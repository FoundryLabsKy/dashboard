name: Check Live Site
on: workflow_dispatch

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Marketing site and app both respond
        run: |
          set -euo pipefail
          url="https://foundrylabsky.github.io/dashboard/"
          # Public marketing site at the root
          code=$(curl -s -o /tmp/page.html -w "%{http_code}" "$url")
          echo "HTTP $code from $url"
          [ "$code" = "200" ]
          grep -q "Foundry Labs" /tmp/page.html && echo "Marketing markup present"
          for path in services pricing about contact; do
            sub=$(curl -sL -o /dev/null -w "%{http_code}" "${url}${path}/")
            echo "HTTP $sub from ${url}${path}/"
            [ "$sub" = "200" ]
          done
          # Internal dashboard, now served under /app
          appcode=$(curl -sL -o /tmp/app.html -w "%{http_code}" "${url}app/")
          echo "HTTP $appcode from ${url}app/"
          [ "$appcode" = "200" ]
          grep -q "Foundry Dashboard" /tmp/app.html && echo "App markup present"
          for path in todo built income archived company; do
            sub=$(curl -sL -o /dev/null -w "%{http_code}" "${url}app/${path}/")
            echo "HTTP $sub from ${url}app/${path}/"
            [ "$sub" = "200" ]
          done
      - name: Supabase reachable with app credentials
        run: |
          set -euo pipefail
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "apikey: sb_publishable_wFjOh8cogARpOPpXcZ4nww_SZaG90np" \
            "https://lcgqzvfeqynzfwpmcoye.supabase.co/rest/v1/companies?select=id&limit=1")
          echo "Supabase REST HTTP $code"
          [ "$code" = "200" ]
          talks=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "apikey: sb_publishable_wFjOh8cogARpOPpXcZ4nww_SZaG90np" \
            "https://lcgqzvfeqynzfwpmcoye.supabase.co/rest/v1/companies?select=in_talks,talking_points&limit=1")
          echo "In Talks columns HTTP $talks"
          [ "$talks" = "200" ] && echo "In Talks migration applied" || echo "::warning::In Talks migration NOT applied yet — run the Migrate Supabase workflow"
          echo "ALL LIVE CHECKS PASSED"
      - name: AI autofill key works
        run: |
          set -euo pipefail
          b64=$(grep -o 'EMBEDDED_KEY_B64 = "[^"]*"' src/lib/ai.ts | cut -d'"' -f2)
          key=$(printf %s "$b64" | base64 -d)
          echo "::add-mask::$key"
          code=$(curl -s -o /tmp/ai.json -w "%{http_code}" -X POST \
            -H "Content-Type: application/json" -H "x-goog-api-key: $key" \
            -d '{"contents":[{"parts":[{"text":"Reply with the single word: ready"}]}]}' \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent")
          echo "Gemini basic call HTTP $code"
          [ "$code" = "200" ] || { echo "Gemini error:"; head -c 500 /tmp/ai.json; echo; echo "AI KEY CHECK FAILED"; exit 1; }
          code2=$(curl -s -o /tmp/ai2.json -w "%{http_code}" -X POST \
            -H "Content-Type: application/json" -H "x-goog-api-key: $key" \
            -d '{"contents":[{"parts":[{"text":"What is the current population of the Cayman Islands? One sentence."}]}],"tools":[{"google_search":{}}]}' \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent")
          echo "Gemini search-grounded call HTTP $code2"
          if [ "$code2" = "200" ]; then
            echo "AI AUTOFILL KEY WORKS (with web search)"
          elif [ "$code2" = "429" ]; then
            echo "::warning::Web-search quota exhausted for today — the app falls back to built-in knowledge"
            echo "AI AUTOFILL KEY WORKS (fallback mode)"
          else
            echo "Gemini search error:"; head -c 500 /tmp/ai2.json; echo
            echo "AI SEARCH CHECK FAILED"; exit 1
          fi
