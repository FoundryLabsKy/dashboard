name: Diagnose AI
on: workflow_dispatch

env:
  SUPA: https://lcgqzvfeqynzfwpmcoye.supabase.co
  ANON: sb_publishable_wFjOh8cogARpOPpXcZ4nww_SZaG90np

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Inspect stored Gemini key (never prints the value)
        run: |
          set -euo pipefail
          row=$(curl -s -H "apikey: $ANON" "$SUPA/rest/v1/settings?select=key,value&key=eq.gemini_api_key")
          count=$(echo "$row" | jq 'length')
          if [ "$count" = "0" ]; then
            echo "No custom key stored — app uses the built-in key."
          else
            val=$(echo "$row" | jq -r '.[0].value')
            echo "::add-mask::$val"
            echo "Custom key stored: length ${#val}, starts with ${val:0:3}..."
            code=$(curl -s -o /tmp/k.json -w "%{http_code}" -X POST \
              -H "Content-Type: application/json" -H "x-goog-api-key: $val" \
              -d '{"contents":[{"parts":[{"text":"Reply with the single word: ready"}]}]}' \
              "https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent")
            echo "STORED key basic call HTTP $code"
            [ "$code" = "200" ] || { echo "Stored key error:"; head -c 400 /tmp/k.json; echo; }
          fi
      - name: Test embedded key right now
        run: |
          set -euo pipefail
          b64=$(grep -o 'EMBEDDED_KEY_B64 = "[^"]*"' src/lib/ai.ts | cut -d'"' -f2)
          key=$(printf %s "$b64" | base64 -d)
          echo "::add-mask::$key"
          code=$(curl -s -o /tmp/e.json -w "%{http_code}" -X POST \
            -H "Content-Type: application/json" -H "x-goog-api-key: $key" \
            -d '{"contents":[{"parts":[{"text":"Reply with the single word: ready"}]}]}' \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent")
          echo "EMBEDDED key basic call HTTP $code"
          [ "$code" = "200" ] || { echo "Embedded key error:"; head -c 400 /tmp/e.json; echo; }
      - name: Browser-level check of the live site (CORS + runtime)
        run: |
          set -euo pipefail
          npm install --no-save playwright@1.49.0 > /dev/null 2>&1
          npx playwright install --with-deps chromium > /dev/null 2>&1
          node - <<'EOF'
          const { chromium } = require("playwright");
          (async () => {
            const browser = await chromium.launch();
            const page = await browser.newPage();
            const logs = [];
            page.on("console", (m) => { if (m.type() === "error") logs.push("CONSOLE: " + m.text()); });
            page.on("pageerror", (e) => logs.push("PAGEERROR: " + e.message));
            page.on("response", (r) => {
              if (r.url().includes("generativelanguage")) logs.push("GEMINI RESPONSE: HTTP " + r.status());
            });
            page.on("requestfailed", (r) => {
              if (r.url().includes("generativelanguage")) logs.push("GEMINI REQUEST FAILED: " + (r.failure()?.errorText ?? "?"));
            });
            await page.goto("https://foundrylabsky.github.io/dashboard/", { waitUntil: "networkidle" });
            await page.getByLabel("Enter access code").fill("community");
            await page.getByRole("button", { name: "Unlock" }).click();
            await page.waitForTimeout(2500);
            // open first Built-stage company via the Built page
            await page.goto("https://foundrylabsky.github.io/dashboard/built/", { waitUntil: "networkidle" });
            await page.waitForTimeout(2500);
            const heading = page.locator("article h3").first;
            const cards = await page.locator("article h3").allInnerTexts();
            logs.push("BUILT CARDS: " + JSON.stringify(cards));
            if (cards.length) {
              await page.locator("article h3").first().click();
              await page.waitForTimeout(3000);
              const hasScript = await page.getByText("Sales script").count();
              logs.push("SALES SCRIPT SECTION PRESENT: " + hasScript);
              const btn = page.getByRole("button", { name: /Write my script|Rewrite/ });
              if (await btn.count()) {
                await btn.first().click();
                await page.waitForTimeout(15000);
                const toasts = await page.locator("[aria-live=polite] div").allInnerTexts();
                logs.push("TOASTS: " + JSON.stringify(toasts));
                const textarea = await page.locator("textarea[aria-label^='Sales script']").count();
                logs.push("SCRIPT TEXTAREA PRESENT AFTER GENERATE: " + textarea);
              } else {
                logs.push("NO GENERATE BUTTON FOUND");
              }
            }
            console.log(logs.join("\n"));
            await browser.close();
          })().catch((e) => { console.error("E2E ERROR: " + e.message); process.exit(1); });
          EOF
