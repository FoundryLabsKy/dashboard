        <div key={"tag-"+animKey} style={{padding:"7px 16px",borderRadius:20,border:"1px solid "+current.accent+"35",background:current.accent+"0D",opacity:0,animation:titleDone?"tutFadeUp 0.4s ease 0.2s forwards":"none"}}>
          <p style={{fontSize:10,fontWeight:700,color:current.accent,letterSpacing:"0.09em"}}>📍 {current.tag}</p>
        </div>
      </div>
      <div style={{display:"flex",gap:6,justifyContent:"center",padding:"28px 0 0"}}>
        {STEPS.map(function(_,i){
          return <div key={i} onClick={function(){jumpTo(i);}} style={{width:i===step?26:6,height:6,borderRadius:3,background:i===step?current.accent:"rgba(255,255,255,0.12)",cursor:"pointer",transition:"width 0.35s cubic-bezier(0.25,1,0.5,1), background 0.35s ease"}}/>;
        })}
      </div>
      <div style={{padding:"20px 24px 48px",display:"flex",gap:12,alignItems:"center"}}>
        <button onClick={goPrev} disabled={step===0} style={{width:52,height:52,borderRadius:13,border:"1px solid rgba(255,255,255,0.12)",background:"transparent",color:step===0?"rgba(255,255,255,0.15)":"rgba(255,255,255,0.6)",fontSize:22,cursor:step===0?"default":"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>←</button>
        <button onClick={goNext} style={{flex:1,padding:"17px",borderRadius:13,border:"none",background:"linear-gradient(135deg,"+current.accent+","+OR_H+")",color:"#fff",fontFamily:"Barlow Condensed,sans-serif",fontSize:20,fontWeight:800,cursor:"pointer",letterSpacing:"0.08em",boxShadow:"0 0 32px "+current.accent+"3A",transition:"background 0.45s ease, box-shadow 0.3s ease"}}>{step===total-1?"FINISH →":"NEXT →"}</button>
      </div>
    </div>
  );
}

/* -- PLATE CALCULATOR MODAL ----------------------------------------- */
function PlateCalc(p){
  var [unit,setUnit]=useState(p.useKg!==false?"kg":"lb");
  var [barId,setBarId]=useState("oly");
  var [addedPlates,setAddedPlates]=useState([]);
  var [perSide,setPerSide]=useState(true);
  var bar=getBar(barId);
  var barW=unit==="lb"?bar.lb:bar.kg;
  var KG_OPTS=[1.25,2.5,5,10,15,20,25];
  var LB_OPTS=[2.5,5,10,15,25,35,45];
  var plateOpts=unit==="kg"?KG_OPTS:LB_OPTS;
  function pColor(w){
    if(unit==="lb"){
      if(w>=45)return "#DC2626";
      if(w>=35)return "#2563EB";
      if(w>=25)return "#EAB308";
      if(w>=15)return "#16A34A";
      if(w>=10)return "#F97316";
      if(w>=5) return "#E5E7EB";
      return "#9CA3AF";
    } else {
      if(w>=25)return "#DC2626";
      if(w>=20)return "#2563EB";
      if(w>=15)return "#EAB308";
      if(w>=10)return "#16A34A";
      if(w>=5) return "#E5E7EB";
      if(w>=2.5)return "#9CA3AF";
      return "#C084FC";
    }
  }
  function pH(w){return unit==="lb"?(w>=45?46:w>=35?42:w>=25?38:w>=15?33:w>=10?28:w>=5?22:16):(w>=25?46:w>=20?42:w>=15?38:w>=10?32:w>=5?26:w>=2.5?20:16);}
  function pW(w){return unit==="lb"?(w>=45?14:w>=35?13:w>=25?12:w>=10?10:w>=5?8:6):(w>=25?14:w>=20?13:w>=15?12:w>=10?10:w>=5?8:6);}
  function addPlate(w){setAddedPlates(function(prev){return prev.concat([w]).sort(function(a,b){return b-a;});});}
  function undoLast(){setAddedPlates(function(prev){return prev.slice(0,-1);});}
  function reset(){setAddedPlates([]);}
  var platesSum=addedPlates.reduce(function(a,b){return a+b;},0);
  var totalWeight=barW+(perSide?platesSum*2:platesSum);
  var counts={};addedPlates.forEach(function(w){counts[w]=(counts[w]||0)+1;});
  function fmt(n){var s=n.toFixed(2).replace(/\.?0+$/,"");return s;}
  return (
    <div style={{position:"fixed",top:0,right:0,bottom:0,left:0,zIndex:400,display:"flex",flexDirection:"column",justifyContent:"flex-end",background:"rgba(0,0,0,0.5)",backdropFilter:"blur(6px)",WebkitBackdropFilter:"blur(6px)",animation:"overlayIn .3s ease"}} onClick={p.onClose}>
      <div onClick={function(e){e.stopPropagation();}} style={{background:SURF,borderRadius:"22px 22px 0 0",border:"1px solid "+BORD,maxWidth:420,width:"100%",margin:"0 auto",padding:"14px 16px 24px",animation:"slideUp .5s cubic-bezier(0.32,0.72,0,1)",maxHeight:"90vh",overflowY:"auto"}}>
        <div style={{display:"flex",justifyContent:"center",marginBottom:10}}><div style={{width:36,height:4,borderRadius:2,background:BORD}}/></div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <p style={{fontFamily:"Barlow Condensed,sans-serif",fontSize:20,fontWeight:800,letterSpacing:"0.04em"}}>PLATE CALCULATOR</p>
          <button onClick={p.onClose} style={{background:"none",border:"none",color:MU,cursor:"pointer",padding:4}}><Ic d={D.x} z={18} c={MU}/></button>
        </div>
        {/* Unit + Bar row */}
        <div style={{display:"flex",gap:6,marginBottom:10,overflowX:"auto"}}>
          {["kg","lb"].map(function(u){return <button key={u} onClick={function(){
            if(u===unit) return;
            var newOpts=u==="kg"?KG_OPTS:LB_OPTS;
            setAddedPlates(function(prev){
              return prev.map(function(w){
                var converted=u==="lb"?w*2.20462:w/2.20462;
                return newOpts.reduce(function(a,b){return Math.abs(b-converted)<Math.abs(a-converted)?b:a;});
              }).sort(function(a,b){return b-a;});
            });
            setUnit(u);
          }} style={{padding:"6px 12px",borderRadius:8,border:"1px solid "+(unit===u?OR:BORD),background:unit===u?OR_H+"15":"transparent",color:unit===u?OR:MU,fontWeight:700,fontSize:12,cursor:"pointer",flexShrink:0}}>{u.toUpperCase()}</button>;})}
          {BARS.map(function(b){return <button key={b.id} onClick={function(){setBarId(b.id);}} style={{padding:"6px 10px",borderRadius:8,border:"1px solid "+(barId===b.id?OR:BORD),background:barId===b.id?OR_H+"12":CARD,color:barId===b.id?OR:MU,fontSize:11,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap",flexShrink:0}}>{b.name} <span style={{opacity:0.6}}>{unit==="lb"?b.lb:b.kg}{unit}</span></button>;})}
        </div>
        {/* Per Side / Total toggle */}
        <div style={{display:"flex",gap:0,marginBottom:14,background:CARD,borderRadius:10,padding:3,border:"1px solid "+BORD}}>
          {[{v:true,l:"Per Side"},{v:false,l:"Total"}].map(function(opt){return <button key={opt.l} onClick={function(){setPerSide(opt.v);}} style={{flex:1,padding:"8px",borderRadius:8,border:"none",background:perSide===opt.v?OR:"transparent",color:perSide===opt.v?"#fff":MU,fontSize:13,fontWeight:700,cursor:"pointer",transition:"all 0.15s"}}>{opt.l}</button>;})}
        </div>
        {/* Total weight display */}
        <div style={{textAlign:"center",marginBottom:12}}>
          <div style={{fontFamily:"Barlow Condensed,sans-serif",fontSize:56,fontWeight:800,color:TX,lineHeight:1}}>{fmt(totalWeight)}<span style={{fontSize:16,color:MU,fontWeight:400,marginLeft:4}}>{unit}</span></div>
          <div style={{fontSize:11,color:MU,marginTop:3}}>Bar {barW}{unit}{platesSum>0?" + "+(perSide?fmt(platesSum*2):fmt(platesSum))+unit+" plates":""}</div>
        </div>
        {/* Barbell graphic */}
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",marginBottom:14,minHeight:56,overflowX:"auto",paddingBottom:4}}>
          <div style={{display:"flex",alignItems:"center",gap:0,flexShrink:0}}>
            <div style={{width:6,height:18,background:"#52525B",borderRadius:"3px 0 0 3px"}}/>
            <div style={{width:addedPlates.length>0?8:20,height:8,background:"#9CA3AF"}}/>
            {addedPlates.slice().reverse().map(function(w,i){return <div key={"L"+i} title={"Tap to remove"} onClick={function(){undoLast();}} style={{width:pW(w),height:pH(w),background:pColor(w),border:"1px solid rgba(0,0,0,0.4)",cursor:"pointer"}}/>;  })}
            <div style={{width:44,height:16,background:"#374151",borderRadius:3,display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{width:34,height:7,background:"#1F2937",borderRadius:2}}/></div>
            {addedPlates.map(function(w,i){return <div key={"R"+i} style={{width:pW(w),height:pH(w),background:pColor(w),border:"1px solid rgba(0,0,0,0.4)"}}/>;  })}
            <div style={{width:addedPlates.length>0?8:20,height:8,background:"#9CA3AF"}}/>
            <div style={{width:6,height:18,background:"#52525B",borderRadius:"0 3px 3px 0"}}/>
          </div>
        </div>
        {/* Plate count tags */}
        {addedPlates.length>0&&(
          <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:12,justifyContent:"center"}}>
            {Object.keys(counts).sort(function(a,b){return parseFloat(b)-parseFloat(a);}).map(function(w){return <span key={w} style={{padding:"4px 10px",borderRadius:20,background:pColor(parseFloat(w))+"22",border:"1px solid "+pColor(parseFloat(w))+"50",color:TX,fontSize:12,fontWeight:700}}>{counts[w]}× {w}{unit}{perSide?" /side":""}</span>;})}
          </div>
        )}
        {/* Plate tap buttons */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:7,marginBottom:12}}>
          {plateOpts.map(function(w){
            return (
              <button key={w} onClick={function(){addPlate(w);}} style={{padding:"10px 4px",borderRadius:12,border:"2px solid "+pColor(w)+"55",background:pColor(w)+"15",color:TX,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                <div style={{width:18,height:Math.min(32,14+w*0.5),background:pColor(w),borderRadius:3,border:"1px solid rgba(0,0,0,0.3)"}}/>
                <span style={{fontFamily:"Barlow Condensed,sans-serif",fontSize:15,fontWeight:800,lineHeight:1}}>{w}</span>
                <span style={{fontSize:9,color:MU}}>{unit}</span>
              </button>
            );
          })}
        </div>
        {/* Undo / Clear */}
        <div style={{display:"flex",gap:8}}>
          <button onClick={undoLast} disabled={addedPlates.length===0} style={{flex:1,padding:"11px",borderRadius:10,border:"1px solid "+BORD,background:"transparent",color:addedPlates.length>0?TX:MU,fontSize:13,fontWeight:700,cursor:addedPlates.length>0?"pointer":"default",opacity:addedPlates.length>0?1:0.4}}>↩ Undo</button>
          <button onClick={reset} disabled={addedPlates.length===0} style={{flex:1,padding:"11px",borderRadius:10,border:"1px solid "+RE_H+"40",background:RE_H+"10",color:addedPlates.length>0?RE:MU,fontSize:13,fontWeight:700,cursor:addedPlates.length>0?"pointer":"default",opacity:addedPlates.length>0?1:0.4}}>Clear All</button>
        </div>
      </div>
    </div>
  );
}

/* -- CARDIO LOG SCREEN ---------------------------------------------- */
function CardioLog(p){
  var [type,setType]=useState(null);
  var [duration,setDuration]=useState("30");
  var [distance,setDistance]=useState("5");
  var [calories,setCalories]=useState("");
  var [intensity,setIntensity]=useState("moderate");
  var [notes,setNotes]=useState("");
  var [showCustomModal,setShowCustomModal]=useState(false);
  var [customName,setCustomName]=useState("");
  var [customCalories,setCustomCalories]=useState("8");
  var [customTrackDist,setCustomTrackDist]=useState(false);
  var [isSaving,setIsSaving]=useState(false);
  var bodyKg=p.profile&&p.profile.weightKg?p.profile.weightKg:75;
  var distUnit=p.useKg!==false?"km":"mi";
  function autoCal(){
    if(!type||!duration)return;
    var c=estimateCardioCalories(type.id,parseFloat(duration),bodyKg,p.history);
    if(intensity==="high")c=Math.round(c*1.2);
    if(intensity==="low")c=Math.round(c*0.8);
    setCalories(String(c));
  }
  function saveCustomCardio(){
    var n=customName.trim();
    if(!n){alert("Enter activity name");return;}
    var m=parseFloat(customCalories)||8;
    var cust={id:"custom_"+Date.now(),name:n,icon:"bolt",met:m*200/(3.5*bodyKg),trackDist:customTrackDist,custom:true};
    if(p.onCustomCardio)p.onCustomCardio(cust);
    setType(cust);
    setShowCustomModal(false);
    setCustomName("");
    setCustomCalories("8");
    setCustomTrackDist(false);
  }
  function save(){
    if(!type||!duration){alert("Pick activity & duration");return;}
    setIsSaving(true);
    setTimeout(function(){
      var cal=parseFloat(calories)||estimateCardioCalories(type.id,parseFloat(duration),bodyKg);
      var rec={
        type:"cardio",
        name:type.name,
        date:new Date().toLocaleDateString("en-US",{month:"short",day:"numeric"}),
        dateISO:new Date().toISOString().slice(0,10),
        dur:Math.round(parseFloat(duration))+" min",
        sets:1,
        vol:Math.round(cal)+" cal",
        cardioType:type.id,
        duration:parseFloat(duration)||0,
        distance:parseFloat(distance)||null,
        distanceUnit:distUnit,
        calories:cal,
        intensity:intensity,
        notes:notes,
        durationSec:Math.round((parseFloat(duration)||0)*60)
      };
      if(p.onSave)p.onSave(rec);
      setIsSaving(false);
      if(p.onSaveSuccess)setTimeout(function(){p.onSaveSuccess();},100);
    },300);
  }
  var customCardio=p.customCardio||[];
  var allTypes=CARDIO_TYPES.concat(customCardio);
  return (
    <React.Fragment>
      {!type?(
        <div style={{paddingBottom:80,animation:"fadeUp 0.3s ease-out"}}>
          <div style={{padding:"52px 20px 14px",background:SURF,display:"flex",alignItems:"center",gap:12}}>
            <button onClick={p.onBack} style={{width:36,height:36,borderRadius:10,border:"1px solid "+BORD,background:CARD,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}><Ic d={D.back} z={16} c={TX}/></button>
            <h1 style={{fontFamily:"Barlow Condensed,sans-serif",fontSize:28,fontWeight:800,letterSpacing:"0.04em"}}>CARDIO</h1>
          </div>
          <div style={{padding:"16px 20px"}}>
            <p style={{fontSize:12,color:MU,marginBottom:12,letterSpacing:"0.05em",fontWeight:700}}>PICK YOUR ACTIVITY</p>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              {allTypes.map(function(c){
                return (
                  <button key={c.id} onClick={function(){setType(c);}} style={{padding:"18px 12px",borderRadius:14,border:"1px solid "+(c.custom?OR_H+"60":BORD),background:c.custom?OR_H+"08":CARD,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"flex-start",gap:8,transition:"border .15s, transform .15s"}}
                    onMouseDown={function(e){e.currentTarget.style.transform="scale(0.97)";}}
                    onMouseUp={function(e){e.currentTarget.style.transform="scale(1)";}}
                    onMouseLeave={function(e){e.currentTarget.style.transform="scale(1)";}}>
                    <div style={{width:34,height:34,borderRadius:9,background:OR_H+"15",display:"flex",alignItems:"center",justifyContent:"center"}}>
                      <Ic d={D[c.icon||"bolt"]} z={18} c={OR}/>
                    </div>
                    <p style={{fontFamily:"Barlow Condensed,sans-serif",fontSize:17,fontWeight:700,letterSpacing:"0.03em"}}>{c.name.toUpperCase()}{c.custom&&<span style={{color:OR,fontSize:11,marginLeft:4,animation:"checkPulse 1.2s ease-in-out infinite",display:"inline-block"}}>★</span>}</p>
                    <p style={{fontSize:10,color:MU}}>~{Math.round(c.met*3.5*bodyKg/200)} cal/min</p>
                  </button>
                );
              })}
              <button onClick={function(){setShowCustomModal(true);}} style={{padding:"18px 12px",borderRadius:14,border:"2px dashed "+OR_H+"40",background:"transparent",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:8,transition:"border .15s"}}>
                <Ic d={D.plus} z={18} c={OR}/>
                <p style={{fontFamily:"Barlow Condensed,sans-serif",fontSize:15,fontWeight:700,letterSpacing:"0.03em",color:OR}}>CREATE</p>
              </button>
            </div>
          </div>
        </div>
      ):(
        <div style={{paddingBottom:120,animation:"fadeUp 0.3s ease-out"}}>
          <div style={{padding:"52px 20px 14px",background:SURF,display:"flex",alignItems:"center",gap:12}}>
            <button onClick={function(){setType(null);}} style={{width:36,height:36,borderRadius:10,border:"1px solid "+BORD,background:CARD,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}><Ic d={D.back} z={16} c={TX}/></button>
            <div style={{flex:1}}>
              <h1 style={{fontFamily:"Barlow Condensed,sans-serif",fontSize:24,fontWeight:800,letterSpacing:"0.04em"}}>{type.name.toUpperCase()}</h1>
              <p style={{fontSize:11,color:MU}}>Log your session</p>
            </div>
            <div style={{width:42,height:42,borderRadius:11,background:OR_H+"15",display:"flex",alignItems:"center",justifyContent:"center"}}><Ic d={D[type.icon]} z={20} c={OR}/></div>
          </div>
          <div style={{padding:"16px 20px",display:"flex",flexDirection:"column",gap:14}}>
            {/* duration */}
            <div>
              <p style={{fontSize:11,color:MU,fontWeight:700,letterSpacing:"0.05em",marginBottom:6}}>DURATION (MINUTES)</p>
              <input type="number" inputMode="decimal" value={duration} onChange={function(e){setDuration(e.target.value);}} onBlur={autoCal} placeholder="30" style={{width:"100%",background:CARD,border:"1px solid "+BORD,borderRadius:11,padding:"14px 16px",color:TX,fontSize:18,fontFamily:"Barlow Condensed,sans-serif",fontWeight:700,outline:"none",boxSizing:"border-box"}}/>
            </div>
            {/* distance (only if applicable) */}
            {type.trackDist&&(
              <div>
                <p style={{fontSize:11,color:MU,fontWeight:700,letterSpacing:"0.05em",marginBottom:6}}>DISTANCE ({distUnit.toUpperCase()})</p>
                <input type="number" inputMode="decimal" value={distance} onChange={function(e){setDistance(e.target.value);}} placeholder="5" style={{width:"100%",background:CARD,border:"1px solid "+BORD,borderRadius:11,padding:"14px 16px",color:TX,fontSize:18,fontFamily:"Barlow Condensed,sans-serif",fontWeight:700,outline:"none",boxSizing:"border-box"}}/>
              </div>
            )}
            {/* intensity */}
            <div>
              <p style={{fontSize:11,color:MU,fontWeight:700,letterSpacing:"0.05em",marginBottom:6}}>INTENSITY</p>
              <div style={{display:"flex",gap:6}}>
                {[["low","Low"],["moderate","Moderate"],["high","High"]].map(function(k){
                  return <button key={k[0]} onClick={function(){setIntensity(k[0]);}} style={{flex:1,padding:"11px 6px",borderRadius:10,border:"1px solid "+(intensity===k[0]?OR:BORD),background:intensity===k[0]?OR_H+"15":CARD,color:intensity===k[0]?OR:MU,fontWeight:700,fontSize:12,cursor:"pointer"}}>{k[1]}</button>;
                })}
              </div>
            </div>
            {/* calories */}
            <div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                <p style={{fontSize:11,color:MU,fontWeight:700,letterSpacing:"0.05em"}}>CALORIES BURNED</p>
                <button onClick={autoCal} style={{padding:"3px 8px",borderRadius:6,border:"1px solid "+OR_H+"40",background:OR_H+"10",color:OR,fontSize:10,fontWeight:700,cursor:"pointer"}}>Auto-Estimate</button>
              </div>
              <input type="number" inputMode="numeric" value={calories} onChange={function(e){setCalories(e.target.value);}} placeholder={duration?String(estimateCardioCalories(type.id,parseFloat(duration),bodyKg)):"--"} style={{width:"100%",background:CARD,border:"1px solid "+BORD,borderRadius:11,padding:"14px 16px",color:TX,fontSize:18,fontFamily:"Barlow Condensed,sans-serif",fontWeight:700,outline:"none",boxSizing:"border-box"}}/>
            </div>
            {/* notes */}
            <div>
              <p style={{fontSize:11,color:MU,fontWeight:700,letterSpacing:"0.05em",marginBottom:6}}>NOTES</p>
              <textarea value={notes} onChange={function(e){setNotes(e.target.value);}} placeholder="How did it feel?" rows={3} style={{width:"100%",background:CARD,border:"1px solid "+BORD,borderRadius:11,padding:"12px 14px",color:TX,fontSize:14,outline:"none",boxSizing:"border-box",resize:"vertical",fontFamily:"inherit"}}/>
            </div>
          </div>
          <div style={{position:"fixed",bottom:80,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:420,padding:"10px 20px 12px",borderTop:"1px solid "+BORD,background:SURF,zIndex:60}}>
            <button onClick={save} disabled={!duration||isSaving} style={{width:"100%",padding:"15px",borderRadius:13,border:"none",background:duration?"linear-gradient(135deg,"+OR_H+",#EA580C)":SU,color:duration?"#fff":MU,fontFamily:"Barlow Condensed,sans-serif",fontSize:18,fontWeight:800,cursor:duration&&!isSaving?"pointer":"default",letterSpacing:"0.04em",opacity:isSaving?0.7:1,animation:isSaving?"pulse 1s ease-in-out infinite":"none"}}>
              {isSaving?"SAVING...":"SAVE CARDIO"}
            </button>
          </div>
        </div>
      )}
      {showCustomModal&&<div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.6)",display:"flex",alignItems:"flex-end",zIndex:100,animation:"fadeUp 0.25s ease-out"}}>
        <div style={{width:"100%",background:SURF,borderRadius:"20px 20px 0 0",padding:"20px",boxShadow:"0 -4px 20px rgba(0,0,0,0.3)",animation:"slideUp .5s cubic-bezier(0.32,0.72,0,1)"}}>
          <p style={{fontSize:16,fontWeight:700,marginBottom:16,color:TX}}>CREATE CUSTOM ACTIVITY</p>
          <input type="text" placeholder="Activity name (e.g. Rowing Machine)" value={customName} onChange={function(e){setCustomName(e.target.value);}} style={{width:"100%",padding:"12px 14px",borderRadius:11,border:"1px solid "+BORD,background:CARD,color:TX,fontSize:14,marginBottom:12,boxSizing:"border-box",outline:"none"}}/>
          <input type="number" inputMode="decimal" placeholder="Calories per min" value={customCalories} onChange={function(e){setCustomCalories(e.target.value);}} style={{width:"100%",padding:"12px 14px",borderRadius:11,border:"1px solid "+BORD,background:CARD,color:TX,fontSize:14,marginBottom:12,boxSizing:"border-box",outline:"none"}}/>
          <button onClick={function(){setCustomTrackDist(!customTrackDist);}} style={{width:"100%",padding:"12px 14px",borderRadius:11,border:"1px solid "+(customTrackDist?OR:BORD),background:customTrackDist?OR_H+"15":CARD,color:customTrackDist?OR:TX,fontSize:14,fontWeight:700,marginBottom:16,boxSizing:"border-box",cursor:"pointer",transition:"all 0.25s ease, transform 0.15s ease",transform:"scale(1)"}} onMouseDown={function(e){e.currentTarget.style.transform="scale(0.98)";}} onMouseUp={function(e){e.currentTarget.style.transform="scale(1)";}} onMouseLeave={function(e){e.currentTarget.style.transform="scale(1)";}}>{"✓ TRACK DISTANCE"}</button>
          <button onClick={saveCustomCardio} style={{width:"100%",padding:"12px",borderRadius:11,background:OR,color:"#fff",border:"none",fontWeight:700,fontSize:16,cursor:"pointer",marginBottom:8,transition:"all 0.2s ease",transform:"scale(1)"}} onMouseDown={function(e){e.currentTarget.style.transform="scale(0.96)";}} onMouseUp={function(e){e.currentTarget.style.transform="scale(1)";}} onMouseLeave={function(e){e.currentTarget.style.transform="scale(1)";}}>CREATE</button>
          <button onClick={function(){setShowCustomModal(false);setCustomName("");setCustomCalories("8");setCustomTrackDist(false);}} style={{width:"100%",padding:"12px",borderRadius:11,background:BORD,color:MU,border:"none",fontWeight:700,fontSize:16,cursor:"pointer",transition:"all 0.2s ease",transform:"scale(1)"}} onMouseDown={function(e){e.currentTarget.style.transform="scale(0.96)";}} onMouseUp={function(e){e.currentTarget.style.transform="scale(1)";}} onMouseLeave={function(e){e.currentTarget.style.transform="scale(1)";}}>CANCEL</button>
        </div>
      </div>}
    </React.Fragment>
  );
}

function App(){
  var [profile,setProfileRaw]=useState(function(){return ld("profile",null);});
  var [useKg,setUseKgRaw]=useState(function(){var pr=ld("profile",null);return pr?pr.useKg!==false:true;});
  var [splits,setSplitsRaw]=useState(function(){return ld("splits",[]);});
  var [prs,setPrsRaw]=useState(function(){return ld("prs",{});});
  var [history,setHistoryRaw]=useState(function(){return ld("history",[]);});
  var [customs,setCustomsRaw]=useState(function(){return ld("customEx",[]);});
  var [screen,setScreen]=useState("home");
  var [workout,setWorkoutRaw]=useState(function(){return ld("activeWorkout",null);});
  var [finRows,setFinRows]=useState(null);
  var [finSec,setFinSec]=useState(0);
  var [startTime,setStartTime]=useState(null);
  var [showSaveToast,setShowSaveToast]=useState(false);
  var [cardioSuccessMsg,setCardioSuccessMsg]=useState("");
  var [showResumeDialog,setShowResumeDialog]=useState(false);
  var [showTutorial,setShowTutorial]=useState(function(){return !ld("tutorialSeen",false);});

  /* Auto-sync profile from Supabase if missing but user is authenticated */
  useEffect(function(){
    if(profile&&profile.displayName&&profile.username) return;
    try{
      window.LOCKED._client.auth.getSession().then(function(result){
        if(!result||!result.data||!result.data.session||!result.data.session.user) return;
        var user=result.data.session.user;
        var meta=user.user_metadata||{};
        window.LOCKED._client.from("profiles").select("*").eq("user_id",user.id).single().then(function(r){
          if(!r||!r.data) return;
          var syncedProfile={
            displayName:r.data.display_name||r.data.displayName||meta.displayName||"Athlete",
            username:r.data.username||meta.username||(user.email?user.email.split("@")[0]:"user"),
            useKg:r.data.use_kg!==false,
            createdAt:r.data.created_at||new Date().toLocaleDateString()
          };
          sd("profile",syncedProfile);
          setProfileRaw(syncedProfile);
          setUseKgRaw(syncedProfile.useKg);
        }).catch(function(){});
      }).catch(function(){});
    }catch(e){}
  },[]);

  /* Persist workout to localStorage on changes */
  function setWorkout(fn){
    setWorkoutRaw(function(prev){
      var next=typeof fn==="function"?fn(prev):fn;
      if(next) sd("activeWorkout",next);
      else sd("activeWorkout",null);
      return next;
    });
  }

  /* Handle resume dialog on app mount */
  useEffect(function(){
    if(workout&&screen!=="workout"){
      setShowResumeDialog(true);
    }
  },[]);

  /* Handle visibility change to pause timer on background */
  useEffect(function(){
    function handleVisibilityChange(){
      if(document.visibilityState==="hidden"&&workout){
        /* Pause timer when app goes to background */
        setWorkout(function(prev){
          if(!prev) return prev;
          return Object.assign({},prev,{isPaused:true});
        });
      }
    }
    document.addEventListener("visibilitychange",handleVisibilityChange);
    return function(){document.removeEventListener("visibilitychange",handleVisibilityChange);};
  },[workout]);

  function setSplits(fn){setSplitsRaw(function(p){var n=typeof fn==="function"?fn(p):fn;sd("splits",n);return n;});}
  function setPrs(fn){setPrsRaw(function(p){var n=typeof fn==="function"?fn(p):fn;sd("prs",n);return n;});}
  function setHistory(fn){setHistoryRaw(function(p){var n=typeof fn==="function"?fn(p):fn;sd("history",n);return n;});}
  function addCustom(ex){
    var already=false;for(var i=0;i<ALL_EX.length;i++){if(ALL_EX[i].id===ex.id){already=true;break;}}
    if(!already) ALL_EX.push(ex);
    setCustomsRaw(function(p){var n=p.concat([ex]);sd("customEx",n);return n;});
  }
  function toggleUnit(){
    setUseKgRaw(function(prev){
      var next=!prev;
      setProfileRaw(function(pr){var np=Object.assign({},pr,{useKg:next});sd("profile",np);return np;});
      return next;
    });
  }
  function updateProfile(updates){
    setProfileRaw(function(pr){var np=Object.assign({},pr,updates);sd("profile",np);return np;});
  }
  function completeOnboarding(data,prog){
    var pr={displayName:data.displayName,username:data.username,useKg:data.useKg,createdAt:new Date().toLocaleDateString()};
    sd("profile",pr);setProfileRaw(pr);setUseKgRaw(pr.useKg);
    if(prog&&prog.splits){
      // Check if the AI returned splits-with-days format (PPL = 3 splits, each with days)
      // or days-as-splits format (each day is its own split) - we want one split with all days
      var hasDays=prog.splits.some(function(s){return s.days&&s.days.length>0;});
      var newSplits;
      if(hasDays){
        // Correct format: each item in splits becomes a proper split with its days
        // But if the program name suggests it's ONE program (PPL, Upper/Lower etc)
        // keep them as separate splits (Push split, Pull split, Legs split)
        newSplits=prog.splits.map(function(s,i){
          return {
            id:"s"+Date.now()+(i*997),
            name:s.name,
            days:(s.days||[]).map(function(d){return {name:d.name,exIds:d.exIds||d.exercises||[]};})  ,
            created:new Date().toLocaleDateString()
          };
        });
        // If each split only has 1 day and there are 3+ splits, they're probably meant to be
        // days in one split - consolidate into one
        var allSingleDay=newSplits.every(function(s){return s.days.length===1;});
        if(allSingleDay&&newSplits.length>=2){
          var consolidated={
            id:"s"+Date.now(),
            name:prog.name||"My Program",
            days:newSplits.map(function(s){return {name:s.name,exIds:s.days[0].exIds};})  ,
            created:new Date().toLocaleDateString()
          };
          newSplits=[consolidated];
        }
      } else {
        // Days-as-splits: consolidate into one split
        newSplits=[{
          id:"s"+Date.now(),
          name:prog.name||"My Program",
          days:prog.splits.map(function(s){return {name:s.name,exIds:s.exIds||s.exercises||[]};})  ,
          created:new Date().toLocaleDateString()
        }];
      }
      setSplits(newSplits);
    }
    setScreen("home");
  }
  function startWorkout(info){
    var st=Date.now();
    var savedRows=ld("activeWorkoutRows",null);
    var savedSec=ld("activeWorkoutSec",0);
    setWorkout(info);
    setStartTime(st);
    if(savedRows) setFinRows(savedRows);
    if(savedSec) setFinSec(savedSec);
    setScreen(savedRows?"review":"workout");
  }
  function finishWorkout(rows,sec){
    setFinRows(rows);
    setFinSec(sec);
    /* Persist workout progress */
    sd("activeWorkoutRows",rows);
    sd("activeWorkoutSec",sec);
    setScreen("review");
  }
  function saveWorkout(rec){
    setHistory(function(h){return [{name:rec.name,sets:rec.sets,vol:rec.vol,dur:rec.dur,date:rec.date,dateISO:rec.dateISO,exercises:rec.exercises||null,blocks:rec.blocks||null,reflection:rec.reflection||null,note:rec.note||null,aiInsight:rec.aiInsight||null}].concat(h);});
    logBetaActivity("workout_saved",{name:rec.name,sets:rec.sets,vol:rec.vol,dur:rec.dur});
    setShowSaveToast(true);
    setTimeout(function(){setShowSaveToast(false);},2500);
    /* Clear all persisted workout state on successful save */
    setWorkout(null);
    setFinRows(null);
    setStartTime(null);
    sd("activeWorkout",null);
    sd("activeWorkoutRows",null);
    sd("activeWorkoutSec",null);
    sd("activeWorkoutRestTarget",null);
    setScreen("home");
  }

  function go(scr){setScreen(scr);}

  if(!profile||!profile.displayName||!profile.username) return <Onboarding onComplete={completeOnboarding}/>;

  var workoutActive=workout!==null&&screen!=="review";
  var onWorkoutScreen=screen==="workout";
  var showNav=screen!=="review";

  function renderTab(){
    var content;
    if(screen==="review")  content=<Review name={workout&&workout.name} rows={finRows} sec={finSec} useKg={useKg} onSave={saveWorkout} onDiscard={function(){setWorkout(null);setFinRows(null);sd("activeWorkout",null);sd("activeWorkoutRows",null);sd("activeWorkoutSec",null);sd("activeWorkoutRestTarget",null);setScreen("home");}}/>;
    else if(screen==="home"||screen==="workout") content=<HomeScreen useKg={useKg} prs={prs} setPrs={setPrs} customs={customs} onCustom={addCustom} splits={splits} setSplits={setSplits} history={history} setHistory={setHistory} profile={profile} go={go}/>;
    else if(screen==="train")    content=<TrainHub useKg={useKg} prs={prs} setPrs={setPrs} customs={customs} onCustom={addCustom} splits={splits} setSplits={setSplits} history={history} setHistory={setHistory} profile={profile} go={go} onStart={startWorkout} onCardio={function(){setScreen("cardio");}}/>;
    else if(screen==="cardio")   content=<CardioLog useKg={useKg} profile={profile} customCardio={customs.filter(function(c){return c.type==="cardio";})} onCustomCardio={function(cust){addCustom(Object.assign({},cust,{type:"cardio"}));}} onBack={function(){setScreen("train");}} onSave={function(rec){setHistory(function(h){return [rec].concat(h);});setScreen("train");}} onSaveSuccess={function(){setCardioSuccessMsg("✓ LOGGED");setTimeout(function(){setCardioSuccessMsg("");},2000);}}/>;
    else if(screen==="profile")  content=<ProfileScreen useKg={useKg} prs={prs} setPrs={setPrs} customs={customs} onCustom={addCustom} splits={splits} setSplits={setSplits} history={history} profile={profile} go={go} toggleUnit={toggleUnit}/>;
    else if(screen==="settings") content=<SettingsScreen profile={profile} useKg={useKg} toggleUnit={toggleUnit} updateProfile={updateProfile} go={go} onShowTutorial={function(){setShowTutorial(true);}}/>;
    else if(screen==="progress") content=<ProgressPage useKg={useKg} prs={prs} setPrs={setPrs} customs={customs} onCustom={addCustom} splits={splits} setSplits={setSplits} history={history} profile={profile} go={go}/>;
    if(screen==="fuel")     return <FuelTab useKg={useKg} prs={prs} setPrs={setPrs} customs={customs} onCustom={addCustom} splits={splits} setSplits={setSplits} history={history} profile={profile} go={go}/>;
    else if(screen==="shopping") content=<ShoppingBudgetTab useKg={useKg} profile={profile} go={go}/>;
    else if(screen==="betaAdmin") content=<BetaAdminPanel go={go}/>;
    else if(screen==="coach")    content=<CoachScreen useKg={useKg} prs={prs} splits={splits} setSplits={setSplits} history={history} profile={profile} go={go}/>;
    else if(!content) content=<HomeScreen useKg={useKg} prs={prs} setPrs={setPrs} customs={customs} onCustom={addCustom} splits={splits} setSplits={setSplits} history={history} setHistory={setHistory} profile={profile} go={go}/>;
    return <ScreenBoundary key={screen}>{content}</ScreenBoundary>;
  }

  return (
    <React.Fragment>
      <style>{CSS}</style>
      {showTutorial&&<TutorialOverlay onDone={function(){sd("tutorialSeen",true);setShowTutorial(false);}}/>}
      {/* Resume Workout Dialog */}
      {showResumeDialog&&workout&&(
        <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.6)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:2000}}>
          <div style={{background:CARD,borderRadius:16,padding:"24px 20px",maxWidth:320,border:"1px solid "+BORD}}>
            <p style={{fontSize:16,fontWeight:700,color:TX,marginBottom:8}}>Resume Workout?</p>
            <p style={{fontSize:13,color:MU,marginBottom:16,lineHeight:1.5}}>You have an active workout: <strong>{workout.name||"Untitled"}</strong></p>
            <div style={{display:"flex",gap:10}}>
              <button onClick={function(){setShowResumeDialog(false);setWorkout(null);sd("activeWorkout",null);sd("activeWorkoutRows",null);sd("activeWorkoutSec",null);sd("activeWorkoutRestTarget",null);}} style={{flex:1,padding:"12px",borderRadius:10,border:"1px solid "+BORD,background:"transparent",color:MU,fontSize:13,fontWeight:700,cursor:"pointer"}}>Start Fresh</button>
              <button onClick={function(){setShowResumeDialog(false);setScreen("workout");}} style={{flex:1,padding:"12px",borderRadius:10,border:"none",background:"linear-gradient(135deg,"+OR_H+",#EA580C)",color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer"}}>Resume</button>
            </div>
          </div>
        </div>
      )}
      <div style={{maxWidth:420,margin:"0 auto",minHeight:"100vh",background:BG,overflowX:"hidden"}}>
        {/* Floating workout bar when browsing other tabs */}
        {workoutActive&&!onWorkoutScreen&&(
          <div onClick={function(){setScreen("workout");}} style={{position:"fixed",top:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:420,zIndex:300,background:"linear-gradient(90deg,"+OR_H+",#EA580C)",padding:"6px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",cursor:"pointer",paddingTop:50}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <div style={{width:8,height:8,borderRadius:"50%",background:"#fff",animation:"pulse 2s infinite"}}/>
              <p style={{color:"#fff",fontSize:13,fontWeight:700}}>{workout.name||"Workout"} in progress</p>
            </div>
            <p style={{color:"rgba(255,255,255,0.8)",fontSize:12,fontWeight:600}}>TAP TO RETURN</p>
          </div>
        )}
        {/* Persistent WorkoutLog - stays mounted, shown/hidden via CSS */}
        {workoutActive&&(
          <div style={{display:onWorkoutScreen?"block":"none"}}>
            <WorkoutLog name={workout.name} exIds={workout.exIds} blocks={workout.blocks||[]} prs={prs} setPrs={setPrs} useKg={useKg} toggleUnit={toggleUnit} customs={customs} onCustom={addCustom} history={history} onFinish={finishWorkout} onDiscard={function(){setWorkout(null);sd("activeWorkout",null);sd("activeWorkoutRows",null);sd("activeWorkoutSec",null);sd("activeWorkoutRestTarget",null);setScreen("home");}}/>
          </div>
        )}
        {/* Current tab content - hidden when on workout screen */}
        {(!workoutActive||!onWorkoutScreen)&&(
          <div style={{paddingTop:workoutActive&&!onWorkoutScreen?36:0}}>
            {renderTab()}
          </div>
        )}
        {showNav&&<Nav active={onWorkoutScreen?"train":(screen==="settings"||screen==="betaAdmin"?"profile":(screen==="progress"?"home":screen))} go={go}/>}
        {/* Voice Button — toggleable in settings, draggable to corners */}
        {showNav&&profile&&<VoiceButtonWrap/>}
        {/* Voice action toast */}
        <div id="lockedVoiceToast" style={{position:"fixed",bottom:100,left:"50%",transform:"translateX(-50%) translateY(20px)",background:OR,color:"#fff",padding:"12px 22px",borderRadius:10,fontSize:13,fontWeight:600,zIndex:998,opacity:0,transition:"all 0.3s ease",pointerEvents:"none",whiteSpace:"nowrap",maxWidth:"90vw",textAlign:"center"}}/>
        {/* Save Toast Notification */}
        {showSaveToast&&(
          <div style={{position:"fixed",bottom:100,left:"50%",transform:"translateX(-50%)",background:GR,color:"#fff",padding:"12px 20px",borderRadius:8,fontSize:13,fontWeight:600,zIndex:1000,display:"flex",alignItems:"center",gap:8,animation:"slideUp .5s cubic-bezier(0.32,0.72,0,1)"}}>
            <span>✓</span> Saved
          </div>
        )}
        {cardioSuccessMsg&&(
          <div style={{position:"fixed",bottom:100,left:"50%",transform:"translateX(-50%)",background:OR,color:"#fff",padding:"12px 20px",borderRadius:8,fontSize:13,fontWeight:600,zIndex:1000,display:"flex",alignItems:"center",gap:8,animation:"scalePopOut 0.3s ease-out"}}>
            <span>{cardioSuccessMsg}</span>
          </div>
        )}
      </div>
    </React.Fragment>
  );
}

try {
  ReactDOM.createRoot(document.getElementById('root')).render(<ErrorBoundary><App/></ErrorBoundary>);
} catch(e) {
  document.getElementById('root').innerHTML = '<div style="background:#080809;color:#EF4444;padding:40px;text-align:center;min-height:100vh;display:flex;flex-direction:column;justify-content:center"><h2>Failed to Load App</h2><p>Error: ' + (e.message || 'Unknown error') + '</p><p style="color:#9CA3AF;font-size:12px">Check browser console for details</p></div>';
}
</script>
<script>
// Fallback if React/Babel don't load
setTimeout(function(){
  if(!window.React){
    document.getElementById('root').innerHTML = '<div style="background:#080809;color:#EF4444;padding:40px;text-align:center;min-height:100vh;display:flex;flex-direction:column;justify-content:center"><h2>CDN Error</h2><p>React libraries failed to load from unpkg</p><p style="color:#9CA3AF;font-size:12px">Check your internet connection or try again</p><button onClick="location.reload()" style="margin-top:20px;padding:10px 20px;background:#F97316;color:#fff;border:none;border-radius:6px;cursor:pointer">Reload</button></div>';
  }
}, 3000);
</script>
