/* -- POST WORKOUT REVIEW ---------------------------------------------- */
function Review(p){
  var useKg=p.useKg!==false; var unit=useKg?"kg":"lb";
  var rows=p.rows||[];
  var [note,setNote]=useState("");
  var [step,setStep]=useState("summary");
  var [ratings,setRatings]=useState({energy:0,pump:0,strength:0,sleep:0,stress:0});
  var [aiText,setAiText]=useState("");
  var [aiLoading,setAiLoading]=useState(false);

  var totalSets=rows.reduce(function(a,r){if(r.type==="block")return a;return a+r.sets.filter(function(s){return s.done&&s.setType!=="warmup";}).length;},0);
  var totalVol=rows.reduce(function(a,r){if(r.type==="block")return a;return a+r.sets.filter(function(s){return s.done&&s.setType!=="warmup";}).reduce(function(b,s){return b+(parseFloat(s.w)||0)*(parseInt(s.r)||0);},0);},0);
  var dur=Math.floor((p.sec||0)/60);
  var dispVol=useKg?Math.round(totalVol):Math.round(totalVol*2.20462);

  function setRating(key,val){setRatings(function(prev){var n=Object.assign({},prev);n[key]=val;return n;});}

  function save(){
    var exercises=rows.filter(function(r){return r.type!=="block"&&r.sets.some(function(s){return s.done;});}).map(function(r){
      return {id:r.id,name:r.name,muscle:r.muscle,sets:r.sets.filter(function(s){return s.done;}).map(function(s){var set={w:s.w,r:s.r,rir:s.rir,done:true};if(s.setType&&s.setType!=="normal")set.setType=s.setType;if(s.rL)set.rL=s.rL;if(s.rR)set.rR=s.rR;if(s.partials)set.partials=s.partials;return set;})};
    });
    var blocks=rows.filter(function(r){return r.type==="block";}).map(function(r){return {title:r.title,notes:r.notes||"",duration:r.duration||null};});
    p.onSave({name:p.name,sets:totalSets,vol:dispVol+" "+unit,dur:dur+" min",date:new Date().toLocaleDateString(),dateISO:new Date().toISOString().slice(0,10),reflection:ratings,note:note,exercises:exercises,blocks:blocks.length>0?blocks:null,aiInsight:aiText||null});
  }

  function submitReflection(){
    setStep("ai");setAiLoading(true);
    var exSummary=rows.filter(function(r){return r.type!=="block"&&r.sets.some(function(s){return s.done;});}).map(function(r){
      var done=r.sets.filter(function(s){return s.done&&s.setType!=="warmup";});
      var top=done.reduce(function(b,s){return (parseFloat(s.w)||0)>(parseFloat(b.w)||0)?s:b;},done[0]||{w:0,r:0});
      return r.name+": "+done.length+" sets, top "+top.w+unit+"x"+top.r;
    }).join(". ");
    var sys="You are a concise strength coach. Give a 2-3 sentence post-workout insight. Be specific, reference the actual data. No fluff or generic advice.";
    var coachInstr=ld("coachInstructions","");
    if(coachInstr) sys+=" User instructions for you: "+coachInstr;
    var profile=ld("profile",{});
    if(profile.goal) sys+=" Their goal is: "+profile.goal+".";
    var weightLog=getWeightLog();
    if(weightLog.length>0){var lw=weightLog[weightLog.length-1];sys+=" Latest weigh-in: "+Math.round(lw.kg*10)/10+"kg on "+lw.date+".";}
    var recentFb=ld("feedback",[]).slice(0,3);
    if(recentFb.length>0){var lastFb=recentFb[0];sys+=" Last check-in: mood "+lastFb.mood+"/5, energy "+lastFb.energy+"/5, stress "+lastFb.stress+"/5"+(lastFb.note?" note: "+lastFb.note.slice(0,60):"")+".";}
    var blockSummary=rows.filter(function(r){return r.type==="block";}).map(function(r){return r.title+(r.notes?" ("+r.notes+")":"");}).join("; ");
    var usr="Workout: "+p.name+". Duration: "+dur+"min. "+exSummary+(blockSummary?". Notes/blocks: "+blockSummary:".")+". Athlete ratings - Energy: "+ratings.energy+"/5, Pump: "+ratings.pump+"/5, Strength: "+ratings.strength+"/5, Sleep: "+ratings.sleep+"/5, Stress: "+ratings.stress+"/5. Note: "+note+". Give a brief specific coach insight.";
    aiCall(sys, usr, null, function(txt){setAiText(txt);setAiLoading(false);}, function(){setAiText("Solid session. Keep the consistency and focus on quality sleep tonight.");setAiLoading(false);});
  }

  var fields=[
    {key:"energy",label:"Energy",icons:["Awful","Low","Ok","High","Peak"]},
    {key:"pump",label:"Pump",icons:["None","Mild","Good","Great","Insane"]},
    {key:"strength",label:"Strength Feel",icons:["Weak","Below avg","Normal","Strong","Best ever"]},
    {key:"sleep",label:"Sleep Last Night",icons:["<4h","5h","6h","7h","8h+"]},
    {key:"stress",label:"Stress Level",icons:["None","Low","Medium","High","Max"]},
  ];

  if(step==="summary") return (
    <div style={{paddingBottom:100}}>
      <div style={{padding:"52px 20px 22px",background:"linear-gradient(180deg,"+GR_H+"18 0%,transparent 100%)"}}>
        <span style={{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.07em",background:GR_H+"22",color:GR,borderRadius:4,padding:"2px 8px",border:"1px solid "+GR_H+"40"}}>WORKOUT COMPLETE</span>
        <h1 style={{fontFamily:"Barlow Condensed,sans-serif",fontSize:32,fontWeight:800,letterSpacing:"0.04em",marginTop:8,lineHeight:1,color:TX}}>{p.name||"Workout"}</h1>
        <p style={{color:MU,fontSize:13,marginTop:4}}>{new Date().toLocaleDateString()}</p>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginTop:18}}>
          {[["Sets",totalSets],["Volume",dispVol+" "+unit],["Duration",dur+" min"]].map(function(item,i){
            return <div key={i} style={{background:CARD,borderRadius:12,padding:"12px 10px",textAlign:"center",border:"1px solid "+BORD}}><p style={{fontSize:18,fontWeight:800,fontFamily:"Barlow Condensed,sans-serif",color:i===0?OR:TX}}>{item[1]}</p><p style={{fontSize:9,color:MU,marginTop:2}}>{item[0]}</p></div>;
          })}
        </div>
      </div>
      <div style={{padding:"0 20px"}}>
        {rows.map(function(row,i){
          if(row.type==="block"){
            return <div key={i} style={{background:SU,borderRadius:12,padding:"12px 14px",border:"1px dashed "+OR_H+"40",marginBottom:8,display:"flex",alignItems:"center",gap:10}}><span style={{fontSize:15}}>📝</span><div style={{flex:1}}><p style={{fontWeight:600,fontSize:14,color:TX}}>{row.title}</p>{row.notes&&<p style={{fontSize:12,color:MU,marginTop:2}}>{row.notes}</p>}</div>{row.duration&&<p style={{fontSize:12,fontWeight:700,color:OR}}>{row.duration}m</p>}</div>;
          }
          var done=row.sets.filter(function(s){return s.done;});
          if(done.length===0)return null;
          var vol=done.reduce(function(b,s){return b+(parseFloat(s.w)||0)*(parseInt(s.r)||0);},0);
          return <div key={i} style={{background:CARD,borderRadius:12,padding:"12px 14px",border:"1px solid "+BORD,marginBottom:8,display:"flex",alignItems:"center",gap:12}}><div style={{flex:1}}><p style={{fontWeight:600,fontSize:14,color:TX}}>{row.name}</p><p style={{fontSize:12,color:MU,marginTop:1}}>{done.length} sets</p></div><p style={{fontSize:13,fontWeight:700,color:OR}}>{useKg?Math.round(vol):Math.round(vol*2.20462)} {unit}</p></div>;
        })}
        <div style={{marginTop:14,marginBottom:18}}>
          <p style={{fontSize:13,fontWeight:600,marginBottom:8,color:TX}}>Quick note</p>
          <textarea value={note} onChange={function(e){setNote(e.target.value);}} placeholder="Anything to note about this session..." rows={2} style={{width:"100%",background:CARD,border:"1px solid "+BORD,borderRadius:12,padding:"12px 14px",color:TX,fontSize:14,outline:"none",resize:"none"}}/>
        </div>
        <button onClick={function(){setStep("reflect");}} style={{width:"100%",padding:"15px",borderRadius:13,border:"none",background:"linear-gradient(135deg,"+OR_H+",#EA580C)",color:"#fff",fontFamily:"Barlow Condensed,sans-serif",fontSize:18,fontWeight:800,cursor:"pointer",marginBottom:10}}>HOW DID IT FEEL?</button>
        <button onClick={save} style={{width:"100%",padding:"13px",borderRadius:13,border:"1px solid "+BORD,background:"transparent",color:MU,fontSize:14,cursor:"pointer"}}>Save without reflection</button>
      </div>
    </div>
  );

  if(step==="reflect") return (
    <div style={{paddingBottom:100}}>
      <div style={{padding:"52px 20px 18px",background:SURF}}>
        <p style={{fontSize:12,color:OR,fontWeight:700,letterSpacing:"0.1em",marginBottom:6}}>SESSION REFLECTION</p>
        <h1 style={{fontFamily:"Barlow Condensed,sans-serif",fontSize:28,fontWeight:800,letterSpacing:"0.04em",color:TX,lineHeight:1}}>How did it go?</h1>
        <p style={{color:MU,fontSize:13,marginTop:6}}>10 seconds. Your AI coach uses this.</p>
      </div>
      <div style={{padding:"0 20px",display:"flex",flexDirection:"column",gap:14}}>
        {fields.map(function(field){
          return (
            <div key={field.key} style={{background:CARD,borderRadius:14,padding:"14px 15px",border:"1px solid "+BORD}}>
              <p style={{fontSize:11,fontWeight:700,color:MU,letterSpacing:"0.05em",marginBottom:10}}>{field.label.toUpperCase()}</p>
              <div style={{display:"flex",gap:6}}>
                {field.icons.map(function(label,i){
                  var val=i+1;
                  var act=ratings[field.key]===val;
                  return (
                    <button key={i} onClick={function(){setRating(field.key,val);}} style={{flex:1,padding:"8px 4px",borderRadius:9,border:"2px solid "+(act?OR:BORD),background:act?OR_H+"18":"transparent",color:act?OR:MU,fontSize:10,fontWeight:act?700:400,cursor:"pointer",transition:"all .15s",lineHeight:1.2,textAlign:"center"}}>
                      {val}<br/>{label}
                    </button>
                  );
                })}
              </div>
            </div>
          );
        })}
        <button onClick={submitReflection} style={{width:"100%",padding:"15px",borderRadius:13,border:"none",background:"linear-gradient(135deg,"+OR_H+",#EA580C)",color:"#fff",fontFamily:"Barlow Condensed,sans-serif",fontSize:18,fontWeight:800,cursor:"pointer"}}>GET AI COACH INSIGHT</button>
        <button onClick={save} style={{width:"100%",padding:"13px",borderRadius:13,border:"1px solid "+BORD,background:"transparent",color:MU,fontSize:14,cursor:"pointer"}}>Skip and save</button>
      </div>
    </div>
  );

  return (
    <div style={{paddingBottom:100}}>
      <div style={{padding:"52px 20px 18px",background:"linear-gradient(180deg,"+OR_H+"20 0%,transparent 100%)"}}>
        <p style={{fontSize:12,color:OR,fontWeight:700,letterSpacing:"0.1em",marginBottom:6}}>AI COACH</p>
        <h1 style={{fontFamily:"Barlow Condensed,sans-serif",fontSize:28,fontWeight:800,letterSpacing:"0.04em",color:TX,lineHeight:1}}>{p.name||"Workout"}</h1>
      </div>
      <div style={{padding:"0 20px"}}>
        <div style={{background:CARD,borderRadius:16,padding:"20px",border:"1px solid "+BORD,marginBottom:16,minHeight:90,display:"flex",alignItems:"center",gap:14}}>
          <div style={{width:40,height:40,borderRadius:11,background:"linear-gradient(135deg,"+OR_H+",#7C3A0E)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
            <Ic d={D.ai} z={20} c="#fff"/>
          </div>
          <div style={{flex:1}}>
            {aiLoading?(
              <div style={{display:"flex",gap:5,alignItems:"center"}}>
                {[0,1,2].map(function(i){return <div key={i} style={{width:7,height:7,borderRadius:"50%",background:OR,animation:"pulse 1.4s "+(i*0.2)+"s infinite"}}/>;}) }
              </div>
            ):(
              <p style={{fontSize:14,color:TX,lineHeight:1.6}}>{aiText}</p>
            )}
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:16}}>
          {fields.map(function(field){
            var val=ratings[field.key]||0;
            return <div key={field.key} style={{background:CARD,borderRadius:11,padding:"10px 12px",border:"1px solid "+BORD}}><p style={{fontSize:10,color:MU,marginBottom:2}}>{field.label}</p><p style={{fontSize:13,fontWeight:700,color:val>0?TX:MU}}>{val>0?val+"/5 - "+field.icons[val-1]:"--"}</p></div>;
          })}
        </div>
        <button onClick={save} style={{width:"100%",padding:"15px",borderRadius:13,border:"none",background:"linear-gradient(135deg,"+OR_H+",#EA580C)",color:"#fff",fontFamily:"Barlow Condensed,sans-serif",fontSize:18,fontWeight:800,cursor:"pointer",marginBottom:10}}>SAVE WORKOUT</button>
        <button onClick={p.onDiscard} style={{width:"100%",padding:"13px",borderRadius:13,border:"1px solid "+BORD,background:"transparent",color:MU,fontSize:14,cursor:"pointer"}}>Discard</button>
      </div>
    </div>
  );
}

/* -- CONVERT TO SPLIT MODAL ---------------------------------------- */
function ConvertToSplitModal(p){
  var w=p.workout;
  var splits=p.splits||[];
  var [mode,setMode]=useState(null);
  var [newSplitName,setNewSplitName]=useState("");
  var [selectedSplitId,setSelectedSplitId]=useState(null);
  var [dayName,setDayName]=useState("");

  function resolveExId(name){
    for(var i=0;i<ALL_EX.length;i++){if(ALL_EX[i].name===name)return ALL_EX[i].id;}
    return null;
  }

  function convertToNewSplit(){
    if(!newSplitName.trim())return;
    var exIds=(w.exercises||[]).map(function(ex){return resolveExId(ex.name);}).filter(Boolean);
    var resolvedDayName=dayName.trim()||"Day 1";
    var newSplit={
      id:"s"+Date.now(),
      name:newSplitName.trim(),
      days:[{name:resolvedDayName,exIds:exIds,blocks:[]}],
      created:new Date().toLocaleDateString()
    };
    p.onConvert(newSplit);
  }

  function convertToExistingSplit(){
    if(!selectedSplitId)return;
    var split=splits.find(function(s){return s.id===selectedSplitId;});
    if(!split)return;
    var exIds=(w.exercises||[]).map(function(ex){return resolveExId(ex.name);}).filter(Boolean);
    var resolvedDayName=dayName.trim()||("Day "+(split.days.length+1));
    var updatedSplit=Object.assign({},split,{
      days:split.days.concat([{name:resolvedDayName,exIds:exIds,blocks:[]}])
    });
    p.onConvert(updatedSplit);
  }

  if(!mode){
    return (
      <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.7)",display:"flex",alignItems:"flex-end",zIndex:1000}}>
        <div style={{width:"100%",background:CARD,borderRadius:"20px 20px 0 0",padding:"20px",paddingBottom:30}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
            <h2 style={{fontFamily:"Barlow Condensed,sans-serif",fontSize:20,fontWeight:800,color:TX}}>CONVERT TO SPLIT</h2>
            <button onClick={p.onCancel} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:MU}}>×</button>
          </div>
          <p style={{fontSize:13,color:MU,marginBottom:16}}>Turn this workout into a training day in a split program</p>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            <button onClick={function(){setMode("new");}} style={{padding:"14px",borderRadius:11,border:"1px solid "+OR_H+"40",background:OR_H+"12",color:OR,fontSize:14,fontWeight:600,cursor:"pointer",textAlign:"left"}}>

  if(mode==="new"){

      <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.7)",display:"flex",alignItems:"flex-end",zIndex:1000,paddingBottom:40}}>

            <input value={newSplitName} onChange={function(e){setNewSplitName(e.target.value);}} placeholder="e.g. Push Pull Legs" style={{width:"100%",background:SU,border:"1px solid "+BORD,borderRadius:9,padding:"11px 13px",color:TX,fontSize:14,outline:"none"}}/>
          </div>
          <div style={{marginBottom:18}}>
            <p style={{fontSize:12,fontWeight:700,color:MU,marginBottom:6}}>DAY NAME <span style={{fontWeight:400}}>(optional, defaults to "Day 1")</span></p>
            <input value={dayName} onChange={function(e){setDayName(e.target.value);}} placeholder="e.g. Day 1, Chest, Upper A" style={{width:"100%",background:SU,border:"1px solid "+BORD,borderRadius:9,padding:"11px 13px",color:TX,fontSize:14,outline:"none"}}/>
          </div>
          <p style={{fontSize:12,color:MU,marginBottom:14}}>This workout ({w.exercises&&w.exercises.length} exercises) will be added as the first day</p>
          <div style={{display:"flex",gap:10}}>
            <button onClick={function(){setMode(null);}} style={{flex:1,padding:"12px",borderRadius:9,border:"1px solid "+BORD,background:"transparent",color:MU,fontSize:13,fontWeight:600,cursor:"pointer"}}>Back</button>
            <button onClick={convertToNewSplit} disabled={!newSplitName.trim()} style={{flex:1,padding:"12px",borderRadius:9,border:"none",background:!newSplitName.trim()?BORD:OR,color:"#fff",fontSize:13,fontWeight:700,cursor:!newSplitName.trim()?"default":"pointer",opacity:!newSplitName.trim()?0.5:1}}>CREATE</button>
          </div>
        </div>
      </div>
    );
  }

  if(mode==="existing"){
    return (
      <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.7)",display:"flex",alignItems:"flex-end",zIndex:1000,paddingBottom:40}}>
        <div style={{width:"100%",background:CARD,borderRadius:"16px",padding:"20px",margin:"0 16px",maxHeight:"80vh",overflowY:"auto"}}>
          <h2 style={{fontFamily:"Barlow Condensed,sans-serif",fontSize:18,fontWeight:800,color:TX,marginBottom:14}}>SELECT SPLIT</h2>
          <div style={{marginBottom:16}}>
            <p style={{fontSize:12,fontWeight:700,color:MU,marginBottom:8}}>CHOOSE A SPLIT</p>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {splits.map(function(split){
                return (
                  <button key={split.id} onClick={function(){setSelectedSplitId(split.id);}} style={{padding:"12px 14px",borderRadius:9,border:"1px solid "+(selectedSplitId===split.id?OR:BORD),background:selectedSplitId===split.id?OR_H+"12":"transparent",cursor:"pointer",textAlign:"left",transition:"all 0.2s"}}>
                    <p style={{fontWeight:600,color:TX,fontSize:14}}>{split.name}</p>
                    <p style={{fontSize:11,color:MU,marginTop:3}}>{split.days.length} day{split.days.length!==1?"s":""}</p>

function WorkoutDetail(p){
  var w=p.workout;
  var useKg=p.useKg!==false;
  var unit=useKg?"kg":"lb";
  var [editing,setEditing]=useState(false);
  var [showConvert,setShowConvert]=useState(false);
  var [eName,setEName]=useState(w.name||"");
  var [eNote,setENote]=useState(w.note||"");
  var [eExercises,setEExercises]=useState(function(){
    if(!w.exercises) return [];
    return w.exercises.map(function(ex){return {name:ex.name,sets:(ex.sets||[]).map(function(s){return {w:s.w||"",r:s.r||"",rir:s.rir||"",rL:s.rL||"",rR:s.rR||"",partials:s.partials||""};})};});
  });

  function setExSet(ei,si,field,val){
    setEExercises(function(prev){
      return prev.map(function(ex,i){
        if(i!==ei) return ex;
        var ns=ex.sets.map(function(s,j){if(j!==si) return s;var c=Object.assign({},s);c[field]=val;return c;});
        return Object.assign({},ex,{sets:ns});
      });
    });
  }
  function addExSet(ei){
    setEExercises(function(prev){
      return prev.map(function(ex,i){if(i!==ei) return ex;return Object.assign({},ex,{sets:ex.sets.concat([{w:"",r:"",rir:"2"}])});});
    });
  }
  function removeExSet(ei,si){
    setEExercises(function(prev){
      return prev.map(function(ex,i){if(i!==ei) return ex;return Object.assign({},ex,{sets:ex.sets.filter(function(_,j){return j!==si;})});});
    });
  }
  function removeExercise(ei){
    setEExercises(function(prev){return prev.filter(function(_,i){return i!==ei;});});
  }

  function saveEdit(){
    var totalSets=0;var totalVol=0;
    var exercises=eExercises.map(function(ex){
      var sets=ex.sets.filter(function(s){return s.w||s.r;}).map(function(s){
        totalSets++;
        var wNum=parseFloat(s.w)||0;
        var rNum=parseInt(s.r)||0;
        totalVol+=wNum*rNum;
        return {w:s.w,r:s.r,rir:s.rir,rL:s.rL,rR:s.rR,done:true,partials:s.partials||undefined};
      });
      return {name:ex.name,sets:sets};
    }).filter(function(ex){return ex.sets.length>0;});
    var dispVol=useKg?Math.round(totalVol):Math.round(totalVol*2.20462);
    var updated=Object.assign({},w,{
      name:eName.trim()||w.name,
      note:eNote.trim(),
      exercises:exercises,
      sets:totalSets,
      vol:dispVol+" "+unit,
      editedAt:new Date().toISOString()
    });
    if(p.onEdit) p.onEdit(updated);
    setEditing(false);
  }

  if(editing){
    return (
      <div style={{paddingBottom:100}}>
        <div style={{position:"sticky",top:0,zIndex:50,background:"rgba(10,10,12,0.78)",borderBottom:"1px solid "+BORD,padding:"52px 20px 14px"}}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <button onClick={function(){setEditing(false);}} style={{background:"none",border:"none",cursor:"pointer"}}><Ic d={D.back} z={22}/></button>
            <h1 style={{fontFamily:"Barlow Condensed,sans-serif",fontSize:22,fontWeight:800,letterSpacing:"0.03em",color:OR,flex:1}}>EDITING</h1>
            <button onClick={saveEdit} style={{padding:"8px 18px",borderRadius:9,border:"none",background:OR,color:"#fff",fontFamily:"Barlow Condensed,sans-serif",fontSize:14,fontWeight:700,cursor:"pointer"}}>SAVE</button>
          </div>
        </div>
        <div style={{padding:"16px 20px",display:"flex",flexDirection:"column",gap:14}}>
          <div>
            <p style={{fontSize:11,fontWeight:700,color:MU,letterSpacing:"0.06em",marginBottom:6}}>WORKOUT NAME</p>
            <input value={eName} onChange={function(e){setEName(e.target.value);}} style={{width:"100%",background:CARD,border:"1px solid "+(eName?OR:BORD),borderRadius:10,padding:"11px 13px",color:TX,fontSize:15,fontWeight:700,outline:"none"}}/>
          </div>
          <div>
            <p style={{fontSize:11,fontWeight:700,color:MU,letterSpacing:"0.06em",marginBottom:6}}>NOTE</p>
            <textarea value={eNote} onChange={function(e){setENote(e.target.value);}} rows={2} placeholder="Session notes..." style={{width:"100%",background:CARD,border:"1px solid "+BORD,borderRadius:10,padding:"11px 13px",color:TX,fontSize:13,outline:"none",resize:"none"}}/>
          </div>
          <p style={{fontSize:11,fontWeight:700,color:MU,letterSpacing:"0.06em"}}>EXERCISES</p>
          {eExercises.map(function(ex,ei){
            return (
              <div key={ei} style={{background:CARD,borderRadius:13,border:"1px solid "+BORD,overflow:"hidden"}}>
                <div style={{padding:"11px 13px",borderBottom:"1px solid "+BORD,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                  <p style={{fontWeight:700,fontSize:14,color:TX}}>{ex.name}</p>
                  <button onClick={function(){removeExercise(ei);}} style={{width:26,height:26,borderRadius:7,border:"1px solid "+RE_H+"40",background:RE_H+"12",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}><Ic d={D.trash} z={12} c={RE}/></button>
                </div>
                <div style={{padding:"9px 11px"}}>
                  <div style={{display:"grid",gridTemplateColumns:"24px 1fr 1fr 50px 28px",gap:4,marginBottom:5}}>
                    {["#",unit.toUpperCase(),"REPS","RIR",""].map(function(h,i){return <p key={i} style={{fontSize:9,color:i===1?OR:MU,fontWeight:700,letterSpacing:"0.05em",textAlign:"center"}}>{h}</p>;})}
                  </div>
                  {ex.sets.map(function(set,si){
                    return (
                      <div key={si} style={{display:"grid",gridTemplateColumns:"24px 1fr 1fr 50px 28px",gap:4,alignItems:"center",marginBottom:4}}>
                        <p style={{textAlign:"center",fontSize:12,color:MU,fontWeight:600}}>{si+1}</p>
                        <input value={set.w} onChange={function(e){setExSet(ei,si,"w",e.target.value);}} placeholder="--" style={{background:SU,border:"1px solid "+BORD,borderRadius:6,padding:"7px 4px",color:TX,fontSize:13,textAlign:"center",outline:"none",width:"100%"}}/>
                        <input value={set.r} onChange={function(e){setExSet(ei,si,"r",e.target.value);}} placeholder="--" style={{background:SU,border:"1px solid "+BORD,borderRadius:6,padding:"7px 4px",color:TX,fontSize:13,textAlign:"center",outline:"none",width:"100%"}}/>
                        <select value={set.rir} onChange={function(e){setExSet(ei,si,"rir",e.target.value);}} style={{background:SU,border:"1px solid "+BORD,borderRadius:6,padding:"7px 2px",color:TX,fontSize:12,outline:"none",cursor:"pointer",width:"100%",textAlign:"center"}}>
                          <option value="">--</option>
                          {[0,1,2,3,4,"5+"].map(function(v){return <option key={v} value={v}>{v}</option>;})}
                        </select>
                        <button onClick={function(){removeExSet(ei,si);}} style={{width:26,height:26,borderRadius:6,border:"1px solid "+RE_H+"30",background:RE_H+"08",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}><Ic d={D.x} z={10} c={RE}/></button>
                      </div>
                    );
                  })}
                  <button onClick={function(){addExSet(ei);}} style={{width:"100%",padding:"6px",borderRadius:7,border:"1px dashed "+BORD,background:"transparent",color:MU,fontSize:11,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:4,marginTop:4}}>
                    <Ic d={D.plus} z={11} c={MU}/> Add Set
                  </button>
                </div>
              </div>
            );
          })}
          {eExercises.length===0&&<p style={{fontSize:13,color:MU,textAlign:"center",padding:"20px"}}>No exercises. This workout will be empty.</p>}
        </div>
      </div>
    );
  }

  return (
    <div style={{paddingBottom:100}}>
      <div style={{position:"sticky",top:0,zIndex:50,background:"rgba(10,10,12,0.78)",borderBottom:"1px solid "+BORD,padding:"52px 20px 14px"}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <button onClick={p.onBack} style={{background:"none",border:"none",cursor:"pointer"}}><Ic d={D.back} z={22}/></button>
          <div style={{flex:1}}>
            <h1 style={{fontFamily:"Barlow Condensed,sans-serif",fontSize:24,fontWeight:800,letterSpacing:"0.035em",color:TX}}>{w.name}</h1>
            <p style={{fontSize:12,color:MU,marginTop:2}}>{w.date} - {w.dur} - {w.sets} sets - {w.vol}{w.editedAt?" (edited)":""}</p>
          </div>
          <div style={{display:"flex",gap:6}}>
            {w.exercises&&w.exercises.length>0&&(
              <button onClick={function(){setEditing(true);setEName(w.name||"");setENote(w.note||"");setEExercises(w.exercises.map(function(ex){return {name:ex.name,sets:(ex.sets||[]).map(function(s){return {w:s.w||"",r:s.r||"",rir:s.rir||"",rL:s.rL||"",rR:s.rR||""};})};}) );}} style={{padding:"6px 12px",borderRadius:8,border:"1px solid "+OR_H+"40",background:OR_H+"12",color:OR,fontSize:12,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",gap:4}}>
                <Ic d={D.edit} z={12} c={OR}/> Edit
              </button>
            )}
            {w.exercises&&w.exercises.length>0&&(
              <button onClick={function(){setShowConvert(true);}} style={{padding:"6px 12px",borderRadius:8,border:"1px solid "+BLU_H+"40",background:BLU_H+"12",color:BLU,fontSize:12,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",gap:4}}>
                <Ic d={D.plus} z={12} c={BLU}/> Convert
              </button>
            )}
            <button onClick={function(){p.onDelete();}} style={{padding:"6px 12px",borderRadius:8,border:"1px solid "+RE_H+"40",background:RE_H+"12",color:RE,fontSize:12,fontWeight:600,cursor:"pointer"}}>Delete</button>
          </div>
        </div>
      </div>
      <div style={{padding:"16px 20px"}}>
        {w.note&&(
          <div style={{background:CARD,borderRadius:12,padding:"12px 15px",border:"1px solid "+BORD,marginBottom:14}}>
            <p style={{fontSize:11,fontWeight:700,color:MU,marginBottom:5}}>NOTE</p>
            <p style={{fontSize:14,color:TX,lineHeight:1.6}}>{w.note}</p>
          </div>
        )}
        {w.reflection&&(
          <div style={{background:CARD,borderRadius:12,padding:"12px 15px",border:"1px solid "+BORD,marginBottom:14}}>
            <p style={{fontSize:11,fontWeight:700,color:MU,marginBottom:8}}>HOW YOU FELT</p>
            <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
              {[["Energy",w.reflection.energy],["Pump",w.reflection.pump],["Strength",w.reflection.strength],["Sleep",w.reflection.sleep],["Stress",w.reflection.stress]].map(function(item,i){
                return item[1]?(
                  <div key={i} style={{background:SU,borderRadius:8,padding:"6px 10px",border:"1px solid "+BORD}}>
                    <p style={{fontSize:10,color:MU,marginBottom:2}}>{item[0]}</p>
                    <p style={{fontFamily:"Barlow Condensed,sans-serif",fontSize:18,fontWeight:800,color:OR}}>{item[1]}<span style={{fontSize:11,color:MU}}>/5</span></p>
                  </div>
                ):null;
              })}
            </div>
          </div>
        )}
        {w.sets&&(
          <div style={{background:CARD,borderRadius:12,padding:"12px 15px",border:"1px solid "+BORD,marginBottom:14}}>
            <p style={{fontSize:11,fontWeight:700,color:MU,marginBottom:8}}>EXERCISES</p>
            {w.exercises?(
              w.exercises.map(function(ex,i){
                return (
                  <div key={i} style={{marginBottom:12,paddingBottom:12,borderBottom:i<w.exercises.length-1?"1px solid "+BORD:"none"}}>
                    <p style={{fontWeight:700,fontSize:14,color:TX,marginBottom:6}}>{ex.name}</p>
                    {ex.sets&&ex.sets.map(function(s,j){
                      var repsDisplay=s.rL&&s.rR?s.rL+"|"+s.rR:s.r;
                      return (
                        <div key={j} style={{display:"flex",gap:10,marginBottom:3}}>
                          <span style={{fontSize:12,color:MU,width:20}}>{j+1}</span>
                          <span style={{fontSize:12,color:TX}}>{s.w?s.w+" "+unit+" x "+repsDisplay+" reps":"Reps: "+repsDisplay}</span>
                          {s.partials&&<span style={{fontSize:11,color:"#8B5CF6",fontWeight:700}}>+{s.partials}P</span>}
                          {s.rir!==undefined&&<span style={{fontSize:11,color:MU}}>RIR {s.rir}</span>}
                          {s.done&&<Ic d={D.check} z={11} c={GR}/>}
                        </div>
                      );

                );
              })
            ):(
              <p style={{fontSize:13,color:MU}}>{w.sets} sets logged - {w.vol} total volume</p>
            )}

        )}
        {w.blocks&&w.blocks.length>0&&(
          <div style={{background:CARD,borderRadius:12,padding:"12px 15px",border:"1px solid "+BORD,marginBottom:14}}>
            <p style={{fontSize:11,fontWeight:700,color:MU,marginBottom:8}}>NOTES</p>
            {w.blocks.map(function(b,i){return (
              <div key={i} style={{marginBottom:i<w.blocks.length-1?10:0,paddingBottom:i<w.blocks.length-1?10:0,borderBottom:i<w.blocks.length-1?"1px solid "+BORD:"none"}}>
                <p style={{fontWeight:700,fontSize:13,color:TX}}>{b.title}</p>
                {b.notes&&<p style={{fontSize:12,color:MU,marginTop:3,lineHeight:1.5}}>{b.notes}</p>}

              </div>
            );})}

        )}
        {w.aiInsight&&(
          <div style={{background:OR_H+"10",borderRadius:12,padding:"12px 15px",border:"1px solid "+OR_H+"30",marginBottom:14}}>
            <p style={{fontSize:11,fontWeight:700,color:OR,marginBottom:5}}>AI COACH INSIGHT</p>
            <p style={{fontSize:13,color:TX,lineHeight:1.6}}>{w.aiInsight}</p>
          </div>

      </div>
      {showConvert&&<ConvertToSplitModal workout={w} splits={p.splits||[]} onCancel={function(){setShowConvert(false);}} onConvert={function(split){setShowConvert(false);if(p.onConvertToSplit)p.onConvertToSplit(split);}}/>}
    </div>
  );

function ProactiveTipCard(p){
  var todayISO=new Date().toISOString().slice(0,10);
  var cached=ld("proactiveTip",null);
  var [tip,setTip]=useState(cached&&cached.date===todayISO?cached.text:null);
  var [loading,setLoading]=useState(!(cached&&cached.date===todayISO));
  var [dismissed,setDismissed]=useState(false);

  useEffect(function(){
    if(tip||dismissed) return;
    var profile=p.profile||{};
    var history=p.history||[];
    var ctx="";
    if(profile.displayName) ctx+="User: "+profile.displayName+". ";
    if(profile.goal) ctx+="Goal: "+profile.goal+". ";
    if(history.length>0) ctx+="Last workout: "+history[0].name+" ("+history[0].sets+" sets). "+history.length+" workouts total. ";
    var fuelLog=ld("fuelLog",{});
    var todayFood=fuelLog[todayISO];
    if(todayFood&&todayFood.meals){
      var all=[];["breakfast","lunch","dinner","snacks"].forEach(function(mk){(todayFood.meals[mk]||[]).forEach(function(it){all.push(it);});});
      var tc=all.reduce(function(a,i){return a+(i.cal||0);},0);
      var tp=all.reduce(function(a,i){return a+(i.pro||0);},0);
      ctx+=(all.length>0?"Today: "+tc+"cal, "+tp+"g protein logged. ":"No food logged today. ");
    }
    var fp=ld("fuelProfile",null);
    if(fp&&fp.tdee) ctx+="Daily targets: "+fp.tdee+"cal, "+(fp.macroProtein||"?")+"g protein. ";
    var bd=getBudgetData();
    if(bd.weeklyTarget>0){
      var wStart=new Date();wStart.setDate(wStart.getDate()-wStart.getDay());wStart.setHours(0,0,0,0);
      var spent=bd.history.filter(function(e){return new Date(e.date)>=wStart;}).reduce(function(a,e){return a+(e.total||0);},0);
      ctx+="Grocery budget: $"+bd.weeklyTarget+"/week, $"+Math.round(spent)+" spent so far. ";
    }
    var ctrl=new AbortController();
    fetch("https://lockedapi.cescocugliari.workers.dev/",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({system:"You are a personal coach. Give ONE short, specific, actionable insight in 1-2 sentences based on this person's data. Reference their actual numbers. Be direct, not generic.",messages:[{role:"user",content:ctx+"\nGive me one insight based on my data right now."}],max_tokens:100}),
      signal:ctrl.signal
    }).then(function(r){return r.json();}).then(function(d){
      var text=(d.content&&d.content[0]&&d.content[0].text)||"";
      if(text){setTip(text.trim());sd("proactiveTip",{text:text.trim(),date:todayISO});}
      setLoading(false);
    }).catch(function(e){if(e&&e.name==="AbortError")return;setLoading(false);});
    return function(){ctrl.abort();};
  },[]);

  if(dismissed||(!loading&&!tip)) return null;
  return (
    <div style={{margin:"10px 20px 0",background:OR_H+"12",borderRadius:13,padding:"13px 14px",border:"1px solid "+OR_H+"30"}}>

function DynamicFeed(p){
  var history=p.history||[];
  var splits=p.splits||[];
  var go=p.go||function(){};
  var todayISO=new Date().toISOString().slice(0,10);
  var feedbacks=ld("feedback",[]);

  var todayFb=null;
  for(var fi=0;fi<feedbacks.length;fi++){
    if(feedbacks[fi].date&&feedbacks[fi].date.slice(0,10)===todayISO){todayFb=feedbacks[fi];break;}
  }

  var lastW=history.length>0?history[0]:null;
  var daysSinceLast=999;
  if(lastW&&lastW.dateISO){
    var d1=new Date(todayISO);var d2=new Date(lastW.dateISO.slice(0,10));
    daysSinceLast=Math.round((d1-d2)/(1000*60*60*24));
  }

  var trainedToday=false;
  for(var ti=0;ti<history.length;ti++){
    if(history[ti].dateISO&&history[ti].dateISO.slice(0,10)===todayISO){trainedToday=true;break;}
  }

  var consec=0;
  var cd=new Date();if(!trainedToday)cd.setDate(cd.getDate()-1);
  for(var ci=0;ci<10;ci++){
    var ciso=cd.toISOString().slice(0,10);
    var foundW=false;
    for(var cj=0;cj<history.length;cj++){
      if(history[cj].dateISO&&history[cj].dateISO.slice(0,10)===ciso){foundW=true;break;}
    }
    if(foundW){consec++;cd.setDate(cd.getDate()-1);}
    else break;
  }
  if(trainedToday) consec++;

  var nextSplitDay=null;
  if(splits.length>0&&lastW){
    var spFound=false;
    for(var si=0;si<splits.length;si++){
      var splt=splits[si];
      for(var di=0;di<splt.days.length;di++){
        if(splt.days[di].name===lastW.name){
          nextSplitDay=splt.days[(di+1)%splt.days.length];
          spFound=true;break;
        }
      }
      if(spFound) break;
    }
    if(!spFound&&splits[0].days&&splits[0].days.length>0) nextSplitDay=splits[0].days[0];
  }

  var cards=[];
  if(!todayFb){
    cards.push({type:"checkin"});
  } else if(todayFb.sleep||todayFb.soreness){
    cards.push({type:"recovery",fb:todayFb});
  }
  if(consec>=4){
    cards.push({type:"rest",days:consec});
  } else if(daysSinceLast>=3&&!trainedToday){
    cards.push({type:"comeback",days:daysSinceLast});
  }
  if(nextSplitDay&&!trainedToday){
    cards.push({type:"nextsplit",day:nextSplitDay});
  }

  if(cards.length===0) return null;

  return (
    <div style={{padding:"16px 20px 0"}}>
      <p style={{fontSize:10,fontWeight:700,color:MU,letterSpacing:"0.08em",marginBottom:9}}>YOUR FEED</p>

                <div style={{width:38,height:38,borderRadius:10,background:"#F59E0B"+"20",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><span style={{fontSize:18}}>📋</span></div>
                <div style={{flex:1}}>
                  <p style={{fontWeight:700,fontSize:14,color:TX,margin:0}}>Check in today</p>
                  <p style={{fontSize:12,color:MU,marginTop:2,margin:0}}>Log your sleep, recovery and mood</p>
                </div>
                <Ic d={D.chev} z={14} c={MU}/>
              </div>
            );

          if(card.type==="recovery"){
            var fb=card.fb;
            var sl=fb.sleep||0;var so=fb.soreness||0;

            var msg=overallGood?"Well rested and feeling fresh — push hard today.":overallBad?"Take it steady — your body is asking for recovery.":"Feeling okay — train smart today.";

                <p style={{fontSize:10,fontWeight:700,color:MU,letterSpacing:"0.07em",marginBottom:8}}>TODAY'S READINESS</p>
                <div style={{display:"flex",gap:8,marginBottom:9}}>
                  {sl>0&&<div style={{flex:1,background:(sl>=4?"#22C55E":sl<=2?"#EF4444":"#F59E0B")+"12",borderRadius:10,padding:"9px 7px",textAlign:"center",border:"1px solid "+(sl>=4?"#22C55E":sl<=2?"#EF4444":"#F59E0B")+"25"}}><p style={{fontSize:17,margin:0}}>{["","😫","😕","😴","💤","⭐"][sl]}</p><p style={{fontSize:10,color:MU,marginTop:2,margin:0}}>Sleep</p></div>}

  var dateSet={};
  history.forEach(function(w){
    /* Normalize to date-only — some entries (cardio, voice) store full ISO timestamps */
    var iso=w.dateISO?w.dateISO.slice(0,10):null;

  });
  var streak=0;
  var sd=new Date(today);

      <ProactiveTipCard profile={p.profile} history={p.history}/>
      <DynamicFeed history={history} splits={p.splits} go={p.go}/>
      <div style={{padding:"14px 20px 0"}}>
        <button onClick={function(){p.go("train");}} style={{width:"100%",padding:"15px",borderRadius:13,border:"none",background:"linear-gradient(135deg,"+OR_H+",#EA580C)",color:"#fff",fontFamily:"Barlow Condensed,sans-serif",fontSize:18,fontWeight:800,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:9}}>
          <Ic d={D.train} z={20} c="#fff"/> START WORKOUT
        </button>
      </div>
      <SuppReminderCard/>
      <CycleReminderCard/>
      <div style={{padding:"10px 20px 0"}}>
        <button onClick={function(){p.go("progress");}} style={{width:"100%",padding:"13px",borderRadius:12,border:"1px solid #8B5CF6"+"40",background:"#8B5CF6"+"08",color:"#8B5CF6",fontSize:15,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:9,fontFamily:"Barlow Condensed,sans-serif"}}>
          <Ic d={D.prog} z={18} c="#8B5CF6"/> VIEW PROGRESS
        </button>
      </div>
      {(isSun||haswkdata)&&(
        <div style={{padding:"10px 20px 0"}}>
          <button onClick={function(){setShowRecap(true);}} style={{width:"100%",padding:"12px",borderRadius:12,border:"1px solid "+OR_H+"40",background:OR_H+"08",color:OR,fontSize:14,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
            <Ic d={D.cal} z={15} c={OR}/> Weekly Recap
          </button>
        </div>
      )}
      {p.splits.length===0&&(
        <div style={{margin:"12px 20px 0",background:OR_H+"10",borderRadius:13,padding:"14px",border:"1px solid "+OR_H+"30"}}>
          <p style={{fontWeight:700,fontSize:15,marginBottom:4,color:TX}}>Set up your first split</p>
          <p style={{fontSize:13,color:MU,marginBottom:11,lineHeight:1.5}}>Build your training program in the Train tab.</p>
          <button onClick={function(){p.go("train");}} style={{padding:"8px 15px",borderRadius:9,border:"none",background:OR,color:"#fff",fontFamily:"Barlow Condensed,sans-serif",fontSize:13,fontWeight:700,cursor:"pointer"}}>Create a Split</button>
        </div>
      )}
      <div style={{padding:"18px 20px 0"}}>
        <div style={{background:CARD,borderRadius:16,padding:"15px",border:"1px solid "+BORD}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <p style={{fontFamily:"Barlow Condensed,sans-serif",fontSize:17,fontWeight:800,color:TX}}>{mnths[calM].toUpperCase()} {calY}</p>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:4}}>
            {["S","M","T","W","T","F","S"].map(function(d,i){return <p key={i} style={{textAlign:"center",fontSize:10,color:MU,fontWeight:600,padding:"2px 0"}}>{d}</p>;})}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>
            {Array(firstDay).fill(null).map(function(_,i){return <div key={"e"+i}/>;})}
            {Array(daysInM).fill(null).map(function(_,i){
              var day=i+1;
              var key=calKey(day);
              var isToday=day===today.getDate();
              var hasW=!!dateSet[key];
              var isFut=day>today.getDate();
              return (
                <div key={day} style={{aspectRatio:"1",borderRadius:6,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:isToday?OR:hasW?GR_H+"18":SU,border:isToday?"1px solid "+OR:hasW?"1px solid "+GR_H+"40":"1px solid transparent"}}>
                  <p style={{fontSize:11,fontWeight:isToday||hasW?700:400,color:isToday?"#fff":hasW?GR:isFut?BORD:MU}}>{day}</p>
                  {hasW&&!isToday&&<div style={{width:4,height:4,borderRadius:"50%",background:GR,marginTop:1}}/>}
                </div>
              );
            })}
          </div>
        </div>
      </div>
      {history.length>0&&(
        <div style={{padding:"18px 20px 0"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:11}}>
            <h2 style={{fontFamily:"Barlow Condensed,sans-serif",fontSize:18,fontWeight:700,color:TX}}>Recent Workouts</h2>
            <button onClick={function(){p.go("train");}} style={{background:"none",border:"none",color:OR,fontSize:13,cursor:"pointer"}}>See all</button>
          </div>
          {history.slice(0,5).map(function(w,i){
            return <div key={i} onClick={function(){setSelectedWorkout(w);}} style={{background:CARD,borderRadius:13,padding:"12px 14px",border:"1px solid "+BORD,display:"flex",alignItems:"center",gap:12,marginBottom:9,cursor:"pointer"}}><div style={{width:36,height:36,borderRadius:9,background:OR_H+"18",display:"flex",alignItems:"center",justifyContent:"center"}}><Ic d={D.fire} z={16} c={OR}/></div><div style={{flex:1}}><p style={{fontWeight:600,fontSize:14,color:TX}}>{w.name}</p><p style={{color:MU,fontSize:12,marginTop:1}}>{w.date} - {w.dur} - {w.sets} sets</p></div><Ic d={D.chev} z={14} c={MU}/></div>;
          })}
        </div>
      )}
    </div>
  );
}

/* -- PR HUB ----------------------------------------------------------- */
/* -- PROGRESS PAGE ---------------------------------------------------- */
/* -- GOALS TAB (Progress sub-tab) ------------------------------------- */
var GOAL_TYPES=[
  {id:"lift",name:"Lift PR",icon:"🏋️",col:OR,desc:"Hit a target weight on a specific exercise"},
  {id:"weight",name:"Body Weight",icon:"⚖️",col:"#8B5CF6",desc:"Reach a target body weight"},
  {id:"bf",name:"Body Fat %",icon:"📐",col:"#3B82F6",desc:"Reach a target body fat percentage"},
  {id:"custom",name:"Custom",icon:"🎯",col:GR,desc:"Any numeric goal you want to track"}
];

function getBfLog(){return ld("bfLog",[]);}
function addBfEntry(pct,method){
  var log=getBfLog();
  log.push({pct:pct,method:method||"manual",date:new Date().toISOString().slice(0,10)});
  log.sort(function(a,b){return a.date<b.date?-1:a.date>b.date?1:0;});
  sd("bfLog",log);
  return log;
}

function GoalsTab(p){
  var useKg=p.useKg!==false;
  var unit=useKg?"kg":"lb";
  var prs=p.prs||{};
  var history=p.history||[];
  var profile=p.profile||{};
  var [goals,setGoalsRaw]=useState(function(){return ld("goals",[]);});
  var [bfLog,setBfLog]=useState(function(){return getBfLog();});
  var [view,setView]=useState("list");
  var [selIdx,setSelIdx]=useState(null);
  var [aiText,setAiText]=useState("");
  var [aiLoading,setAiLoading]=useState(false);

  /* new goal form */
  var [gType,setGType]=useState("");
  var [gName,setGName]=useState("");
  var [gTarget,setGTarget]=useState("");
  var [gDate,setGDate]=useState("");
  var [gExId,setGExId]=useState(null);
  var [gExSearch,setGExSearch]=useState("");
  var [gUnit,setGUnit]=useState("");
  var [gNotes,setGNotes]=useState("");
  var [editIdx,setEditIdx]=useState(null);

  /* BF log form */
  var [bfInput,setBfInput]=useState("");
  var [bfMethod,setBfMethod]=useState("manual");
  var [showBfLog,setShowBfLog]=useState(false);
  var [bfAiText,setBfAiText]=useState("");
  var [bfAiLoading,setBfAiLoading]=useState(false);

  function setGoals(fn){setGoalsRaw(function(prev){var n=typeof fn==="function"?fn(prev):fn;sd("goals",n);return n;});}
  var todayISO=new Date().toISOString().slice(0,10);

  function toDisp(kgV){if(!kgV&&kgV!==0)return 0;return useKg?Math.round(kgV*10)/10:Math.round(kgV*2.20462*10)/10;}
  function toKg(v){return convToKg(v,useKg);}

  function getCurrentValue(goal){
    if(goal.type==="lift"){
      var list=prs[goal.exId];
      if(!list||list.length===0) return null;
      var best=list.reduce(function(b,x){return (!b||x.w>b.w)?x:b;},null);
      return best?toDisp(best.w):null;
    }
    if(goal.type==="weight"){
      var wl=getWeightLog();
      if(wl.length===0) return null;
      return toDisp(wl[wl.length-1].kg);
    }
    if(goal.type==="bf"){
      if(bfLog.length===0) return null;
      return bfLog[bfLog.length-1].pct;
    }
    if(goal.type==="custom") return goal.currentManual||null;
    return null;
  }

  function getProgress(goal){
    var cur=getCurrentValue(goal);
    if(cur===null||!goal.target||!goal.start) return null;
    var start=parseFloat(goal.start);
    var target=parseFloat(goal.target);
    if(start===target) return 100;
    var pct=Math.round(((cur-start)/(target-start))*100);
    return Math.max(0,Math.min(pct,100));
  }

  function getDaysLeft(goal){
    if(!goal.targetDate) return null;
    var now=new Date();
    var end=new Date(goal.targetDate+"T00:00:00");
    var diff=Math.ceil((end-now)/(1000*60*60*24));
    return diff;
  }

  function openAdd(type){
    setGType(type);setGName("");setGTarget("");setGDate("");setGExId(null);setGExSearch("");setGUnit(type==="bf"?"%":type==="weight"?unit:unit);setGNotes("");setEditIdx(null);setView("add");
  }
  function openEdit(idx){
    var g=goals[idx];
    setGType(g.type);setGName(g.name);setGTarget(String(g.target||""));setGDate(g.targetDate||"");setGExId(g.exId||null);setGExSearch("");setGUnit(g.unit||unit);setGNotes(g.notes||"");setEditIdx(idx);setView("add");
  }

  function saveGoal(){
    if(!gName.trim()||!gTarget) return;
    var startVal=null;
    if(gType==="lift"&&gExId){
      var list=prs[gExId];
      if(list&&list.length>0) startVal=toDisp(list.reduce(function(b,x){return (!b||x.w>b.w)?x:b;},null).w);
    } else if(gType==="weight"){
      var wl=getWeightLog();
      if(wl.length>0) startVal=toDisp(wl[wl.length-1].kg);
    } else if(gType==="bf"){
      if(bfLog.length>0) startVal=bfLog[bfLog.length-1].pct;
    }
    var entry={
      type:gType,name:gName.trim(),target:parseFloat(gTarget),targetDate:gDate||null,
      exId:gExId,unit:gUnit,notes:gNotes.trim(),start:editIdx!==null?goals[editIdx].start:(startVal||0),
      status:"active",created:editIdx!==null?goals[editIdx].created:new Date().toISOString()
    };
    if(editIdx!==null){
      setGoals(function(prev){var n=prev.slice();n[editIdx]=entry;return n;});
    } else {
      setGoals(function(prev){return prev.concat([entry]);});
    }
    logBetaActivity("goal_"+(editIdx!==null?"edit":"create"),{name:entry.name,type:entry.type,target:entry.target});
    setView("list");
  }

  function completeGoal(idx){setGoals(function(prev){var n=prev.slice();n[idx]=Object.assign({},n[idx],{status:"completed",completedDate:todayISO});return n;});}
  function deleteGoal(idx){
    logBetaActivity("goal_deleted",{name:goals[idx].name});
    setGoals(function(prev){return prev.filter(function(_,i){return i!==idx;});});
    if(selIdx===idx){setSelIdx(null);setView("list");}
  }

  function logBf(){
    if(!bfInput) return;
    var updated=addBfEntry(parseFloat(bfInput),bfMethod);
    setBfLog(updated);setBfInput("");
    logBetaActivity("bf_logged",{pct:parseFloat(bfInput),method:bfMethod});
  }

  function getAiBfEstimate(){
    setBfAiLoading(true);
    var wl=getWeightLog();
    var lastW=wl.length>0?wl[wl.length-1]:null;
    var photos=ld("progressPhotos",[]);
    var photoNotes=photos.slice(-5).map(function(ph){return (ph.note||"no note")+" ("+new Date(ph.date).toLocaleDateString()+")";}).join("; ");
    var bfHistory=bfLog.slice(-5).map(function(e){return e.date+": "+e.pct+"% ("+e.method+")";}).join(", ");
    var sys="You are a fitness coach estimating body fat percentage. Be practical and give a specific number range. Do not hedge excessively.";
    var usr="User: "+profile.displayName+", "+(profile.sex||"male")+", age "+(profile.age||"unknown")+". Weight: "+(lastW?Math.round(lastW.kg*10)/10+"kg":"unknown")+". Height: "+(profile.heightCm?Math.round(profile.heightCm)+"cm":"unknown")+". Goal: "+(profile.goal||"unknown")+". Previous BF logs: "+(bfHistory||"none")+". Progress photo notes: "+(photoNotes||"none")+". Based on this data, estimate their current body fat percentage range and explain briefly. 2-3 sentences.";
    aiCall(sys,usr,null,function(txt){setBfAiText(txt);setBfAiLoading(false);},function(){setBfAiText("Unable to estimate. Try logging more data points.");setBfAiLoading(false);});
  }

  function getGoalAiAnalysis(goal){
    setAiLoading(true);
    var cur=getCurrentValue(goal);
    var pct=getProgress(goal);
    var daysLeft=getDaysLeft(goal);
    var wl=getWeightLog();
    var recentWorkouts=history.slice(0,5).map(function(w){return w.date+": "+w.name+" - "+w.sets+" sets, "+w.vol;}).join(". ");
    var sys="You are an elite strength coach analysing goal progress. Be direct, specific, and actionable. Reference the numbers.";
    var usr="Goal: "+goal.name+". Type: "+goal.type+". Target: "+goal.target+(goal.unit||"")+". Current: "+(cur!==null?cur:"unknown")+(goal.unit||"")+". Start: "+goal.start+(goal.unit||"")+". Progress: "+(pct!==null?pct+"%":"unknown")+". Days remaining: "+(daysLeft!==null?daysLeft:"no deadline")+". ";
    if(goal.type==="lift"&&goal.exId){
      var exName=getEx(goal.exId).name;
      var exPrs=prs[goal.exId]||[];
      usr+="Exercise: "+exName+". PR history: "+exPrs.map(function(pr){return pr.w+"kg x"+pr.r+(pr.date?" ("+pr.date+")":"");}).join(", ")+". ";
    }
    usr+="Recent workouts: "+recentWorkouts+". ";
    var coachInstr=ld("coachInstructions","");
    if(coachInstr) usr+="User context: "+coachInstr.slice(0,300)+". ";
    usr+="Analyse: is the user on track? What should they focus on? Give specific actionable advice. 3-5 sentences.";
    aiCall(sys,usr,null,function(txt){setAiText(txt);setAiLoading(false);},function(){setAiText("Analysis unavailable. Check connection.");setAiLoading(false);});
  }

  /* BF LOG VIEW */
  if(showBfLog){
    return (
      <div>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16}}>
          <button onClick={function(){setShowBfLog(false);}} style={{background:"none",border:"none",cursor:"pointer"}}><Ic d={D.back} z={20}/></button>
          <p style={{fontFamily:"Barlow Condensed,sans-serif",fontSize:20,fontWeight:800,color:TX}}>Body Fat Log</p>
        </div>

        <div style={{background:CARD,borderRadius:13,padding:"14px",border:"1px solid "+BORD,marginBottom:14}}>
          <p style={{fontSize:11,fontWeight:700,color:MU,letterSpacing:"0.06em",marginBottom:8}}>LOG BODY FAT %</p>
          <div style={{display:"flex",gap:8,marginBottom:8}}>
            <input value={bfInput} onChange={function(e){setBfInput(e.target.value.replace(/[^0-9.]/g,""));}} placeholder="e.g. 12.5" style={{flex:1,background:SU,border:"1px solid "+BORD,borderRadius:9,padding:"10px 12px",color:TX,fontSize:14,outline:"none"}}/>
            <span style={{alignSelf:"center",color:MU,fontSize:14}}>%</span>
          </div>
          <div style={{display:"flex",gap:6,marginBottom:10}}>
            {["Manual","Calipers","DEXA","Scale","Visual"].map(function(m){var act=bfMethod===m.toLowerCase();return <button key={m} onClick={function(){setBfMethod(m.toLowerCase());}} style={{padding:"5px 10px",borderRadius:16,border:"1px solid "+(act?"#3B82F6":BORD),background:act?"#3B82F6"+"15":"transparent",color:act?"#3B82F6":MU,fontSize:10,fontWeight:act?700:400,cursor:"pointer"}}>{m}</button>;})}
          </div>
          <button onClick={logBf} disabled={!bfInput} style={{width:"100%",padding:"11px",borderRadius:10,border:"none",background:bfInput?"#3B82F6":SU,color:bfInput?"#fff":MU,fontSize:13,fontWeight:700,cursor:bfInput?"pointer":"default"}}>LOG ENTRY</button>
        </div>

        <button onClick={getAiBfEstimate} style={{width:"100%",padding:"11px",borderRadius:10,border:"1px solid "+OR_H+"40",background:OR_H+"08",color:OR,fontSize:12,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:7,marginBottom:14}}>
          <Ic d={D.ai} z={14} c={OR}/> AI Body Fat Estimate
        </button>
        {bfAiLoading&&<p style={{fontSize:12,color:MU,textAlign:"center",marginBottom:10}}>Analysing...</p>}
        {bfAiText&&!bfAiLoading&&(
          <div style={{background:OR_H+"08",borderRadius:11,padding:"12px 13px",border:"1px solid "+OR_H+"25",marginBottom:14}}>
            <p style={{fontSize:12,color:TX,lineHeight:1.6}}>{bfAiText}</p>
          </div>
        )}

        {bfLog.length>0?(
          <div>
            <p style={{fontSize:11,fontWeight:700,color:MU,letterSpacing:"0.06em",marginBottom:8}}>HISTORY ({bfLog.length} entries)</p>
            {bfLog.slice().reverse().map(function(e,i){
              return (
                <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:"1px solid "+SU}}>
                  <div>
                    <p style={{fontSize:14,fontWeight:700,color:TX}}>{e.pct}%</p>
                    <p style={{fontSize:11,color:MU}}>{e.date}</p>
                  </div>
                  <span style={{fontSize:10,color:"#3B82F6",background:"#3B82F6"+"15",borderRadius:6,padding:"2px 8px"}}>{e.method}</span>
                </div>
              );
            })}
          </div>
        ):(
          <p style={{color:MU,fontSize:13,textAlign:"center",padding:"20px"}}>No body fat entries yet.</p>
        )}
      </div>
    );
  }

  /* GOAL DETAIL VIEW */
  if(view==="detail"&&selIdx!==null&&goals[selIdx]){
    var goal=goals[selIdx];
    var cur=getCurrentValue(goal);
    var pct=getProgress(goal);
    var daysLeft=getDaysLeft(goal);
    var typeInfo=GOAL_TYPES.find(function(t){return t.id===goal.type;})||GOAL_TYPES[3];
    var isActive=goal.status==="active";
    var exName=goal.exId?getEx(goal.exId).name:null;

    return (
      <div>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16}}>
          <button onClick={function(){setView("list");setSelIdx(null);setAiText("");}} style={{background:"none",border:"none",cursor:"pointer"}}><Ic d={D.back} z={20}/></button>
          <div style={{flex:1}}>
            <p style={{fontFamily:"Barlow Condensed,sans-serif",fontSize:22,fontWeight:800,color:TX}}>{goal.name}</p>
            <p style={{fontSize:12,color:typeInfo.col,fontWeight:600}}>{typeInfo.icon} {typeInfo.name}{exName?" — "+exName:""}</p>
          </div>
          <button onClick={function(){openEdit(selIdx);}} style={{width:32,height:32,borderRadius:8,border:"1px solid "+BORD,background:"transparent",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}><Ic d={D.edit} z={14} c={MU}/></button>
        </div>

        {/* Progress ring */}
        <div style={{background:CARD,borderRadius:16,padding:"20px",border:"1px solid "+BORD,marginBottom:14,textAlign:"center"}}>
          <div style={{position:"relative",width:120,height:120,margin:"0 auto 14px"}}>
            <svg width={120} height={120} viewBox="0 0 120 120">
              <circle cx={60} cy={60} r={52} fill="none" stroke={SU} strokeWidth={8}/>
              <circle cx={60} cy={60} r={52} fill="none" stroke={pct!==null&&pct>=100?GR:typeInfo.col} strokeWidth={8} strokeLinecap="round" strokeDasharray={327} strokeDashoffset={327-(327*(Math.min(pct||0,100)/100))} transform="rotate(-90 60 60)" style={{transition:"stroke-dashoffset .5s"}}/>
            </svg>
            <div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",textAlign:"center"}}>
              <p style={{fontFamily:"Barlow Condensed,sans-serif",fontSize:28,fontWeight:800,letterSpacing:"0.04em",color:pct>=100?GR:TX,lineHeight:1}}>{pct!==null?pct:0}%</p>
              <p style={{fontSize:9,color:MU}}>complete</p>
            </div>
          </div>

          <div style={{display:"flex",gap:10,justifyContent:"center"}}>
            <div style={{flex:1,background:SU,borderRadius:10,padding:"10px",textAlign:"center"}}>
              <p style={{fontSize:10,color:MU,fontWeight:700,marginBottom:3}}>START</p>
              <p style={{fontFamily:"Barlow Condensed,sans-serif",fontSize:20,fontWeight:900,color:MU}}>{goal.start||"--"}{goal.unit||""}</p>
            </div>
            <div style={{flex:1,background:typeInfo.col+"12",borderRadius:10,padding:"10px",textAlign:"center",border:"1px solid "+typeInfo.col+"30"}}>
              <p style={{fontSize:10,color:typeInfo.col,fontWeight:700,marginBottom:3}}>CURRENT</p>
              <p style={{fontFamily:"Barlow Condensed,sans-serif",fontSize:20,fontWeight:900,color:typeInfo.col}}>{cur!==null?cur:"--"}{goal.unit||""}</p>
            </div>
            <div style={{flex:1,background:OR_H+"12",borderRadius:10,padding:"10px",textAlign:"center",border:"1px solid "+OR_H+"30"}}>
              <p style={{fontSize:10,color:OR,fontWeight:700,marginBottom:3}}>TARGET</p>
              <p style={{fontFamily:"Barlow Condensed,sans-serif",fontSize:20,fontWeight:900,color:OR}}>{goal.target}{goal.unit||""}</p>
            </div>
          </div>

          {daysLeft!==null&&(
            <div style={{marginTop:12,background:daysLeft>0?(daysLeft<14?RE_H+"12":"#3B82F6"+"12"):GR_H+"12",borderRadius:10,padding:"10px",border:"1px solid "+(daysLeft>0?(daysLeft<14?RE_H+"30":"#3B82F6"+"30"):GR_H+"30")}}>
              <p style={{fontSize:13,fontWeight:700,color:daysLeft>0?(daysLeft<14?RE:"#3B82F6"):GR}}>
                {daysLeft>0?daysLeft+" days remaining":"Deadline reached!"}
              </p>
              <p style={{fontSize:11,color:MU,marginTop:2}}>Due: {goal.targetDate}</p>
            </div>
          )}
        </div>

        {/* AI Analysis */}
        {isActive&&(
          <div style={{marginBottom:14}}>
            {!aiText&&!aiLoading&&(
              <button onClick={function(){getGoalAiAnalysis(goal);}} style={{width:"100%",padding:"12px",borderRadius:10,border:"1px solid "+OR_H+"40",background:OR_H+"08",color:OR,fontSize:13,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
                <Ic d={D.ai} z={15} c={OR}/> Analyse My Progress
              </button>
            )}
            {aiLoading&&(
              <div style={{textAlign:"center",padding:"16px"}}>
                <div style={{width:22,height:22,borderRadius:"50%",border:"2px solid "+OR,borderTopColor:"transparent",animation:"pulse 1s linear infinite",margin:"0 auto 8px"}}/>
                <p style={{fontSize:12,color:MU}}>Analysing goal...</p>
              </div>
            )}
            {aiText&&!aiLoading&&(

        </div>

        {!gType&&(
          <div>
            <p style={{fontSize:12,color:MU,marginBottom:12}}>What do you want to track?</p>
            {GOAL_TYPES.map(function(t){

                <button key={t.id} onClick={function(){setGType(t.id);setGUnit(t.id==="bf"?"%":unit);}} style={{width:"100%",textAlign:"left",background:CARD,borderRadius:12,padding:"14px",border:"1px solid "+BORD,marginBottom:8,cursor:"pointer",display:"flex",alignItems:"center",gap:12}}>

            {gType==="lift"&&(

                <p style={{fontSize:11,fontWeight:700,color:MU,letterSpacing:"0.06em",marginBottom:6}}>EXERCISE</p>

                    <button onClick={function(){setGExId(null);}} style={{fontSize:11,color:MU,background:"none",border:"none",cursor:"pointer"}}>Change</button>
                  </div>
                ):(
                  <div>
                    <input value={gExSearch} onChange={function(e){setGExSearch(e.target.value);}} placeholder="Search for exercise..." style={{width:"100%",background:CARD,border:"1px solid "+BORD,borderRadius:10,padding:"10px 13px",color:TX,fontSize:13,outline:"none",marginBottom:6}}/>
                    {exResults.map(function(ex){

                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <input value={gTarget} onChange={function(e){setGTarget(e.target.value.replace(/[^0-9.]/g,""));}} placeholder={gType==="bf"?"e.g. 10":"e.g. 225"} style={{flex:1,background:CARD,border:"1px solid "+BORD,borderRadius:10,padding:"11px 13px",color:TX,fontSize:14,outline:"none"}}/>
                  <span style={{color:MU,fontSize:14}}>{gType==="bf"?"%":unit}</span>
                </div>

              <div style={{flex:1}}>
                <p style={{fontSize:11,fontWeight:700,color:MU,letterSpacing:"0.06em",marginBottom:6}}>DEADLINE</p>
                <input type="date" value={gDate} onChange={function(e){setGDate(e.target.value);}} style={{width:"100%",background:CARD,border:"1px solid "+BORD,borderRadius:10,padding:"11px 13px",color:TX,fontSize:13,outline:"none",colorScheme:"dark"}}/>
              </div>
            </div>

            <div>
              <p style={{fontSize:11,fontWeight:700,color:MU,letterSpacing:"0.06em",marginBottom:6}}>NOTES (optional)</p>
              <textarea value={gNotes} onChange={function(e){setGNotes(e.target.value);}} rows={2} placeholder="Strategy, milestones, motivation..." style={{width:"100%",background:CARD,border:"1px solid "+BORD,borderRadius:10,padding:"11px 13px",color:TX,fontSize:13,outline:"none",resize:"none"}}/>
            </div>

            <button onClick={saveGoal} disabled={!gName.trim()||!gTarget||(gType==="lift"&&!gExId)} style={{width:"100%",padding:"14px",borderRadius:12,border:"none",background:(gName.trim()&&gTarget&&(gType!=="lift"||gExId))?"linear-gradient(135deg,"+OR_H+",#EA580C)":SU,color:(gName.trim()&&gTarget)?"#fff":MU,fontFamily:"Barlow Condensed,sans-serif",fontSize:16,fontWeight:800,cursor:(gName.trim()&&gTarget)?"pointer":"default"}}>{editIdx!==null?"SAVE CHANGES":"CREATE GOAL"}</button>
          </div>
        )}
      </div>

  /* LIST VIEW */
  var active=goals.filter(function(g){return g.status==="active";});
  var completed=goals.filter(function(g){return g.status==="completed";});

  return (
    <div style={{marginTop:10}}>
      {goals.length===0&&(
        <div style={{textAlign:"center",padding:"30px 20px"}}>

          <p style={{fontSize:13,color:MU,marginTop:6,lineHeight:1.5}}>Set targets for lifts, body weight, or body fat — track your progress automatically from your logged data.</p>
        </div>
      )}

      {active.length>0&&(
        <div style={{marginBottom:16}}>
          <p style={{fontSize:11,fontWeight:700,color:OR,letterSpacing:"0.06em",marginBottom:8}}>ACTIVE ({active.length})</p>

            var idx=goals.indexOf(goal);
            var cur=getCurrentValue(goal);
            var pct=getProgress(goal);
            var daysLeft=getDaysLeft(goal);
            var typeInfo=GOAL_TYPES.find(function(t){return t.id===goal.type;})||GOAL_TYPES[3];
            return (
              <button key={idx} onClick={function(){setSelIdx(idx);setView("detail");setAiText("");}} style={{width:"100%",textAlign:"left",background:CARD,borderRadius:13,padding:"14px",border:"1px solid "+BORD,marginBottom:8,cursor:"pointer"}}>
                <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:10}}>
                  <span style={{fontSize:20}}>{typeInfo.icon}</span>

      {completed.length>0&&(
        <div style={{marginBottom:16}}>
          <p style={{fontSize:11,fontWeight:700,color:GR,letterSpacing:"0.06em",marginBottom:8}}>COMPLETED ({completed.length})</p>
          {completed.map(function(goal){
            var idx=goals.indexOf(goal);
            var typeInfo=GOAL_TYPES.find(function(t){return t.id===goal.type;})||GOAL_TYPES[3];
            return (
              <button key={idx} onClick={function(){setSelIdx(idx);setView("detail");setAiText("");}} style={{width:"100%",textAlign:"left",background:GR_H+"08",borderRadius:12,padding:"12px 14px",border:"1px solid "+GR_H+"30",marginBottom:6,cursor:"pointer",display:"flex",alignItems:"center",gap:10}}>
                <Ic d={D.check} z={16} c={GR}/>
                <div style={{flex:1}}>
                  <p style={{fontSize:14,fontWeight:600,color:GR}}>{goal.name}</p>
                  <p style={{fontSize:11,color:MU}}>{goal.start}{goal.unit||""} → {goal.target}{goal.unit||""}{goal.completedDate?" — completed "+goal.completedDate:""}</p>
                </div>
              </button>
            );
          })}
        </div>
      )}

      {/* BF Log button */}
      <button onClick={function(){setShowBfLog(true);setBfAiText("");}} style={{width:"100%",padding:"12px",borderRadius:12,border:"1px solid #3B82F6"+"40",background:"#3B82F6"+"08",color:"#3B82F6",fontSize:13,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8,marginBottom:8}}>
        📐 Body Fat Log{bfLog.length>0?" — current: "+bfLog[bfLog.length-1].pct+"%":""}
      </button>

      {/* Add goal */}
      <button onClick={function(){openAdd("");}} style={{width:"100%",padding:"14px",borderRadius:12,border:"1.5px dashed #8B5CF6"+"50",background:"#8B5CF6"+"08",color:"#8B5CF6",fontFamily:"Barlow Condensed,sans-serif",fontSize:15,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
        <Ic d={D.plus} z={16} c="#8B5CF6"/> NEW GOAL
      </button>
    </div>
  );
}

function ProgressPage(p){
  var [tab,setTab]=useState("overview");
  var [featuredIds,setFeaturedIdsRaw]=useState(function(){return ld("featuredLifts",[]);});
  var [showAddLift,setShowAddLift]=useState(false);
  var [liftSearch,setLiftSearch]=useState("");
  var useKg=p.useKg!==false;
  var unit=useKg?"kg":"lb";
  var history=p.history||[];
  var prs=p.prs||{};
  var weightLog=ld("weightLog",[]);
  var photos=ld("progressPhotos",[]);

  function setFeaturedIds(fn){setFeaturedIdsRaw(function(prev){var n=typeof fn==="function"?fn(prev):fn;sd("featuredLifts",n);return n;});}

  function getFirstLogged(exId){
    for(var i=history.length-1;i>=0;i--){
      var w=history[i];
      if(!w.exercises) continue;
      for(var j=0;j<w.exercises.length;j++){
        var ex=w.exercises[j];
        var exInfo=getEx(exId);
        if(ex.name===exInfo.name&&ex.sets&&ex.sets.length>0){
          var best=ex.sets.reduce(function(b,s){return (parseFloat(s.w)||0)>(parseFloat(b.w)||0)?s:b;},ex.sets[0]);
          return {w:parseFloat(best.w)||0,date:w.date||w.dateISO||"?"};
        }
      }
    }
    return null;
  }

  function getCurrentPR(exId){
    var list=prs[exId];
    if(!list||list.length===0) return null;
    return list.reduce(function(b,x){return (!b||x.w>b.w)?x:b;},null);
  }

  function toDisp(kgV){if(!kgV&&kgV!==0) return 0;return useKg?Math.round(kgV*10)/10:Math.round(kgV*2.20462*10)/10;}

  /* Calendar data */
  var calMonth=new Date().getMonth();
  var calYear=new Date().getFullYear();
  var [calM,setCalM]=useState(calMonth);
  var [calY,setCalY]=useState(calYear);
  var mnths=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  var firstDay=new Date(calY,calM,1).getDay();
  var daysInM=new Date(calY,calM+1,0).getDate();

  function calKey(day){return calY+"-"+String(calM+1).padStart(2,"0")+"-"+String(day).padStart(2,"0");}

  /* Build calendar data maps */
  var weighInDates={};
  weightLog.forEach(function(e){weighInDates[e.date]=e.kg;});

  var prDates={};
  Object.keys(prs).forEach(function(eid){
    (prs[eid]||[]).forEach(function(pr){
      if(pr.date){
        var d=pr.date;
        if(!prDates[d]) prDates[d]=[];
        prDates[d].push({ex:getEx(parseInt(eid)).name,w:pr.w,r:pr.r});
      }
    });
  });

  var photoDates={};
  photos.forEach(function(ph){
    var d=(ph.date||"").slice(0,10);
    if(d) photoDates[d]=true;
  });

  /* Weight graph - last 30 entries */
  var graphData=weightLog.slice(-30);
  var graphMin=graphData.length>0?graphData.reduce(function(m,e){return e.kg<m?e.kg:m;},Infinity):0;
  var graphMax=graphData.length>0?graphData.reduce(function(m,e){return e.kg>m?e.kg:m;},0):100;
  var graphRange=Math.max(graphMax-graphMin,1);

  if(tab==="prs") return <PRHub useKg={useKg} prs={prs} setPrs={p.setPrs} customs={p.customs} onCustom={p.onCustom} splits={p.splits} setSplits={p.setSplits} history={history} profile={p.profile} go={p.go} onBack={function(){setTab("overview");}} defaultTab="prs"/>;

  if(showAddLift){
    var available=ALL_EX.filter(function(ex){
      if(featuredIds.indexOf(ex.id)>=0) return false;
      if(!liftSearch.trim()) return true;
      return ex.name.toLowerCase().indexOf(liftSearch.toLowerCase())>=0;
    }).slice(0,20);
    return (
      <div style={{paddingBottom:80}}>
        <div style={{padding:"52px 20px 16px",background:SURF}}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <button onClick={function(){setShowAddLift(false);setLiftSearch("");}} style={{background:"none",border:"none",cursor:"pointer"}}><Ic d={D.back} z={22}/></button>
            <h1 style={{fontFamily:"Barlow Condensed,sans-serif",fontSize:24,fontWeight:800,letterSpacing:"0.035em"}}>Add Featured Lift</h1>
          </div>
        </div>
        <div style={{padding:"12px 20px"}}>
          <input value={liftSearch} onChange={function(e){setLiftSearch(e.target.value);}} placeholder="Search exercises..." style={{width:"100%",background:CARD,border:"1px solid "+BORD,borderRadius:11,padding:"12px 14px",color:TX,fontSize:14,outline:"none",marginBottom:12}}/>
          {available.map(function(ex){
            return (
              <div key={ex.id} onClick={function(){setFeaturedIds(function(prev){return prev.concat([ex.id]);});setShowAddLift(false);setLiftSearch("");}} style={{background:CARD,borderRadius:11,padding:"12px 14px",border:"1px solid "+BORD,marginBottom:8,display:"flex",alignItems:"center",gap:12,cursor:"pointer"}}>
                <div style={{width:32,height:32,borderRadius:8,background:(ex.col||OR)+"18",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                  <Ic d={D.train} z={14} c={ex.col||OR}/>
                </div>
                <div><p style={{fontWeight:600,fontSize:14,color:TX}}>{ex.name}</p><p style={{fontSize:11,color:MU}}>{ex.muscle} - {ex.eq}</p></div>
              </div>
            );
          })}
          {available.length===0&&<p style={{color:MU,fontSize:13,textAlign:"center",padding:"20px"}}>No matching exercises found.</p>}
        </div>
      </div>
    );
  }

  return (
    <div style={{paddingBottom:80}}>
      <div style={{padding:"52px 20px 0",background:"linear-gradient(180deg,#8B5CF6"+"18 0%,transparent 100%)"}}>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:14}}>
          <button onClick={function(){p.go("home");}} style={{background:"none",border:"none",cursor:"pointer"}}><Ic d={D.back} z={22}/></button>
          <h1 style={{fontFamily:"Barlow Condensed,sans-serif",fontSize:32,fontWeight:800,letterSpacing:"0.04em",color:TX}}>PROGRESS</h1>
        </div>
        <div style={{display:"flex",gap:6,marginBottom:14,overflowX:"auto"}}>
          {[["overview","Overview"],["goals","Goals"],["calendar","Calendar"],["photos","Photos"],["prs","PR Vault"]].map(function(t){
            var act=tab===t[0];
            return <button key={t[0]} onClick={function(){setTab(t[0]);}} style={{padding:"7px 16px",borderRadius:20,border:"1px solid "+(act?"#8B5CF6":BORD),background:act?"#8B5CF6":"transparent",color:act?"#fff":MU,fontSize:13,fontWeight:600,cursor:"pointer",whiteSpace:"nowrap",flexShrink:0}}>{t[1]}</button>;
          })}
        </div>
      </div>
      <div style={{padding:"0 20px"}}>

        {tab==="overview"&&(
          <div>
            <p style={{fontFamily:"Barlow Condensed,sans-serif",fontSize:18,fontWeight:800,color:TX,marginBottom:12}}>FEATURED LIFTS</p>
            {featuredIds.length===0&&(
              <div style={{background:CARD,borderRadius:14,padding:"20px",border:"1px solid "+BORD,textAlign:"center",marginBottom:14}}>
                <p style={{color:MU,fontSize:13,marginBottom:10}}>Track your key lifts here. Add exercises to see Day 1 vs current PR.</p>
              </div>
            )}
            {featuredIds.map(function(eid,fi){
              var ex=getEx(eid);
              var first=getFirstLogged(eid);
              var pr=getCurrentPR(eid);
              var firstW=first?toDisp(first.w):null;
              var prW=pr?toDisp(pr.w):null;
              var gain=firstW!==null&&prW!==null?Math.round((prW-firstW)*10)/10:null;
              return (
                <div key={eid} style={{background:CARD,borderRadius:14,padding:"14px",border:"1px solid "+BORD,marginBottom:10}}>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
                    <div style={{display:"flex",alignItems:"center",gap:10}}>
                      <div style={{width:36,height:36,borderRadius:9,background:(ex.col||OR)+"18",display:"flex",alignItems:"center",justifyContent:"center"}}><Ic d={D.train} z={16} c={ex.col||OR}/></div>
                      <div><p style={{fontWeight:700,fontSize:14,color:TX}}>{ex.name}</p><p style={{fontSize:11,color:MU}}>{ex.muscle}</p></div>
                    </div>
                    <button onClick={function(){setFeaturedIds(function(prev){return prev.filter(function(id){return id!==eid;});});}} style={{width:24,height:24,borderRadius:6,border:"1px solid "+BORD,background:"transparent",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}><Ic d={D.x} z={11} c={MU}/></button>
                  </div>
                  <div style={{display:"flex",gap:10}}>
                    <div style={{flex:1,background:SU,borderRadius:10,padding:"10px",textAlign:"center"}}>
                      <p style={{fontSize:10,color:MU,fontWeight:700,marginBottom:4}}>DAY 1</p>
                      <p style={{fontFamily:"Barlow Condensed,sans-serif",fontSize:22,fontWeight:800,letterSpacing:"0.03em",color:MU}}>{firstW!==null?firstW+unit:"--"}</p>
                      {first&&<p style={{fontSize:9,color:MU,marginTop:2}}>{first.date}</p>}
                    </div>
                    <div style={{display:"flex",alignItems:"center"}}>
                      <Ic d={D.chev} z={20} c={gain>0?GR:MU}/>
                    </div>
                    <div style={{flex:1,background:(gain>0?GR:OR)+"10",borderRadius:10,padding:"10px",textAlign:"center",border:"1px solid "+(gain>0?GR:OR)+"30"}}>
                      <p style={{fontSize:10,color:gain>0?GR:OR,fontWeight:700,marginBottom:4}}>CURRENT PR</p>
                      <p style={{fontFamily:"Barlow Condensed,sans-serif",fontSize:22,fontWeight:800,letterSpacing:"0.03em",color:gain>0?GR:OR}}>{prW!==null?prW+unit:"--"}</p>
                      {gain!==null&&<p style={{fontSize:10,color:gain>0?GR:MU,fontWeight:700,marginTop:2}}>+{gain}{unit}</p>}
                    </div>
                  </div>
                </div>
              );
            })}
            <button onClick={function(){setShowAddLift(true);}} style={{width:"100%",padding:"12px",borderRadius:12,border:"1.5px dashed #8B5CF6"+"50",background:"#8B5CF6"+"08",color:"#8B5CF6",fontFamily:"Barlow Condensed,sans-serif",fontSize:14,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8,marginBottom:20}}>
              <Ic d={D.plus} z={14} c="#8B5CF6"/> ADD LIFT
            </button>

            <p style={{fontFamily:"Barlow Condensed,sans-serif",fontSize:18,fontWeight:800,color:TX,marginBottom:12}}>BODY WEIGHT</p>
            {graphData.length>1?(
              <div style={{background:CARD,borderRadius:14,padding:"14px",border:"1px solid "+BORD,marginBottom:20}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                  <p style={{fontSize:12,color:MU}}>Last {graphData.length} entries</p>
                  <p style={{fontSize:12,fontWeight:700,color:TX}}>{toDisp(graphData[graphData.length-1].kg)} {unit}</p>
                </div>
                <svg width="100%" height={120} viewBox={"0 0 "+Math.max(graphData.length*12,100)+" 120"} style={{overflow:"visible"}}>
                  <polyline fill="none" stroke="#8B5CF6" strokeWidth={2} strokeLinecap="round" strokeLinejoin="round"
                    points={graphData.map(function(e,i){
