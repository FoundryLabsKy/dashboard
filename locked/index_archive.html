function SupplementsTab(){
  var [supps,setSuppsRaw]=useState(function(){return ld("supplements",[]);});
  var [suppLog,setSuppLog]=useState(function(){return getSuppLog();});
  var [showAdd,setShowAdd]=useState(false);
  var [editIdx,setEditIdx]=useState(null);
  var [showPresets,setShowPresets]=useState(false);
  var [showHistory,setShowHistory]=useState(null);
  var [name,setName]=useState("");
  var [dose,setDose]=useState("");
  var [freq,setFreq]=useState("Daily");
  var [timeOf,setTimeOf]=useState("Morning");
  var [customTime,setCustomTime]=useState("");
  var [reminder,setReminder]=useState(false);
  var [q,setQ]=useState("");
  var todayISO=new Date().toISOString().slice(0,10);

  function setSupps(fn){setSuppsRaw(function(prev){var n=typeof fn==="function"?fn(prev):fn;sd("supplements",n);return n;});}

  function take(suppName){
    var updated=markSuppTaken(suppName);
    setSuppLog(updated);
    logBetaActivity("supplement_taken",{name:suppName});
  }

  function openAdd(){
    setName("");setDose("");setFreq("Daily");setTimeOf("Morning");setCustomTime("");setReminder(false);
    setEditIdx(null);setShowAdd(true);setShowPresets(false);
  }
  function openEdit(idx){
    var s=supps[idx];
    setName(s.name);setDose(s.dose||"");setFreq(s.freq||"Daily");
    if(SUPP_TIMES.indexOf(s.timeOf)>=0&&s.timeOf!=="Custom"){setTimeOf(s.timeOf);setCustomTime("");}
    else{setTimeOf("Custom");setCustomTime(s.timeOf||"");}
    setReminder(s.reminder||false);
    setEditIdx(idx);setShowAdd(true);setShowPresets(false);
  }
  function save(){
    if(!name.trim()) return;
    var entry={
      name:name.trim(),
      dose:dose.trim(),
      freq:freq,
      timeOf:timeOf==="Custom"?customTime.trim()||"Custom":timeOf,
      reminder:reminder,
      created:editIdx!==null?supps[editIdx].created:new Date().toISOString()
    };
    if(editIdx!==null){
      setSupps(function(prev){var n=prev.slice();n[editIdx]=entry;return n;});
    } else {
      setSupps(function(prev){return prev.concat([entry]);});
    }
    logBetaActivity("supplement_"+(editIdx!==null?"edit":"add"),{name:entry.name,dose:entry.dose});
    setShowAdd(false);setEditIdx(null);
  }
  function remove(idx){
    logBetaActivity("supplement_delete",{name:supps[idx].name});
    setSupps(function(prev){return prev.filter(function(_,i){return i!==idx;});});
  }

  var filteredPresets=PRESET_SUPPS.filter(function(p){
    var existing=supps.some(function(s){return s.name.toLowerCase()===p.toLowerCase();});
    if(existing) return false;
    if(!q.trim()) return true;
    return p.toLowerCase().indexOf(q.toLowerCase())>=0;
  });

  /* History view for a single supplement */
  if(showHistory!==null){
    var sh=supps[showHistory];
    if(!sh){setShowHistory(null);return null;}
    var streak=getSuppStreak(sh.name);
    var log=getSuppLog();
    var last14=[];
    for(var hi=0;hi<14;hi++){
      var hd=new Date();hd.setDate(hd.getDate()-hi);
      var hk=hd.toISOString().slice(0,10);

          <div>

            <p style={{fontSize:12,color:MU}}>{sh.dose?sh.dose+" — ":""}{sh.timeOf} — {sh.freq}</p>
          </div>
        </div>
        <div style={{display:"flex",gap:14,marginBottom:18}}>
          <div style={{flex:1,background:OR_H+"12",borderRadius:12,padding:"14px",border:"1px solid "+OR_H+"30",textAlign:"center"}}>
            <p style={{fontFamily:"Barlow Condensed,sans-serif",fontSize:28,fontWeight:800,letterSpacing:"0.04em",color:OR,lineHeight:1}}>{streak}</p>
            <p style={{fontSize:11,color:MU,marginTop:4}}>Day Streak</p>
          </div>
          <div style={{flex:1,background:GR_H+"12",borderRadius:12,padding:"14px",border:"1px solid "+GR_H+"30",textAlign:"center"}}>
            <p style={{fontFamily:"Barlow Condensed,sans-serif",fontSize:28,fontWeight:800,letterSpacing:"0.04em",color:GR,lineHeight:1}}>{last14.filter(function(d){return d.taken;}).length}</p>
            <p style={{fontSize:11,color:MU,marginTop:4}}>Last 14 Days</p>
          </div>
        </div>
        <p style={{fontSize:11,fontWeight:700,color:MU,letterSpacing:"0.06em",marginBottom:8}}>LAST 14 DAYS</p>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:6}}>
          {last14.map(function(d,i){

                </div>
                <p style={{fontSize:8,color:MU,marginTop:2}}>{d.date.slice(5)}</p>
              </div>
            );
          })}
        </div>
      </div>
    );
  }

  if(showAdd) return (
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>

        <button onClick={function(){setShowAdd(false);setEditIdx(null);}} style={{background:"none",border:"none",cursor:"pointer"}}><Ic d={D.x} z={20} c={MU}/></button>
      </div>

      {!name&&editIdx===null&&(
        <div style={{marginBottom:14}}>
          <button onClick={function(){setShowPresets(!showPresets);}} style={{width:"100%",padding:"11px",borderRadius:10,border:"1px solid "+OR_H+"40",background:OR_H+"10",color:OR,fontSize:13,fontWeight:700,cursor:"pointer",marginBottom:8}}>Choose from Presets</button>
          {showPresets&&(

              <input value={q} onChange={function(e){setQ(e.target.value);}} placeholder="Search presets..." style={{width:"100%",background:CARD,border:"1px solid "+BORD,borderRadius:9,padding:"9px 12px",color:TX,fontSize:13,outline:"none",marginBottom:8}}/>

                {filteredPresets.map(function(p){

var CYCLE_FREQ_OPTS=["Daily","2x/day","Every Other Day","2x/week","3x/week","1x/week","As Needed"];
var CYCLE_ROUTE_OPTS=["Oral","IM Injection","SubQ Injection","Topical","Sublingual","Other"];

function getCycles(){return ld("cycles",[]);}
function saveCycles(c){sd("cycles",c);}
function getCycleLog(){return ld("cycleLog",{});}
function markCompoundTaken(cycleName,compoundName){
  var log=getCycleLog();
  var today=new Date().toISOString().slice(0,10);
  var key=cycleName+"::"+compoundName;
  if(!log[today]) log[today]=[];
  if(log[today].indexOf(key)<0) log[today].push(key);
  sd("cycleLog",log);
  return log;
}
function isCompoundTaken(cycleName,compoundName,dateISO){
  var log=getCycleLog();
  if(!dateISO) dateISO=new Date().toISOString().slice(0,10);
  var key=cycleName+"::"+compoundName;
  return log[dateISO]&&log[dateISO].indexOf(key)>=0;
}
function getCompoundStreak(cycleName,compoundName){
  var log=getCycleLog();
  var key=cycleName+"::"+compoundName;
  var streak=0;
  var d=new Date();
  while(true){
    var k=d.toISOString().slice(0,10);
    if(log[k]&&log[k].indexOf(key)>=0){streak++;d.setDate(d.getDate()-1);}
    else break;
  }
  return streak;
}
function getDueCompounds(){
  var perfOn=ld("perfTracking",false);
  if(!perfOn) return [];
  var cycles=getCycles();
  var today=new Date().toISOString().slice(0,10);
  var now=new Date();
  var dayNum=Math.floor(now.getTime()/(1000*60*60*24));
  var log=getCycleLog();
  var taken=log[today]||[];
  var due=[];
  cycles.forEach(function(cyc){
    if(cyc.status!=="active") return;
    if(cyc.endDate&&today>cyc.endDate) return;
    if(cyc.startDate&&today<cyc.startDate) return;
    (cyc.compounds||[]).forEach(function(comp){
      var key=cyc.name+"::"+comp.name;
      if(taken.indexOf(key)>=0) return;
      var f=comp.freq||"Daily";
      if(f==="Every Other Day"&&dayNum%2!==0) return;
      if(f==="1x/week"&&now.getDay()!==1) return;
      if(f==="2x/week"&&now.getDay()!==1&&now.getDay()!==4) return;
      if(f==="3x/week"&&now.getDay()!==1&&now.getDay()!==3&&now.getDay()!==5) return;
      due.push({cycleName:cyc.name,compound:comp});
    });
  });
  return due;
}

          <div>
            <p style={{fontSize:11,fontWeight:700,color:MU,letterSpacing:"0.06em",marginBottom:6}}>DOSE</p>
            <input value={compDose} onChange={function(e){setCompDose(e.target.value);}} placeholder="e.g. 250mg, 4IU, 20mg" style={{width:"100%",background:CARD,border:"1px solid "+BORD,borderRadius:10,padding:"11px 13px",color:TX,fontSize:14,outline:"none"}}/>
            {presetMatch&&<p style={{fontSize:10,color:MU,marginTop:4}}>Typical: {presetMatch.defDose} — Half-life: {presetMatch.halfLife}</p>}
          </div>
          <div>
            <p style={{fontSize:11,fontWeight:700,color:MU,letterSpacing:"0.06em",marginBottom:6}}>FREQUENCY</p>
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              {CYCLE_FREQ_OPTS.map(function(f){var act=compFreq===f;return <button key={f} onClick={function(){setCompFreq(f);}} style={{padding:"7px 12px",borderRadius:20,border:"1px solid "+(act?OR:BORD),background:act?OR_H+"15":"transparent",color:act?OR:MU,fontSize:11,fontWeight:act?700:400,cursor:"pointer"}}>{f}</button>;})}
            </div>
          </div>
          <div>
            <p style={{fontSize:11,fontWeight:700,color:MU,letterSpacing:"0.06em",marginBottom:6}}>ROUTE</p>
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              {routeOpts.map(function(r){var act=compRoute===r;return <button key={r} onClick={function(){setCompRoute(r);}} style={{padding:"7px 12px",borderRadius:20,border:"1px solid "+(act?OR:BORD),background:act?OR_H+"15":"transparent",color:act?OR:MU,fontSize:11,fontWeight:act?700:400,cursor:"pointer"}}>{r}</button>;})}
            </div>
          </div>
          <button onClick={saveComp} disabled={!compName.trim()} style={{width:"100%",padding:"14px",borderRadius:12,border:"none",background:compName.trim()?"linear-gradient(135deg,"+OR_H+",#EA580C)":SU,color:compName.trim()?"#fff":MU,fontFamily:"Barlow Condensed,sans-serif",fontSize:16,fontWeight:800,cursor:compName.trim()?"pointer":"default"}}>{compEditIdx!==null?"SAVE CHANGES":"ADD TO CYCLE"}</button>
        </div>
      </div>
    );
  }

  /* CYCLE DETAIL VIEW */
  if(view==="detail"&&selIdx!==null&&cycles[selIdx]){
    var cyc=cycles[selIdx];
    var isActive=cyc.status==="active";
    var startD=cyc.startDate?new Date(cyc.startDate+"T00:00:00"):null;
    var endD=cyc.endDate?new Date(cyc.endDate+"T00:00:00"):null;
    var nowD=new Date();
    var weekNum=startD?Math.max(1,Math.ceil((nowD-startD)/(7*24*60*60*1000))):null;
    var totalWeeks=parseInt(cyc.weeks)||null;

    return (
      <div>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16}}>
          <button onClick={function(){setView("list");setSelIdx(null);}} style={{background:"none",border:"none",cursor:"pointer"}}><Ic d={D.back} z={20}/></button>
          <div style={{flex:1}}>
            <p style={{fontFamily:"Barlow Condensed,sans-serif",fontSize:22,fontWeight:800,color:TX}}>{cyc.name}</p>
            <p style={{fontSize:12,color:isActive?GR:MU,fontWeight:600}}>{isActive?"Active":"Completed"}{weekNum&&totalWeeks&&isActive?" — Week "+weekNum+" of "+totalWeeks:""}</p>
          </div>
          <div style={{display:"flex",gap:6}}>
            <button onClick={function(){openEdit(selIdx);}} style={{width:32,height:32,borderRadius:8,border:"1px solid "+BORD,background:"transparent",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}><Ic d={D.edit} z={14} c={MU}/></button>
            {isActive&&<button onClick={function(){endCycle(selIdx);}} style={{padding:"6px 12px",borderRadius:8,border:"1px solid "+RE_H+"40",background:RE_H+"10",color:RE,fontSize:11,fontWeight:700,cursor:"pointer"}}>End</button>}
          </div>
        </div>
        {cyc.startDate&&<p style={{fontSize:11,color:MU,marginBottom:4}}>Started: {cyc.startDate}{cyc.endDate?" — Ends: "+cyc.endDate:""}</p>}

        {/* Today's compounds - daily check-off */}
        {isActive&&(
          <div style={{marginBottom:16}}>
            <p style={{fontSize:11,fontWeight:700,color:MU,letterSpacing:"0.06em",marginBottom:8}}>TODAY</p>
            {(cyc.compounds||[]).map(function(comp,ci){
              var taken=isCompoundTaken(cyc.name,comp.name);
              var streak=getCompoundStreak(cyc.name,comp.name);
              var cat=COMPOUND_CATEGORIES.find(function(c){return c.id===comp.cat;})||COMPOUND_CATEGORIES[4];
              var dayNum=Math.floor(new Date().getTime()/(1000*60*60*24));
              var f=comp.freq||"Daily";
              var dueToday=true;
              if(f==="Every Other Day"&&dayNum%2!==0) dueToday=false;
              if(f==="1x/week"&&new Date().getDay()!==1) dueToday=false;
              if(f==="2x/week"&&new Date().getDay()!==1&&new Date().getDay()!==4) dueToday=false;
              if(f==="3x/week"&&new Date().getDay()!==1&&new Date().getDay()!==3&&new Date().getDay()!==5) dueToday=false;
              if(f==="As Needed") dueToday=false;
              return (
                <div key={ci} style={{background:taken?GR_H+"08":CARD,borderRadius:12,padding:"11px 13px",border:"1px solid "+(taken?GR_H+"30":BORD),marginBottom:6,display:"flex",alignItems:"center",gap:10}}>
                  <button onClick={function(){if(!taken&&dueToday)take(cyc.name,comp.name);}} disabled={taken||!dueToday} style={{width:36,height:36,borderRadius:9,background:taken?GR_H+"20":dueToday?cat.col+"18":SU,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,border:"none",cursor:taken||!dueToday?"default":"pointer"}}>
                    {taken?<Ic d={D.check} z={16} c={GR}/>:<div style={{width:8,height:8,borderRadius:"50%",background:dueToday?cat.col:BORD}}/>}
                  </button>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:"flex",alignItems:"center",gap:6}}>
                      <p style={{fontSize:13,fontWeight:600,color:taken?GR:dueToday?TX:MU,textDecoration:taken?"line-through":"none"}}>{comp.name}</p>
                      {streak>1&&<span style={{fontSize:9,color:OR,fontWeight:700,background:OR_H+"15",borderRadius:5,padding:"1px 5px"}}>{streak}d</span>}
                    </div>
                    <p style={{fontSize:11,color:MU}}>{comp.dose} — {comp.route} — {comp.freq}{!dueToday&&!taken?" (not scheduled today)":""}</p>
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {/* Compounds list */}
        <p style={{fontSize:11,fontWeight:700,color:MU,letterSpacing:"0.06em",marginBottom:8}}>COMPOUNDS ({(cyc.compounds||[]).length})</p>
        {(cyc.compounds||[]).map(function(comp,ci){
          var cat=COMPOUND_CATEGORIES.find(function(c){return c.id===comp.cat;})||COMPOUND_CATEGORIES[4];
          return (
            <div key={ci} style={{background:CARD,borderRadius:11,padding:"10px 13px",border:"1px solid "+BORD,marginBottom:6,display:"flex",alignItems:"center",gap:10}}>
              <div style={{width:6,height:28,borderRadius:3,background:cat.col,flexShrink:0}}/>
              <div style={{flex:1}}>
                <p style={{fontSize:13,fontWeight:600,color:TX}}>{comp.name}</p>
                <p style={{fontSize:11,color:MU}}>{comp.dose} — {comp.route} — {comp.freq}</p>
              </div>
              <span style={{fontSize:9,color:cat.col,fontWeight:700,background:cat.col+"15",borderRadius:6,padding:"2px 7px"}}>{cat.name}</span>
            </div>
          );
        })}

        {/* AI Overview */}
        {cyc.aiOverview&&(
          <div style={{marginTop:14}}>
            <p style={{fontSize:11,fontWeight:700,color:MU,letterSpacing:"0.06em",marginBottom:8}}>AI OVERVIEW</p>
            <div style={{background:OR_H+"08",borderRadius:12,padding:"13px 14px",border:"1px solid "+OR_H+"25"}}>
              <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:8}}>
                <Ic d={D.ai} z={14} c={OR}/>
                <p style={{fontSize:12,fontWeight:700,color:OR}}>Coach Analysis</p>
              </div>
              <p style={{fontSize:13,color:TX,lineHeight:1.7}}>{cyc.aiOverview}</p>
            </div>
          </div>
        )}

        {/* Notes */}
        {cyc.notes&&(
          <div style={{marginTop:12}}>
            <p style={{fontSize:11,fontWeight:700,color:MU,letterSpacing:"0.06em",marginBottom:6}}>NOTES</p>
            <p style={{fontSize:13,color:MU,lineHeight:1.6}}>{cyc.notes}</p>
          </div>
        )}

        <button onClick={function(){deleteCycle(selIdx);}} style={{width:"100%",padding:"12px",borderRadius:10,border:"1px solid "+RE_H+"40",background:RE_H+"08",color:RE,fontSize:13,fontWeight:600,cursor:"pointer",marginTop:18}}>Delete Cycle</button>
      </div>
    );
  }

  /* ADD / EDIT CYCLE VIEW */
  if(view==="add"){
    var filteredPresets=PRESET_COMPOUNDS.filter(function(p){
      var q2=presetQ.toLowerCase();
      if(presetCat&&p.cat!==presetCat) return false;
      if(q2&&p.name.toLowerCase().indexOf(q2)<0) return false;
      return true;
    });

    return (
      <div>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
          <p style={{fontFamily:"Barlow Condensed,sans-serif",fontSize:20,fontWeight:800,color:TX}}>{editIdx!==null?"Edit":"New"} Cycle</p>
          <button onClick={function(){setView("list");}} style={{background:"none",border:"none",cursor:"pointer"}}><Ic d={D.x} z={20} c={MU}/></button>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <div>
            <p style={{fontSize:11,fontWeight:700,color:MU,letterSpacing:"0.06em",marginBottom:6}}>CYCLE NAME</p>
            <input value={cName} onChange={function(e){setCName(e.target.value);}} placeholder="e.g. Summer Blast, First Cycle, TRT+" style={{width:"100%",background:CARD,border:"1px solid "+(cName?OR:BORD),borderRadius:10,padding:"11px 13px",color:TX,fontSize:14,outline:"none"}}/>
          </div>
          <div style={{display:"flex",gap:10}}>
            <div style={{flex:1}}>
              <p style={{fontSize:11,fontWeight:700,color:MU,letterSpacing:"0.06em",marginBottom:6}}>START DATE</p>
              <input type="date" value={cStart} onChange={function(e){setCStart(e.target.value);}} style={{width:"100%",background:CARD,border:"1px solid "+BORD,borderRadius:10,padding:"11px 13px",color:TX,fontSize:13,outline:"none",colorScheme:"dark"}}/>
            </div>
            <div style={{flex:1}}>
              <p style={{fontSize:11,fontWeight:700,color:MU,letterSpacing:"0.06em",marginBottom:6}}>WEEKS</p>
              <input value={cWeeks} onChange={function(e){setCWeeks(e.target.value.replace(/[^0-9]/g,""));}} placeholder="12" style={{width:"100%",background:CARD,border:"1px solid "+BORD,borderRadius:10,padding:"11px 13px",color:TX,fontSize:14,outline:"none"}}/>
            </div>
          </div>
          {cStart&&cWeeks&&<p style={{fontSize:11,color:MU,marginTop:-8}}>Ends: {calcEndDate()}</p>}

          {/* Compounds section */}
          <div>
            <p style={{fontSize:11,fontWeight:700,color:MU,letterSpacing:"0.06em",marginBottom:8}}>COMPOUNDS ({cComps.length})</p>
            {cComps.map(function(c,i){
              var cat=COMPOUND_CATEGORIES.find(function(ct){return ct.id===c.cat;})||COMPOUND_CATEGORIES[4];
              return (
                <div key={i} style={{background:CARD,borderRadius:11,padding:"10px 13px",border:"1px solid "+BORD,marginBottom:6,display:"flex",alignItems:"center",gap:8}}>
                  <div style={{width:5,height:26,borderRadius:3,background:cat.col,flexShrink:0}}/>
                  <div style={{flex:1,minWidth:0}}>
                    <p style={{fontSize:13,fontWeight:600,color:TX}}>{c.name}</p>
                    <p style={{fontSize:11,color:MU}}>{c.dose} — {c.route} — {c.freq}</p>
                  </div>
                  <button onClick={function(){openCompEdit(i);}} style={{width:28,height:28,borderRadius:7,border:"1px solid "+BORD,background:"transparent",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}><Ic d={D.edit} z={12} c={MU}/></button>
                  <button onClick={function(){removeComp(i);}} style={{width:28,height:28,borderRadius:7,border:"1px solid "+RE_H+"30",background:RE_H+"08",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}><Ic d={D.trash} z={12} c={RE}/></button>
                </div>
              );
            })}

            {/* Preset browser */}
            <button onClick={function(){setShowPresets(!showPresets);setPresetCat(null);setPresetQ("");}} style={{width:"100%",padding:"10px",borderRadius:10,border:"1px solid "+OR_H+"40",background:OR_H+"10",color:OR,fontSize:13,fontWeight:700,cursor:"pointer",marginBottom:6}}>
              {showPresets?"Hide":"Browse"} Compound Database
            </button>
            {showPresets&&(
              <div style={{background:CARD,borderRadius:12,padding:"12px",border:"1px solid "+BORD,marginBottom:8}}>
                <input value={presetQ} onChange={function(e){setPresetQ(e.target.value);}} placeholder="Search compounds..." style={{width:"100%",background:SU,border:"1px solid "+BORD,borderRadius:9,padding:"9px 12px",color:TX,fontSize:13,outline:"none",marginBottom:8}}/>
                <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:8}}>
                  <button onClick={function(){setPresetCat(null);}} style={{padding:"5px 10px",borderRadius:16,border:"1px solid "+(!presetCat?OR:BORD),background:!presetCat?OR_H+"15":"transparent",color:!presetCat?OR:MU,fontSize:10,fontWeight:700,cursor:"pointer"}}>All</button>
                  {COMPOUND_CATEGORIES.map(function(cat){var act=presetCat===cat.id;return <button key={cat.id} onClick={function(){setPresetCat(act?null:cat.id);}} style={{padding:"5px 10px",borderRadius:16,border:"1px solid "+(act?cat.col:BORD),background:act?cat.col+"15":"transparent",color:act?cat.col:MU,fontSize:10,fontWeight:700,cursor:"pointer"}}>{cat.name}</button>;})}
                </div>
                <div style={{maxHeight:220,overflowY:"auto"}}>
                  {filteredPresets.map(function(p2){
                    var cat=COMPOUND_CATEGORIES.find(function(c){return c.id===p2.cat;})||COMPOUND_CATEGORIES[4];
                    return (
                      <button key={p2.name} onClick={function(){addPresetComp(p2);}} style={{width:"100%",textAlign:"left",padding:"9px 10px",borderRadius:9,border:"1px solid "+BORD,background:"transparent",color:TX,cursor:"pointer",marginBottom:4,display:"flex",alignItems:"center",gap:8}}>
                        <div style={{width:5,height:20,borderRadius:2,background:cat.col,flexShrink:0}}/>
                        <div style={{flex:1}}>
                          <p style={{fontSize:13,fontWeight:600,color:TX}}>{p2.name}</p>
                          <p style={{fontSize:10,color:MU}}>{p2.defDose} — {p2.routes.join(", ")} — {p2.halfLife}</p>
                        </div>
                      </button>
                    );
                  })}
                  {filteredPresets.length===0&&<p style={{fontSize:12,color:MU,padding:"10px 0",textAlign:"center"}}>No matches</p>}
                </div>
              </div>
            )}

            <button onClick={function(){setCompName("");setCompDose("");setCompFreq("Daily");setCompRoute("Oral");setCompCat("aas");setCompEditIdx(null);setShowCompForm(true);}} style={{width:"100%",padding:"10px",borderRadius:10,border:"1.5px dashed "+BORD,background:"transparent",color:MU,fontSize:12,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
              <Ic d={D.plus} z={14} c={MU}/> Add Custom Compound
            </button>
          </div>

          {/* Notes */}
          <div>
            <p style={{fontSize:11,fontWeight:700,color:MU,letterSpacing:"0.06em",marginBottom:6}}>NOTES (optional)</p>
            <textarea value={cNotes} onChange={function(e){setCNotes(e.target.value);}} rows={3} placeholder="Goals, blood work schedule, PCT plan..." style={{width:"100%",background:CARD,border:"1px solid "+BORD,borderRadius:10,padding:"11px 13px",color:TX,fontSize:13,outline:"none",resize:"none"}}/>
          </div>

          {/* AI Overview */}
          {cComps.length>0&&(
            <div>
              {!aiOverview&&!aiLoading&&(
                <button onClick={getAiOverview} style={{width:"100%",padding:"12px",borderRadius:10,border:"1px solid "+OR_H+"40",background:OR_H+"08",color:OR,fontSize:13,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
                  <Ic d={D.ai} z={15} c={OR}/> Generate AI Cycle Overview
                </button>
              )}
              {aiLoading&&(
                <div style={{textAlign:"center",padding:"16px"}}>
                  <div style={{width:22,height:22,borderRadius:"50%",border:"2px solid "+OR,borderTopColor:"transparent",animation:"pulse 1s linear infinite",margin:"0 auto 8px"}}/>
                  <p style={{fontSize:12,color:MU}}>Analysing cycle...</p>
                </div>
              )}
              {aiOverview&&!aiLoading&&(
                <div style={{background:OR_H+"08",borderRadius:12,padding:"13px 14px",border:"1px solid "+OR_H+"25"}}>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
                    <div style={{display:"flex",alignItems:"center",gap:7}}>
                      <Ic d={D.ai} z={14} c={OR}/>
                      <p style={{fontSize:12,fontWeight:700,color:OR}}>AI Overview</p>
                    </div>
                    <button onClick={getAiOverview} style={{fontSize:10,color:MU,background:"none",border:"none",cursor:"pointer"}}>Regenerate</button>
                  </div>
                  <p style={{fontSize:13,color:TX,lineHeight:1.7}}>{aiOverview}</p>
                </div>
              )}
            </div>
          )}

          <button onClick={saveCycle} disabled={!cName.trim()||cComps.length===0} style={{width:"100%",padding:"15px",borderRadius:12,border:"none",background:(cName.trim()&&cComps.length>0)?"linear-gradient(135deg,"+OR_H+",#EA580C)":SU,color:(cName.trim()&&cComps.length>0)?"#fff":MU,fontFamily:"Barlow Condensed,sans-serif",fontSize:17,fontWeight:800,cursor:(cName.trim()&&cComps.length>0)?"pointer":"default"}}>{editIdx!==null?"SAVE CHANGES":"CREATE CYCLE"}</button>
        </div>
      </div>
    );
  }

  /* LIST VIEW (default) */
  var active=cycles.filter(function(c){return c.status==="active";});
  var past=cycles.filter(function(c){return c.status!=="active";});

  return (
    <div>
      {cycles.length===0&&(
        <div style={{textAlign:"center",padding:"30px 20px"}}>
          <span style={{fontSize:36}}>💉</span>
          <p style={{fontFamily:"Barlow Condensed,sans-serif",fontSize:18,fontWeight:800,color:TX,marginTop:10}}>No Cycles Logged</p>
          <p style={{fontSize:13,color:MU,marginTop:6,lineHeight:1.5}}>Track your compounds, doses, and schedule. Everything stays on your device.</p>
        </div>
      )}
      {active.length>0&&(
        <div style={{marginBottom:16}}>
          <p style={{fontSize:11,fontWeight:700,color:GR,letterSpacing:"0.06em",marginBottom:8}}>ACTIVE</p>
          {active.map(function(cyc,i){
            var realIdx=cycles.indexOf(cyc);
            var compCount=(cyc.compounds||[]).length;
            var startD=cyc.startDate?new Date(cyc.startDate+"T00:00:00"):null;
            var weekNum=startD?Math.max(1,Math.ceil((new Date()-startD)/(7*24*60*60*1000))):null;
            return (
              <button key={realIdx} onClick={function(){setSelIdx(realIdx);setView("detail");}} style={{width:"100%",textAlign:"left",background:GR_H+"08",borderRadius:13,padding:"13px 14px",border:"1px solid "+GR_H+"30",marginBottom:8,cursor:"pointer",display:"flex",alignItems:"center",gap:12}}>
                <div style={{width:40,height:40,borderRadius:10,background:GR_H+"18",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                  <span style={{fontSize:18}}>💉</span>
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <p style={{fontFamily:"Barlow Condensed,sans-serif",fontSize:16,fontWeight:800,color:TX}}>{cyc.name}</p>
                  <p style={{fontSize:11,color:MU}}>{compCount} compound{compCount!==1?"s":""}{weekNum?" — Week "+weekNum+(cyc.weeks?" of "+cyc.weeks:""):""}</p>
                </div>
                <Ic d={D.chev} z={16} c={MU}/>
              </button>
            );
          })}
        </div>
      )}
      {past.length>0&&(
        <div style={{marginBottom:16}}>
          <p style={{fontSize:11,fontWeight:700,color:MU,letterSpacing:"0.06em",marginBottom:8}}>PAST CYCLES</p>
          {past.map(function(cyc,i){
            var realIdx=cycles.indexOf(cyc);
            return (
              <button key={realIdx} onClick={function(){setSelIdx(realIdx);setView("detail");}} style={{width:"100%",textAlign:"left",background:CARD,borderRadius:12,padding:"12px 14px",border:"1px solid "+BORD,marginBottom:6,cursor:"pointer",display:"flex",alignItems:"center",gap:10}}>
                <div style={{flex:1,minWidth:0}}>
                  <p style={{fontSize:14,fontWeight:600,color:MU}}>{cyc.name}</p>
                  <p style={{fontSize:11,color:BORD}}>{(cyc.compounds||[]).length} compounds — {cyc.startDate||"?"} to {cyc.endDate||"?"}</p>
                </div>
                <Ic d={D.chev} z={14} c={BORD}/>
              </button>
            );
          })}
        </div>
      )}
      <button onClick={openAdd} style={{width:"100%",padding:"14px",borderRadius:12,border:"1.5px dashed "+OR_H+"50",background:OR_H+"08",color:OR,fontFamily:"Barlow Condensed,sans-serif",fontSize:15,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
        <Ic d={D.plus} z={16} c={OR}/> NEW CYCLE
      </button>
    </div>
  );
}

function Placeholder(p){
  return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"100vh",gap:13,paddingBottom:80}}>
      <div style={{width:64,height:64,borderRadius:18,background:OR_H+"18",border:"1px solid "+OR_H+"30",display:"flex",alignItems:"center",justifyContent:"center"}}><Ic d={p.icon} z={28} c={OR}/></div>
      <p style={{fontFamily:"Barlow Condensed,sans-serif",fontSize:26,fontWeight:800,color:TX}}>{p.name}</p>
      <p style={{color:MU,fontSize:14}}>Coming soon</p>
    </div>
  );
}

/* -- APP ROOT --------------------------------------------------------- */
function CoachScreen(p){
  var [msgs,setMsgs]=useState(function(){return ld("coachLastMsgs",[]);});
  var [input,setInput]=useState("");
  var [loading,setLoading]=useState(false);
  var [savedMsg,setSavedMsg]=useState("");
  var scrollRef=useRef(null);
  var histRef=useRef(ld("coachLastHist",[]));

  /* Persist conversation whenever msgs changes */
  useEffect(function(){
    if(msgs.length>0){
      sd("coachLastMsgs",msgs.slice(-40));
      sd("coachLastHist",histRef.current.slice(-40));
    }
    /* Scroll chat to bottom whenever messages update */
    if(scrollRef.current) scrollRef.current.scrollTop=scrollRef.current.scrollHeight;
  },[msgs]);

  function clearConvo(){
    setMsgs([]);
    histRef.current=[];

  function buildContext(){
    var profile=p.profile||{};
    var history=p.history||[];
    var prs=p.prs||{};
    var splits=p.splits||[];

    /* Recent workouts with exercise detail + reflection */
    var recentWorkouts=history.slice(0,5).map(function(w){
      var base=w.date+": "+w.name+" - "+w.sets+" sets, "+w.vol;
      if(w.exercises&&w.exercises.length>0){
        var exDetail=w.exercises.map(function(e){
          var exName=e.name||getEx(e.id).name;
          var setCount=(e.sets||[]).length;
          var topW=0;
          var totalPartials=0;
          (e.sets||[]).forEach(function(s){if((parseFloat(s.w)||0)>topW)topW=parseFloat(s.w)||0;if(s.partials)totalPartials+=parseInt(s.partials)||0;});
          var tw=p.useKg?Math.round(topW*10)/10:Math.round(topW*2.20462*10)/10;
          var detail=exName+"("+setCount+"s,top "+tw+(p.useKg?"kg":"lb");
          if(totalPartials>0)detail+=",+"+totalPartials+"P";
          detail+=")";
          return detail;
        }).join(", ");
        base+=" ["+exDetail+"]";
      }
      if(w.reflection){
        var r=w.reflection;
        var refs=[];
        if(r.energy) refs.push("energy:"+r.energy+"/5");
        if(r.pump) refs.push("pump:"+r.pump+"/5");
        if(r.strength) refs.push("strength:"+r.strength+"/5");
        if(r.sleep) refs.push("sleep:"+r.sleep+"/5");
        if(r.stress) refs.push("stress:"+r.stress+"/5");
        if(refs.length>0) base+=" Reflection: "+refs.join(", ");
      }
      if(w.aiInsight) base+=" AI said: "+w.aiInsight.slice(0,80);
      return base;
    }).join(". ");

    /* PRs */
    var prList=Object.keys(prs).slice(0,8).map(function(id){
      var ex=getEx(parseInt(id));
      var best=(prs[id]||[]).reduce(function(b,x){return (!b||x.w>b.w)?x:b;},null);
      if(!best) return "";
      var w=p.useKg?Math.round(best.w*10)/10:Math.round(best.w*2.20462*10)/10;
      return ex.name+": "+w+(p.useKg?"kg":"lb")+" x "+best.r;
    }).filter(Boolean).join(", ");

    /* Splits */
    var splitNames=splits.map(function(s){
      var dayNames=s.days.map(function(d){return d.name;}).join(", ");
      return s.name+" ("+s.days.length+" days: "+dayNames+")";
    }).join("; ");

    /* Fuel profile — full detail */
    var fuelProfile=null;
    try{var fp=localStorage.getItem("lk_fuelProfile");if(fp)fuelProfile=JSON.parse(fp);}catch(e){}
    var nutritionCtx="";
    if(fuelProfile){
      nutritionCtx=" Nutrition: goal="+fuelProfile.goal+", TDEE="+(fuelProfile.tdee||"unknown")+"kcal";
      if(fuelProfile.macroProtein) nutritionCtx+=", protein="+fuelProfile.macroProtein+"g";
      if(fuelProfile.macroCarbs) nutritionCtx+=", carbs="+fuelProfile.macroCarbs+"g";
      if(fuelProfile.macroFat) nutritionCtx+=", fat="+fuelProfile.macroFat+"g";
      if(fuelProfile.dietPrefs&&fuelProfile.dietPrefs.length>0) nutritionCtx+=", dietary prefs: "+fuelProfile.dietPrefs.join(", ");
      if(fuelProfile.allergies) nutritionCtx+=", allergies/intolerances: "+fuelProfile.allergies;
      if(fuelProfile.actLevel) nutritionCtx+=", activity level: "+fuelProfile.actLevel;
      nutritionCtx+=".";
    }

    /* Today's food intake */
    var todayISO=new Date().toISOString().slice(0,10);
    var fuelLog=ld("fuelLog",{});
    var todayFood=fuelLog[todayISO];
    var foodCtx="";
    if(todayFood&&todayFood.meals){
      var allItems=[];
      ["breakfast","lunch","dinner","snacks"].forEach(function(mk){(todayFood.meals[mk]||[]).forEach(function(item){allItems.push(item);});});
      if(allItems.length>0){
        var tc=allItems.reduce(function(a,i){return a+(i.cal||0);},0);
        var tp=allItems.reduce(function(a,i){return a+(i.pro||0);},0);
        var tcarb=allItems.reduce(function(a,i){return a+(i.carb||0);},0);
        var tf=allItems.reduce(function(a,i){return a+(i.fat||0);},0);
        foodCtx=" Today's intake so far: "+tc+"cal, "+tp+"g protein, "+tcarb+"g carbs, "+tf+"g fat ("+allItems.length+" items logged).";
        if(todayFood.water) foodCtx+=" Water: "+todayFood.water+"ml.";
      }
    }

    /* Weight log trend */
    var weightLog=getWeightLog();
    var weightCtx="";
    if(weightLog.length>0){
      var recent=weightLog.slice(-7);
      var wts=recent.map(function(e){
        var v=p.useKg?Math.round(e.kg*10)/10:Math.round(e.kg*2.20462*10)/10;
        return e.date+": "+v+(p.useKg?"kg":"lb");
      }).join(", ");
      weightCtx=" Weight log (last "+recent.length+"): "+wts+".";
      if(weightLog.length>=3){
        var first=weightLog[Math.max(0,weightLog.length-7)].kg;
        var last=weightLog[weightLog.length-1].kg;
        var diff=last-first;
        var dv=p.useKg?Math.round(diff*10)/10:Math.round(diff*2.20462*10)/10;
        weightCtx+=" 7-day trend: "+(dv>0?"+":"")+dv+(p.useKg?"kg":"lb")+".";
      }
    }

    /* Supplement stack */
    var supps=ld("supplements",[]);
    var suppCtx="";
    if(supps.length>0){
      suppCtx=" Supplements: "+supps.map(function(s){return s.name+(s.dose?" "+s.dose:"")+" ("+s.freq+", "+s.timeOf+")";}).join(", ")+".";
    }

    /* Cycle data */
    var cycleCtx="";
    if(ld("perfTracking",false)){
      var activeCycles=getCycles().filter(function(c){return c.status==="active";});
      if(activeCycles.length>0){
        cycleCtx=" Active cycles: "+activeCycles.map(function(c){
          var startD=c.startDate?new Date(c.startDate+"T00:00:00"):null;
          var weekNum=startD?Math.max(1,Math.ceil((new Date()-startD)/(7*24*60*60*1000))):null;
          return c.name+(weekNum?" (week "+weekNum+(c.weeks?" of "+c.weeks:"")+")":"")+" — "+c.compounds.map(function(cp){return cp.name+" "+cp.dose+" "+cp.freq+" ("+cp.route+")";}).join(", ");
        }).join("; ")+".";
      }
    }

    /* Check-in / feedback data */
    var feedback=ld("feedback",[]);
    var feedbackCtx="";
    if(feedback.length>0){
      var recentFb=feedback.slice(0,5);
      feedbackCtx=" Recent check-ins: "+recentFb.map(function(f){
        var moodEmojis=["","Very Low","Low","Okay","Good","Great"];
        var energyLabels=["","Drained","Low","Moderate","High","Wired"];
        var stressLabels=["","Chill","Low","Moderate","High","Overwhelmed"];
        return f.dateStr+": mood="+moodEmojis[f.mood||3]+", energy="+energyLabels[f.energy||3]+", stress="+stressLabels[f.stress||3]+(f.note?" (\""+f.note.slice(0,50)+"\")":"");
      }).join("; ")+".";
    }

    /* Goals and body fat data */
    var goalsCtx="";
    var activeGoals=ld("goals",[]).filter(function(g){return g.status==="active";});
    if(activeGoals.length>0){
      goalsCtx=" Active goals: "+activeGoals.map(function(g){
        var dLeft=g.targetDate?Math.ceil((new Date(g.targetDate+"T00:00:00")-new Date())/(1000*60*60*24)):null;
        return g.name+" (target: "+g.target+(g.unit||"")+", deadline: "+(g.targetDate||"none")+(dLeft!==null?", "+dLeft+"d left":"")+")";
      }).join("; ")+".";
    }
    var bfCtx="";
    var bfData=ld("bfLog",[]);
    if(bfData.length>0){
      bfCtx=" Body fat log: "+bfData.slice(-5).map(function(e){return e.date+": "+e.pct+"% ("+e.method+")";}).join(", ")+".";
    }
    var planCtx="";
    var coachPlan=ld("coachPlan",null);
    if(coachPlan&&coachPlan.phases){
      var startD2=new Date(coachPlan.startDate+"T00:00:00");
      var weekNum2=Math.max(1,Math.ceil((new Date()-startD2)/(7*24*60*60*1000)));
      var curPhase=null;
      coachPlan.phases.forEach(function(ph){if(weekNum2>=ph.weekStart&&weekNum2<=ph.weekEnd) curPhase=ph;});
      planCtx=" Active plan: "+coachPlan.name+" (week "+weekNum2+"). ";
      if(curPhase) planCtx+="Current phase: "+curPhase.name+" — "+curPhase.focus+". ";
      planCtx+="Phases: "+coachPlan.phases.map(function(ph){return ph.name+" (wk "+ph.weekStart+"-"+ph.weekEnd+": "+ph.focus+")";}).join(", ")+".";
    }

    /* Build system prompt */
    var s1="You are an elite personal trainer and sports nutritionist coaching "+profile.displayName+".";
    var bodyStats="";
    if(profile.age) bodyStats+=" Age: "+profile.age+".";
    if(profile.sex) bodyStats+=" Sex: "+profile.sex+".";
    if(profile.weightKg) bodyStats+=" Weight: "+(p.useKg?Math.round(profile.weightKg*10)/10:Math.round(profile.weightKg*2.20462*10)/10)+(p.useKg?"kg":"lbs")+".";
    if(profile.heightCm) bodyStats+=" Height: "+(p.useKg?Math.round(profile.heightCm)+"cm":(Math.floor(profile.heightCm/30.48)+"ft "+Math.round((profile.heightCm/2.54)%12)+"in"))+".";
    if(profile.goal) bodyStats+=" Goal: "+profile.goal+".";
    /* Weekly food average */
    var weekFoodCtx="";
    try{
      var fuelLog7=ld("fuelLog",{});
      var w7cals=[],w7pro=[],w7carb=[],w7fat=[];
      for(var di=1;di<=7;di++){
        var d7=new Date();d7.setDate(d7.getDate()-di);
        var dISO7=d7.toISOString().slice(0,10);
        var dayLog=fuelLog7[dISO7];
        if(dayLog&&dayLog.meals){
          var dItems=[];
          ["breakfast","lunch","dinner","snacks"].forEach(function(mk){(dayLog.meals[mk]||[]).forEach(function(it){dItems.push(it);});});
          if(dItems.length>0){
            w7cals.push(dItems.reduce(function(a,x){return a+(x.cal||0);},0));
            w7pro.push(dItems.reduce(function(a,x){return a+(x.pro||0);},0));
            w7carb.push(dItems.reduce(function(a,x){return a+(x.carb||0);},0));
            w7fat.push(dItems.reduce(function(a,x){return a+(x.fat||0);},0));
          }
        }
      }
      if(w7cals.length>0){
        var avg=function(arr){return Math.round(arr.reduce(function(a,x){return a+x;},0)/arr.length);};
        weekFoodCtx=" 7-day avg intake: "+avg(w7cals)+"cal, "+avg(w7pro)+"g protein, "+avg(w7carb)+"g carbs, "+avg(w7fat)+"g fat ("+w7cals.length+" days logged).";
      }
    }catch(e){}
    /* Coach memory */
    var memoryFacts=ld("coachMemory",[]);
    var memoryCtx=memoryFacts.length>0?" Known facts about this user: "+memoryFacts.join("; ")+".":"";
    var enabledStores=ld("myStores",[]).filter(function(s){return s.enabled;});
    var storesCtx=enabledStores.length>0?" The user shops at these stores: "+enabledStores.map(function(s){return s.name+(s.description?" ("+s.description+")":"");}).join(", ")+". When recommending groceries or recipe ingredients, use names and products those specific stores carry. Mention which store an ingredient is from when it's store-specific (e.g. a Trader Joe's item).":"";
    var s2=" They train in "+(p.useKg?"kg":"lbs")+"."+bodyStats+" Splits: "+splitNames+". Recent workouts: "+recentWorkouts+". PRs: "+prList+"."+nutritionCtx+foodCtx+weekFoodCtx+weightCtx+suppCtx+cycleCtx+feedbackCtx+goalsCtx+bfCtx+planCtx+memoryCtx+storesCtx;
    var userInstr=ld("coachInstructions","");
    var instrCtx=userInstr?" USER INSTRUCTIONS (follow these closely, the user wrote them to guide you): "+userInstr:"";

    /* CRITICAL CONSTRAINTS - PREVENT UNREALISTIC RECOMMENDATIONS */
    var constraints=" CONSTRAINT RULES (FOLLOW STRICTLY): ";
    constraints+="1) Weight increases must be realistic: suggest max +15% above their current PR, never more than +50lbs/22kg per 6 weeks. ";
    constraints+="2) Food portions must be reasonable: if they eat 100g protein daily, suggest 150-250g max (1.5-2.5x current). Never suggest 5kg portions. ";
    constraints+="3) Volume scaling: suggest +10-20% weekly volume increases only. Progressive overload is gradual. ";
    constraints+="4) Recovery bounds: never suggest workouts exceeding 90 min or <4hr sleep without noting it's suboptimal. ";
    constraints+="5) If their PR is unknown, ask for it before suggesting increases. ";
    constraints+="6) In workout data, '+NP' means N partial reps performed after reaching failure on a set — this indicates the user pushed past failure. When you see partials, acknowledge their intensity and factor it into recovery and volume recommendations. ";

    var s3=" Your tone is direct, warm, and conversational — like a knowledgeable friend who trains, not a formal report. Speak naturally, use contractions, and keep it real. Reference their actual data when relevant — don't give generic advice when you have their numbers. Ask a follow-up question when it would help you give better guidance, but don't pepper them with multiple questions at once. If they share something personal (a bad day, a PR, a struggle), acknowledge it briefly before jumping into advice. Vary your response length: short punchy answers for simple questions, more detail only when the topic calls for it. Never use bullet-point lists for conversational replies — write in flowing sentences. You have access to their full training history, nutrition, body weight trends, check-in mood/energy/stress, supplement stack, and any active cycles. Use this data proactively to make your responses feel personal."+instrCtx+constraints;
    var s4=" If asked to build a training split, output it between ###PROGRAM_START### and ###PROGRAM_END### as JSON with this shape: {name:string, splits:[{name:string, days:[{name:string, exIds:[numbers]}]}]}.";
    var s5=" Exercise IDs: Chest=107,101,108,110,112. Back=201,202,206,207,208. Shoulders=301,302,306,307,311. Triceps=403,406,407,408. Biceps=503,502,506,505. Quads=701,702,703,704. Hams=801,802,803. Abs=1001,1008.";
    var s6=" After ###PROGRAM_END### add one short summary sentence.";
    var s7=" If asked for a meal or recipe suggestion, output it between ###RECIPE_START### and ###RECIPE_END### as JSON: {name:string, description:string, cal:number, pro:number, carb:number, fat:number, ingredients:[{item:string, amount:string, cal:number, pro:number, carb:number, fat:number}], steps:[string]}. After ###RECIPE_END### add one sentence about the meal. Then immediately output the main grocery ingredients (raw/whole foods only, not spices or condiments) as a shopping list addition so the user can buy them: ###SHOPPING_ADD### item1, item2, item3 ###/SHOPPING_ADD###. If the user has linked stores, choose ingredient names that match what those stores actually sell. For all other questions keep replies to 2-4 sentences.";
    var s8=" If setting a goal for the user or they ask you to create/track a goal, output it between ###GOAL_START### and ###GOAL_END### as JSON: {name:string, type:\"lift\"|\"weight\"|\"bf\"|\"custom\", target:number, targetDate:\"YYYY-MM-DD\"|null, exId:number|null, unit:string, notes:string}. For lift goals, use the exercise ID. After ###GOAL_END### add one motivational sentence.";
    var s9=" If the user tells you what they ate, describes a meal, or asks you to log food, output it between ###FOOD_START### and ###FOOD_END### as JSON: {meal:\"breakfast\"|\"lunch\"|\"dinner\"|\"snacks\", items:[{name:string, cal:number, pro:number, carb:number, fat:number}]}. Estimate macros from the description. After ###FOOD_END### add a brief note about the meal. You can also proactively suggest logging food when discussing nutrition.";
    var s10=" IMPORTANT: You can take actions! When the user discusses goals, nutrition, or meals, proactively offer to create goals or log food for them. Use the structured markers above whenever an action would be helpful - do not just give advice when you could also take the action.";
    var s11=" If asked to create a training plan, periodisation plan, or transformation timeline, output it between ###PLAN_START### and ###PLAN_END### as JSON: {name:string, description:string, startDate:\"YYYY-MM-DD\", phases:[{name:string, weekStart:number, weekEnd:number, focus:string, trainingNotes:string, nutritionNotes:string, targets:[{name:string, value:string}], milestones:[string]}]}. Each phase is a block of weeks. After ###PLAN_END### add a motivating summary. Generate plans proactively when the user shares goals with deadlines.";
    var s12=" If the user asks for shopping recommendations, grocery suggestions, meal prep help, or what to buy, proactively output items between ###SHOPPING_ADD### and ###/SHOPPING_ADD### as a simple comma-separated list: ###SHOPPING_ADD### item1, item2, item3 ###/SHOPPING_ADD###. These are auto-added to their shopping list instantly. Keep item names simple and generic (no quantities like '500g' — just 'chicken breast'). If the user has linked stores, name items the way those stores label them — e.g. if they shop at Trader Joe's say 'cauliflower gnocchi' not just 'gnocchi'. For local or specialty stores, use the description to calibrate what's realistically stocked. When discussing meal ideas or nutrition goals, always offer to add the required groceries to their list.";
    var s13=" If the user asks you to 'set yourself up', 'write my instructions', 'learn about me', 'create my coaching profile', or after a thorough conversation where you have learned their goals, training history, injuries, dietary approach, and preferences — output comprehensive personalised coaching instructions between ###INSTRUCTIONS_START### and ###INSTRUCTIONS_END### as plain text (not JSON). The instructions should cover: primary goals and timelines, training style and frequency preferences, any injuries or physical limitations, dietary approach and restrictions, weak body parts to prioritise, current phase or focus, preferred communication style (blunt/motivational/educational), any relevant context. Keep it under 600 words. After ###INSTRUCTIONS_END### add one sentence. Proactively offer to write instructions after a thorough onboarding conversation.";
    return s1+s2+s3+s4+s5+s6+s7+s8+s9+s10+s11+s12+s13;
  }

  function send(){
    if(!input.trim()||loading) return;
    var msg=input.trim();
    setInput("");
    setMsgs(function(m){return m.concat([{role:"user",text:msg}]);});
    histRef.current.push({role:"user",content:msg});
    setLoading(true);
    fetch("https://lockedapi.cescocugliari.workers.dev/",{
      method:"POST",headers:authHeaders(),
      body:JSON.stringify({system:buildContext(),max_tokens:1000,messages:histRef.current})
    })
    .then(function(r){return r.json();})
    .then(function(d){
      var txt="";
      if(d.content&&d.content[0]&&d.content[0].text) txt=d.content[0].text;
      if(!txt) txt="Try again.";
      histRef.current.push({role:"assistant",content:txt});
      var detectedSplit=null;
      var si=txt.indexOf("###PROGRAM_START###");
      var ei=txt.indexOf("###PROGRAM_END###");
      if(si>=0&&ei>si){
        try{detectedSplit=JSON.parse(txt.slice(si+19,ei).trim());}catch(e){}
      }
      if(!detectedSplit){
        var splKey="splits";
        var sk=txt.indexOf(splKey);
        if(sk>=0){
          var ob=txt.lastIndexOf("{",sk);
          if(ob>=0){try{var ps=JSON.parse(txt.slice(ob));if(ps.splits) detectedSplit=ps;}catch(e){}}
        }
      }
      var displayTxt=detectedSplit?(txt.slice(0,si>=0?si:txt.length).trim()||"Here is your split:"):txt;
      /* Detect recipe */
      var detectedRecipe=null;
      var ri=txt.indexOf("###RECIPE_START###");
      var re=txt.indexOf("###RECIPE_END###");
      if(ri>=0&&re>ri){
        try{detectedRecipe=JSON.parse(txt.slice(ri+18,re).trim());}catch(e){}
      }
      if(!detectedRecipe){
        /* Fallback: look for recipe-shaped JSON */
        var ingKey="ingredients";
        var ik=txt.indexOf(ingKey);
        if(ik>=0){
          var rob=txt.lastIndexOf("{",ik);
          if(rob>=0){try{var rp=JSON.parse(txt.slice(rob));if(rp.ingredients&&rp.steps)detectedRecipe=rp;}catch(e){}}}
      }
      if(detectedRecipe&&!detectedSplit){
        displayTxt=txt.slice(0,ri>=0?ri:txt.length).trim()||"Here is a meal for you:";
      }
      /* Detect goal */
      var detectedGoal=null;
      var gi=txt.indexOf("###GOAL_START###");
      var ge=txt.indexOf("###GOAL_END###");
      if(gi>=0&&ge>gi){
        try{detectedGoal=JSON.parse(txt.slice(gi+16,ge).trim());}catch(e){}
      }
      if(detectedGoal){
        var beforeGoal=txt.slice(0,gi).trim();
        var afterGoal=txt.slice(ge+14).trim();
        displayTxt=(beforeGoal||afterGoal||"Here is your goal:").replace(/###GOAL_START###[\s\S]*?###GOAL_END###/g,"").trim();
        if(!displayTxt) displayTxt=afterGoal||"Goal created:";
      }
      /* Detect food log with strict validation */
      var detectedFood=null;
      var fi=txt.indexOf("###FOOD_START###");
      var fe=txt.indexOf("###FOOD_END###");
      if(fi>=0&&fe>fi){
        try{
          var parsed=JSON.parse(txt.slice(fi+16,fe).trim());
          /* Strict validation: require meal type and items array */
          if(parsed&&parsed.meal&&parsed.items&&Array.isArray(parsed.items)&&parsed.items.length>0){
            /* Validate each item has required fields */
            var allValid=true;
            for(var vi=0;vi<parsed.items.length;vi++){
              var item=parsed.items[vi];
              if(!item.name||typeof item.cal!=="number"||item.cal<0||item.cal>2000){
                allValid=false;break;
              }
            }
            if(allValid) detectedFood=parsed;
          }
        }catch(e){}
      }
      if(detectedFood){
        var beforeFood=txt.slice(0,fi).trim();
        var afterFood=txt.slice(fe+14).trim();
        displayTxt=(beforeFood||afterFood||"Logged your food:").replace(/###FOOD_START###[\s\S]*?###FOOD_END###/g,"").trim();
        if(!displayTxt) displayTxt=afterFood||"Food logged:";
      }
      /* Clean any remaining markers from display text */
      displayTxt=displayTxt.replace(/###\w+_START###[\s\S]*?###\w+_END###/g,"").trim();
      if(!displayTxt) displayTxt="Done!";
      /* Detect plan */
      var detectedPlan=null;
      var pi2=txt.indexOf("###PLAN_START###");
      var pe2=txt.indexOf("###PLAN_END###");
      if(pi2>=0&&pe2>pi2){
        try{detectedPlan=JSON.parse(txt.slice(pi2+16,pe2).trim());}catch(e){}
      }
      if(detectedPlan){
        displayTxt=displayTxt.replace(/###PLAN_START###[\s\S]*?###PLAN_END###/g,"").trim();
        if(!displayTxt){
          var afterPlan=txt.slice(pe2+14).trim();
          displayTxt=afterPlan||"Here is your plan:";
        }
      }
      /* Detect coach instructions */
      var detectedInstructions=null;
      var ini=txt.indexOf("###INSTRUCTIONS_START###");
      var ine=txt.indexOf("###INSTRUCTIONS_END###");
      if(ini>=0&&ine>ini){
        detectedInstructions=txt.slice(ini+24,ine).trim();
        displayTxt=displayTxt.replace(/###INSTRUCTIONS_START###[\s\S]*?###INSTRUCTIONS_END###/g,"").trim();
        if(!displayTxt){var afterInstr=txt.slice(ine+22).trim();displayTxt=afterInstr||"Here are your personalised coaching instructions:";}
      }

    }else{
      newSplits=prog.splits.map(function(s,i){return {id:"s"+Date.now()+(i*997),name:s.name,days:(s.days||[]).map(function(d){return {name:d.name,exIds:d.exIds||[]};})  ,created:new Date().toLocaleDateString()};});

  function saveCoachGoal(goalData){
    if(!goalData||!goalData.name) return;
    var useKg2=p.useKg!==false;
    var curVal=null;
    if(goalData.type==="lift"&&goalData.exId){
      var list=(p.prs||{})[goalData.exId];
      if(list&&list.length>0){
        var best=list.reduce(function(b,x){return (!b||x.w>b.w)?x:b;},null);
        curVal=best?(useKg2?Math.round(best.w*10)/10:Math.round(best.w*2.20462*10)/10):0;
      }

      var wl=getWeightLog();
      if(wl.length>0) curVal=useKg2?Math.round(wl[wl.length-1].kg*10)/10:Math.round(wl[wl.length-1].kg*2.20462*10)/10;
    } else if(goalData.type==="bf"){
      var bfl=getBfLog();
      if(bfl.length>0) curVal=bfl[bfl.length-1].pct;
    }
    var entry={
      type:goalData.type||"custom",
      name:goalData.name,
      target:parseFloat(goalData.target)||0,
      targetDate:goalData.targetDate||null,
      exId:goalData.exId||null,
      unit:goalData.unit||(goalData.type==="bf"?"%":(useKg2?"kg":"lb")),
      notes:goalData.notes||"",
      start:curVal||0,
      status:"active",
      created:new Date().toISOString()
    };

    goals.push(entry);
    sd("goals",goals);
    setSavedMsg("Goal added to Progress!");
    setTimeout(function(){setSavedMsg("");},3000);

  function parseShoppingFromCoach(text){
    var si=text.indexOf("###SHOPPING_ADD###");
    var se=text.indexOf("###/SHOPPING_ADD###");
    if(si<0||se<=si) return null;
    var itemsStr=text.slice(si+18,se).trim();
    if(!itemsStr) return null;
    var items=itemsStr.split(",").map(function(item){return item.trim();}).filter(function(item){return item.length>0;});
    return items.length>0?items:null;
  }

  function parseItemWithQuantity(itemStr){
    /* Parse strings like "200g chicken", "1 cup milk", "2 eggs" into {name, quantity, unit} */
    var match=itemStr.match(/^([\d.]+)\s*([a-zA-Z]*)\s+(.+)$/);
    if(match){
      var qty=parseFloat(match[1])||1;
      var un=match[2].toLowerCase().trim()||"qty";
      var name=match[3].trim();
      return {name:name,quantity:qty,unit:un};
    }
    return {name:itemStr,quantity:1,unit:"qty"};
  }

      });

  function getCurrentPhase(){
    if(!plan||!plan.phases||plan.phases.length===0) return null;
    var startD=new Date(plan.startDate+"T00:00:00");
    var nowD=new Date();
    var weekNum=Math.max(1,Math.ceil((nowD-startD)/(7*24*60*60*1000)));
    for(var pi=0;pi<plan.phases.length;pi++){
      var ph=plan.phases[pi];
      if(weekNum>=ph.weekStart&&weekNum<=ph.weekEnd) return {phase:ph,index:pi,currentWeek:weekNum};
    }
    return null;
  }

  function parseTargetValue(valStr){
    if(!valStr) return null;
    var num=parseFloat(valStr.replace(/[^0-9.\-]/g,""));
    if(isNaN(num)) return null;
    var isLbs=valStr.toLowerCase().indexOf("lb")>=0||valStr.toLowerCase().indexOf("lbs")>=0;
    var isKg=valStr.toLowerCase().indexOf("kg")>=0;
    var isPct=valStr.indexOf("%")>=0;
    return {num:num,isLbs:isLbs,isKg:isKg,isPct:isPct,raw:valStr};
  }

  function matchTargetToData(target){
    var name=(target.name||"").toLowerCase();
    var parsed=parseTargetValue(target.value);
    if(!parsed) return null;
    var useKg2=p.useKg!==false;
    var prs2=p.prs||{};
    var history2=p.history||[];

    /* Try matching against exercise PRs */
    var matchedExId=null;
    var allExes=ALL_EX;
    for(var ei=0;ei<allExes.length;ei++){
      if(name.indexOf(allExes[ei].name.toLowerCase())>=0||allExes[ei].name.toLowerCase().indexOf(name)>=0){
        matchedExId=allExes[ei].id;
        break;
      }
    }
    /* Common name shortcuts */
    if(!matchedExId){
      var shortcuts={"bench":107,"squat":701,"deadlift":201,"ohp":301,"overhead press":301,"row":202,"pull up":207,"pullup":207,"lat pulldown":206,"incline bench":108,"dumbbell press":110};
      var keys=Object.keys(shortcuts);
      for(var si=0;si<keys.length;si++){
        if(name.indexOf(keys[si])>=0){matchedExId=shortcuts[keys[si]];break;}
      }
    }
    if(matchedExId){
      var prList=prs2[matchedExId];
      if(prList&&prList.length>0){
        var best=prList.reduce(function(b,x){return (!b||x.w>b.w)?x:b;},null);
        if(best){
          var curW=parsed.isLbs?Math.round(best.w*2.20462*10)/10:(parsed.isKg?Math.round(best.w*10)/10:(useKg2?Math.round(best.w*10)/10:Math.round(best.w*2.20462*10)/10));
          return {type:"lift",current:curW,target:parsed.num,exName:getEx(matchedExId).name};
        }
      }
      return {type:"lift",current:0,target:parsed.num,exName:getEx(matchedExId).name};
    }

    /* Body weight */
    if(name.indexOf("weight")>=0||name.indexOf("bw")>=0||name.indexOf("body")>=0){
      var wl=getWeightLog();
      if(wl.length>0){
        var lastW=wl[wl.length-1].kg;
        var curBw=parsed.isLbs?Math.round(lastW*2.20462*10)/10:(parsed.isKg?Math.round(lastW*10)/10:(useKg2?Math.round(lastW*10)/10:Math.round(lastW*2.20462*10)/10));
        return {type:"weight",current:curBw,target:parsed.num};
      }
      return {type:"weight",current:0,target:parsed.num};
    }

    /* Body fat */
    if(name.indexOf("bf")>=0||name.indexOf("body fat")>=0||name.indexOf("bodyfat")>=0||parsed.isPct){
      var bfl=getBfLog();
      if(bfl.length>0){
        return {type:"bf",current:bfl[bfl.length-1].pct,target:parsed.num};
      }
      return {type:"bf",current:0,target:parsed.num};
    }

    /* Goals match */
    var goals2=ld("goals",[]).filter(function(g){return g.status==="active";});
    for(var gi=0;gi<goals2.length;gi++){
      if(name.indexOf(goals2[gi].name.toLowerCase())>=0||goals2[gi].name.toLowerCase().indexOf(name)>=0){
        var gCur=0;
        if(goals2[gi].type==="lift"&&goals2[gi].exId){
          var gPrs=prs2[goals2[gi].exId];
          if(gPrs&&gPrs.length>0){var gBest=gPrs.reduce(function(b,x){return(!b||x.w>b.w)?x:b;},null);if(gBest) gCur=useKg2?Math.round(gBest.w*10)/10:Math.round(gBest.w*2.20462*10)/10;}
        }
        return {type:"goal",current:gCur,target:parsed.num};
      }
    }

    return null;
  }

  function calcTargetProgress(target){
    var match=matchTargetToData(target);
    if(!match||!match.target) return null;
    if(match.type==="weight"||match.type==="bf"){
      /* For cutting targets where current > target, invert */
      if(match.current>match.target){
        var startVal=match.current*1.1; /* estimate starting ~10% higher */
        var pct=Math.round(((startVal-match.current)/(startVal-match.target))*100);
        return {pct:Math.max(0,Math.min(pct,100)),current:match.current,target:match.target,type:match.type,exName:match.exName};
      }
    }
    if(match.target===0) return {pct:0,current:match.current,target:match.target,type:match.type,exName:match.exName};
    var pct2=Math.round((match.current/match.target)*100);
    return {pct:Math.max(0,Math.min(pct2,100)),current:match.current,target:match.target,type:match.type,exName:match.exName};
  }

  function calcPhaseProgress(phase){
    var cp=getCurrentPhase();
    var phaseIdx=(plan.phases||[]).indexOf(phase);
    if(cp&&cp.index>phaseIdx) return 100; /* past phase */
    if(cp&&cp.index<phaseIdx) return 0; /* future phase */

    /* Mix of time progress and target progress */
    var timeProgress=0;
    if(cp&&cp.index===phaseIdx){
      var weeksInPhase=phase.weekEnd-phase.weekStart+1;
      var weeksDone=cp.currentWeek-phase.weekStart;
      timeProgress=Math.round((weeksDone/weeksInPhase)*100);
    }

    var targetProgresses=[];
    if(phase.targets&&phase.targets.length>0){
      phase.targets.forEach(function(t){
        var tp=calcTargetProgress(t);
        if(tp) targetProgresses.push(tp.pct);
      });
    }

    if(targetProgresses.length===0) return Math.max(0,Math.min(timeProgress,100));
    var avgTarget=targetProgresses.reduce(function(a,b){return a+b;},0)/targetProgresses.length;
    /* Blend: 40% time, 60% target achievement */
    var blended=Math.round(timeProgress*0.4+avgTarget*0.6);
    return Math.max(0,Math.min(blended,100));
  }

  function calcOverallProgress(){
    if(!plan||!plan.phases||plan.phases.length===0) return 0;
    var total=plan.phases.reduce(function(a,ph){return a+calcPhaseProgress(ph);},0);
    return Math.round(total/plan.phases.length);
  }

/* -- FEEDBACK SCREEN ---------------------------------------------------- */
function FeedbackScreen(p){
  var [entries,setEntriesRaw]=useState(function(){return ld("feedback",[]);});
  var [mood,setMood]=useState(3);
  var [energy,setEnergy]=useState(3);
  var [stress,setStress]=useState(3);
  var [sleep,setSleep]=useState(3);
  var [soreness,setSoreness]=useState(3);
  var [note,setNote]=useState("");
  var [saved,setSaved]=useState(false);
  var [showHistory,setShowHistory]=useState(false);

  function setEntries(fn){setEntriesRaw(function(prev){var n=typeof fn==="function"?fn(prev):fn;sd("feedback",n);return n;});}

  function submit(){
    var entry={
      id:"fb"+Date.now(),
      date:new Date().toISOString(),
      dateStr:new Date().toLocaleDateString(),
      mood:mood,energy:energy,stress:stress,sleep:sleep,soreness:soreness,
      note:note.trim()
    };
    setEntries(function(prev){return [entry].concat(prev);});
    logBetaActivity("feedback",entry);
    setNote("");setMood(3);setEnergy(3);setStress(3);setSleep(3);setSoreness(3);
    setSaved(true);
    setTimeout(function(){setSaved(false);},2500);
  }

  var moodEmojis=["","😞","😕","😐","😊","🔥"];
  var energyEmojis=["","🔋","⚡","💪","🚀","⚡"];
  var stressEmojis=["","😌","🙂","😐","😰","🤯"];
  var moodLabels=["","Very Low","Low","Okay","Good","Great"];
  var energyLabels=["","Drained","Low","Moderate","High","Wired"];
  var stressLabels=["","Chill","Low","Normal","High","Maxed"];
  var sleepEmojis=["","😫","😕","😴","💤","⭐"];
  var sleepLabels=["","Terrible","Poor","Okay","Good","Great"];
  var sorenessEmojis=["","🔥","😣","😐","💪","✨"];
  var sorenessLabels=["","Very Sore","Sore","Mild","Fresh","100%"];

  function RatingRow(props){
    var label=props.label;var value=props.value;var onChange=props.onChange;var emojis=props.emojis;var labels=props.labels;var color=props.color;
    return (
      <div style={{marginBottom:18}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <p style={{fontSize:13,fontWeight:600,color:TX}}>{label}</p>
          <p style={{fontSize:12,color:color,fontWeight:600}}>{emojis[value]} {labels[value]}</p>
        </div>
        <div style={{display:"flex",gap:6}}>
          {[1,2,3,4,5].map(function(v){
            var active=v<=value;
            return (
              <button key={v} onClick={function(){onChange(v);}} style={{flex:1,height:52,borderRadius:14,border:"1.5px solid "+(active?color:BORD),background:active?color+"20":"transparent",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",transition:"all .2s"}}>
                <span style={{fontSize:v===value?22:17,transition:"font-size .18s cubic-bezier(0.34,1.3,0.64,1)",filter:active?"none":"grayscale(0.7)",opacity:active?1:0.6}}>{emojis[v]}</span>
              </button>
            );
          })}
        </div>
      </div>
    );
  }

  var todayISO=new Date().toISOString().slice(0,10);
  var loggedToday=entries.some(function(e){return e.date&&e.date.slice(0,10)===todayISO;});
  var thisWeekStart=new Date();thisWeekStart.setDate(thisWeekStart.getDate()-thisWeekStart.getDay());
  var weekISO=thisWeekStart.toISOString().slice(0,10);
  var loggedThisWeek=entries.some(function(e){return e.date&&e.date.slice(0,10)>=weekISO;});

  return (
    <div style={{paddingBottom:100}}>
      {saved&&(
        <div style={{position:"fixed",top:58,left:"50%",transform:"translateX(-50%)",zIndex:200,background:"rgba(34,197,94,0.16)",border:"1px solid "+GR_H+"50",backdropFilter:"blur(12px)",WebkitBackdropFilter:"blur(12px)",borderRadius:999,padding:"10px 22px",display:"flex",alignItems:"center",gap:9,animation:"slideFromTop .32s cubic-bezier(0.22,1,0.36,1)",boxShadow:"0 8px 28px rgba(0,0,0,0.25)"}}>
          <Ic d={D.check} z={16} c={GR}/>
          <p style={{color:GR,fontWeight:700,fontSize:14,margin:0}}>Check-in saved</p>
        </div>
      )}
      <div style={{padding:"52px 20px 16px",background:"linear-gradient(180deg,#8B5CF6"+"18 0%,transparent 100%)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
          <div>
            <h1 style={{fontFamily:"Barlow Condensed,sans-serif",fontSize:32,fontWeight:800,letterSpacing:"0.04em",color:TX}}>CHECK-IN</h1>
            <p style={{color:MU,fontSize:13,marginTop:2}}>How are you feeling today?</p>
          </div>
          <button onClick={function(){setShowHistory(!showHistory);}} style={{padding:"7px 14px",borderRadius:9,border:"1px solid "+BORD,background:"transparent",color:MU,fontSize:12,cursor:"pointer"}}>
            {showHistory?"New Entry":"History"}
          </button>
        </div>
        {!loggedThisWeek&&!loggedToday&&(
          <div style={{background:"#F59E0B"+"15",borderRadius:11,padding:"10px 14px",border:"1px solid #F59E0B30",display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
            <span style={{fontSize:18}}>📝</span>
            <p style={{fontSize:12,color:"#F59E0B",fontWeight:600}}>You have not checked in this week yet. Take a moment now!</p>
          </div>
        )}
        {loggedToday&&!showHistory&&(
          <div style={{background:GR_H+"15",borderRadius:11,padding:"10px 14px",border:"1px solid "+GR_H+"30",display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
            <span style={{fontSize:18}}>✅</span>
            <p style={{fontSize:12,color:GR,fontWeight:600}}>Already checked in today. You can add another entry or view history.</p>
          </div>
        )}
      </div>
      <div style={{padding:"0 20px"}}>
        {!showHistory?(
          <div>
            <div style={{background:CARD,borderRadius:16,padding:"18px",border:"1px solid "+BORD,marginBottom:16}}>
              <RatingRow label="Mood" value={mood} onChange={setMood} emojis={moodEmojis} labels={moodLabels} color="#8B5CF6"/>
              <RatingRow label="Energy" value={energy} onChange={setEnergy} emojis={energyEmojis} labels={energyLabels} color="#F97316"/>
              <RatingRow label="Stress" value={stress} onChange={setStress} emojis={stressEmojis} labels={stressLabels} color="#EF4444"/>
              <RatingRow label="Sleep Quality" value={sleep} onChange={setSleep} emojis={sleepEmojis} labels={sleepLabels} color="#3B82F6"/>
              <RatingRow label="Recovery" value={soreness} onChange={setSoreness} emojis={sorenessEmojis} labels={sorenessLabels} color="#22C55E"/>
              <div>
                <p style={{fontSize:13,fontWeight:600,color:TX,marginBottom:8}}>Notes (optional)</p>
                <textarea value={note} onChange={function(e){setNote(e.target.value);}} rows={3} placeholder="Anything on your mind..." style={{width:"100%",background:SU,border:"1px solid "+BORD,borderRadius:11,padding:"12px 14px",color:TX,fontSize:14,outline:"none",resize:"none"}}/>
              </div>
            </div>
            <button onClick={submit} style={{width:"100%",padding:"16px",borderRadius:14,border:"none",background:"linear-gradient(135deg,#8B5CF6,#7C3AED)",color:"#fff",fontFamily:"Barlow Condensed,sans-serif",fontSize:18,fontWeight:800,cursor:"pointer",letterSpacing:"0.03em"}}>
              LOG CHECK-IN
            </button>
          </div>
        ):(
          <div>
            {entries.length===0&&(
              <div style={{textAlign:"center",padding:"40px 20px"}}>
                <p style={{color:MU,fontSize:14}}>No check-ins yet. Start logging!</p>
              </div>
            )}
            {entries.map(function(e,i){
              return (
                <div key={e.id||i} style={{background:CARD,borderRadius:14,padding:"14px 16px",border:"1px solid "+BORD,marginBottom:10}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                    <p style={{fontSize:13,fontWeight:700,color:TX}}>{e.dateStr||new Date(e.date).toLocaleDateString()}</p>
                    <p style={{fontSize:11,color:MU}}>{new Date(e.date).toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"})}</p>
                  </div>
                  <div style={{display:"flex",gap:8,marginBottom:e.note?8:0}}>
                    <div style={{flex:1,textAlign:"center",background:"#8B5CF6"+"12",borderRadius:9,padding:"7px 6px"}}>
                      <p style={{fontSize:16}}>{moodEmojis[e.mood]}</p>
                      <p style={{fontSize:10,color:MU,marginTop:2}}>Mood</p>
                    </div>
                    <div style={{flex:1,textAlign:"center",background:OR_H+"12",borderRadius:9,padding:"7px 6px"}}>
                      <p style={{fontSize:16}}>{energyEmojis[e.energy]}</p>
                      <p style={{fontSize:10,color:MU,marginTop:2}}>Energy</p>
                    </div>
                    <div style={{flex:1,textAlign:"center",background:RE_H+"12",borderRadius:9,padding:"7px 6px"}}>
                      <p style={{fontSize:16}}>{stressEmojis[e.stress]}</p>
                      <p style={{fontSize:10,color:MU,marginTop:2}}>Stress</p>
                    </div>
                    {e.sleep&&<div style={{flex:1,textAlign:"center",background:"#3B82F6"+"12",borderRadius:9,padding:"7px 6px"}}>
                      <p style={{fontSize:16}}>{sleepEmojis[e.sleep]||"💤"}</p>
                      <p style={{fontSize:10,color:MU,marginTop:2}}>Sleep</p>
                    </div>}
                    {e.soreness&&<div style={{flex:1,textAlign:"center",background:"#22C55E"+"12",borderRadius:9,padding:"7px 6px"}}>
                      <p style={{fontSize:16}}>{sorenessEmojis[e.soreness]||"💪"}</p>
                      <p style={{fontSize:10,color:MU,marginTop:2}}>Recovery</p>
                    </div>}
                  </div>
                  {e.note&&<p style={{fontSize:13,color:MU,lineHeight:1.5,marginTop:4}}>{e.note}</p>}
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

/* -- BETA ADMIN PANEL --------------------------------------------------- */
function BetaAdminPanel(p){
  var [codes,setCodesRaw]=useState(function(){return ld("betaCodes",[]);});
  var [activityLog]=useState(function(){return ld("betaLog",[]);});
  var [aiLog]=useState(function(){return ld("betaAILog",[]);});

  function setCodes(fn){setCodesRaw(function(prev){var n=typeof fn==="function"?fn(prev):fn;sd("betaCodes",n);return n;});}

  function addCode(){
    if(!newCode.trim()) return;
    setCodes(function(prev){return prev.concat([{code:newCode.trim().toUpperCase(),active:true,usedBy:null}]);});
    setNewCode("");
  }
  function toggleCode(idx){
    setCodes(function(prev){
      var n=prev.slice();
      n[idx]=Object.assign({},n[idx],{active:!n[idx].active});
      return n;
    });
  }
  function exportAll(){
    var data={codes:codes,activity:activityLog,aiInteractions:aiLog,feedback:feedbackLog};

    var url=URL.createObjectURL(blob);

          })}
        </div>
        <button onClick={exportAll} style={{marginTop:10,padding:"8px 16px",borderRadius:9,border:"1px solid "+BORD,background:CARD,color:TX,fontSize:12,fontWeight:600,cursor:"pointer"}}>Export All Data (JSON)</button>
        <button onClick={function(){syncBetaData(function(){alert("Synced to server!");},function(e){alert("Sync failed: "+e);});}} style={{marginTop:6,padding:"8px 16px",borderRadius:9,border:"none",background:"#22C55E",color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer"}}>Sync All to Server Now</button>
        <p style={{fontSize:10,color:MU,marginTop:6}}>Last sync: {ld("lastSync","Never")}</p>
      </div>

        {tab==="codes"&&(
          <div>
            <div style={{display:"flex",gap:8,marginBottom:14}}>
              <input value={newCode} onChange={function(e){setNewCode(e.target.value);}} placeholder="New beta code..." style={{flex:1,background:CARD,border:"1px solid "+BORD,borderRadius:9,padding:"10px 12px",color:TX,fontSize:13,outline:"none"}}/>
              <button onClick={addCode} style={{padding:"10px 16px",borderRadius:9,border:"none",background:OR,color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer"}}>Add</button>

                  <div>
                    <p style={{fontFamily:"Barlow Condensed,sans-serif",fontSize:15,fontWeight:700,color:c.active?TX:MU,textDecoration:c.active?"none":"line-through"}}>{c.code}</p>
                    <p style={{fontSize:11,color:MU,marginTop:2}}>{c.usedBy?"Claimed by: "+c.usedBy:"Unclaimed"}{c.claimedAt?" on "+new Date(c.claimedAt).toLocaleDateString():""}</p>

    if(recording) return;
    navigator.mediaDevices.getUserMedia({audio:true}).then(function(stream){
      var mr=new MediaRecorder(stream);
      mrRef.current=mr;
      chunksRef.current=[];
      mr.ondataavailable=function(e){if(e.data&&e.data.size>0)chunksRef.current.push(e.data);};
      mr.onstop=function(){
        stream.getTracks().forEach(function(t){t.stop();});
        var blob=new Blob(chunksRef.current,{type:"audio/webm"});
        sendAudio(blob);
      };
      mr.start();
      setRecording(true);
    }).catch(function(e){alert("Microphone access denied. Please allow microphone in your browser settings.");});
  }
  function stopRec(){
    if(mrRef.current&&mrRef.current.state!=="inactive"){
      mrRef.current.stop();

    if(recording) stopRec();

  useEffect(function(){

            <circle cx={55} cy={82} r={34} fill="none" stroke={OR} strokeWidth={0.7}
              style={{opacity:0,animation:"lockRingExpand2 0.75s cubic-bezier(0.25,1,0.5,1) 1.25s forwards",transformOrigin:"55px 82px"}}/>
            <g style={{animation:"lockBodyIn 0.45s cubic-bezier(0.25,1,0.5,1) 0.08s both",transformOrigin:"55px 82px"}}>
              <rect x={14} y={52} width={82} height={60} rx={8} fill={OR}/>
              <circle cx={55} cy={76} r={7} fill="rgba(0,0,0,0.35)"/>
              <path d="M52,82 L58,82 L57,92 L53,92 Z" fill="rgba(0,0,0,0.35)"/>
            </g>

        </div>
        <h1 style={{fontFamily:"Barlow Condensed,sans-serif",fontSize:58,fontWeight:900,color:"#F5F5F5",letterSpacing:"0.04em",marginBottom:6,zIndex:1,opacity:0,animation:"tutFadeUp 0.5s ease 0.5s forwards"}}>YOU'RE READY.</h1>
        <p style={{fontSize:17,color:OR,fontWeight:700,letterSpacing:"0.18em",marginBottom:52,zIndex:1,opacity:0,animation:"tutFadeUp 0.5s ease 0.7s forwards"}}>GET LOCKED.</p>
        <button onClick={finish} style={{padding:"18px 52px",borderRadius:14,border:"none",background:"linear-gradient(135deg,"+OR_H+",#EA580C)",color:"#fff",fontFamily:"Barlow Condensed,sans-serif",fontSize:22,fontWeight:800,cursor:"pointer",letterSpacing:"0.1em",zIndex:1,opacity:0,animation:"tutFadeUp 0.5s ease 0.9s forwards",boxShadow:"0 0 60px "+OR_H+"40"}}>START TRAINING</button>
      </div>
    );
  }

  return (
    <div onTouchStart={handleTouchStart} onTouchEnd={handleTouchEnd} style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"#080809",display:"flex",flexDirection:"column",zIndex:2000,overflow:"hidden"}}>
      <div style={{height:3,background:"rgba(255,255,255,0.08)",position:"absolute",top:0,left:0,right:0,zIndex:10}}>
        <div style={{height:"100%",background:"linear-gradient(90deg,"+current.accent+","+OR_H+")",width:((step+1)/total*100)+"%",transition:"width 0.45s cubic-bezier(0.25,1,0.5,1)"}}/>
      </div>
      <div style={{position:"absolute",top:16,right:16,zIndex:11,paddingTop:6}}>
        <button onClick={finish} style={{background:"none",border:"none",color:MU,fontSize:13,cursor:"pointer",fontWeight:500,padding:"8px 12px"}}>Skip</button>
      </div>
      <div style={{position:"absolute",width:260,height:260,borderRadius:"50%",background:"radial-gradient(circle,"+current.accent+"14 0%,transparent 70%)",top:"50%",left:"50%",transform:"translate(-50%,-60%)",transition:"background 0.5s ease",pointerEvents:"none"}}/>
      <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"60px 32px 0",opacity:exiting?0:1,transform:exiting?"translateX(-28px) scale(0.95)":"translateX(0) scale(1)",transition:"opacity 0.24s ease, transform 0.24s ease"}}>
        <div key={"icon-"+animKey} style={{marginBottom:20,animation:"tutIconIn 0.55s cubic-bezier(0.25,1,0.5,1) forwards",filter:"drop-shadow(0 0 22px "+current.accent+"55)"}}>
          <Ic d={current.d} z={52} c={current.accent} w={1.4}/>
        </div>
        <p style={{fontSize:11,fontWeight:700,color:current.accent,letterSpacing:"0.16em",marginBottom:10,opacity:0,animation:"tutFadeIn 0.3s ease 0.15s forwards",transition:"color 0.4s ease"}}>{step+1} / {total}</p>
        <h2 style={{fontFamily:"Barlow Condensed,sans-serif",fontSize:28,fontWeight:900,color:"#F5F5F5",textAlign:"center",letterSpacing:"0.04em",marginBottom:20,minHeight:66,lineHeight:1.2}}>
          {displayTitle}
          <span style={{display:"inline-block",width:2.5,height:24,background:current.accent,marginLeft:3,verticalAlign:"middle",animation:"tutCursor 0.85s step-end infinite",opacity:titleDone?0:1,transition:"opacity 0.2s ease"}}/>
        </h2>
        <div key={"steps-"+animKey} style={{width:"100%",maxWidth:320,display:"flex",flexDirection:"column",gap:11,marginBottom:20,opacity:0,animation:titleDone?"tutFadeUp 0.4s ease forwards":"none"}}>
          {(current.steps||[]).map(function(s,i){

              <div key={i} style={{display:"flex",alignItems:"flex-start",gap:11,opacity:0,animation:titleDone?"tutFadeUp 0.35s ease "+(0.06*i)+"s forwards":"none"}}>
                <div style={{width:22,height:22,borderRadius:"50%",background:current.accent+"1A",border:"1px solid "+current.accent+"55",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:1}}>
                  <span style={{fontSize:10,fontWeight:800,color:current.accent}}>{i+1}</span>
                </div>
                <p style={{fontSize:14,color:"rgba(245,245,245,0.82)",lineHeight:1.6,margin:0}}>{s}</p>
              </div>
