function PRHub(p){
  var useKg=p.useKg!==false; var unit=useKg?"kg":"lb";
  function toDisp(kgV){if(!kgV&&kgV!==0)return kgV;return useKg?Math.round(kgV*10)/10:Math.round(kgV*2.20462*10)/10;}
  function toKg(v){return convToKg(v,useKg);}
  var [sel,setSel]=useState(null);
  var [logging,setLogging]=useState(false);
  var [tab,setTab]=useState(p.defaultTab||"overview");
  var [logEx,setLogEx]=useState("107");
  var [logReps,setLogReps]=useState("");
  var [logW,setLogW]=useState("");
  var [search,setSearch]=useState("");
  var withPRs=ALL_EX.filter(function(e){return p.prs[e.id]&&p.prs[e.id].length>0;});

  function doLog(){
    var eid=parseInt(logEx),r=parseInt(logReps),w=toKg(parseFloat(logW));
    if(!r||!w)return;
    p.setPrs(function(prev){
      var exist=(prev[eid]||[]).find(function(x){return x.r===r;});
      if(exist&&w<=exist.w)return prev;
      var list=(prev[eid]||[]).filter(function(x){return x.r!==r;});
      var upd=Object.assign({},prev);
      upd[eid]=list.concat([{r:r,w:w,date:"Today"}]).sort(function(a,b){return a.r-b.r;});
      return upd;
    });
    setLogging(false);setSel(eid);setLogReps("");setLogW("");
  }

  if(logging) return (
    <div style={{paddingBottom:80}}>
      <div style={{padding:"52px 20px 18px",background:SURF}}>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:4}}><button onClick={function(){setLogging(false);}} style={{background:"none",border:"none",cursor:"pointer"}}><Ic d={D.back} z={22}/></button><h1 style={{fontFamily:"Barlow Condensed,sans-serif",fontSize:26,fontWeight:800}}>LOG A PR</h1></div>
      </div>
      <div style={{padding:"16px 20px",display:"flex",flexDirection:"column",gap:16}}>
        <div><p style={{fontSize:11,fontWeight:700,color:MU,marginBottom:8}}>EXERCISE</p>
          <select value={logEx} onChange={function(e){setLogEx(e.target.value);}} style={{width:"100%",background:SU,border:"1px solid "+BORD,borderRadius:10,padding:"12px 14px",color:TX,fontSize:14,outline:"none",cursor:"pointer"}}>
            {ALL_EX.map(function(e){return <option key={e.id} value={e.id}>{e.name}</option>;})}
          </select>
        </div>
        <div><p style={{fontSize:11,fontWeight:700,color:MU,marginBottom:8}}>REP RANGE</p>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {[1,2,3,4,5,6,8,10,12].map(function(r){var act=logReps===String(r);return <button key={r} onClick={function(){setLogReps(String(r));}} style={{padding:"8px 12px",borderRadius:8,border:"1px solid "+(act?OR:BORD),background:act?OR_H+"20":"transparent",color:act?OR:MU,fontSize:13,fontWeight:600,cursor:"pointer"}}>{r===1?"1RM":r+"RM"}</button>;})}
          </div>
        </div>
        <div><p style={{fontSize:11,fontWeight:700,color:MU,marginBottom:8}}>WEIGHT ({useKg?"KG":"LBS"})</p>
          <input value={logW} onChange={function(e){setLogW(e.target.value);}} type="number" placeholder="e.g. 140" style={{width:"100%",background:SU,border:"1px solid "+BORD,borderRadius:10,padding:"14px",color:TX,fontSize:28,fontWeight:800,outline:"none",textAlign:"center",fontFamily:"Barlow Condensed,sans-serif"}}/>
        </div>
        {logW&&logReps&&(
          <div style={{background:OR_H+"12",borderRadius:10,padding:"12px 15px",border:"1px solid "+OR_H+"30",display:"flex",justifyContent:"space-between"}}>
            <div><p style={{fontSize:11,color:MU}}>Est. 1RM</p><p style={{fontSize:20,fontWeight:800,fontFamily:"Barlow Condensed,sans-serif",color:OR}}>{Math.round(toKg(parseFloat(logW))*(1+parseInt(logReps)/30)*10)/10} kg</p></div>
            <div style={{textAlign:"right"}}><p style={{fontSize:11,color:MU}}>Logged as</p><p style={{fontSize:14,fontWeight:700,color:TX}}>{logW} {unit} x {logReps}</p></div>
          </div>
        )}
        <button onClick={doLog} style={{width:"100%",padding:"15px",borderRadius:13,border:"none",background:logW&&logReps?"linear-gradient(135deg,"+OR_H+",#EA580C)":SU,color:logW&&logReps?TX:MU,fontFamily:"Barlow Condensed,sans-serif",fontSize:18,fontWeight:800,cursor:logW&&logReps?"pointer":"default"}}>SAVE PR</button>
      </div>
    </div>
  );

  if(sel!==null){
    var ex=ALL_EX.find(function(e){return e.id===sel;});
    var exPrs=p.prs[sel]||[];
    if(!ex) return null;
    return (
      <div style={{paddingBottom:80}}>
        <div style={{padding:"52px 20px 18px",background:"linear-gradient(180deg,"+OR_H+"15 0%,transparent 100%)"}}>
          <div style={{display:"flex",alignItems:"center",gap:12}}><button onClick={function(){setSel(null);}} style={{background:"none",border:"none",cursor:"pointer"}}><Ic d={D.back} z={22}/></button><div><h1 style={{fontFamily:"Barlow Condensed,sans-serif",fontSize:24,fontWeight:800,color:TX}}>{ex.name}</h1><p style={{color:MU,fontSize:13}}>{ex.muscle}</p></div></div>
        </div>
        <div style={{padding:"0 20px"}}>
          {exPrs.map(function(pr,i){
            return (
              <div key={i} style={{background:CARD,borderRadius:14,padding:"15px",border:"1px solid "+BORD,marginBottom:10}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                  <div style={{display:"flex",alignItems:"center",gap:12}}>
                    <div style={{width:48,height:48,borderRadius:13,background:OR_H+"18",border:"1px solid "+OR_H+"30",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"Barlow Condensed,sans-serif",fontSize:22,fontWeight:800,letterSpacing:"0.03em",color:OR}}>{pr.r}</div>
                    <div><p style={{fontSize:10,color:MU,fontWeight:600,letterSpacing:"0.06em"}}>{pr.r===1?"1 REP MAX":pr.r+" REP MAX"}</p><p style={{fontFamily:"Barlow Condensed,sans-serif",fontSize:26,fontWeight:800,letterSpacing:"0.035em",lineHeight:1,color:TX}}>{toDisp(pr.w)}<span style={{fontSize:13,fontWeight:400,color:MU}}> {unit}</span></p></div>
                  </div>
                  <div style={{textAlign:"right"}}><p style={{fontSize:10,color:MU}}>Est. 1RM</p><p style={{fontSize:16,fontWeight:800,color:OR,fontFamily:"Barlow Condensed,sans-serif"}}>{Math.round(pr.w*(1+pr.r/30)*10)/10} kg</p><p style={{fontSize:11,color:MU,marginTop:2}}>{pr.date}</p></div>
                </div>
              </div>
            );
          })}
          {exPrs.length>=2&&(function(){
            var ests=exPrs.map(function(pr){return {r:pr.r,est:Math.round(pr.w*(1+pr.r/30)*10)/10};});
            var maxEst=Math.max.apply(null,ests.map(function(e){return e.est;}));
            var n=ests.length;
            var cW=300;var cH=70;var bW=Math.min(36,Math.floor((cW-20)/n)-6);
            return (
              <div style={{background:CARD,borderRadius:14,padding:"13px 16px",border:"1px solid "+BORD,marginBottom:10}}>
                <p style={{fontSize:10,color:MU,fontWeight:700,letterSpacing:"0.08em",marginBottom:8}}>STRENGTH PROFILE — EST. 1RM</p>
                <svg width="100%" height={cH+28} viewBox={"0 0 "+cW+" "+(cH+28)} style={{overflow:"visible"}}>
                  {ests.map(function(e,i){
                    var h=Math.max(6,Math.round((e.est/maxEst)*cH));
                    var x=10+i*(bW+6);
                    var y=cH-h;
                    return (
                      <g key={i}>
                        <rect x={x} y={y} width={bW} height={h} rx={4} fill={OR_H+"99"}/>
                        <text x={x+bW/2} y={y-4} textAnchor="middle" fontSize={8} fill={OR} fontWeight="700">{e.est}</text>
                        <text x={x+bW/2} y={cH+14} textAnchor="middle" fontSize={8} fill={MU} fontWeight="600">{e.r}RM</text>
                      </g>
                    );
                  })}
                </svg>
              </div>
            );
          })()}
          <button onClick={function(){setLogEx(String(sel));setLogging(true);}} style={{width:"100%",padding:"12px",borderRadius:12,border:"1.5px dashed "+OR_H+"40",background:OR_H+"08",color:OR,fontSize:14,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:7,marginTop:8}}>
            <Ic d={D.plus} z={14} c={OR}/> Log New PR
          </button>
        </div>
      </div>
    );
  }

  var history=p.history||[];
  var prs=p.prs||{};

  // Overview stats
  var last7=history.filter(function(w){
    if(!w.dateISO) return false;
    var d=new Date(w.dateISO);
    var now=new Date();
    return (now-d)/(1000*60*60*24)<=7;
  });
  var last4w=history.filter(function(w){
    if(!w.dateISO) return false;
    var d=new Date(w.dateISO);
    var now=new Date();
    return (now-d)/(1000*60*60*24)<=28;
  });
  var totalVol7=last7.reduce(function(a,w){return a+(parseInt((w.vol||"0").replace(/[^0-9]/g,""))||0);},0);
  var prCount=Object.keys(prs).length;

  return (
    <div style={{paddingBottom:80}}>
      <div style={{padding:"52px 20px 0",background:SURF}}>
        {p.onBack?(
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:14,paddingBottom:14,borderBottom:"1px solid "+BORD}}>
            <button onClick={p.onBack} style={{background:"none",border:"none",cursor:"pointer",display:"flex",alignItems:"center"}}><Ic d={D.back} z={22}/></button>
            <h1 style={{fontFamily:"Barlow Condensed,sans-serif",fontSize:28,fontWeight:800,letterSpacing:"0.04em"}}>PR VAULT</h1>
          </div>
        ):(
          <>
            <h1 style={{fontFamily:"Barlow Condensed,sans-serif",fontSize:32,fontWeight:800,letterSpacing:"0.04em",marginBottom:14}}>PROGRESS</h1>
            <div style={{display:"flex",borderBottom:"1px solid "+BORD}}>
              {[["overview","Overview"],["prs","PR Vault"]].map(function(t){
                return <button key={t[0]} onClick={function(){setTab(t[0]);}} style={{flex:1,padding:"11px 0",background:"none",border:"none",cursor:"pointer",color:tab===t[0]?OR:MU,fontSize:14,fontWeight:600,borderBottom:"2px solid "+(tab===t[0]?OR:"transparent")}}>{t[1]}</button>;
              })}
            </div>
          </>

      {tab==="overview"&&(
        <div style={{padding:"18px 20px"}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:18}}>
            {[
              {label:"Total Workouts",value:history.length,col:OR},

              {label:"Last 4 Weeks",value:last4w.length,col:"#3B82F6"},
              {label:"PRs Logged",value:prCount,col:"#F59E0B"},

            })}
          </div>

          <p style={{fontFamily:"Barlow Condensed,sans-serif",fontSize:16,fontWeight:700,color:TX,marginBottom:12}}>Last 7 Days</p>

            <div style={{marginBottom:18}}>

                return <div key={i} style={{background:CARD,borderRadius:12,padding:"12px 14px",border:"1px solid "+BORD,display:"flex",alignItems:"center",gap:12,marginBottom:8}}>
                  <div style={{width:36,height:36,borderRadius:9,background:OR_H+"18",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><Ic d={D.fire} z={16} c={OR}/></div>
                  <div style={{flex:1}}><p style={{fontWeight:600,fontSize:14,color:TX}}>{w.name}</p><p style={{color:MU,fontSize:12,marginTop:1}}>{w.date} - {w.dur} - {w.sets} sets</p></div>

              })}

          )}

          {Object.keys(prs).slice(0,5).map(function(eid){

        {withPRs.filter(function(e){return e.name.toLowerCase().indexOf(search.toLowerCase())>=0;}).map(function(ex){
          var exPrs=p.prs[ex.id]||[];

function ProfileScreen(p){
  var [themeState, setThemeState]=useState(isDarkMode);
  useEffect(function(){
    var handleThemeChange=function(){ setThemeState(isDarkMode); };
    window.addEventListener("theme-changed", handleThemeChange);
    return function(){ window.removeEventListener("theme-changed", handleThemeChange); };
  }, []);
  var useKg=p.useKg!==false; var unit=useKg?"KG":"LBS";
  var history=p.history||[]; var prs=p.prs||{};
  var totalSets=history.reduce(function(a,w){return a+(w.sets||0);},0);
  var totalVol=history.reduce(function(a,w){return a+(parseInt((w.vol||"0").replace(/[^0-9]/g,""))||0);},0);
  var prCount=Object.keys(prs).length;
  var badges=[];
  if(history.length>=1) badges.push({icon:"1",label:"First Rep",desc:"Logged your first workout",col:GR_H});
  if(history.length>=5) badges.push({icon:"5",label:"5 Workouts",desc:"Consistency is building",col:"#3B82F6"});
  if(history.length>=10) badges.push({icon:"10",label:"10 Workouts",desc:"The habit is forming",col:"#8B5CF6"});
  if(history.length>=25) badges.push({icon:"25",label:"25 Workouts",desc:"Committed athlete",col:"#F59E0B"});
  if(prCount>=1) badges.push({icon:"PR",label:"First PR",desc:"Logged your first record",col:OR_H});
  if(prCount>=5) badges.push({icon:"P5",label:"5 PRs",desc:"You are getting stronger",col:"#8B5CF6"});
  if(totalSets>=100) badges.push({icon:"S",label:"100 Sets",desc:"That is a lot of reps",col:"#06B6D4"});
  var locked=[];
  if(history.length<5) locked.push({icon:"5",label:"5 Workouts",desc:(5-history.length)+" more to go",col:MU});
  if(history.length<10) locked.push({icon:"10",label:"10 Workouts",desc:(10-history.length)+" more to go",col:MU});
  if(prCount<5) locked.push({icon:"P5",label:"5 PRs",desc:(5-prCount)+" more to go",col:MU});
  var bestPRs=[];

        </div>
        {bestPRs.length>0&&(
          <>

            {bestPRs.map(function(pr,i){
              var dw=useKg?Math.round(pr.w*10)/10:Math.round(pr.w*2.20462*10)/10;
              return <div key={i} style={{background:CARD,borderRadius:13,padding:"12px 14px",border:"1px solid "+BORD,marginBottom:8,display:"flex",alignItems:"center",gap:12}}><div style={{width:36,height:36,borderRadius:9,background:(pr.col||OR)+"18",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><Ic d={D.trophy} z={16} c={pr.col||OR}/></div><div style={{flex:1}}><p style={{fontWeight:600,fontSize:14,color:TX}}>{pr.name}</p><p style={{fontSize:11,color:MU,marginTop:1}}>{pr.muscle}</p></div><div style={{textAlign:"right"}}><p style={{fontFamily:"Barlow Condensed,sans-serif",fontSize:20,fontWeight:800,color:OR,lineHeight:1}}>{dw}<span style={{fontSize:12,fontWeight:400,color:MU}}>{useKg?"kg":"lb"}</span></p></div></div>;
            })}
          </>
        )}
      </div>
    </div>
  );
}

/* -- PROGRESS PHOTOS COMPONENT ---------------------------------------- */
function ProgressPhotos(){
  var [photos,setPhotos]=useState(function(){return ld("progressPhotos",[]);});
  var [note,setNote]=useState("");
  var [lightbox,setLightbox]=useState(null);
  var [analysis,setAnalysis]=useState(null);
  var [analysing,setAnalysing]=useState(false);
  var fileRef=useRef(null);

  function analysePhoto(photo){
    if(analysing) return;
    setAnalysis(null);setAnalysing(true);
    var profile=ld("profile",null)||{};
    fetch("https://lockedapi.cescocugliari.workers.dev/analyze-physique",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({base64:photo.thumb,profile:{goal:profile.goal,weight:profile.weight}})
    }).then(function(r){return r.json();}).then(function(d){
      var text=(d.content&&d.content[0]&&d.content[0].text)||"";
      text=text.trim().replace(/```json/g,"").replace(/```/g,"").trim();
      try{
        var res=JSON.parse(text);
        setAnalysis(res);
      }catch(e){
        var m=text.match(/\{[\s\S]*\}/);
        if(m){try{setAnalysis(JSON.parse(m[0]));}catch(e2){setAnalysis({summary:text,observations:[],strengths:[],focus:"",bodyComposition:"",qualifier:""});}}
        else setAnalysis({summary:text,observations:[],strengths:[],focus:"",bodyComposition:"",qualifier:""});
      }
      setAnalysing(false);
    }).catch(function(){setAnalysing(false);});
  }

  function handleFile(e){
    var file=e.target.files&&e.target.files[0];
    if(!file) return;
    resizeImage(file,800,function(thumb){
      var updated=saveProgressPhoto(thumb,note.trim());
      setPhotos(updated);
      setNote("");
    });
    e.target.value="";
  }

  function removePhoto(idx){
    var updated=photos.filter(function(_,i){return i!==idx;});
    sd("progressPhotos",updated);
    setPhotos(updated);
    setLightbox(null);setAnalysis(null);setAnalysing(false);
  }

  function openLightbox(idx){setLightbox(idx);setAnalysis(null);setAnalysing(false);}
  function prevPhoto(){setLightbox(lightbox>0?lightbox-1:photos.length-1);setAnalysis(null);setAnalysing(false);}
  function nextPhoto(){setLightbox(lightbox<photos.length-1?lightbox+1:0);setAnalysis(null);setAnalysing(false);}

  /* group photos by month, newest first */
  var groups=(function(){
    var map={};var order=[];
    photos.forEach(function(ph,idx){
      var d=new Date(ph.date);
      var key=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");
      var label=d.toLocaleDateString("en-US",{month:"long",year:"numeric"});
      if(!map[key]){map[key]={label:label,items:[]};order.push(key);}
      map[key].items.push(Object.assign({},ph,{_idx:idx}));
    });
    return order.map(function(k){return map[k];}).reverse();
  })();

  return (
    <div style={{paddingBottom:8}}>
      {/* header */}
      <div style={{display:"flex",alignItems:"flex-end",justifyContent:"space-between",marginBottom:14}}>
        <div>
          <p style={{fontFamily:"Barlow Condensed,sans-serif",fontSize:22,fontWeight:800,color:TX,letterSpacing:"0.03em"}}>Progress Photos</p>
          {photos.length>0&&<p style={{fontSize:11,color:MU,marginTop:2}}>{photos.length} photo{photos.length===1?"":"s"} · stored on device</p>}
        </div>
      </div>

      {/* capture card */}
      <div style={{background:CARD,borderRadius:14,padding:14,border:"1px solid "+BORD,marginBottom:14}}>
        <input ref={fileRef} type="file" accept="image/*" onChange={handleFile} style={{display:"none"}}/>
        <textarea value={note} onChange={function(e){setNote(e.target.value);}} rows={2}
          placeholder="Optional note — e.g. Week 4, front pose"
          style={{width:"100%",background:SU,border:"1px solid "+BORD,borderRadius:9,padding:"10px 12px",
            color:TX,fontSize:13,outline:"none",resize:"none",marginBottom:10,lineHeight:1.5}}/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          <button onClick={function(){
            var inp=document.createElement("input");
            inp.type="file";inp.accept="image/*";inp.capture="environment";
            inp.onchange=handleFile;inp.click();
          }} style={{padding:"13px 8px",borderRadius:10,border:"1.5px solid "+OR_H+"55",background:OR_H+"0A",
            color:OR,fontSize:13,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:7}}>
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
              <path d="M20 20H4a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2h.5L6.6 5h10.8L19.5 7H20a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2z"/><circle cx="12" cy="13" r="3"/>
            </svg>Camera
          </button>
          <button onClick={function(){fileRef.current&&fileRef.current.click();}}
            style={{padding:"13px 8px",borderRadius:10,border:"1.5px solid "+BORD,background:SU,
              color:MU,fontSize:13,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:7}}>
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
            </svg>Library
          </button>
        </div>
      </div>

      {/* empty state */}
      {photos.length===0&&(
        <div style={{textAlign:"center",padding:"44px 20px"}}>
          <div style={{width:64,height:64,borderRadius:"50%",background:OR_H+"12",border:"1px solid "+OR_H+"22",
            display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 16px"}}>
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke={OR} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
              <path d="M20 20H4a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2h.5L6.6 5h10.8L19.5 7H20a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2z"/><circle cx="12" cy="13" r="3"/>
            </svg>
          </div>
          <p style={{fontSize:15,fontWeight:600,color:TX,marginBottom:6}}>Start Your Transformation</p>
          <p style={{fontSize:12,color:MU,lineHeight:1.6,maxWidth:220,margin:"0 auto"}}>
            Take your first photo. Track how your body changes week by week.
          </p>
        </div>
      )}

      {/* month groups */}
      {groups.map(function(group,gi){
        return (
          <div key={gi} style={{marginBottom:20}}>
            <p style={{fontSize:10,fontWeight:700,color:MU,letterSpacing:"0.1em",marginBottom:9,textTransform:"uppercase"}}>{group.label}</p>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6}}>
              {group.items.map(function(ph,i){
                return (
                  <button key={i} onClick={function(){openLightbox(ph._idx);}}
                    style={{position:"relative",borderRadius:10,overflow:"hidden",aspectRatio:"1",
                      border:"1px solid "+BORD,padding:0,cursor:"pointer",background:SU,display:"block"}}>
                    <img src={ph.thumb} style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}/>
                    <div style={{position:"absolute",inset:0,background:"linear-gradient(to top,rgba(0,0,0,0.7) 0%,transparent 55%)"}}>
                      <div style={{position:"absolute",bottom:0,left:0,right:0,padding:"6px 7px"}}>
                        <p style={{fontSize:9,color:"rgba(255,255,255,0.85)",fontWeight:600}}>
                          {new Date(ph.date).toLocaleDateString("en-US",{month:"short",day:"numeric"})}

                        {ph.note&&<p style={{fontSize:8,color:"rgba(255,255,255,0.5)",marginTop:1,
                          overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{ph.note}</p>}
                      </div>
                    </div>
                  </button>
                );
              })}
            </div>
          </div>
        );
      })}

      {photos.length>0&&(
        <div style={{marginTop:10,marginBottom:12,background:"#8B5CF6"+"0A",borderRadius:11,padding:"10px 13px",border:"1px solid #8B5CF6"+"25",display:"flex",alignItems:"center",gap:9}}>
          <div style={{width:28,height:28,borderRadius:7,background:"#8B5CF6"+"20",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
            <Ic d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4M10 17l5-5-5-5M15 12H3" z={12} c="#8B5CF6"/>
          </div>
          <p style={{fontSize:11,color:"#8B5CF6",fontWeight:600,flex:1,margin:0}}>Tap a photo → <span style={{fontWeight:800}}>Analyse Physique</span> for AI feedback</p>
        </div>
      )}

      {/* lightbox */}
      {lightbox!==null&&photos[lightbox]&&(
        <div onClick={function(){setLightbox(null);setAnalysis(null);setAnalysing(false);}}
          style={{position:"fixed",inset:0,zIndex:99999,background:"rgba(0,0,0,0.96)",
            display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"flex-start",overflowY:"auto",animation:"fadeUp 0.18s ease"}}>

          {/* top bar */}
          <div onClick={function(e){e.stopPropagation();}}

              display:"flex",alignItems:"flex-start",justifyContent:"space-between",
              background:"linear-gradient(to bottom,rgba(0,0,0,0.92),transparent)",zIndex:2,flexShrink:0}}>

              {photos[lightbox].note&&<p style={{fontSize:12,color:"rgba(255,255,255,0.5)"}}>{photos[lightbox].note}</p>}
            </div>
            <button onClick={function(){setLightbox(null);setAnalysis(null);setAnalysing(false);}}
              style={{width:36,height:36,borderRadius:"50%",background:"rgba(255,255,255,0.12)",border:"none",
                display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",color:"#fff",flexShrink:0}}>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round">
                <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
              </svg>
            </button>
          </div>

          {/* image */}

              }).then(function(){
                return navigator.serviceWorker.getRegistrations();
              }).then(function(regs){
                return Promise.all(regs.map(function(r){return r.unregister();}));
              }).then(function(){
                window.location.reload(true);
              });
            } else {
              window.location.reload(true);
            }
          }} style={{width:"100%",padding:"11px",borderRadius:9,border:"1px solid #8B5CF650",background:"#8B5CF615",color:"#8B5CF6",fontSize:13,fontWeight:700,cursor:"pointer"}}>Force Refresh App</button>
        </div>
        )}
        <div style={{background:CARD,borderRadius:13,padding:"15px",border:"1px solid "+BORD}}>
          <p style={{fontSize:11,fontWeight:700,color:MU,letterSpacing:"0.06em",marginBottom:10}}>HELP</p>
          <button onClick={function(){if(p.onShowTutorial)p.onShowTutorial();}} style={{width:"100%",padding:"13px",borderRadius:9,border:"1px solid "+OR_H+"40",background:OR_H+"10",color:OR,fontSize:14,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
            <span style={{fontSize:16}}>🎯</span> Replay Tutorial
          </button>
        </div>
        <div style={{background:CARD,borderRadius:13,padding:"15px",border:"1px solid "+BORD}}>
          <p style={{fontSize:11,fontWeight:700,color:RE,letterSpacing:"0.06em",marginBottom:10}}>DANGER ZONE</p>
          <button onClick={function(){localStorage.clear();window.location.reload();}} style={{width:"100%",padding:"12px",borderRadius:9,border:"1px solid "+RE_H+"40",background:RE_H+"10",color:RE,fontSize:14,fontWeight:600,cursor:"pointer",marginBottom:8}}>Reset all data</button>
          {!deleteConfirm?(
            <button onClick={function(){setDeleteConfirm(true);}} style={{width:"100%",padding:"12px",borderRadius:9,border:"1px solid "+RE_H+"40",background:"transparent",color:RE,fontSize:14,fontWeight:600,cursor:"pointer"}}>Delete Account</button>
          ):(
            <div style={{background:RE_H+"08",borderRadius:10,padding:"14px",border:"1px solid "+RE_H+"30"}}>
              <p style={{fontSize:13,color:RE,fontWeight:700,marginBottom:6}}>This cannot be undone.</p>
              <p style={{fontSize:12,color:MU,marginBottom:14,lineHeight:1.5}}>Your account, subscription, and all stored data will be permanently deleted.</p>
              <div style={{display:"flex",gap:8}}>
                <button onClick={function(){setDeleteConfirm(false);}} style={{flex:1,padding:"10px",borderRadius:9,border:"1px solid "+BORD,background:"transparent",color:MU,fontSize:13,cursor:"pointer"}}>Cancel</button>
                <button onClick={async function(){
                  setDeleteLoading(true);
                  try{await window.LOCKED.deleteAccount();}
                  catch(e){if(window.LOCKED)window.LOCKED.toast("Delete failed: "+e.message,"error");setDeleteLoading(false);setDeleteConfirm(false);}
                }} disabled={deleteLoading} style={{flex:1,padding:"10px",borderRadius:9,border:"none",background:RE,color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer",opacity:deleteLoading?0.6:1}}>
                  {deleteLoading?"Deleting…":"Yes, Delete"}
                </button>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

/* -- ONBOARDING ------------------------------------------------------- */
function Onboarding(p){
  var [step,setStep]=useState(1);
  var [dispName,setDispName]=useState("");
  var [username,setUsername]=useState("");
  var [unitChoice,setUnitChoice]=useState("kg");
  var [betaCode,setBetaCode]=useState("");
  var [betaErr,setBetaErr]=useState("");
  var [betaClaimed,setBetaClaimed]=useState(false);
  var [betaAgreed,setBetaAgreed]=useState(false);
  var [msgs,setMsgs]=useState([]);
  var [input,setInput]=useState("");
  var [aiLoading,setAiLoading]=useState(false);
  var [prog,setProg]=useState(null);
  var [done,setDone]=useState(false);
  var histRef=useRef([]);
  var scrollRef=useRef(null);
  var answerCountRef=useRef(0);

  useEffect(function(){
    if(scrollRef.current) scrollRef.current.scrollTop=scrollRef.current.scrollHeight;
  },[msgs]);

  useEffect(function(){
    if(step===4 && msgs.length===0 && !aiLoading){
      setTimeout(function(){kickoffChat();}, 100);
    }
  },[step]);

  function getChatSys(){
    var s1="You are LOCKED AI, a strength coach onboarding "+dispName+".";
    var s2=" Ask short questions one at a time to learn: training experience, main goal, days per week available.";
    var s3=" Keep replies to 1-2 sentences. After 3 answers you MUST generate their program.";
    var s4=" To generate: output ###PROGRAM_START### then a JSON object then ###PROGRAM_END### then one sentence.";
    var s5=" JSON shape: {name:string, splits:[{name:string, days:[{name:string, exIds:[numbers]}]}]}.";
    var s6=" Exercise IDs - Chest:107,101,108,110,112. Back:201,202,206,207,208. Shoulders:301,302,306,307,311. Triceps:403,406,407,408. Biceps:503,502,506,505. Quads:701,702,703,704. Hams:801,802,803. Abs:1001,1008.";
    return s1+s2+s3+s4+s5+s6;
  }

  function getGenSys(){
    var answers=histRef.current.filter(function(m){return m.role==="user"&&m.content!=="hi";}).map(function(m){return m.content;}).join(". ");
    var s1="Build a training split. User info: "+answers+".";
    var s2=" Output ONLY: ###PROGRAM_START### then JSON then ###PROGRAM_END### then one line.";
    var s3=" JSON: {name:string, splits:[{name:string, days:[{name:string, exIds:[numbers]}]}]}.";
    var s4=" Match days to their schedule. IDs - Chest:107,101,108,110,112. Back:201,202,206,207,208. Shoulders:301,302,306,307,311. Triceps:403,406,407,408. Biceps:503,502,506,505. Quads:701,702,703,704. Hams:801,802,803. Abs:1001,1008.";
    return s1+s2+s3+s4;
  }

  function callWorker(sys, messages, onDone, onErr){
    fetch("https://lockedapi.cescocugliari.workers.dev/",{
      method:"POST", headers:{"Content-Type":"application/json"},
      body:JSON.stringify({system:sys, max_tokens:800, messages:messages})
    })
    .then(function(r){return r.json();})
    .then(function(d){
      var txt="";
      if(d.content&&d.content[0]&&d.content[0].text) txt=d.content[0].text;
      else if(d.choices&&d.choices[0]&&d.choices[0].message) txt=d.choices[0].message.content;
      else if(d.error&&d.error.message) txt="API error: "+d.error.message;
      if(txt.trim()) onDone(txt);
      else onErr();
    })
    .catch(function(){onErr();});
  }

  function tryParseProg(txt){
    var si=txt.indexOf("###PROGRAM_START###");
    var ei=txt.indexOf("###PROGRAM_END###");
    if(si<0||ei<=si) return null;
    try{
      var jsonStr=txt.slice(si+19,ei).trim();
      return JSON.parse(jsonStr);
    }catch(e){ return null; }
  }

  function kickoffChat(){
    setAiLoading(true);
    callWorker(getChatSys(),[{role:"user",content:"hi"}], function(txt){
      histRef.current=[{role:"user",content:"hi"},{role:"assistant",content:txt}];
      setMsgs([{role:"assistant",text:txt}]);
      setAiLoading(false);
    }, function(){
      var fb="Hey "+dispName+"! How long have you been training and what is your main goal?";
      histRef.current=[{role:"user",content:"hi"},{role:"assistant",content:fb}];
      setMsgs([{role:"assistant",text:fb}]);
      setAiLoading(false);
    });
  }

  function send(){
    if(!input.trim()||aiLoading) return;
    var msg=input.trim();
    setInput("");
    setMsgs(function(m){return m.concat([{role:"user",text:msg}]);});
    histRef.current.push({role:"user",content:msg});
    answerCountRef.current=answerCountRef.current+1;
    setAiLoading(true);
    if(answerCountRef.current>=3){
      // Force generate
      callWorker(getGenSys(),[{role:"user",content:"Generate my program now."}], function(txt){
        var parsed=tryParseProg(txt);
        var displayTxt=txt.slice(txt.indexOf("###PROGRAM_END###")+17).trim();
        if(parsed){
          setProg(parsed);
          setMsgs(function(m){return m.concat([{role:"assistant",text:displayTxt||"Your program is ready!",prog:parsed}]);});
          setDone(true);
        }else{
          setMsgs(function(m){return m.concat([{role:"assistant",text:"Could not generate program. Please try again."}]);});
        }
        setAiLoading(false);
      }, function(){
        setMsgs(function(m){return m.concat([{role:"assistant",text:"Connection issue. Try again."}]);});
        setAiLoading(false);
      });
      return;
    }
    callWorker(getChatSys(), histRef.current, function(txt){
      histRef.current.push({role:"assistant",content:txt});
      var parsed=tryParseProg(txt);
      if(parsed){
        var displayTxt=txt.slice(txt.indexOf("###PROGRAM_END###")+17).trim();
        setProg(parsed);
        setMsgs(function(m){return m.concat([{role:"assistant",text:displayTxt||"Your program is ready!",prog:parsed}]);});
        setDone(true);
      }else{
        setMsgs(function(m){return m.concat([{role:"assistant",text:txt}]);});
      }
      setAiLoading(false);
    }, function(){
      setMsgs(function(m){return m.concat([{role:"assistant",text:"Connection issue. Try again."}]);});
      setAiLoading(false);
    });
  }

  function finish(withProg){
    p.onComplete({displayName:dispName.trim(),username:username.trim(),useKg:unitChoice==="kg"},withProg?prog:null);
  }

  if(step===1) return (
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#0A0A0B 0%,#1A0A02 100%)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px 28px"}}>
      <style>{CSS}</style>
      <div style={{width:88,height:88,borderRadius:24,background:"linear-gradient(135deg,"+OR_H+","+ORD_H+")",display:"flex",alignItems:"center",justifyContent:"center",marginBottom:32,boxShadow:"0 0 48px "+OR_H+"50"}}><Ic d={D.train} z={44} c="#fff"/></div>
      <h1 style={{fontFamily:"Barlow Condensed,sans-serif",fontSize:58,fontWeight:800,letterSpacing:"0.05em",lineHeight:1,marginBottom:10,textAlign:"center",color:TX}}>LOCKED</h1>
      <p style={{color:MU,fontSize:15,textAlign:"center",lineHeight:1.6,maxWidth:280,marginBottom:30}}>The training app built around how serious lifters actually train.</p>
      <div style={{width:"100%",maxWidth:320,marginBottom:20}}>
        <div style={{background:CARD,borderRadius:12,padding:"12px 14px",border:"1px solid "+BORD}}>
          <p style={{fontSize:10,fontWeight:700,color:OR,letterSpacing:"0.08em",marginBottom:6}}>INVITE CODE (OPTIONAL)</p>
          <div style={{display:"flex",gap:8}}>
            <input value={betaCode} onChange={function(e){setBetaCode(e.target.value.toUpperCase());setBetaErr("");}} placeholder="Enter code if you have one" style={{flex:1,background:SU,border:"1px solid "+(betaClaimed?"#22C55E40":betaErr?RE_H+"40":BORD),borderRadius:9,padding:"9px 10px",color:TX,fontSize:13,outline:"none"}}/>
            {!betaClaimed&&<button onClick={function(){
              if(!betaCode.trim()){setBetaErr("Enter a code");return;}
              validateBetaCodeRemote(betaCode,function(ok,err){
                if(ok){setBetaClaimed(true);setBetaErr("");}
                else{setBetaErr(err||"Invalid or used code");}
              });
            }} style={{padding:"9px 14px",borderRadius:9,border:"none",background:OR,color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}}>Verify</button>}
          </div>
          {betaErr&&<p style={{fontSize:11,color:RE,marginTop:4}}>{betaErr}</p>}
          {betaClaimed&&!betaAgreed&&(
            <div style={{marginTop:10,background:CARD,borderRadius:10,padding:"12px",border:"1px solid "+BORD}}>
              <p style={{fontSize:12,fontWeight:700,color:OR,marginBottom:6}}>Beta Tester Agreement</p>
              <p style={{fontSize:11,color:MU,lineHeight:1.6,marginBottom:10}}>By using this invite code you agree to participate as a beta tester for LOCKED. As part of testing, the following data will be collected and sent back to the development team to improve the app and train the AI coach:</p>
              <p style={{fontSize:11,color:MU,lineHeight:1.8,marginBottom:10,paddingLeft:8}}>
                {"\u2022 "}Workout data (exercises, sets, reps, weights){"\n"}
                {"\u2022 "}AI coach interactions (your questions and AI responses){"\n"}
                {"\u2022 "}Check-in entries (mood, energy, stress ratings){"\n"}
                {"\u2022 "}Nutrition and weight log data{"\n"}
                {"\u2022 "}App usage activity
              </p>
              <p style={{fontSize:11,color:MU,lineHeight:1.6,marginBottom:8}}>This data is used solely to improve LOCKED and will not be shared with third parties. You can stop participating at any time.</p>
              <p style={{fontSize:11,color:MU,lineHeight:1.6,marginBottom:12}}>By agreeing you also confirm that you will not copy, reproduce, reverse-engineer, decompile, or distribute any part of this application — including its source code, design, AI systems, or data structures. Unauthorised reproduction or redistribution is strictly prohibited.</p>
              <button onClick={function(){setBetaAgreed(true);}} style={{width:"100%",padding:"10px",borderRadius:9,border:"none",background:OR,color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer"}}>I Agree</button>
            </div>
          )}
          {betaClaimed&&betaAgreed&&<p style={{fontSize:11,color:"#22C55E",marginTop:4}}>Code accepted — you are in!</p>}
        </div>
      </div>
      <button onClick={function(){setStep(2);}} style={{width:"100%",maxWidth:320,padding:"18px",borderRadius:16,border:"none",background:"linear-gradient(135deg,"+OR_H+",#EA580C)",color:"#fff",fontFamily:"Barlow Condensed,sans-serif",fontSize:20,fontWeight:800,cursor:"pointer",letterSpacing:"0.04em"}}>GET STARTED</button>
      <p style={{fontSize:10,color:MU,textAlign:"center",maxWidth:300,lineHeight:1.5,marginTop:12,opacity:0.7}}>By continuing you agree not to copy, reverse-engineer, or reproduce any part of this application or its source code.</p>
    </div>
  );

  if(step===2) return (
    <div style={{minHeight:"100vh",background:BG,padding:"60px 28px 40px"}}>
      <style>{CSS}</style>
      <p style={{fontSize:12,color:OR,fontWeight:700,letterSpacing:"0.1em",marginBottom:8}}>STEP 1 OF 3</p>
      <h1 style={{fontFamily:"Barlow Condensed,sans-serif",fontSize:34,fontWeight:800,letterSpacing:"0.04em",lineHeight:1,marginBottom:8,color:TX}}>Create your profile</h1>
      <p style={{color:MU,fontSize:14,lineHeight:1.5,marginBottom:28}}>How you appear in the app.</p>
      <div style={{display:"flex",flexDirection:"column",gap:16,marginBottom:30}}>
        <div>
          <p style={{fontSize:11,fontWeight:700,color:MU,letterSpacing:"0.06em",marginBottom:8}}>YOUR NAME</p>
          <input value={dispName} onChange={function(e){setDispName(e.target.value);}} placeholder="e.g. Alex, Jordan, Mike..." style={{width:"100%",background:CARD,border:"1px solid "+(dispName?OR:BORD),borderRadius:12,padding:"13px 15px",color:TX,fontSize:16,fontWeight:600,outline:"none"}}/>
        </div>
        <div>
          <p style={{fontSize:11,fontWeight:700,color:MU,letterSpacing:"0.06em",marginBottom:8}}>USERNAME</p>
          <input value={username} onChange={function(e){setUsername(e.target.value.toLowerCase().replace(/[^a-z0-9_]/g,""));}} placeholder="e.g. alex_lifts" style={{width:"100%",background:CARD,border:"1px solid "+(username?OR:BORD),borderRadius:12,padding:"13px 15px",color:TX,fontSize:16,fontWeight:600,outline:"none"}}/>
        </div>
      </div>
      <button onClick={function(){if(dispName.trim()&&username.trim()){if(betaClaimed&&!betaAgreed)return;if(betaClaimed&&betaCode){claimBetaCode(betaCode,username.trim());}setStep(3);}}} disabled={!dispName.trim()||!username.trim()||(betaClaimed&&!betaAgreed)} style={{width:"100%",padding:"15px",borderRadius:14,border:"none",background:dispName.trim()&&username.trim()&&(!betaClaimed||betaAgreed)?"linear-gradient(135deg,"+OR_H+",#EA580C)":SU,color:dispName.trim()&&username.trim()&&(!betaClaimed||betaAgreed)?TX:MU,fontFamily:"Barlow Condensed,sans-serif",fontSize:18,fontWeight:800,cursor:dispName.trim()&&username.trim()&&(!betaClaimed||betaAgreed)?"pointer":"default"}}>CONTINUE</button>
    </div>
  );

  if(step===3) return (
    <div style={{minHeight:"100vh",background:BG,padding:"60px 28px 40px"}}>
      <style>{CSS}</style>
      <p style={{fontSize:12,color:OR,fontWeight:700,letterSpacing:"0.1em",marginBottom:8}}>STEP 2 OF 3</p>
      <h1 style={{fontFamily:"Barlow Condensed,sans-serif",fontSize:34,fontWeight:800,letterSpacing:"0.04em",lineHeight:1,marginBottom:8,color:TX}}>Choose your units</h1>
      <p style={{color:MU,fontSize:14,lineHeight:1.5,marginBottom:28}}>Change anytime in your profile.</p>
      <div style={{display:"flex",flexDirection:"column",gap:12,marginBottom:36}}>
        {[{id:"kg",label:"Kilograms (KG)",desc:"Used in most countries"},{id:"lbs",label:"Pounds (LBS)",desc:"Used in the US and UK"}].map(function(opt){
          var act=unitChoice===opt.id;
          return (
            <div key={opt.id} onClick={function(){setUnitChoice(opt.id);}} style={{background:act?OR_H+"15":CARD,borderRadius:14,padding:"18px",border:"1.5px solid "+(act?OR:BORD),cursor:"pointer",display:"flex",alignItems:"center",gap:12}}>
              <div style={{width:22,height:22,borderRadius:"50%",border:"2px solid "+(act?OR:BORD),display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{act&&<div style={{width:10,height:10,borderRadius:"50%",background:OR}}/>}</div>
              <div><p style={{fontFamily:"Barlow Condensed,sans-serif",fontSize:20,fontWeight:800,color:act?OR:TX}}>{opt.label}</p><p style={{fontSize:13,color:MU,marginTop:2}}>{opt.desc}</p></div>
            </div>
          );
        })}
      </div>
      <button onClick={function(){setStep(4);}} style={{width:"100%",padding:"15px",borderRadius:14,border:"none",background:"linear-gradient(135deg,"+OR_H+",#EA580C)",color:"#fff",fontFamily:"Barlow Condensed,sans-serif",fontSize:18,fontWeight:800,cursor:"pointer"}}>CONTINUE</button>
    </div>
  );

  return (
    <div style={{background:BG,paddingBottom:100}}>
      <style>{CSS}</style>
      <div style={{position:"sticky",top:0,zIndex:50,background:"rgba(10,10,12,0.78)",borderBottom:"1px solid "+BORD,padding:"52px 20px 14px"}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{width:40,height:40,borderRadius:11,background:"linear-gradient(135deg,"+OR_H+","+ORD_H+")",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><Ic d={D.ai} z={18} c="#fff"/></div>
          <div style={{flex:1}}>
            <h1 style={{fontFamily:"Barlow Condensed,sans-serif",fontSize:20,fontWeight:800,color:TX}}>LOCKED AI COACH</h1>
            <p style={{fontSize:12,color:MU,marginTop:1}}>Building your personalized program</p>
          </div>
          <p style={{fontSize:11,color:MU,fontWeight:600}}>STEP 3 OF 3</p>
        </div>
      </div>
      <div ref={scrollRef} style={{padding:"14px 18px",display:"flex",flexDirection:"column",gap:10}}>
        {msgs.length===0&&!aiLoading&&<div style={{textAlign:"center",padding:"40px 20px",color:MU}}><p style={{fontSize:14}}>Starting your coaching session...</p></div>}
        {msgs.map(function(m,i){
          return (
            <div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start",gap:8,alignItems:"flex-end"}}>
              {m.role==="assistant"&&<div style={{width:28,height:28,borderRadius:8,background:"linear-gradient(135deg,"+OR_H+","+ORD_H+")",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><Ic d={D.ai} z={13} c="#fff"/></div>}
              <div style={{maxWidth:"82%",background:m.role==="user"?"linear-gradient(135deg,"+OR_H+",#EA580C)":CARD,borderRadius:m.role==="user"?"16px 16px 4px 16px":"16px 16px 16px 4px",padding:"11px 14px",border:m.role==="user"?"none":"1px solid "+BORD,color:m.role==="user"?"#fff":TX,fontSize:14,lineHeight:1.6}}>
                {m.text}
                {m.prog&&(
                  <div style={{marginTop:10,padding:"10px",borderRadius:9,background:OR_H+"15",border:"1px solid "+OR_H+"30"}}>
                    <p style={{fontSize:11,fontWeight:700,color:OR,marginBottom:6}}>{m.prog.name}</p>
                    {m.prog.splits&&m.prog.splits.map(function(s,si){return <div key={si} style={{display:"flex",alignItems:"center",gap:8,marginBottom:3}}><span style={{fontSize:11,color:MU,width:20}}>{si+1}</span><span style={{fontSize:12,fontWeight:600,color:TX}}>{s.name}</span><span style={{fontSize:11,color:MU,marginLeft:"auto"}}>{s.days&&s.days[0]?s.days[0].exIds.length:0} ex</span></div>;})}
                  </div>
                )}
              </div>
            </div>
          );
        })}
        {aiLoading&&(
          <div style={{display:"flex",alignItems:"flex-end",gap:8}}>
            <div style={{width:28,height:28,borderRadius:8,background:"linear-gradient(135deg,"+OR_H+","+ORD_H+")",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><Ic d={D.ai} z={13} c="#fff"/></div>
            <div style={{background:CARD,border:"1px solid "+BORD,borderRadius:16,padding:"12px 16px",display:"flex",gap:5}}>
              {[0,1,2].map(function(i){return <div key={i} style={{width:7,height:7,borderRadius:"50%",background:OR,animation:"pulse 1.4s "+(i*0.2)+"s infinite"}}/>;}) }
            </div>
          </div>
        )}
      </div>
      {done?(
        <div style={{position:"fixed",bottom:80,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:420,padding:"10px 18px 12px",borderTop:"1px solid "+BORD,background:SURF,display:"flex",flexDirection:"column",gap:10,zIndex:60}}>
          <button onClick={function(){finish(true);}} style={{width:"100%",padding:"15px",borderRadius:13,border:"none",background:"linear-gradient(135deg,"+OR_H+",#EA580C)",color:"#fff",fontFamily:"Barlow Condensed,sans-serif",fontSize:18,fontWeight:800,cursor:"pointer"}}>SAVE MY PROGRAM</button>
          <button onClick={function(){finish(false);}} style={{width:"100%",padding:"12px",borderRadius:13,border:"1px solid "+BORD,background:"transparent",color:MU,fontSize:14,cursor:"pointer"}}>Skip - set up manually</button>
        </div>
      ):(
        <div style={{position:"fixed",bottom:80,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:420,padding:"10px 18px 12px",borderTop:"1px solid "+BORD,background:"rgba(10,10,12,0.78)",zIndex:60}}>
          <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:8}}>
            <input value={input} onChange={function(e){setInput(e.target.value);}} onKeyDown={function(e){if(e.key==="Enter")send();}} placeholder="Type your answer..." style={{flex:1,background:CARD,border:"1px solid "+BORD,borderRadius:12,padding:"12px 14px",color:TX,fontSize:16,outline:"none"}}/>
            <button onClick={send} disabled={!input.trim()||aiLoading} style={{width:46,height:46,borderRadius:12,border:"none",background:input.trim()&&!aiLoading?OR:SU,display:"flex",alignItems:"center",justifyContent:"center",cursor:input.trim()&&!aiLoading?"pointer":"default",flexShrink:0}}>
              <Ic d={D.send} z={18} c={input.trim()&&!aiLoading?"#fff":MU}/>
            </button>
          </div>

function estimateMacros(text){
  var words=text.toLowerCase().split(/[\s,]+/);
  var totals={cal:0,pro:0,carb:0,fat:0};
  var found=[];
  var i=0;
  while(i<words.length){
    // look for a number
    var qty=parseFloat(words[i]);
    if(!isNaN(qty)){
      var unitWord=words[i+1]||"";
      var foodWord=words[i+2]||words[i+1]||"";
      // find matching food
      var match=null;
      for(var fi=0;fi<FOODS.length;fi++){
        var fn=FOODS[fi].n.toLowerCase();
        if(fn.indexOf(foodWord)>=0||foodWord.indexOf(fn.split(" ")[0])>=0){
          match=FOODS[fi];break;
        }
      }
      if(match){
        var grams=qty*match.g;
        var factor=grams/100;
        totals.cal+=Math.round(match.cal*factor);
        totals.pro+=Math.round(match.pro*factor);
        totals.carb+=Math.round(match.carb*factor);
        totals.fat+=Math.round(match.fat*factor);
        found.push({name:qty+" "+match.n,cal:Math.round(match.cal*factor),pro:Math.round(match.pro*factor),carb:Math.round(match.carb*factor),fat:Math.round(match.fat*factor)});
        i+=3;continue;
      }
    } else {
      // no number, try to match food word directly assuming 1 serving
      var word=words[i];
      if(word.length>2){
        for(var fi2=0;fi2<FOODS.length;fi2++){
          var fn=FOODS[fi2].n.toLowerCase();
          if(fn.indexOf(word)>=0){
            var match=FOODS[fi2];
            var factor=match.g/100;
            totals.cal+=Math.round(match.cal*factor);
            totals.pro+=Math.round(match.pro*factor);
            totals.carb+=Math.round(match.carb*factor);
            totals.fat+=Math.round(match.fat*factor);
            found.push({name:match.n,cal:Math.round(match.cal*factor),pro:Math.round(match.pro*factor),carb:Math.round(match.carb*factor),fat:Math.round(match.fat*factor)});
            break;
          }
        }
      }
    }
    i++;
  }
  return {items:found,totals:totals};
}

function calcTDEE(profile){
  if(!profile||!profile.weightKg||!profile.heightCm||!profile.age) return 2200;
  var bmr;
  var kg=parseFloat(profile.weightKg);
  var cm=parseFloat(profile.heightCm);
  var age=parseInt(profile.age);
  if(profile.sex==="female"){
    bmr=447.593+(9.247*kg)+(3.098*cm)-(4.330*age);
  } else {
    bmr=88.362+(13.397*kg)+(4.799*cm)-(5.677*age);
  }
  var mults={sedentary:1.2,light:1.375,moderate:1.55,active:1.725,very:1.9};
  var mult=mults[profile.activityLevel]||1.55;
  var tdee=Math.round(bmr*mult);
  if(profile.goal==="cut") tdee=Math.round(tdee*0.8);
  if(profile.goal==="bulk") tdee=Math.round(tdee*1.1);
  return tdee;
}

function calcMacros(tdee, weightKg, goal){
  var kg=parseFloat(weightKg)||80;
  var pro=Math.round(kg*(goal==="cut"?2.4:goal==="bulk"?2.0:2.2));
  var fat=Math.round(tdee*0.25/9);
  var carb=Math.round((tdee-(pro*4)-(fat*9))/4);
  return {pro:pro, carb:Math.max(carb,50), fat:fat};
}
function MacroRing(p){
  var size=p.size||120;
  var stroke=p.stroke||10;
  var r=(size-stroke)/2;
  var circ=2*3.14159*r;
  var pct=Math.min(p.pct||0,1);
  var dashArr=pct*circ+" "+(circ-(pct*circ));
  return (
    <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={SU} strokeWidth={stroke}/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={p.color||OR} strokeWidth={stroke} strokeDasharray={dashArr} strokeLinecap="round"/>
    </svg>
  );
}
