    /* ── Deploy version check ──────────────────────────────────────
       On every load, fetch the current deploy version from the Worker.
       If it differs from what's stored in localStorage, bust the SW
       cache and hard-reload so users always get the latest build.
    ──────────────────────────────────────────────────────────────── */
    (function checkDeployVersion(){
      var WORKER = "https://lockedapi.cescocugliari.workers.dev";
      var stored = localStorage.getItem("lk_deployVersion");
      fetch(WORKER + "/app-version", {cache:"no-store"})
        .then(function(r){ return r.ok ? r.json() : null; })
        .then(function(data){
          if(!data || !data.version) return;
          var latest = data.version;
          if(stored && stored !== latest){
            /* New deploy detected — clear SW caches then hard reload */
            localStorage.setItem("lk_deployVersion", latest);
            if("serviceWorker" in navigator && "caches" in window){
              navigator.serviceWorker.getRegistrations()
                .then(function(regs){
                  return Promise.all(regs.map(function(r){ return r.unregister(); }));
                })
                .then(function(){
                  return caches.keys().then(function(keys){
                    return Promise.all(keys.map(function(k){ return caches.delete(k); }));
                  });
                })
                .then(function(){ window.location.reload(true); });
            } else {
              window.location.reload(true);
            }
          } else {
            localStorage.setItem("lk_deployVersion", latest);
          }
        })
        .catch(function(){}); /* fail silently — never block the app */
    })();

  /* ---- Patch localStorage so every write to a sync key gets a timestamp.

  var _origSetItem = window.localStorage.setItem.bind(window.localStorage);
  var _origGetItem = window.localStorage.getItem.bind(window.localStorage);
  window.localStorage.setItem = function(key, value) {

  /* First-run migration: if a sync key already has local data but no

  (function seedExistingTimestamps() {

    SYNC_KEYS.forEach(function(k) {

        _ready = true;
        _readyCbs.forEach(function (cb) { cb(); });
        _readyCbs = [];
        if (isGuestMode()) { _setGuestSubscription(); return; }

       app boots from the merged storage. */

  /* ============================================================
     BIDIRECTIONAL SYNC
     1. Fetch cloud state (/user/data)
     2. Per-key: if cloud timestamp > local timestamp → take cloud
                 if local timestamp >= cloud timestamp → queue for upload
     3. Push locally-newer keys to cloud (/user/sync)
     4. Record success timestamp

     The localStorage patch (above) ensures every app write to a
     sync key records "__lk_ts__<key>" automatically, so we always
     know when local data last changed without modifying app code.
  ============================================================ */
  async function syncBidirectional() {
    if (!_session || _syncState === "syncing") return;
    /* Skip while a workout is actively in progress — prevents history clobber
       mid-session if another device just saved a newer lk_workoutData */
    if (_origGetItem("lk_activeWorkout")) return;
    _setSyncState("syncing");
    try {
      var h = await headers();

      /* -- Pull cloud ------------------------------------------------- */
      var res = await fetch(WORKER_URL + "/user/data", { headers: h });
      if (!res.ok) throw new Error("GET /user/data failed: " + res.status);
      var cloud = (await res.json()).data || {};

      /* -- Merge: compare per-key timestamps --------------------------- */
      var toUpload = {};
      var pulled = 0;
      SYNC_KEYS.forEach(function(k) {
        var cloudEntry = cloud[k];
        var cloudTs    = cloudEntry ? new Date(cloudEntry.updatedAt || 0).getTime() : 0;
        var localTsStr = _origGetItem("__lk_ts__" + k);
        var localTs    = localTsStr ? new Date(localTsStr).getTime() : 0;
        var localRaw   = _origGetItem(k);

        if (cloudTs > localTs && cloudEntry) {
          /* Cloud is newer → write directly (bypass patch so we preserve
             the cloud timestamp rather than stamping "now") */
          _origSetItem(k, JSON.stringify(cloudEntry.value));
          _origSetItem("__lk_ts__" + k, cloudEntry.updatedAt);
          pulled++;
        } else if (localRaw) {
          /* Local is same-age or newer → upload */
          try { toUpload[k] = JSON.parse(localRaw); } catch(e) { toUpload[k] = localRaw; }
        }
      });

      /* -- Push local-newer keys -------------------------------------- */
      /* Worker enforces a 20-key-per-request limit and 512 KB payload cap.
         Batch uploads in chunks of 18 to stay safely under both limits.
         Progress photos go last in their own best-effort request so a
         large base64 payload cannot sink the core data sync. */
      var photos = toUpload["lk_progressPhotos"];
      delete toUpload["lk_progressPhotos"];

      var uploadKeys = Object.keys(toUpload);
      var CHUNK = 18;
      for (var ci = 0; ci < uploadKeys.length; ci += CHUNK) {
        var chunk = {};
        uploadKeys.slice(ci, ci + CHUNK).forEach(function(k) { chunk[k] = toUpload[k]; });
        var pushRes = await fetch(WORKER_URL + "/user/sync", {
          method: "POST",
          headers: h,
          body: JSON.stringify({ data: chunk })
        });
        if (!pushRes.ok) throw new Error("POST /user/sync failed: " + pushRes.status);
      }
      if (photos !== undefined) {
        try {
          await fetch(WORKER_URL + "/user/sync", {
            method: "POST",
            headers: h,
            body: JSON.stringify({ data: { lk_progressPhotos: photos } })
          });
        } catch(e) { console.warn("[LOCKED Sync] photo push skipped:", e.message); }
      }

      /* -- Record success --------------------------------------------- */
      var now = new Date().toISOString();
      _origSetItem("__lk_last_sync__", now);
      _lastSyncAt = now;
      _setSyncState("synced");
      return pulled;

    } catch(e) {
      console.warn("[LOCKED Sync] Failed:", e.message);
      _setSyncState("error");
      throw e; /* re-throw so manual callers can surface the message */
    }
  }

  /* React state is initialised from localStorage at mount, so when a
     merge pulls newer cloud data the running UI is stale. Reload once —
     after the pull, local timestamps equal cloud timestamps, so the
     post-reload merge pulls nothing and cannot loop. Never reloads
     mid-workout (syncBidirectional already bails during a session). */
  function reloadIfPulled(pulled) {
    if (pulled > 0 && !_origGetItem("lk_activeWorkout")) {
      window.location.reload();
    }
  }

  /* Manual force-sync: bypasses the active-workout guard.
     The user explicitly requested sync so we honour it. */
  async function forceSyncNow() {
    if (isGuestMode()) return; /* guests sync nowhere — silently no-op */
    if (!_session) throw new Error("Not signed in");
    if (_syncState === "syncing") return; /* already running, wait */
    var wasBlocked = !!_origGetItem("lk_activeWorkout");
    /* Temporarily clear so syncBidirectional doesn't bail out */
    if (wasBlocked) _origSetItem("lk_activeWorkout", "");
    try {
      await syncBidirectional();
    } finally {
      /* Restore the flag if it was set (we only bypassed the guard) */
      if (wasBlocked) _origSetItem("lk_activeWorkout", "1");
    }
  }

  /* Periodic sync every 2 minutes */
  setInterval(function () {
    if (_session) syncBidirectional();
  }, 120000);

  /* Sync whenever the tab/app returns to the foreground.

  async function _submitAuth(mode) {
    var email    = (document.getElementById("auth-email")    || {}).value || "";
    var password = (document.getElementById("auth-password") || {}).value || "";
    var errEl    = document.getElementById("auth-error");
    var btn      = document.getElementById("auth-submit");

    if (!email || !password) {
      if (errEl) { errEl.textContent = "Email and password are required."; errEl.style.display = "block"; }
      return;
    }

    /* Complexity check — signup only */
    if (mode === "signup") {
      var pwErr = [];
      if (password.length < 8)          pwErr.push("8+ characters");
      if (!/[A-Z]/.test(password))       pwErr.push("uppercase letter");
      if (!/[a-z]/.test(password))       pwErr.push("lowercase letter");
      if (!/[0-9]/.test(password))       pwErr.push("a number");
      if (pwErr.length > 0) {
        if (errEl) { errEl.textContent = "Password needs: " + pwErr.join(", ") + "."; errEl.style.display = "block"; }
        return;
      }
    }

    if (btn) {
      btn.innerHTML = '<span style="display:inline-flex;gap:5px;align-items:center;justify-content:center">' +
        '<span style="width:7px;height:7px;background:#fff;border-radius:50%;animation:pulse 0.9s ease infinite"></span>' +
        '<span style="width:7px;height:7px;background:#fff;border-radius:50%;animation:pulse 0.9s 0.2s ease infinite"></span>' +
        '<span style="width:7px;height:7px;background:#fff;border-radius:50%;animation:pulse 0.9s 0.4s ease infinite"></span>' +
        '</span>';
      btn.disabled = true;
    }
    if (errEl) errEl.style.display = "none";

    try {
      if (mode === "signup") {
        var result = await _client.auth.signUp({ email: email, password: password });

        /* Account already exists — try signing in directly */
        var alreadyExists = result.error && (
          result.error.message.toLowerCase().includes("already registered") ||
          result.error.message.toLowerCase().includes("already been registered") ||
          result.error.message.toLowerCase().includes("user already")
        );
        if (alreadyExists) {
          try {
            await signIn(email, password);
            return;
          } catch (siErr) {
            throw new Error("An account with this email already exists. Try signing in.");
          }
        }

        /* Rate limit hit — account was likely created, try signing in */
        var rateLimited = result.error && (
          result.error.message.toLowerCase().includes("rate limit") ||
          result.error.message.toLowerCase().includes("email rate") ||
          result.error.message.toLowerCase().includes("too many")
        );
        if (rateLimited) {
          try {
            await signIn(email, password);
            return; /* worked — email confirmation must be off */
          } catch (siErr) {
            if (siErr.message.toLowerCase().includes("not confirmed")) {
              _pendingEmail = email;
              _setAuthMode("confirm");
              return;
            }
            /* Account wasn't created yet */
            throw new Error("Signup is temporarily limited. Please try again in a few minutes.");
          }
        }

        if (result.error) throw result.error;

        /* Email confirmation required (confirmation ON in Supabase) */
        if (!result.data || !result.data.session) {
          /* Try signing in anyway — works if confirmation was just disabled */
          try {
            await signIn(email, password);
            return;
          } catch (_) {
            _pendingEmail = email;
            _setAuthMode("confirm");
            return;
          }
        }

        _session = result.data.session;
        await fetchSubscription(result.data.user.id);
        hideOverlay();
        checkTrialWarning();
        showToast("Welcome to LOCKED! Your 14-day trial starts now.", "success");

      } else {
        await signIn(email, password);
      }
    } catch (e) {
      var msg = (e.message || "Authentication failed.");
      if (msg.toLowerCase().includes("email not confirmed") || msg.toLowerCase().includes("not confirmed")) {
        _pendingEmail = email;
        _setAuthMode("confirm");
        return;
      }
      if (msg.toLowerCase().includes("invalid login") || msg.toLowerCase().includes("invalid credentials")) {
        msg = "Incorrect email or password.";
      } else if (msg.toLowerCase().includes("rate limit") || msg.toLowerCase().includes("email rate") || msg.toLowerCase().includes("too many")) {
        msg = "Signup is temporarily limited. Please wait a few minutes and try again.";
      }
      if (errEl) { errEl.textContent = msg; errEl.style.display = "block"; }
      if (btn) { btn.textContent = mode === "signup" ? "CREATE ACCOUNT" : "SIGN IN"; btn.disabled = false; }
    }
  }

  function _validatePw() {
    var pw = (document.getElementById("auth-password") || {}).value || "";
    var checks = [
      { dotId: "req-len-dot",   rowId: "req-len",   ok: pw.length >= 8 },
      { dotId: "req-upper-dot", rowId: "req-upper",  ok: /[A-Z]/.test(pw) },
      { dotId: "req-lower-dot", rowId: "req-lower",  ok: /[a-z]/.test(pw) },
      { dotId: "req-num-dot",   rowId: "req-num",    ok: /[0-9]/.test(pw) }
    ];
    checks.forEach(function(c) {
      var dot = document.getElementById(c.dotId);
      var row = document.getElementById(c.rowId);
      if (dot) dot.textContent = c.ok ? "✓" : "○";
      if (row) row.style.color = c.ok ? "#10B981" : "rgba(148,163,184,0.35)";
    });
  }

  async function _resendConfirmation() {
    var email = _pendingEmail;
    if (!email) return;
    try {
      await _client.auth.resend({ type: "signup", email: email });
      showToast("Confirmation email resent!", "success");
    } catch (e) {
      showToast("Failed: " + e.message, "error");
    }
  }

  async function _forgotPassword() {
    var email = (document.getElementById("auth-email") || {}).value || "";
    if (!email) {
      var errEl = document.getElementById("auth-error");
      if (errEl) { errEl.textContent = "Enter your email first."; errEl.style.display = "block"; }
      return;
    }

// -- ERROR BOUNDARY ---------------------------------------------------------------
class ErrorBoundary extends React.Component {
  constructor(props) {
    super(props);
    this.state = { hasError: false, error: null };
  }
  static getDerivedStateFromError(error) {
    return { hasError: true, error };
  }
  componentDidCatch(error, errorInfo) {
    // Error boundary caught an error
  }
  render() {
    if (this.state.hasError) {
      return React.createElement('div', {style: {padding: 20, color: '#EF4444', textAlign: 'center', background: '#080809', minHeight: '100vh', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center'}},
        React.createElement('h2', {style: {marginBottom: 12, fontSize: 18}}, 'Error Loading App'),
        React.createElement('p', {style: {marginBottom: 8, fontSize: 14}}, this.state.error ? this.state.error.message : 'Something went wrong'),
        React.createElement('p', {style: {marginBottom: 16, fontSize: 12, color: '#9CA3AF'}}, 'Check browser console (F12) for details'),
        React.createElement('button', {onClick: () => window.location.reload(), style: {padding: '10px 20px', borderRadius: 6, border: 'none', background: '#F97316', color: '#fff', cursor: 'pointer', fontSize: 14}}, 'Refresh Page')
      );
    }
    return this.props.children;
  }
}

/* Lightweight screen-level boundary — shows a tab-scoped error instead of crashing the whole app */
class ScreenBoundary extends React.Component {
  constructor(props){ super(props); this.state={hasError:false,msg:""}; }
  static getDerivedStateFromError(e){ return {hasError:true,msg:e&&e.message||"Unexpected error"}; }
  render(){
    if(this.state.hasError){
      return React.createElement('div',{style:{padding:"40px 20px",textAlign:"center",color:"#EF4444"}},
        React.createElement('p',{style:{fontWeight:700,marginBottom:8}},"Something went wrong on this screen"),

        React.createElement('button',{onClick:function(){window.location.reload();},style:{padding:"10px 20px",borderRadius:8,border:"none",background:"#F97316",color:"#fff",cursor:"pointer",fontSize:14}},"Reload")
      );
    }
    return this.props.children;
  }
}

// Returns auth headers for worker calls. Falls back gracefully if LOCKED not ready.
function authHeaders(extra) {
  var base = {"Content-Type": "application/json"};
  try {
    var session = window.LOCKED && window.LOCKED.session;
    var token = session && session.access_token;
    if (token) base["Authorization"] = "Bearer " + token;
  } catch(e) {}
  return Object.assign(base, extra || {});
}

// -- AI HELPER ---------------------------------------------------------------
function aiCall(sys, userMsg, onLoad, onDone, onFail, signal) {
  if(onLoad) onLoad(true);
  fetch("https://lockedapi.cescocugliari.workers.dev/", {
    method: "POST",
    headers: authHeaders(),
    body: JSON.stringify({
      system: sys,
      max_tokens: 700,
      messages: [{role: "user", content: userMsg}]
    }),
    signal: signal || undefined
  })
  .then(function(r){ return r.json(); })
  .then(function(d){
    if(onLoad) onLoad(false);
    /* Feature-gated response */
    if(d.gated) {
      var gMsg = (d.content && d.content[0] && d.content[0].text) || "Daily limit reached. Upgrade to Pro for unlimited access.";
      if(window.LOCKED && window.LOCKED.toast) window.LOCKED.toast(gMsg, "error");
      if(onFail) onFail(new Error(gMsg));
      return;
    }
    var txt = "";
    if(d.content && d.content[0] && d.content[0].text) txt = d.content[0].text;
    else if(d.choices && d.choices[0] && d.choices[0].message) txt = d.choices[0].message.content;
    if(ld("betaStatus",false)) logBetaAI(userMsg, txt);
    onDone(txt);
  })
  .catch(function(e){
    if(e && e.name === "AbortError") return; /* intentional cancel — swallow silently */
    if(onLoad) onLoad(false);
    if(window.LOCKED && window.LOCKED.toast) window.LOCKED.toast("Connection error. Check your internet and try again.", "error");
    if(onFail) onFail(e);
  });

var DEFAULT_BETA_CODES=["JOSHBETA","SUMMERBETA","ROMANBETA","CESCOBETA","PUBLICBETA","OLIBETA","KENDALLBETA"];
function initBetaCodes(){
  var existing=ld("betaCodes",[]);
  var updated=false;
  DEFAULT_BETA_CODES.forEach(function(c){
    var found=false;
    for(var i=0;i<existing.length;i++){if(existing[i].code===c){found=true;break;}}
    if(!found){existing.push({code:c,active:true,usedBy:null});updated=true;}
  });
  if(updated||existing.length===0) sd("betaCodes",existing);
}
initBetaCodes();

function validateBetaCode(code){
  var codes=ld("betaCodes",[]);
  for(var i=0;i<codes.length;i++){
    if(codes[i].code===code.trim().toUpperCase()&&codes[i].active&&!codes[i].usedBy) return true;
  }
  return false;
}

/* Remote validation — checks server lock status */
function validateBetaCodeRemote(code,onResult){
  var clean=code.trim().toUpperCase();
  /* First check local codes exist */
  if(!validateBetaCode(clean)){onResult(false,"Invalid code");return;}
  /* Then check server lock */
  fetch("https://lockedapi.cescocugliari.workers.dev/beta-validate",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({code:clean})
  })
  .then(function(r){return r.json();})
  .then(function(d){
    if(!d.valid){onResult(false,"Invalid code");}
    else if(d.locked){onResult(false,"This code is no longer available");}
    else{onResult(true,null);}
  })
  .catch(function(){
    /* If server is unreachable, fall back to local validation */
    onResult(true,null);
  });
}
function claimBetaCode(code,userId){
  var codes=ld("betaCodes",[]);
  var cleanCode=code.trim().toUpperCase();
  for(var i=0;i<codes.length;i++){
    if(codes[i].code===cleanCode){codes[i].usedBy=userId;codes[i].claimedAt=new Date().toISOString();break;}
  }
  sd("betaCodes",codes);
  sd("betaStatus",true);
  sd("betaCode",cleanCode);
  sd("betaId",cleanCode.toLowerCase());
}
function logBetaActivity(action,data){
  if(!ld("betaStatus",false)) return;
  var log=ld("betaLog",[]);
  log.push({ts:new Date().toISOString(),action:action,data:data,betaId:ld("betaId","unknown")});
  sd("betaLog",log);
}
function logBetaAI(input,output){
  if(!ld("betaStatus",false)) return;
  var aiLog=ld("betaAILog",[]);
  aiLog.push({ts:new Date().toISOString(),input:input,output:output,betaId:ld("betaId","unknown")});
  sd("betaAILog",aiLog);
}

var SYNC_URL="https://lockedapi.cescocugliari.workers.dev/beta-sync";
var SILENT_BETA_IDS=["summerbeta"];

function isSilentBeta(){
  var bid=ld("betaId","");
  return SILENT_BETA_IDS.indexOf(bid.toLowerCase())>=0;
}

function syncBetaData(onDone,onFail){
  var betaId=ld("betaId","");
  if(!betaId){if(onFail)onFail("No beta ID");return;}
  var dataPayload={
    activity:ld("betaLog",[]),
    aiLogs:ld("betaAILog",[]),
    feedback:ld("feedback",[]),
    weightLog:ld("weightLog",[]),
    workouts:ld("history",[]),
    cycles:ld("cycles",[]),
    cycleLog:ld("cycleLog",{}),
    coachInstructions:ld("coachInstructions",""),
    goals:ld("goals",[]),
    bfLog:ld("bfLog",[]),
    coachPlan:ld("coachPlan",null),
  };
  var payload={betaId:betaId,data:dataPayload};
  fetch(SYNC_URL,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(payload)
  })
  .then(function(r){return r.json();})
  .then(function(d){
    if(d.ok){sd("lastSync",new Date().toISOString());if(onDone)onDone();}
    else{if(onFail)onFail(d.error||"Sync failed");}
  })
  .catch(function(e){if(onFail)onFail(e.message||"Network error");});
}

/* Auto-sync at midnight */
(function(){
  if(!ld("betaStatus",false)) return;
  setInterval(function(){
    if(!ld("betaStatus",false)) return;
    var now=new Date();
    if(now.getHours()===0&&now.getMinutes()===0){
      var lastSync=ld("lastSync","");
      var today=now.toISOString().slice(0,10);
      if(!lastSync||lastSync.slice(0,10)!==today){
        syncBetaData();
      }
    }
  },60000);
})();

function resizeImage(file,maxW,cb){
  var reader=new FileReader();
  reader.onload=function(e){
    var img=new Image();
    img.onload=function(){
      var w=img.width;var h=img.height;
      if(w>maxW){h=Math.round(h*(maxW/w));w=maxW;}
      var canvas=document.createElement("canvas");
      canvas.width=w;canvas.height=h;
      var ctx=canvas.getContext("2d");
      ctx.drawImage(img,0,0,w,h);
      cb(canvas.toDataURL("image/jpeg",0.6));
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

/* -- WEIGHT LOG HELPERS -------------------------------------------------- */
function getWeightLog(){return ld("weightLog",[]);}
function addWeightEntry(kg){
  var log=getWeightLog();
  var today=new Date().toISOString().slice(0,10);
  var existing=false;
  for(var i=0;i<log.length;i++){if(log[i].date===today){log[i].kg=kg;existing=true;break;}}
  if(!existing) log.push({date:today,kg:kg});
  log.sort(function(a,b){return a.date<b.date?-1:a.date>b.date?1:0;});
  sd("weightLog",log);
  logBetaActivity("weight_log",{kg:kg,date:today});
  return log;
}
function checkRefeedTrigger(weightLog,fuelProfile){
  if(!fuelProfile||fuelProfile.goal!=="cut") return false;
  if(!weightLog||weightLog.length<3) return false;
  var dismissed=ld("refeedDismissed",null);
  if(dismissed){
    var daysAgo=(Date.now()-new Date(dismissed).getTime())/(1000*60*60*24);
    if(daysAgo<5) return false;
  }
  var accepted=ld("refeedAccepted",null);
  var today=new Date().toISOString().slice(0,10);
  if(accepted===today) return false;
  var sorted=weightLog.slice().sort(function(a,b){return a.date<b.date?-1:1;});
  var recent=sorted.slice(-3);
  if(recent.length<3) return false;
  for(var i=0;i<3;i++){
    var currentKg=recent[i].kg;
    var allBefore=sorted.filter(function(e){return e.date<recent[i].date;});
    if(allBefore.length===0&&i===0) continue;
    if(allBefore.length===0) return false;
    var prevMin=allBefore.reduce(function(m,e){return e.kg<m?e.kg:m;},Infinity);
    if(currentKg>=prevMin) return false;
  }
  return true;
}
function calcRefeedCarbs(fuelProfile){
  var tdee=fuelProfile.tdee||2200;
  var wkg=fuelProfile.weightKg||80;
  var base=50;
  if(tdee>2500) base=75;
  if(tdee>3000) base=100;
  if(wkg>90) base=base+15;
  return Math.round(base);
}

    });

});
/* load custom exercises into ALL_EX immediately at startup */
(function(){
  try{
    var cs=JSON.parse(localStorage.getItem("lk_customEx")||"[]");
    cs.forEach(function(c){
      var found=false;
      for(var i=0;i<ALL_EX.length;i++){if(ALL_EX[i].id===c.id){found=true;break;}}
      if(!found) ALL_EX.push(c);
    });
  }catch(e){}
})();

/* Shared unit-conversion helper — used by GoalsTab, PRHub, and anywhere else needing kg↔lb */
function convToKg(v, useKg){
  if(!v && v !== 0) return v;
  var n = parseFloat(v);
  if(isNaN(n)) return 0;
  return useKg ? n : n / 2.20462;
}

function getEx(id){
  for(var i=0;i<ALL_EX.length;i++){if(ALL_EX[i].id===id) return ALL_EX[i];}
  return {id:id,name:"Unknown",eq:"",group:"",muscle:"",col:OR,gid:"",sid:""};
}

/* -- ADAPTIVE RECOVERY ------------------------------------------------- */
var EX_NAME_INDEX=null;
function exByName(name){
  if(!EX_NAME_INDEX){EX_NAME_INDEX={};for(var i=0;i<ALL_EX.length;i++){EX_NAME_INDEX[ALL_EX[i].name.toLowerCase()]=ALL_EX[i];}}
  return EX_NAME_INDEX[(name||"").toLowerCase()]||null;
}

/* Ordered synergy rules: first match wins. grp restricts a rule to one primary group. */
var MUSCLE_SYNERGY=[
  {re:/deadlift|rdl|romanian|good\s?morning/i,sec:["Glutes","Back","Hamstrings"],ter:["Forearms"]},
  {re:/squat|leg\s?press|lunge|step\s?up|hack/i,sec:["Glutes"],ter:["Hamstrings"]},
  {re:/hip\s?thrust|glute\s?bridge/i,sec:["Hamstrings"],ter:[]},
  {re:/pull\s?up|chin\s?up|pulldown|pull\s?down|row|pullover/i,sec:["Biceps"],ter:["Forearms"]},
  {re:/shrug/i,sec:[],ter:["Forearms"]},
  {re:/press|dip|push\s?up/i,grp:"Chest",sec:["Triceps"],ter:["Shoulders"]},
  {re:/press|overhead|arnold|military|ohp/i,grp:"Shoulders",sec:["Triceps"],ter:[]},
  {re:/fly|pec\s?deck|crossover/i,sec:[],ter:["Shoulders"]},
  {re:/curl/i,grp:"Biceps",sec:[],ter:["Forearms"]},
  {re:/extension|kickback|raise/i,grp:"Glutes",sec:["Hamstrings"],ter:[]}
];

function getInvolvement(name,group){
  if(!group) return [];
  var inv=[{m:group,w:1.0}];
  function add(m,w){if(m!==group&&!inv.some(function(x){return x.m===m;}))inv.push({m:m,w:w});}
  for(var i=0;i<MUSCLE_SYNERGY.length;i++){
    var rule=MUSCLE_SYNERGY[i];
    if(rule.grp&&rule.grp!==group) continue;
    if(!rule.re.test(name||"")) continue;
    rule.sec.forEach(function(m){add(m,0.5);});
    rule.ter.forEach(function(m){add(m,0.25);});
    break;
  }
  return inv;
}

function resolveSavedEx(savedEx){
  if(!savedEx) return null;
  if(savedEx.id!=null){var ex=getEx(savedEx.id);if(ex&&ex.name!=="Unknown") return ex;}
  if(savedEx.name){var m=exByName(savedEx.name);if(m) return m;}
  return null;
}

function workoutNameGroups(name){
  var n=(name||"").toLowerCase();
  if(n.indexOf("push")>-1||n.indexOf("chest")>-1||n.indexOf("bench")>-1) return ["Chest","Shoulders","Triceps"];
  if(n.indexOf("pull")>-1||n.indexOf("back")>-1||n.indexOf("row")>-1||n.indexOf("deadlift")>-1) return ["Back","Biceps"];
  if(n.indexOf("leg")>-1||n.indexOf("squat")>-1||n.indexOf("quad")>-1||n.indexOf("glute")>-1||n.indexOf("hamstring")>-1) return ["Quads","Glutes","Hamstrings"];
  if(n.indexOf("shoulder")>-1||n.indexOf("delt")>-1||n.indexOf("ohp")>-1) return ["Shoulders"];
  if(n.indexOf("arm")>-1||n.indexOf("bicep")>-1||n.indexOf("tricep")>-1||n.indexOf("curl")>-1) return ["Biceps","Triceps"];
  if(n.indexOf("core")>-1||n.indexOf("abs")>-1) return ["Abs"];
  if(n.indexOf("upper")>-1) return ["Chest","Back","Shoulders"];
  if(n.indexOf("lower")>-1) return ["Quads","Glutes","Hamstrings"];
  return null;
}

var BASE_RECOVERY_H={Quads:66,Hamstrings:60,Glutes:60,Back:60,Chest:48,Shoulders:48,"Inner/Outer Thigh":48,Triceps:36,Biceps:36,Calves:30,Abs:24,Forearms:24};

function rirIntensity(rir){
  var n=parseInt(rir,10);
  if(isNaN(n)) n=2;
  if(n<=0) return 1.0;
  if(n===1) return 0.85;
  if(n===2) return 0.7;
  if(n===3) return 0.55;
  return 0.4;
}

function computeMuscleRecovery(history,now){
  now=now||Date.now();
  var byMuscle={};
  var count=0;
  for(var hi=0;hi<(history||[]).length&&count<40;hi++){
    var w=history[hi];
    if(!w||!w.dateISO) continue;
    var anchor=new Date(w.dateISO.slice(0,10)+"T12:00:00").getTime();
    if(isNaN(anchor)) continue;
    var elapsedH=Math.max(0,(now-anchor)/3.6e6);
    if(elapsedH>14*24) continue;
    count++;
    var loads={};
    var resolvedAny=false;
    var exList=Array.isArray(w.exercises)?w.exercises:[];
    for(var ei=0;ei<exList.length;ei++){
      var sx=exList[ei];
      var ex=resolveSavedEx(sx);
      if(!ex||!ex.group) continue;
      resolvedAny=true;
      var inv=getInvolvement(ex.name||sx.name,ex.group);
      var sets=Array.isArray(sx.sets)?sx.sets:[];
      for(var si=0;si<sets.length;si++){
        var s=sets[si];
        if(!s||s.setType==="warmup") continue;
        var it=rirIntensity(s.rir);
        inv.forEach(function(v){loads[v.m]=(loads[v.m]||0)+v.w*it;});
      }
    }
    if(!resolvedAny){
      var gs=workoutNameGroups(w.name);
      if(gs) gs.forEach(function(g){loads[g]=(loads[g]||0)+3.0;});
    }
    var daysAgo=Math.round(elapsedH/24);
    Object.keys(loads).forEach(function(m){
      var base=BASE_RECOVERY_H[m]||48;
      var f=0.5+loads[m]/6; if(f<0.5)f=0.5; if(f>1.5)f=1.5;
      var needed=base*f;
      var remaining=needed-elapsedH;
      if(!byMuscle[m]){byMuscle[m]={muscle:m,remaining:remaining,needed:needed,lastDays:daysAgo};}
      else{
        if(remaining>byMuscle[m].remaining){byMuscle[m].remaining=remaining;byMuscle[m].needed=needed;}
        if(daysAgo<byMuscle[m].lastDays) byMuscle[m].lastDays=daysAgo;
      }
    });
  }
  var rows=Object.keys(byMuscle).map(function(m){
    var r=byMuscle[m];
    var pct=r.remaining/r.needed;
    var status=r.remaining<=0?"ready":(pct>=0.5?"heavy":"recovering");
    return {muscle:m,status:status,lastDays:r.lastDays,remainingH:Math.max(0,Math.ceil(r.remaining))};
  });
  var ord={ready:0,recovering:1,heavy:2};
  rows.sort(function(a,b){
    if(ord[a.status]!==ord[b.status]) return ord[a.status]-ord[b.status];
    if(a.status==="ready") return b.lastDays-a.lastDays;
    return a.remainingH-b.remainingH;
  });
  return rows;
}

function getBar(id){for(var i=0;i<BARS.length;i++)if(BARS[i].id===id)return BARS[i];return BARS[0];}
function calcPlatesPerSide(target,bar,unit,inv){
  var barW=unit==="lb"?bar.lb:bar.kg;
  barW+=(bar.offset||0);
  var perSide=(target-barW)/2;
  if(perSide<=0)return {plates:[],perSide:0,achievable:target===barW,remainder:target-barW};
  var avail=(inv&&inv.length)?inv.slice().sort(function(a,b){return b-a;}):(unit==="lb"?PLATES_LB:PLATES_KG);
  var out=[],rem=perSide;
  for(var i=0;i<avail.length;i++){
    while(rem>=avail[i]-0.001){out.push(avail[i]);rem-=avail[i];}
  }
  return {plates:out,perSide:perSide-rem,achievable:rem<0.01,remainder:rem*2};
}

  {id:"run",     name:"Running",    icon:"run",     met:9.8,  trackDist:true},

  {id:"ellip",   name:"Elliptical", icon:"train",   met:5.0,  trackDist:false},
  {id:"hiit",    name:"HIIT",       icon:"bolt",    met:10.0, trackDist:false},
  {id:"swim",    name:"Swimming",   icon:"heart",   met:8.0,  trackDist:true}
];
function estimateCardioCalories(type,minutes,bodyKg,hist){
  var t=null;for(var i=0;i<CARDIO_TYPES.length;i++)if(CARDIO_TYPES[i].id===type)t=CARDIO_TYPES[i];
  if(!t||!minutes)return 0;
  var kg=bodyKg||75;
  var base=Math.round((t.met*3.5*kg/200)*minutes);
  /* Learn from history: if user logged this cardio type with actual vs est cal, adjust multiplier */
  if(hist&&hist.length>0){
    var matches=[];
    for(var hi=0;hi<hist.length;hi++){
      if(hist[hi].type==="cardio"&&hist[hi].cardioType===type&&hist[hi].duration){
        matches.push(hist[hi]);
      }
    }
    if(matches.length>=3){
      var totalActual=0,totalEst=0;
      for(var m=0;m<Math.min(5,matches.length);m++){
        var cal=matches[m].calories||base;
        totalActual+=cal;
        totalEst+=Math.round((t.met*3.5*kg/200)*matches[m].duration);
      }
      var adj=totalActual/totalEst;
      adj=Math.max(0.8,Math.min(1.3,adj));
      return Math.round(base*adj);
    }
  }
  return base;
}

var YT_KEY="YT_KEY_REVOKED_SEE_WORKER";
var YT_CREATORS=["Jeff Nippard","TNF","Cbum","Jacob Oestreicher"];

function ytSearchVideo(name,exId){
  var cacheKey="yt3_"+name;
  var cached=localStorage.getItem(cacheKey);
  if(cached) return Promise.resolve(cached);

  /* rotate creators deterministically by exercise id */
  var idx=(exId||0)%YT_CREATORS.length;
  var creator=YT_CREATORS[idx];
  var q=encodeURIComponent(name+" "+creator+" form");
  var url="https://www.googleapis.com/youtube/v3/search?part=snippet&q="+q+"&type=video&maxResults=1&videoEmbeddable=true&key="+YT_KEY;

  return fetch(url)
    .then(function(r){return r.json();})
    .then(function(d){
      var item=d.items&&d.items[0];
      var videoId=item&&item.id&&item.id.videoId;
      if(videoId){
        localStorage.setItem(cacheKey,videoId);
        return videoId;
      }
      /* fallback: search without creator filter */
      var q2=encodeURIComponent(name+" proper form tutorial");
      var url2="https://www.googleapis.com/youtube/v3/search?part=snippet&q="+q2+"&type=video&maxResults=1&videoEmbeddable=true&key="+YT_KEY;
      return fetch(url2).then(function(r2){return r2.json();}).then(function(d2){
        var v=d2.items&&d2.items[0]&&d2.items[0].id&&d2.items[0].id.videoId;
        if(v) localStorage.setItem(cacheKey,v);
        return v||null;
      });
    })
    .catch(function(){return null;});
}

                <div style={{width:40,height:40,borderRadius:11,background:ag.col+"18",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"Barlow Condensed,sans-serif",fontSize:11,fontWeight:800,color:ag.col,textAlign:"center",lineHeight:1.2,flexShrink:0}}>{cnt}<br/>ex</div>
                <div style={{flex:1}}><p style={{fontWeight:700,fontSize:15,color:TX}}>{s.name}</p><p style={{fontSize:12,color:MU,marginTop:2}}>{s.ex.slice(0,2).map(function(e){return e.name;}).join(", ")}</p></div>
                <Ic d={D.chev} z={16} c={ag.col}/>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>

/* -- SPLIT BUILDER ---------------------------------------------------- */
function SplitBuilder(p){
  var existing=p.split;
  var [name,setName]=useState(existing?existing.name:"");

  /* Unified items array: [{type:"ex",id:"..."} | {type:"block",title,notes,duration}] */
  function initDays(){
    if(!existing) return [];
    return existing.days.map(function(d){
      var exItems=(d.exIds||[]).map(function(id){return {type:"ex",id:id};});
      var blkItems=(d.blocks||[]).map(function(b){return Object.assign({type:"block"},b);});
      return {name:d.name,items:exItems.concat(blkItems)};
    });
  }
  var [days,setDays]=useState(initDays);
  var [dayName,setDayName]=useState("");
  var [picking,setPicking]=useState(null);
  var [view,setView]=useState("build");
  var [renamingDay,setRenamingDay]=useState(null);
  var [renameVal,setRenameVal]=useState("");

  /* -- Drag reorder -- */
  var [sbDrag,setSbDrag]=useState(null);
  var sbDragRef=useRef(null);
  var sbDragYRef=useRef(0);
  var sbLongRef=useRef(null);
  var sbHandlersRef=useRef(null);
  var sbWaitMoveRef=useRef(null);

  function sbLongStart(di,ii,e){
    if(!e.touches||!e.touches[0]) return;
    var startY=e.touches[0].clientY;
    sbDragYRef.current=startY;

    function waitMove(ev){
      if(!ev.touches||!ev.touches[0]) return;
      sbDragYRef.current=ev.touches[0].clientY;
      if(Math.abs(ev.touches[0].clientY-startY)>10) sbLongCancel();
    }
    sbWaitMoveRef.current=waitMove;
    document.addEventListener("touchmove",waitMove,{passive:true});

    sbLongRef.current=setTimeout(function(){
      document.removeEventListener("touchmove",waitMove);
      sbWaitMoveRef.current=null;

      var drag={di:di,from:ii,target:null};
      sbDragRef.current=drag;

      function handleMove(ev){
        if(!ev.touches||!ev.touches[0]) return;
        ev.preventDefault();
        var cy=ev.touches[0].clientY;
        sbDragYRef.current=cy;
        setSbDrag(function(prev){if(!prev)return prev;return Object.assign({},prev,{y:cy});});
        var els=document.querySelectorAll("[data-sbrow]");
        var best=null;
        var cur=sbDragRef.current;
        for(var ei=0;ei<els.length;ei++){
          var rowDi=parseInt(els[ei].getAttribute("data-sbday"));
          if(rowDi!==cur.di) continue;
          var rowIdx=parseInt(els[ei].getAttribute("data-sbrow"));
          if(rowIdx===cur.from) continue;
          var rect=els[ei].getBoundingClientRect();
          if(cy>=rect.top&&cy<=rect.bottom){best=rowIdx;break;}
        }
        cur.target=best;
        setSbDrag(function(prev){if(!prev)return prev;return Object.assign({},prev,{target:best});});
      }
      function handleEnd(){sbDragEnd();}
      sbHandlersRef.current={move:handleMove,end:handleEnd};
      document.addEventListener("touchmove",handleMove,{passive:false});
      document.addEventListener("touchend",handleEnd,{passive:true});

      setSbDrag(Object.assign({},drag,{y:sbDragYRef.current}));
      if(navigator.vibrate)navigator.vibrate(30);
    },350);
  }
  function sbLongCancel(){
    if(sbLongRef.current){clearTimeout(sbLongRef.current);sbLongRef.current=null;}
    if(sbWaitMoveRef.current){document.removeEventListener("touchmove",sbWaitMoveRef.current);sbWaitMoveRef.current=null;}
  }
  function sbDragEnd(){
    sbLongCancel();
    if(sbHandlersRef.current){
      document.removeEventListener("touchmove",sbHandlersRef.current.move);
      document.removeEventListener("touchend",sbHandlersRef.current.end);
      sbHandlersRef.current=null;
    }
    var d=sbDragRef.current;
    if(d&&d.target!==null&&d.from!==d.target){
      var di2=d.di;var from=d.from;var ti=d.target;
      setDays(function(prev){
        return prev.map(function(day,i){
          if(i!==di2)return day;
          var items=day.items.slice();
          var item=items.splice(from,1)[0];
          var adj=ti>from?ti-1:ti;
          items.splice(adj,0,item);
          return Object.assign({},day,{items:items});
        });
      });
    }
    sbDragRef.current=null;
    sbDragYRef.current=0;
    setSbDrag(null);
  }
  var sbDragging=sbDrag!==null;
  useEffect(function(){
    return function(){
      if(sbHandlersRef.current){
        document.removeEventListener("touchmove",sbHandlersRef.current.move);
        document.removeEventListener("touchend",sbHandlersRef.current.end);
      }
      if(sbWaitMoveRef.current) document.removeEventListener("touchmove",sbWaitMoveRef.current);
    };
  },[]);
  useEffect(function(){
    if(!sbDragging) return;
    var timer=setInterval(function(){
      var y=sbDragYRef.current;
      var zone=100;
      if(y>0&&y<zone) window.scrollBy(0,-Math.round((zone-y)/10+1));
      else if(y>window.innerHeight-zone) window.scrollBy(0,Math.round((y-(window.innerHeight-zone))/10+1));
    },16);
    return function(){clearInterval(timer);};
  },[sbDragging]);

  function addDay(){if(!dayName.trim())return;setDays(function(d){return d.concat([{name:dayName.trim(),items:[]}]);});setDayName("");}
  function removeDay(di){setDays(function(d){return d.filter(function(_,i){return i!==di;});});}
  function removeItem(di,ii){setDays(function(d){return d.map(function(day,i){if(i!==di)return day;return Object.assign({},day,{items:day.items.filter(function(_,j){return j!==ii;})});});});}
  function updateBlock(di,ii,patch){setDays(function(d){return d.map(function(day,i){if(i!==di)return day;var items=day.items.map(function(it,j){return j===ii?Object.assign({},it,patch):it;});return Object.assign({},day,{items:items});});});}
  function pickEx(ex){
    setDays(function(d){return d.map(function(day,i){if(i!==picking)return day;return Object.assign({},day,{items:(day.items||[]).concat([{type:"ex",id:ex.id}])});});});
    setView("build");setPicking(null);
  }
  function save(){
    if(!name.trim()||days.length===0)return;
    var savedDays=days.map(function(d){
      var items=d.items||[];
      return {
        name:d.name,
        exIds:items.filter(function(it){return it.type==="ex";}).map(function(it){return it.id;}),
        blocks:items.filter(function(it){return it.type==="block";}).map(function(it){return {title:it.title||"",notes:it.notes||"",duration:it.duration||""};})
      };
    });
    p.onSave({id:existing?existing.id:"s"+Date.now(),name:name.trim(),days:savedDays,created:new Date().toLocaleDateString()});
  }

  if(view==="pick") return <ExLib onBack={function(){setView("build");setPicking(null);}} onSelect={pickEx} customs={p.customs} onCustom={p.onCustom}/>;

  var dragDi=sbDrag?sbDrag.di:null;
  var dragFrom=sbDrag?sbDrag.from:null;
  var dragTarget=sbDrag?sbDrag.target:null;
  var dragY=sbDrag?sbDrag.y:0;
  var dragItem=dragDi!==null&&dragFrom!==null&&days[dragDi]?days[dragDi].items[dragFrom]:null;

  return (
    <div style={{paddingBottom:100}}>
      {/* Floating drag pill */}
      {sbDragging&&dragItem&&(
        <div style={{position:"fixed",top:0,left:16,right:16,zIndex:1000,background:CARD,borderRadius:12,border:"2px solid "+OR,padding:"10px 14px",display:"flex",alignItems:"center",gap:10,boxShadow:"0 12px 40px rgba(0,0,0,0.7)",pointerEvents:"none",transform:"translateY("+(dragY-24)+"px)",willChange:"transform"}}>
          <div style={{display:"flex",flexDirection:"column",gap:3,flexShrink:0,opacity:0.7}}><div style={{width:13,height:2,background:OR,borderRadius:1}}/><div style={{width:13,height:2,background:OR,borderRadius:1}}/><div style={{width:13,height:2,background:OR,borderRadius:1}}/></div>
          <p style={{fontWeight:700,fontSize:14,color:TX,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",margin:0}}>
            {dragItem.type==="ex"?getEx(dragItem.id).name:("📝 "+(dragItem.title||"Block"))}
          </p>
        </div>
      )}
      <div style={{padding:"52px 20px 20px",background:SURF}}>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:18}}>
          <button onClick={p.onBack} style={{background:"none",border:"none",cursor:"pointer"}}><Ic d={D.back} z={22}/></button>
          <h1 style={{fontFamily:"Barlow Condensed,sans-serif",fontSize:26,fontWeight:800}}>{existing?"Edit Split":"New Split"}</h1>
        </div>
        <input value={name} onChange={function(e){setName(e.target.value);}} placeholder="Split name (e.g. Push Pull Legs)" style={{width:"100%",background:CARD,border:"1px solid "+BORD,borderRadius:12,padding:"13px 15px",color:TX,fontSize:16,fontWeight:600,outline:"none"}}/>
      </div>
      <div style={{padding:"0 20px"}}>
        {days.map(function(day,di){
          var items=day.items||[];
          return (
            <div key={di} style={{background:CARD,borderRadius:14,border:"1px solid "+BORD,marginBottom:13,overflow:"hidden"}}>
              <div style={{padding:"11px 14px",borderBottom:"1px solid "+BORD,display:"flex",alignItems:"center",gap:10}}>

function NumPad(p){
  var [val,setVal]=useState(p.value||"");
  var isWeight=p.label==="Weight";
  function tap(ch){
    setVal(function(v){
      if(ch==="del") return v.slice(0,-1);
      if(ch==="."){if(v.indexOf(".")>=0) return v; if(v==="") return "0."; return v+".";}
      if(v==="0"&&ch!==".") return ch;
      if(v.length>=6) return v;
      return v+ch;
    });
  }
  function increment(n){
    setVal(function(v){
      var num=parseFloat(v)||0;
      var next=Math.round((num+n)*100)/100;
      return String(next);
    });
  }
  var keys=["1","2","3","4","5","6","7","8","9",".","0","del"];
  return (
    <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:420,background:SURF,borderTop:"1px solid "+BORD,zIndex:300,paddingBottom:20}}>

          <p style={{fontSize:13,color:MU}}>{p.unit}</p>
        </div>
      </div>
      {isWeight&&(
        <div style={{display:"flex",gap:6,padding:"0 12px 8px"}}>
          {[-5,-2.5,2.5,5].map(function(n){
            return <button key={n} onClick={function(){increment(n);}} style={{flex:1,padding:"7px 4px",borderRadius:8,border:"1px solid "+OR_H+"40",background:OR_H+"10",color:OR,fontSize:12,fontWeight:700,cursor:"pointer"}}>{n>0?"+":""}{n}</button>;
          })}
        </div>
      )}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,padding:"0 12px"}}>
        {keys.map(function(k){
          return (
            <button key={k} onClick={function(){tap(k);}} style={{padding:"14px",borderRadius:10,border:"1px solid "+BORD,background:k==="del"?RE_H+"15":CARD,color:k==="del"?RE:TX,fontFamily:"Barlow Condensed,sans-serif",fontSize:k==="del"?14:22,fontWeight:700,cursor:"pointer",textAlign:"center"}}>
              {k==="del"?"DEL":k}

        <button onClick={function(){p.onDone(val);}} style={{flex:2,padding:"13px",borderRadius:10,border:"none",background:"linear-gradient(135deg,"+OR_H+",#EA580C)",color:"#fff",fontFamily:"Barlow Condensed,sans-serif",fontSize:16,fontWeight:800,cursor:"pointer"}}>DONE</button>
      </div>
    </div>
  );
}


function WorkoutLog(p){
  var useKg=p.useKg!==false;
  var unit=useKg?"kg":"lb";
  var [showExDetail,setShowExDetail]=useState(null);

  /* -- Previous session lookup (O(1) via memoised index) -- */
  var lastSessionIndex=React.useMemo(function(){
    var idx={};
    var hist=p.history||[];
    /* Iterate newest-first; first hit per exercise name is the most recent */
    for(var hi=0;hi<hist.length;hi++){
      var w=hist[hi];
      if(!w.exercises) continue;
      for(var ei=0;ei<w.exercises.length;ei++){
        var ex=w.exercises[ei];
        if(!idx[ex.name]&&ex.sets&&ex.sets.length>0){
          idx[ex.name]={sets:ex.sets,date:w.date||w.dateISO||""};
        }
      }
    }
    return idx;
  },[p.history]);
  function getLastSession(exName){ return lastSessionIndex[exName]||null; }

  function mkRow(id){
    var ex=getEx(id);
    var last=getLastSession(ex.name);
    var sets;
    if(last&&last.sets&&last.sets.length>0){
      sets=last.sets.map(function(ls){return {w:ls.w||"",r:ls.r||"",rL:ls.rL||"",rR:ls.rR||"",rir:ls.rir||"2",done:false,rec:true,setType:ls.setType||"normal",partials:ls.partials||""};});
    } else {
      sets=[{w:"",r:"",rL:"",rR:"",rir:"2",done:false,setType:"normal",partials:""},{w:"",r:"",rL:"",rR:"",rir:"2",done:false,setType:"normal",partials:""},{w:"",r:"",rL:"",rR:"",rir:"2",done:false,setType:"normal",partials:""}];
    }
    return {type:"exercise",id:ex.id,name:ex.name,muscle:ex.muscle,col:ex.col,unilateral:false,kg:null,sets:sets,lastDate:last?last.date:null,supersetId:null,startResist:ex.startResist||0,smithNoCB:ex.smithNoCB||false};
  }
  function mkBlock(title,notes,duration){
    try{
      return {type:"block",id:"blk_"+Date.now()+"_"+Math.random().toString(36).slice(2,6),title:title||"Note",notes:notes||"",duration:duration||null,expanded:false};
    }catch(e){
      return null;
    }
  }
  function addBlock(title,notes,duration){
    try{
      var block=mkBlock(title,notes,duration);
      if(!block) throw new Error("Failed to create block");
      setRows(function(prev){return prev.concat([block]);});
    }catch(e){
      alert("Error adding block. Please try again.");
    }
  }
  function updateBlock(ri,patch){
    setRows(function(prev){return prev.map(function(row,i){if(i!==ri)return row;return Object.assign({},row,patch);});});
  }
  function addWarmupSets(ri){
    setRows(function(prev){
      return prev.map(function(row,i){
        if(i!==ri||row.type!=="exercise") return row;
        /* Find first working set with a weight to base warm-ups on */
        var workingSet=row.sets.find(function(s){return s.w&&s.setType!=="warmup";});
        var workingW=workingSet?parseFloat(workingSet.w):0;
        var warmups;
        if(workingW>0){
          var w1=Math.round(workingW*0.5/2.5)*2.5;
          var w2=Math.round(workingW*0.7/2.5)*2.5;
          warmups=[{w:String(w1),r:"8",rL:"",rR:"",rir:"4",done:false,setType:"warmup"},{w:String(w2),r:"5",rL:"",rR:"",rir:"3",done:false,setType:"warmup"}];
        } else {
          warmups=[{w:"",r:"8",rL:"",rR:"",rir:"4",done:false,setType:"warmup"},{w:"",r:"5",rL:"",rR:"",rir:"3",done:false,setType:"warmup"}];
        }
        return Object.assign({},row,{sets:warmups.concat(row.sets)});
      });
    });
  }
  function toggleSetType(ri,si){
    setRows(function(prev){
      return prev.map(function(row,i){
        if(i!==ri) return row;
        var ns=row.sets.map(function(s,j){
          if(j!==si) return s;
          var next="normal";
          if(s.setType==="normal"||!s.setType) next="warmup";
          else if(s.setType==="warmup") next="drop";
          else if(s.setType==="drop") next="normal";
          var patch={setType:next};
          /* Auto-suggest drop weight as 75% of previous set */
          if(next==="drop"&&j>0){
            var prevSet=row.sets[j-1];
            if(prevSet.w){
              var dropW=Math.round(parseFloat(prevSet.w)*0.75/2.5)*2.5;
              patch.w=String(dropW);
            }
          }
          return Object.assign({},s,patch);
        });
        return Object.assign({},row,{sets:ns});
      });
    });
  }
  function toggleUnilateral(ri){setRows(function(prev){return prev.map(function(row,i){if(i!==ri)return row;return Object.assign({},row,{unilateral:!row.unilateral});});});}
  function toggleSuperset(ri){
    var curr=rows[ri];
    if(!curr||curr.type!=="exercise")return;
    if(curr.supersetId){
      var sid=curr.supersetId;
      setRows(function(prev){return prev.map(function(r){return r.supersetId===sid?Object.assign({},r,{supersetId:null}):r;});});
    }else{
      var nextEx=rows.slice(ri+1).find(function(r){return r.type==="exercise";});
      if(nextEx){
        var newId="ss"+Date.now();
        setRows(function(prev){var next=prev.map(function(r){return Object.assign({},r);});var c=next[ri];var nx=next.slice(ri+1).find(function(r){return r.type==="exercise";});return next.map(function(r){return(r===c||r===nx)?Object.assign({},r,{supersetId:newId}):r;});});
      }else{
        setSupersetPickRi(ri);
        setView("add");
      }
    }
  }
  var [rows,setRows]=useState(function(){
    var saved=ld("activeWorkoutRows",null);
    if(saved) return saved;
    var exRows=(p.exIds||[]).map(mkRow);
    var blockRows=(p.blocks||[]).map(function(b){return mkBlock(b.title,b.notes,b.duration);}).filter(Boolean);
    return exRows.concat(blockRows);
  });
  var [sec,setSec]=useState(function(){return ld("activeWorkoutSec",0);});
  var [view,setView]=useState("log");
  var [repIdx,setRepIdx]=useState(null);
  var [prMsg,setPrMsg]=useState("");
  var [numpadTarget,setNumpadTarget]=useState(null);
  var [restSec,setRestSec]=useState(0);
  var [restActive,setRestActive]=useState(false);
  var [restTarget,setRestTarget]=useState(function(){var saved=ld("activeWorkoutRestTarget",null);return saved!==null&&saved!==0?saved:90;});
  var [restCustom,setRestCustom]=useState(false);
  var [restCustomMins,setRestCustomMins]=useState("");
  var [restCustomSecs,setRestCustomSecs]=useState("");
  var [restEnabled,setRestEnabled]=useState(function(){return ld("restEnabled",true);});
  var [restSettingsOpen,setRestSettingsOpen]=useState(false);
  var [blockModal,setBlockModal]=useState(null);
  var [blockTitle,setBlockTitle]=useState("");
  var [blockNotes,setBlockNotes]=useState("");
  var [blockDuration,setBlockDuration]=useState("");
  var [completedSetAnim,setCompletedSetAnim]=useState(null);
  var [showPlateCalc,setShowPlateCalc]=useState(false);
  var [showTools,setShowTools]=useState(false);
  var restRef=useRef(null);
  var restStartRef=useRef(null);
  var startTimeRef=useRef(null);
  var secRef=useRef(0); /* always-current sec for inactivity handler without adding sec to effect deps */
  var [lastActivityTime,setLastActivityTime]=useState(Date.now());
  var inactivityLimit=1800000; /* 30 minutes in ms */

  /* Initialize startTimeRef on first render or when sec is loaded */
  useEffect(function(){
    if(startTimeRef.current===null){
      if(sec===0){
        startTimeRef.current=Date.now();
      } else {
        startTimeRef.current=Date.now()-(sec*1000);
      }
    }
  },[]);

  /* Main workout timer with inactivity detection - timestamp-based for background accuracy */
  useEffect(function(){
    var t=setInterval(function(){
      if(startTimeRef.current){
        var elapsed=Math.floor((Date.now()-startTimeRef.current)/1000);
        secRef.current=elapsed;
        setSec(elapsed);
      }
    },500);
    var inactivityCheck=setInterval(function(){
      var elapsed=Date.now()-lastActivityTime;
      if(elapsed>inactivityLimit){
        /* Auto-end workout after 30 min of inactivity */
        clearInterval(t);
        clearInterval(inactivityCheck);
        if(p.onFinish){p.onFinish(rows,secRef.current);}
      }
    },5000);
    return function(){clearInterval(t);clearInterval(inactivityCheck);};
  },[lastActivityTime,rows]); /* sec and p removed — timer uses startTimeRef, inactivity only needs rows+lastActivityTime */

  /* Recalculate elapsed time when app returns from background */
  useEffect(function(){
    function onVisible(){
      if(document.visibilityState==="visible"&&startTimeRef.current){
        var elapsed=Math.floor((Date.now()-startTimeRef.current)/1000);
        setSec(elapsed);
      }
    }
    document.addEventListener("visibilitychange",onVisible);
    return function(){document.removeEventListener("visibilitychange",onVisible);};
  },[]);

  useEffect(function(){
    if(restActive){
      if(restRef.current) clearInterval(restRef.current);
      /* Only seed restStartRef here if not already set by startRest() */
      if(!restStartRef.current) restStartRef.current=Date.now()-(restTarget-restSec)*1000;
      restRef.current=setInterval(function(){
        var elapsed=Math.floor((Date.now()-restStartRef.current)/1000);
        var remaining=restTarget-elapsed;
        if(remaining<=0){
          clearInterval(restRef.current);
          restRef.current=null;
          restStartRef.current=null;
          setRestSec(0);
          setRestActive(false);
        } else {
          setRestSec(remaining);
        }
      },500);
    } else {
      if(restRef.current){clearInterval(restRef.current);restRef.current=null;}
    }
    return function(){if(restRef.current){clearInterval(restRef.current);restRef.current=null;}};
  },[restActive,restTarget]); /* restSec intentionally excluded — adding it recreates the interval every tick */

  function startRest(secs){
    sd("activeWorkoutRestTarget",secs);
    setRestTarget(secs);
    setRestSec(secs);
    restStartRef.current=Date.now();
    setRestActive(false);
    setTimeout(function(){setRestActive(true);},50);
  }

  /* Recalculate rest timer when app returns from background */
  useEffect(function(){
    function onVisible(){
      if(document.visibilityState==="visible"&&restActive&&restStartRef.current){
        var elapsed=Math.floor((Date.now()-restStartRef.current)/1000);
        var remaining=restTarget-elapsed;
        if(remaining<=0){
          setRestSec(0);setRestActive(false);restStartRef.current=null;

function AISplitBuilder(p){
  var [mode,setMode]=useState("pick");
  var [msgs,setMsgs]=useState([]);
  var [input,setInput]=useState("");
  var [aiLoading,setAiLoading]=useState(false);
  var [prog,setProg]=useState(null);
  var [done,setDone]=useState(false);
  var [imgData,setImgData]=useState(null);
  var [photoNote,setPhotoNote]=useState("");
  var [photoLoading,setPhotoLoading]=useState(false);
  var [photoResult,setPhotoResult]=useState(null);
  var histRef=useRef([]);
  var scrollRef=useRef(null);
  var answerCountRef=useRef(0);

  useEffect(function(){
    if(scrollRef.current) scrollRef.current.scrollTop=scrollRef.current.scrollHeight;
  },[msgs]);

  function getConvoSys(){
    var s1="You are LOCKED AI, a strength coach building a custom split for the user.";
    var s2=" Ask one or two questions at a time to collect: goal, days per week, split style (PPL/Upper-Lower/Full Body/Bro/custom), sets per exercise, exercises per session, equipment access, any injuries.";
    var s3=" After collecting all details generate the split. Keep replies short and conversational.";
    return s1+s2+s3;
  }

  function getGenSys(){
    var answers=histRef.current.filter(function(m){return m.role==="user"&&m.content!=="start";}).map(function(m){return m.content;}).join(". ");
    var s1="Build a custom training split based on: "+answers+".";
    var s2=" Output ONLY: ###PROGRAM_START### then JSON then ###PROGRAM_END### then one sentence.";
    var s3=" JSON: {name:string, splits:[{name:string, days:[{name:string, exIds:[numbers]}]}]}.";
    var s4=" IDs: Chest=107,101,108,110,112,117. Back=201,202,206,207,208,213. Shoulders=301,302,306,307,311,312. Triceps=403,406,407,408. Biceps=503,502,506,505,509. Quads=701,702,703,704,705. Hams=801,802,803. Glutes=901,903. Abs=1001,1008. Calves=1101,1102.";
    var s5=" Match days to schedule. Avoid injuries mentioned.";
    return s1+s2+s3+s4+s5;
  }

  function callWorker(sys, messages, onDone, onErr){
    fetch("https://lockedapi.cescocugliari.workers.dev/",{
      method:"POST", headers:{"Content-Type":"application/json"},
      body:JSON.stringify({system:sys, max_tokens:800, messages:messages})
    })
    .then(function(r){return r.json();})
    .then(function(d){
      var txt="";
      if(d.content&&d.content[0]&&d.content[0].text) txt=d.content[0].text;
      else if(d.choices&&d.choices[0]&&d.choices[0].message) txt=d.choices[0].message.content;
      else if(d.error&&d.error.message) txt="API error: "+d.error.message;
      if(txt.trim()) onDone(txt);
      else onErr();
    })
    .catch(function(){onErr();});
  }

  function tryParse(txt){
    var si=txt.indexOf("###PROGRAM_START###");
    var ei=txt.indexOf("###PROGRAM_END###");
    if(si<0||ei<=si) return null;
    try{ return JSON.parse(txt.slice(si+19,ei).trim()); }catch(e){ return null; }
  }

  function startChat(){
    setMode("chat");
    setAiLoading(true);
    callWorker(getConvoSys(),[{role:"user",content:"start"}], function(txt){
      histRef.current=[{role:"user",content:"start"},{role:"assistant",content:txt}];
      setMsgs([{role:"assistant",text:txt}]);
      setAiLoading(false);
    }, function(){
      var fb="What is your main training goal and how many days a week can you train?";
      histRef.current=[{role:"user",content:"start"},{role:"assistant",content:fb}];
      setMsgs([{role:"assistant",text:fb}]);
      setAiLoading(false);
    });
  }

  function send(){
    if(!input.trim()||aiLoading) return;
    var msg=input.trim();
    setInput("");
    setMsgs(function(m){return m.concat([{role:"user",text:msg}]);});
    histRef.current.push({role:"user",content:msg});
    answerCountRef.current=answerCountRef.current+1;
    setAiLoading(true);
    if(answerCountRef.current>=6){
      callWorker(getGenSys(),[{role:"user",content:"Generate my split now."}], function(txt){
        var parsed=tryParse(txt);
        if(parsed){
          var display=txt.slice(txt.indexOf("###PROGRAM_END###")+17).trim();
          setProg(parsed);
          setMsgs(function(m){return m.concat([{role:"assistant",text:display||"Your split is ready!",prog:parsed}]);});
          setDone(true);
        }else{
          setMsgs(function(m){return m.concat([{role:"assistant",text:"Could not build split. Please try again."}]);});
        }
        setAiLoading(false);
      }, function(){

        setAiLoading(false);
      });
      return;

      histRef.current.push({role:"assistant",content:txt});

function AdaptiveTrainingCard(p){
  var history=p.history||[];
  var rows=computeMuscleRecovery(history,Date.now());
  if(rows.length===0) return null;

  var AMB="#F59E0B";
  var ready=rows.filter(function(r){return r.status==="ready";});
  var recovering=rows.filter(function(r){return r.status==="recovering";});
  var heavy=rows.filter(function(r){return r.status==="heavy";});

  var soonest=rows.filter(function(r){return r.status!=="ready";}).sort(function(a,b){return a.remainingH-b.remainingH;})[0];
  var suggestion;
  if(ready.length>0){
    suggestion="Train "+ready.slice(0,2).map(function(r){return r.muscle;}).join(" or ")+" today — fully recovered.";
    if(soonest) suggestion+=" "+soonest.muscle+" needs ~"+soonest.remainingH+"h more.";
  }else if(soonest&&soonest.remainingH<=12){
    suggestion=soonest.muscle+" is ready in ~"+soonest.remainingH+"h — light technique work until then.";
  }else{
    suggestion="Everything is still recovering — rest or easy cardio today.";
  }

  function Pill(g,i,hex,showHours){
    return <div key={g.muscle} style={{background:hex+"12",borderRadius:999,padding:"5px 12px",border:"1px solid "+hex+"30",display:"flex",alignItems:"center",gap:5,animation:"pillIn .45s cubic-bezier(0.34,1.3,0.64,1) both",animationDelay:(i*0.05)+"s"}}>
      <p style={{fontSize:12,fontWeight:700,color:hex,margin:0}}>{g.muscle}</p>
      <p style={{fontSize:10,color:MU,margin:0}}>{g.lastDays===0?"today":g.lastDays+"d"}{showHours&&g.remainingH>0?" · ~"+g.remainingH+"h":""}</p>
    </div>;
  }

  function Section(label,hex,list,showHours,mb){
    if(list.length===0) return null;
    return <div style={{marginBottom:mb?10:0}}>
      <p style={{fontSize:10,color:hex,fontWeight:700,letterSpacing:"0.06em",marginBottom:7}}>{label}</p>
      <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
        {list.map(function(g,i){return Pill(g,i,hex,showHours);})}
      </div>
    </div>;
  }

  return (
    <div style={{marginTop:16,background:CARD,borderRadius:16,padding:"15px 16px",border:"1px solid "+BORD,animation:"cardRise .5s cubic-bezier(0.22,1,0.36,1) both"}}>
      <div style={{display:"flex",alignItems:"center",gap:9,marginBottom:12}}>
        <div style={{width:32,height:32,borderRadius:9,background:"#EF4444"+"20",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
          <Ic d="M13 2L3 14h9l-1 10 10-12h-9l1-10z" z={14} c="#EF4444"/>
        </div>
        <p style={{fontSize:12,fontWeight:700,color:"#EF4444",margin:0,letterSpacing:"0.06em"}}>ADAPTIVE TRAINING</p>
      </div>
      {Section("READY TO TRAIN",GR_H,ready,false,recovering.length>0||heavy.length>0)}
      {Section("RECOVERING",AMB,recovering,true,heavy.length>0)}
      {Section("HEAVY RECOVERY",RE_H,heavy,true,false)}
      <p style={{fontSize:11,color:MU,lineHeight:1.4,margin:0,marginTop:10,paddingTop:10,borderTop:"1px solid "+BORD}}>
        {suggestion}
      </p>
    </div>
  );
}

                <p style={{fontFamily:"Barlow Condensed,sans-serif",fontSize:21,fontWeight:800,marginBottom:8,color:TX}}>No splits yet</p>
                <p style={{color:MU,fontSize:14,marginBottom:22,lineHeight:1.5}}>Create your first split to organize your training days and exercises.</p>
                <div style={{display:"flex",flexDirection:"column",gap:10,width:"100%",maxWidth:300,margin:"0 auto"}}>
                  <button onClick={function(){setView("create");}} style={{padding:"13px 26px",borderRadius:12,border:"none",background:"linear-gradient(135deg,"+OR_H+",#EA580C)",color:"#fff",fontFamily:"Barlow Condensed,sans-serif",fontSize:17,fontWeight:800,cursor:"pointer"}}>Build Manually</button>
                  <button onClick={function(){setView("aibuilder");}} style={{padding:"13px 26px",borderRadius:12,border:"1.5px solid "+OR,background:"transparent",color:OR,fontFamily:"Barlow Condensed,sans-serif",fontSize:17,fontWeight:800,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
                    <Ic d={D.ai} z={17} c={OR}/> AI Split Builder

            ):(
              <>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
                  <p style={{fontFamily:"Barlow Condensed,sans-serif",fontSize:14,fontWeight:700,color:MU,letterSpacing:"0.06em"}}>MY SPLITS ({p.splits.length})</p>
                  <div style={{display:"flex",gap:6}}>
                    <button onClick={function(){setView("aibuilder");}} style={{display:"flex",alignItems:"center",gap:4,padding:"6px 11px",borderRadius:8,border:"1px solid "+OR_H+"40",background:OR_H+"10",color:OR,fontSize:12,fontWeight:600,cursor:"pointer"}}>
                      <Ic d={D.ai} z={12} c={OR}/> AI Builder
                    </button>
                    <button onClick={function(){setView("create");}} style={{display:"flex",alignItems:"center",gap:4,padding:"6px 11px",borderRadius:8,border:"1px solid "+OR_H+"40",background:OR_H+"10",color:OR,fontSize:13,fontWeight:600,cursor:"pointer"}}>
                      <Ic d={D.plus} z={13} c={OR}/> New

                {p.splits.map(function(split){

                  return (

                      <div style={{padding:"14px 15px",display:"flex",alignItems:"center",gap:12}}>
                        <div style={{width:42,height:42,borderRadius:11,background:OR_H+"18",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><Ic d={D.train} z={19} c={OR}/></div>
                        <div style={{flex:1}}>
                          <p style={{fontWeight:700,fontSize:15,color:TX}}>{split.name}</p>

                      </div>
                      <div style={{borderTop:"1px solid "+BORD,display:"flex"}}>
                        <button onClick={function(){setDayModal(split);}} style={{flex:2,padding:"11px",background:"none",border:"none",borderRight:"1px solid "+BORD,cursor:"pointer",color:OR,fontSize:13,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",gap:5}}>
