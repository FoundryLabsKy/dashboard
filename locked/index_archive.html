function WaterCard(p){
  var [useOz,setUseOz]=useState(false);
  var waterMl=p.waterMl||0;
  var goal=3000;
  var display=useOz?Math.round(waterMl/29.574):waterMl;
  var goalDisplay=useOz?Math.round(goal/29.574):goal;
  var unit=useOz?"fl oz":"ml";
  var addAmts=useOz?[8,16]:[250,500];

  function add(amt){
    var ml=useOz?Math.round(amt*29.574):amt;
    p.addWater(ml);
  }
  function minus(){
    p.setDay(function(d){
      var ml=useOz?Math.round(8*29.574):250;
      return Object.assign({},d,{water:Math.max(0,(d.water||0)-ml)});
    });
  }

  var pct=Math.min(waterMl/goal,1);

  return (
    <div style={{background:CARD,borderRadius:14,padding:"12px 15px",border:"1px solid "+"#3B82F6"+"30",display:"flex",alignItems:"center",gap:12,marginTop:10}}>
      <div style={{flex:1}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3}}>
          <p style={{fontSize:11,color:MU}}>Water</p>
          <button onClick={function(){setUseOz(function(x){return !x;});}} style={{padding:"1px 7px",borderRadius:6,border:"1px solid "+"#3B82F6"+"40",background:"#3B82F6"+"10",color:"#3B82F6",fontSize:10,fontWeight:700,cursor:"pointer"}}>{useOz?"fl oz":"ml"}</button>
        </div>
        <div style={{display:"flex",alignItems:"baseline",gap:4,marginBottom:4}}>
          <p style={{fontFamily:"Barlow Condensed,sans-serif",fontSize:22,fontWeight:800,color:"#3B82F6"}}>{display}</p>
          <p style={{fontSize:12,color:MU}}>/ {goalDisplay} {unit}</p>
        </div>
        <div style={{height:5,background:SU,borderRadius:3,overflow:"hidden"}}>
          <div style={{height:"100%",width:pct*100+"%",background:"#3B82F6",borderRadius:3,transition:"width .3s"}}/>
        </div>
      </div>
      <div style={{display:"flex",gap:6}}>
        {addAmts.map(function(amt){return <button key={amt} onClick={function(){add(amt);}} style={{padding:"8px 10px",borderRadius:9,border:"1px solid "+"#3B82F6"+"50",background:"#3B82F6"+"12",color:"#3B82F6",fontSize:13,fontWeight:700,cursor:"pointer"}}>+{amt}</button>;})}
        {waterMl>0&&<button onClick={minus} style={{padding:"8px 10px",borderRadius:9,border:"1px solid "+BORD,background:"transparent",color:MU,fontSize:13,cursor:"pointer"}}>-</button>}
      </div>
    </div>
  );
}

function SmartNutritionCard(p){
  var [suggestion,setSuggestion]=useState(null);
  var [loading,setLoading]=useState(false);
  var [added,setAdded]=useState(false);
  var [dismissed,setDismissed]=useState(false);

  if(dismissed) return null;
  var calLeft=p.targets.cal-p.totalCal;
  var proLeft=p.targets.pro-p.totalPro;

  function suggest(){
    setLoading(true);setSuggestion(null);setAdded(false);
    var ctx="My remaining macros today: "+Math.round(calLeft)+" calories, "+Math.round(proLeft)+"g protein, "+Math.round(p.targets.carb-p.totalCarb)+"g carbs, "+Math.round(p.targets.fat-p.totalFat)+"g fat. Suggest ONE specific realistic meal or food that fits. Reply ONLY with JSON: {\"name\":\"...\",\"cal\":0,\"pro\":0,\"carb\":0,\"fat\":0,\"reason\":\"one sentence why this fits\"}";
    fetch("https://lockedapi.cescocugliari.workers.dev/",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        system:"You are a nutrition coach. Reply ONLY with a single valid JSON object for a meal suggestion. No markdown, no explanation outside the JSON.",
        messages:[{role:"user",content:ctx}],
        max_tokens:150
      })
    }).then(function(r){return r.json();}).then(function(d){
      var text=(d.content&&d.content[0]&&d.content[0].text)||"";
      text=text.trim().replace(/```json/g,"").replace(/```/g,"").trim();
      try{var meal=JSON.parse(text);if(meal.name)setSuggestion(meal);}
      catch(e){var match=text.match(/\{[\s\S]*?\}/);if(match){try{var m2=JSON.parse(match[0]);if(m2.name)setSuggestion(m2);}catch(e2){}}}
      setLoading(false);
    }).catch(function(){setLoading(false);});
  }

  function addMeal(){
    if(!suggestion||added) return;
    p.addItem("snacks",{name:suggestion.name,cal:Math.round(suggestion.cal)||0,pro:Math.round(suggestion.pro)||0,carb:Math.round(suggestion.carb)||0,fat:Math.round(suggestion.fat)||0});
    setAdded(true);
  }

  return (
    <div style={{marginTop:14,background:"#10B981"+"0A",borderRadius:16,border:"1px solid #10B981"+"30",overflow:"hidden"}}>
      <div style={{padding:"14px 15px"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:suggestion?12:0}}>
          <div style={{width:34,height:34,borderRadius:10,background:"#10B981"+"20",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
            <Ic d="M12 2a7 7 0 017 7c0 5-7 13-7 13S5 14 5 9a7 7 0 017-7z" z={14} c="#10B981"/>
          </div>
          <div style={{flex:1}}>
            <p style={{fontSize:12,fontWeight:700,color:"#10B981",margin:0}}>SMART NUTRITION</p>
            <p style={{fontSize:11,color:MU,margin:0}}>{calLeft>0?Math.round(calLeft)+" cal remaining today":"Target reached — great work"}</p>
          </div>
          <div style={{display:"flex",gap:6}}>
            <button onClick={suggest} disabled={loading} style={{padding:"7px 14px",borderRadius:999,border:"none",background:loading?"#10B981"+"50":"#10B981",color:"#fff",fontSize:12,fontWeight:700,cursor:loading?"default":"pointer"}}>
              {loading?"...":(suggestion?"New":"Suggest")}
            </button>
            <button onClick={function(){setDismissed(true);}} style={{width:28,height:28,borderRadius:8,border:"1px solid "+BORD,background:"transparent",color:MU,fontSize:15,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",lineHeight:1}}>×</button>
          </div>
        </div>
        {suggestion&&(
          <div style={{background:CARD,borderRadius:12,padding:"13px 14px",border:"1px solid "+BORD}}>
            <p style={{fontWeight:700,fontSize:14,color:TX,margin:0,marginBottom:6}}>{suggestion.name}</p>
            <div style={{display:"flex",gap:7,marginBottom:8}}>
              {[["#10B981",Math.round(suggestion.cal||0),"cal"],["#F97316",Math.round(suggestion.pro||0)+"g","protein"],["#3B82F6",Math.round(suggestion.carb||0)+"g","carbs"],["#F59E0B",Math.round(suggestion.fat||0)+"g","fat"]].map(function(m,i){
                return <div key={i} style={{flex:1,textAlign:"center",background:m[0]+"12",borderRadius:9,padding:"8px 5px",border:"1px solid "+m[0]+"20"}}>
                  <p style={{fontSize:13,fontWeight:700,color:m[0],margin:0}}>{m[1]}</p>
                  <p style={{fontSize:10,color:MU,margin:0,marginTop:1}}>{m[2]}</p>
                </div>;
              })}
            </div>
            {suggestion.reason&&<p style={{fontSize:11,color:MU,lineHeight:1.4,margin:0,marginBottom:10}}>{suggestion.reason}</p>}
            <button onClick={addMeal} disabled={added} style={{width:"100%",padding:"10px",borderRadius:11,border:"none",background:added?"#10B981"+"20":"#10B981",color:added?"#10B981":"#fff",fontSize:13,fontWeight:700,cursor:added?"default":"pointer"}}>
              {added?"✓ Added to log":"Add to today's log"}
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

function FuelTab(p){
  var [tab,setTab]=useState("list");
  var [view,setView]=useState("main"); // "main" | "profile"
  var todayISO=new Date().toISOString().slice(0,10);
  var [fuelLog,setFuelLogRaw]=useState(function(){return ld("fuelLog",{});});
  var [fuelProfile,setFuelProfileRaw]=useState(function(){return ld("fuelProfile",null);});
  var [weightLog,setWeightLog]=useState(function(){return getWeightLog();});
  var [showRefeed,setShowRefeed]=useState(false);
  var [refeedActive,setRefeedActive]=useState(function(){return ld("refeedAccepted",null)===new Date().toISOString().slice(0,10);});

  function setFuelLog(fn){setFuelLogRaw(function(prev){var n=typeof fn==="function"?fn(prev):fn;sd("fuelLog",n);return n;});}
  function setFuelProfile(prof){setFuelProfileRaw(prof);sd("fuelProfile",prof);}

  function getDay(){return fuelLog[todayISO]||{meals:{breakfast:[],lunch:[],dinner:[],snacks:[]},water:0};}
  function setDay(fn){
    setFuelLog(function(prev){
      var cur=prev[todayISO]||{meals:{breakfast:[],lunch:[],dinner:[],snacks:[]},water:0};
      var updated=fn(cur);
      var next=Object.assign({},prev);
      next[todayISO]=updated;
      return next;
    });
  }

  var day=getDay();
  var allItems=[];
  var mealKeys=["breakfast","lunch","dinner","snacks"];
  mealKeys.forEach(function(mk){(day.meals[mk]||[]).forEach(function(item){allItems.push(item);});});
  var totalCal=allItems.reduce(function(a,i){return a+(i.cal||0);},0);
  var totalPro=allItems.reduce(function(a,i){return a+(i.pro||0);},0);
  var totalCarb=allItems.reduce(function(a,i){return a+(i.carb||0);},0);
  var totalFat=allItems.reduce(function(a,i){return a+(i.fat||0);},0);
  var waterMl=day.water||0;

  var baseTargets=fuelProfile?{cal:fuelProfile.tdee||2200,pro:fuelProfile.macroProtein||160,carb:fuelProfile.macroCarbs||220,fat:fuelProfile.macroFat||60}:{cal:2200,pro:160,carb:220,fat:60};
  var refeedTriggered=checkRefeedTrigger(weightLog,fuelProfile);
  var refeedCarbs=fuelProfile?calcRefeedCarbs(fuelProfile):75;
  var targets=refeedActive?Object.assign({},baseTargets,{carb:baseTargets.carb+refeedCarbs,cal:baseTargets.cal+(refeedCarbs*4)}):baseTargets;

  useEffect(function(){if(refeedTriggered&&!refeedActive){setShowRefeed(true);}},[]);
  /* Re-read fuelLog when voice command logs a meal */
  useEffect(function(){
    function onVoice(){setFuelLogRaw(ld("fuelLog",{}));}
    window.addEventListener("lockedFuelUpdate",onVoice);
    return function(){window.removeEventListener("lockedFuelUpdate",onVoice);};
  },[]);

  function handleWeightLog(kg){
    var newLog=addWeightEntry(kg);
    setWeightLog(newLog);
    if(checkRefeedTrigger(newLog,fuelProfile)&&!refeedActive){setShowRefeed(true);}
  }
  function acceptRefeed(){
    sd("refeedAccepted",todayISO);
    setRefeedActive(true);setShowRefeed(false);
    logBetaActivity("refeed_accepted",{extraCarbs:refeedCarbs});
  }
  function dismissRefeed(){
    sd("refeedDismissed",new Date().toISOString());
    setShowRefeed(false);
    logBetaActivity("refeed_dismissed",{});
  }

  function addWater(ml){setDay(function(d){return Object.assign({},d,{water:(d.water||0)+ml});});}
  function addItem(meal,item){
    setDay(function(d){
      var meals=Object.assign({},d.meals);
      meals[meal]=(meals[meal]||[]).concat([item]);
      return Object.assign({},d,{meals:meals});
    });
  }
  function removeItem(meal,idx){
    setDay(function(d){
      var meals=Object.assign({},d.meals);
      meals[meal]=(meals[meal]||[]).filter(function(_,i){return i!==idx;});
      return Object.assign({},d,{meals:meals});
    });
  }

  if(view==="profile") return <FuelProfileSetup fuelProfile={fuelProfile} onBack={function(){setView("main");}} onSave={function(prof){setFuelProfile(prof);setView("main");}}/>;

  return (
    <div style={{paddingBottom:80}}>
      <div style={{padding:"52px 20px 16px",background:"linear-gradient(180deg,"+OR_H+"18 0%,transparent 100%)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>
          <h1 style={{fontFamily:"Barlow Condensed,sans-serif",fontSize:32,fontWeight:800,letterSpacing:"0.04em",color:TX}}>FUEL</h1>
          <button onClick={function(){setView("profile");}} style={{display:"flex",alignItems:"center",gap:6,padding:"7px 13px",borderRadius:9,border:"1px solid "+BORD,background:"transparent",color:MU,fontSize:12,cursor:"pointer"}}>
            <Ic d={D.edit} z={13} c={MU}/> My Profile
          </button>
        </div>
        <div style={{background:CARD,borderRadius:16,padding:"16px",border:"1px solid "+BORD,display:"flex",alignItems:"center",gap:16}}>
          <div style={{position:"relative",flexShrink:0}}>
            <MacroRing pct={totalCal/targets.cal} color={OR} size={90} stroke={9}/>
            <div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",textAlign:"center"}}>
              <p style={{fontFamily:"Barlow Condensed,sans-serif",fontSize:16,fontWeight:900,color:TX,lineHeight:1}}>{totalCal}<span style={{fontSize:12,fontWeight:400,color:MU}}>/{targets.cal}</span></p>
              <p style={{fontSize:10,color:MU}}>kcal</p>
            </div>
          </div>
          <div style={{flex:1,display:"flex",flexDirection:"column",gap:8}}>
            {[{label:"Protein",val:totalPro,target:targets.pro,col:"#3B82F6"},{label:"Carbs",val:totalCarb,target:targets.carb,col:"#F59E0B"},{label:"Fat",val:totalFat,target:targets.fat,col:"#EC4899"}].map(function(m){
              return (
                <div key={m.label}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                    <span style={{fontSize:11,color:MU}}>{m.label}</span>
                    <span style={{fontSize:11,fontWeight:700,color:TX}}>{m.val}<span style={{color:MU,fontWeight:400}}>/{m.target}g</span></span>
                  </div>
                  <div style={{height:5,background:SU,borderRadius:3,overflow:"hidden"}}>
                    <div style={{height:"100%",width:Math.min(m.val/m.target,1)*100+"%",background:m.col,borderRadius:3,transition:"width .3s"}}/>
                  </div>
                  {m.val<m.target&&<p style={{fontSize:9,color:MU,textAlign:"right",marginTop:2}}>{Math.round(m.target-m.val)}g left</p>}
                </div>
              );
            })}
          </div>
        </div>
        <WaterCard waterMl={waterMl} addWater={addWater} setDay={setDay}/>
        <WeightLogCard weightLog={weightLog} useKg={p.useKg} onLog={handleWeightLog}/>
        {showRefeed&&!refeedActive&&<div style={{marginTop:10}}><RefeedCard extraCarbs={refeedCarbs} onAccept={acceptRefeed} onDismiss={dismissRefeed}/></div>}
        {refeedActive&&(
          <div style={{background:"#F59E0B"+"15",borderRadius:11,padding:"10px 14px",border:"1px solid #F59E0B30",marginTop:10,display:"flex",alignItems:"center",gap:10}}>
            <Ic d={D.bolt} z={16} c="#F59E0B"/>
            <p style={{fontSize:12,color:"#F59E0B",fontWeight:600}}>Refeed day active — carbs boosted by +{refeedCarbs}g today</p>
          </div>
        )}
        {/* Outer Log / Meals toggle */}
        {(function(){
          var outerMeals=tab==="plan"||tab==="recipes";
          var logTabs=[["list","List"],["search","Search"],["photo","Photo"],["supps","Supps"]];
          if(ld("perfTracking",false))logTabs.push(["cycle","Cycle"]);
          return (
            <div style={{marginTop:12}}>
              <div style={{display:"flex",gap:4,background:SURF,borderRadius:13,padding:4,marginBottom:8}}>
                <button onClick={function(){if(tab==="plan"||tab==="recipes")setTab("list");}} style={{flex:1,padding:"10px",borderRadius:10,border:"none",background:!outerMeals?"linear-gradient(135deg,"+OR_H+",#EA580C)":"transparent",color:!outerMeals?"#fff":MU,fontSize:14,fontWeight:700,cursor:"pointer",transition:"all 0.18s ease"}}>Log</button>
                <button onClick={function(){if(tab!=="plan"&&tab!=="recipes")setTab("plan");}} style={{flex:1,padding:"10px",borderRadius:10,border:"none",background:outerMeals?"linear-gradient(135deg,"+OR_H+",#EA580C)":"transparent",color:outerMeals?"#fff":MU,fontSize:14,fontWeight:700,cursor:"pointer",transition:"all 0.18s ease"}}>Meals</button>
              </div>
              {!outerMeals&&(
                <div style={{display:"flex",gap:6,overflowX:"auto"}}>
                  {logTabs.map(function(t){var act=tab===t[0];return <button key={t[0]} onClick={function(){setTab(t[0]);}} style={{padding:"6px 14px",borderRadius:20,border:"1px solid "+(act?OR:BORD),background:act?OR_H+"18":"transparent",color:act?OR:MU,fontSize:12,fontWeight:600,cursor:"pointer",whiteSpace:"nowrap",flexShrink:0}}>{t[1]}</button>;})}
                </div>
              )}
              {outerMeals&&(
                <div style={{display:"flex",gap:6}}>
                  {[["plan","Meal Plans"],["recipes","Recipes"]].map(function(t){var act=tab===t[0];return <button key={t[0]} onClick={function(){setTab(t[0]);}} style={{flex:1,padding:"8px",borderRadius:20,border:"1px solid "+(act?OR:BORD),background:act?OR_H+"18":"transparent",color:act?OR:MU,fontSize:13,fontWeight:700,cursor:"pointer"}}>{t[1]}</button>;})}
                </div>
              )}
            </div>
          );
        })()}
      </div>
      <div style={{padding:"12px 20px"}}>
        {tab==="plan"&&<MealPlanFuelTab fuelProfile={fuelProfile} addItem={addItem}/>}
        {tab==="list"&&<ListTab day={day} addItem={addItem} removeItem={removeItem}/>}
        {tab==="search"&&<SearchTab day={day} addItem={addItem} removeItem={removeItem}/>}
        {tab==="photo"&&<PhotoTab addItem={addItem}/>}
        {tab==="recipes"&&<RecipesTab fuelProfile={fuelProfile} addItem={addItem} history={p.history}/>}
        {tab==="supps"&&<SupplementsTab/>}
        {tab==="cycle"&&<CycleTab/>}
        {tab==="list"&&<SmartNutritionCard totalCal={totalCal} totalPro={totalPro} totalCarb={totalCarb} totalFat={totalFat} targets={targets} addItem={addItem}/>}
      </div>
    </div>
  );
}
function MealPlanFuelTab(p){
  var [plans,setPlansRaw]=useState(function(){return getMealPlans();});
  var [generating,setGenerating]=useState(false);
  var [daysCount,setDaysCount]=useState("7");
  var [mealsPerDay,setMealsPerDay]=useState("3");
  var [dietPref,setDietPref]=useState("");
  var [budgetPref,setBudgetPref]=useState("");
  var [showForm,setShowForm]=useState(false);
  var [expandedDay,setExpandedDay]=useState(null);
  var [genError,setGenError]=useState("");
  var [swapModal,setSwapModal]=useState(null);
  var [altLoading,setAltLoading]=useState(false);
  var [alternatives,setAlternatives]=useState([]);
  var myStores=getMyStores().filter(function(s){return s.enabled;});
  var profile=ld("profile",{});
  var fuelProfile=p.fuelProfile;

  function setPlans(pp){setPlansRaw(pp);saveMealPlans(pp);}

  function generateAlternatives(dayIdx,mealIdx){
    var currentMeal=plans[0].days[dayIdx].meals[mealIdx];
    var mealType=currentMeal.name.toLowerCase();
    setAltLoading(true);
    var prompt="Generate 4 alternative "+mealType+" options with similar calories ("+currentMeal.totalCal+" kcal) and macros ("+currentMeal.totalProtein+"g protein, "+currentMeal.totalCarb+"g carbs, "+currentMeal.totalFat+"g fat). Return ONLY a JSON array of 4 meal objects with: title, totalCal, totalProtein, totalCarb, totalFat. No markdown, no text.";
    fetch("https://lockedapi.cescocugliari.workers.dev/",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        messages:[{role:"user",content:prompt}],
        max_tokens:500
      })
    }).then(function(r){return r.json();}).then(function(d){
      var text=(d.content&&d.content[0]&&d.content[0].text)||"";
      try{
        var match=text.match(/\[[\s\S]*\]/);
        var alts=JSON.parse(match[0]);
        setAlternatives(alts.slice(0,4));
      }catch(e){
        setAlternatives([{title:"Grilled chicken with sweet potato",totalCal:currentMeal.totalCal,totalProtein:35,totalCarb:45,totalFat:5},{title:"Salmon with broccoli and rice",totalCal:currentMeal.totalCal,totalProtein:32,totalCarb:48,totalFat:8},{title:"Turkey meatballs with pasta",totalCal:currentMeal.totalCal,totalProtein:30,totalCarb:52,totalFat:6},{title:"Tofu stir-fry with vegetables",totalCal:currentMeal.totalCal,totalProtein:20,totalCarb:50,totalFat:7}]);
      }
      setAltLoading(false);
    }).catch(function(){
      setAlternatives([{title:"Grilled chicken with vegetables",totalCal:currentMeal.totalCal,totalProtein:35,totalCarb:40,totalFat:5}]);
      setAltLoading(false);
    });
  }

  function selectAlternative(alt){
    var newPlans=JSON.parse(JSON.stringify(plans));
    var currentMeal=newPlans[0].days[swapModal.dayIdx].meals[swapModal.mealIdx];
    newPlans[0].days[swapModal.dayIdx].meals[swapModal.mealIdx]=Object.assign({},currentMeal,{title:alt.title,totalCal:alt.totalCal,totalProtein:alt.totalProtein,totalCarb:alt.totalCarb,totalFat:alt.totalFat});
    setPlans(newPlans);
    setSwapModal(null);
    setAlternatives([]);
  }

  var activePlan=plans.length>0?plans[0]:null;

  /* Figure out which day of the week we're on */
  var dayNames=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  var todayName=dayNames[new Date().getDay()];
  var todayPlanDay=activePlan?(activePlan.days||[]).find(function(d){return d.day&&d.day.toLowerCase()===todayName.toLowerCase();}):null;
  if(!todayPlanDay&&activePlan&&activePlan.days&&activePlan.days.length>0){
    var dayIdx=new Date().getDay();
    todayPlanDay=activePlan.days[dayIdx%activePlan.days.length];
  }

  function buildMealContext(){
    /* Read actual fuelProfile targets (set in Fuel tab) */
    var fp=ld("fuelProfile",null);
    var tdee=fp&&fp.tdee?fp.tdee:calcTDEE(profile);
    var pro=fp&&fp.macroProtein?fp.macroProtein:(profile.macroProtein||160);
    var carb=fp&&fp.macroCarbs?fp.macroCarbs:(profile.macroCarbs||220);
    var fat=fp&&fp.macroFat?fp.macroFat:(profile.macroFat||60);
    var goal=fp&&fp.goal?fp.goal:(profile.goal||"maintain");
    var ctx="STRICT CALORIE TARGET: "+tdee+" kcal per day. ";
    ctx+="The TOTAL calories across ALL meals + snacks for each day MUST add up to approximately "+tdee+" kcal. ";
    ctx+="Macros per day: "+pro+"g protein, "+carb+"g carbs, "+fat+"g fat. ";
    ctx+="Goal: "+goal+". ";
    if(profile.weightKg) ctx+="Weight: "+profile.weightKg+"kg. ";
    var storeNames=myStores.map(function(s){return s.name+(s.description?" ("+s.description+")":"");}).join(", ");
    if(storeNames) ctx+="Shops at: "+storeNames+". ";
    var budgetData=getBudgetData();
    if(budgetData.weeklyTarget>0) ctx+="Weekly grocery budget: $"+budgetData.weeklyTarget+". ";
    if(budgetPref) ctx+="Budget preference: "+budgetPref+". ";
    if(dietPref) ctx+="Diet preferences/restrictions: "+dietPref+". ";
    return ctx;
  }

  function generatePlan(){
    setGenerating(true);setGenError("");
    var ctx=buildMealContext();
    var days=parseInt(daysCount)||3;
    var meals=parseInt(mealsPerDay)||3;
    var fp=ld("fuelProfile",null);
    var dailyCal=fp&&fp.tdee?fp.tdee:calcTDEE(profile);
    var dayNamesList=[];
    for(var di=0;di<days;di++){var dd=new Date();dd.setDate(dd.getDate()+di);dayNamesList.push(dayNames[dd.getDay()]);}
    fetch("https://lockedapi.cescocugliari.workers.dev/",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        system:"You are a meal planner. "+ctx+" CRITICAL: Each day MUST total approximately "+dailyCal+" kcal. Every day must have "+meals+" main meals PLUS 1-2 snacks. Meal structure per day: Breakfast, Lunch, Dinner"+(meals>3?", Meal "+(meals):"")+" and Snack (or Snack 1 + Snack 2). Distribute calories: ~30% breakfast, ~30% lunch, ~30% dinner, ~10% snacks. Return ONLY valid JSON. Be concise — short titles, 2-4 ingredients per meal. Format: {\"name\":\"Plan Name\",\"days\":[{\"day\":\"DayName\",\"meals\":[{\"name\":\"Breakfast\",\"title\":\"Title\",\"ingredients\":[{\"item\":\"food\",\"amount\":\"qty\"}],\"totalCal\":N,\"totalProtein\":N,\"totalCarb\":N,\"totalFat\":N},{\"name\":\"Snack\",\"title\":\"Snack Title\",\"ingredients\":[{\"item\":\"food\",\"amount\":\"qty\"}],\"totalCal\":N,\"totalProtein\":N,\"totalCarb\":N,\"totalFat\":N}]}],\"shoppingList\":[{\"item\":\"specific product name as sold at store\",\"amount\":\"qty\",\"category\":\"meat\"}]}. IMPORTANT: In the shoppingList, use the exact product name as it would appear in the user's store (e.g. 'Quaker Old Fashioned Oats' not just 'oats', 'Chobani Greek Yogurt' not just 'yogurt'). Days: "+dayNamesList.join(",")+". Keep response under 3500 tokens.",
        messages:[{role:"user",content:"Create a "+days+"-day meal plan totaling "+dailyCal+" kcal per day. ACCURACY RULES: 1) Use REAL calorie counts — oatmeal 1 cup = 300 kcal, banana = 105 kcal, chicken breast 150g = 250 kcal, eggs 2 = 140 kcal, rice 1 cup cooked = 200 kcal, etc. NEVER inflate numbers. 2) To hit "+dailyCal+" kcal, use LARGER PORTIONS or MORE FOOD — do not fake calorie numbers. 3) Each day: "+meals+" main meals + 1-2 snacks. 4) Distribute roughly: breakfast 25%, lunch 30%, dinner 35%, snacks 10%. "+(dietPref?" Preferences: "+dietPref+". ":"")+(budgetPref?" Budget: "+budgetPref+". ":"")+"Return ONLY valid JSON."}],
        max_tokens:4096
      })
    }).then(function(r){return r.json();}).then(function(d){
      setGenerating(false);
      var text=(d.content&&d.content[0]&&d.content[0].text)||"";
      if(!text){setGenError("No response from AI. Try again.");return;}
      try{
        /* Try to find valid JSON even if truncated */
        var match=text.match(/\{[\s\S]*\}/);
        if(!match){setGenError("AI didn't return valid JSON. Try fewer days.");return;}
        var raw=match[0];
        /* Fix common truncation: missing closing brackets */
        var opens=raw.split("[").length-1;
        var closes=raw.split("]").length-1;
        while(closes<opens){raw+="]";closes++;}
        var braceOpens=raw.split("{").length-1;
        var braceCloses=raw.split("}").length-1;
        while(braceCloses<braceOpens){raw+="}";braceCloses++;}
        var plan=JSON.parse(raw);
        /* Rebuild shoppingList from ALL meal ingredients — guarantees completeness */
        var allIng={};
        (plan.days||[]).forEach(function(day){
          (day.meals||[]).forEach(function(meal){
            (meal.ingredients||[]).forEach(function(ing){
              var n=(ing.item||ing.name||"").trim();
              if(!n) return;
              var k=n.toLowerCase().replace(/\s+/g,"");
              if(!allIng[k]) allIng[k]={item:n,amount:ing.amount||"",category:categorizeItem(n)};
            });
          });
        });
        var builtList=[];Object.keys(allIng).forEach(function(k){builtList.push(allIng[k]);});
        if(builtList.length>0) plan.shoppingList=builtList;
        plan.id="mp_"+Date.now();
        plan.created=new Date().toISOString();
        plan.daysCount=days;
        plan.mealsPerDay=meals;
        if(!plan.days||plan.days.length===0){setGenError("Plan was empty. Try again.");return;}
        var updated=[plan].concat(plans);
        setPlans(updated);
        setShowForm(false);setGenError("");
      }catch(e){
        // Meal plan parse error
        setGenError("Failed to parse plan. Try 3 days instead of 7.");
      }
    }).catch(function(e){setGenerating(false);setGenError("Network error: "+e.message);});
  }

  /* Log a meal from the plan into today's fuel log */
  function logMeal(meal){
    if(!p.addItem) return;
    var mealSlot=meal.name.toLowerCase();
    if(mealSlot.indexOf("breakfast")>=0) mealSlot="breakfast";
    else if(mealSlot.indexOf("lunch")>=0) mealSlot="lunch";
    else if(mealSlot.indexOf("dinner")>=0||mealSlot.indexOf("supper")>=0) mealSlot="dinner";
    else mealSlot="snacks";
    p.addItem(mealSlot,{name:meal.title,cal:meal.totalCal||0,pro:meal.totalProtein||0,carb:meal.totalCarb||0,fat:meal.totalFat||0,fromPlan:true});
  }

  /* Add shopping list */
  function addToShopping(plan){
    if(!plan.shoppingList||plan.shoppingList.length===0){alert("No shopping list in this plan.");return;}
    var list=getShoppingList();
    var added=0;
    var ts=Date.now();
    plan.shoppingList.forEach(function(item,idx){
      var name=(item.item||item.name||"").trim();
      if(!name) return;
      /* loose match — ignore case and small differences */
      var exists=list.find(function(x){return x.itemName.toLowerCase().indexOf(name.toLowerCase().slice(0,6))>=0;});
      if(!exists){
        list.push({id:"sh_"+(ts+idx)+"_"+Math.random().toString(36).slice(2,9),itemName:name,quantity:1,unit:item.amount||"qty",category:item.category||categorizeItem(name),dateAdded:new Date().toISOString(),checked:false,fromMealPlan:true});
        added++;
      }
    });
    saveShoppingList(list);
    alert(added+" items added to shopping list!"+(added<plan.shoppingList.length?" ("+(plan.shoppingList.length-added)+" already on list)":""));
  }

  function deletePlan(id){
    var updated=plans.filter(function(pp){return pp.id!==id;});
    setPlans(updated);
  }
  function toggleStar(id){
    var updated=plans.map(function(pp){return pp.id===id?Object.assign({},pp,{starred:!pp.starred}):pp;});
    /* Keep active (index 0) first, then sort starred above unstarred within rest */
    if(updated.length>1){
      var active=updated[0];
      var rest=updated.slice(1).sort(function(a,b){return (b.starred?1:0)-(a.starred?1:0);});
      updated=[active].concat(rest);
    }
    setPlans(updated);
  }

  var dayColors=["#F97316","#3B82F6","#22C55E","#8B5CF6","#EF4444","#06B6D4","#F59E0B"];

  return (
    <div>
      {/* Today's meals from active plan */}
      {todayPlanDay&&(
        <div style={{background:CARD,borderRadius:14,padding:"14px",border:"1px solid "+BORD,marginBottom:12}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <div>
              <p style={{fontSize:11,fontWeight:700,color:OR,letterSpacing:"0.06em",margin:0}}>TODAY'S PLAN</p>
              <p style={{fontSize:10,color:MU,margin:"2px 0 0"}}>{todayPlanDay.day}</p>
            </div>
            <span style={{fontSize:11,color:MU}}>{activePlan.name}</span>
          </div>
          {(todayPlanDay.meals||[]).map(function(meal,mi){
            return (
              <div key={mi} style={{background:SU,borderRadius:10,padding:"10px 12px",marginBottom:6}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div style={{flex:1}}>
                    <span style={{fontSize:10,color:OR,fontWeight:700,textTransform:"uppercase"}}>{meal.name}</span>
                    <p style={{fontSize:13,fontWeight:600,color:TX,margin:"2px 0 0"}}>{meal.title}</p>
                    <div style={{display:"flex",gap:8,marginTop:4}}>
                      <span style={{fontSize:10,color:MU}}>{meal.totalCal||"?"} cal</span>
                      {meal.totalProtein&&<span style={{fontSize:10,color:"#3B82F6"}}>{meal.totalProtein}g P</span>}
                      {meal.totalCarb&&<span style={{fontSize:10,color:"#F59E0B"}}>{meal.totalCarb}g C</span>}
                      {meal.totalFat&&<span style={{fontSize:10,color:"#EC4899"}}>{meal.totalFat}g F</span>}
                    </div>
                  </div>
                  <button onClick={function(){logMeal(meal);}} style={{padding:"8px 12px",borderRadius:8,background:"linear-gradient(135deg,"+OR_H+",#EA580C)",color:"#fff",border:"none",fontSize:11,fontWeight:700,cursor:"pointer",flexShrink:0}}>Log</button>
                </div>
                <div style={{marginTop:6,borderTop:"1px solid "+BORD,paddingTop:6}}>
                  {(meal.ingredients||[]).map(function(ing,ii){
                    return <span key={ii} style={{fontSize:10,color:MU}}>{ing.amount+" "+ing.item}{ii<meal.ingredients.length-1?", ":""}</span>;
                  })}
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* Full week view */}
      {activePlan&&(
        <div style={{background:CARD,borderRadius:14,padding:"14px",border:"1px solid "+BORD,marginBottom:12}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <p style={{fontSize:11,fontWeight:700,color:MU,letterSpacing:"0.06em",margin:0}}>FULL WEEK</p>
            <button onClick={function(){addToShopping(activePlan);}} style={{fontSize:10,color:OR,background:"none",border:"none",fontWeight:700,cursor:"pointer"}}>+ Shopping List ({(activePlan.shoppingList||[]).length})</button>
          </div>
          {(activePlan.days||[]).map(function(day,di){
            var col=dayColors[di%dayColors.length];
            var isToday=day.day&&day.day.toLowerCase()===todayName.toLowerCase();
            var expanded=expandedDay===di;
            return (
              <div key={di}>
                <button onClick={function(){setExpandedDay(expanded?null:di);}} style={{width:"100%",display:"flex",alignItems:"center",gap:8,padding:"8px 0",border:"none",background:"transparent",cursor:"pointer",borderBottom:"1px solid "+SU}}>
                  <div style={{width:24,height:24,borderRadius:6,background:isToday?OR:col+"20",display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{fontSize:10,fontWeight:800,color:isToday?"#fff":col}}>{di+1}</span></div>
                  <span style={{fontSize:13,fontWeight:isToday?700:500,color:isToday?OR:TX,flex:1,textAlign:"left"}}>{day.day||"Day "+(di+1)}</span>
                  <span style={{fontSize:11,color:MU}}>{(day.meals||[]).reduce(function(s,m){return s+(m.totalCal||0);},0)} cal</span>
                  <span style={{fontSize:14,color:MU,marginLeft:4}}>{expanded?"\u25B2":"\u25BC"}</span>
                </button>
                {expanded&&(
                  <div style={{padding:"8px 0 8px 32px"}}>
                    {(day.meals||[]).map(function(meal,mi){
                      return (
                        <div key={mi} style={{marginBottom:8}}>
                          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
                            <div style={{flex:1}}>
                              <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:2}}>
                                <span style={{fontSize:10,color:col,fontWeight:700}}>{meal.name}</span>
                                <button onClick={function(){setSwapModal({dayIdx:di,mealIdx:mi});generateAlternatives(di,mi);}} title="Find alternatives" style={{fontSize:9,padding:"2px 6px",borderRadius:4,background:OR_H+"15",color:OR,border:"none",fontWeight:700,cursor:"pointer"}}>⇄ Swap</button>
                              </div>
                              <p style={{fontSize:12,fontWeight:600,color:TX,margin:"2px 0"}}>{meal.title}</p>
                              <div style={{marginTop:4}}>{(meal.ingredients||[]).map(function(ing,ii){return <span key={ii} style={{fontSize:10,color:MU}}>{ing.amount+" "+ing.item}{ii<meal.ingredients.length-1?", ":""}</span>;})}</div>
                            </div>
                            <div style={{textAlign:"right",whiteSpace:"nowrap"}}>
                              <span style={{fontSize:11,color:OR,fontWeight:700}}>{meal.totalCal} cal</span>
                              <div style={{display:"flex",gap:6,justifyContent:"flex-end",marginTop:2}}>
                                {meal.totalProtein&&<span style={{fontSize:9,color:"#3B82F6",fontWeight:700}}>{meal.totalProtein}P</span>}
                                {meal.totalCarb&&<span style={{fontSize:9,color:"#F59E0B",fontWeight:700}}>{meal.totalCarb}C</span>}
                                {meal.totalFat&&<span style={{fontSize:9,color:"#EC4899",fontWeight:700}}>{meal.totalFat}F</span>}
                              </div>
                            </div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}

      {/* Generate / manage plans */}
      <div style={{background:CARD,borderRadius:14,padding:"14px",border:"1px solid "+BORD,marginBottom:12}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:showForm?12:0}}>
          <p style={{fontSize:11,fontWeight:700,color:MU,letterSpacing:"0.06em",margin:0}}>{activePlan?"MANAGE PLANS":"GET STARTED"}</p>
          <button onClick={function(){setShowForm(!showForm);}} style={{fontSize:11,color:OR,background:"none",border:"none",fontWeight:700,cursor:"pointer"}}>{showForm?"Cancel":"+ New Plan"}</button>
        </div>
        {showForm&&(
          <div>
            <div style={{display:"flex",gap:8,marginBottom:8}}>
              <div style={{flex:1}}>
                <p style={{fontSize:10,color:MU,margin:"0 0 4px",fontWeight:700}}>DAYS</p>
                <select value={daysCount} onChange={function(e){setDaysCount(e.target.value);}} style={{width:"100%",background:SU,border:"1px solid "+BORD,borderRadius:10,padding:"10px",color:TX,fontSize:14,outline:"none"}}>
                  <option value="3">3 days</option><option value="5">5 days</option><option value="7">7 days</option>
                </select>
              </div>
              <div style={{flex:1}}>
                <p style={{fontSize:10,color:MU,margin:"0 0 4px",fontWeight:700}}>MEALS/DAY</p>
                <select value={mealsPerDay} onChange={function(e){setMealsPerDay(e.target.value);}} style={{width:"100%",background:SU,border:"1px solid "+BORD,borderRadius:10,padding:"10px",color:TX,fontSize:14,outline:"none"}}>
                  <option value="2">2 meals</option><option value="3">3 meals</option><option value="4">4 meals</option><option value="5">5 meals</option>
                </select>
              </div>
            </div>
            <input placeholder="Diet preferences (high protein, keto, halal, no dairy...)" value={dietPref} onChange={function(e){setDietPref(e.target.value);}} style={{width:"100%",background:SU,border:"1px solid "+BORD,borderRadius:10,padding:"10px 12px",color:TX,fontSize:13,outline:"none",marginBottom:8}}/>
            <input placeholder="Budget (cheap, moderate, no limit)" value={budgetPref} onChange={function(e){setBudgetPref(e.target.value);}} style={{width:"100%",background:SU,border:"1px solid "+BORD,borderRadius:10,padding:"10px 12px",color:TX,fontSize:13,outline:"none",marginBottom:10}}/>
            <button onClick={generatePlan} disabled={generating} style={{width:"100%",padding:"14px",borderRadius:10,background:generating?"#666":"linear-gradient(135deg,"+OR_H+",#EA580C)",color:"#fff",border:"none",fontSize:14,fontWeight:700,cursor:"pointer"}}>
              {generating?"Generating...":"Generate Meal Plan"}
            </button>
            {generating&&<div style={{textAlign:"center",marginTop:8}}><span style={{fontSize:16,letterSpacing:4,animation:"pulse 1.2s infinite",color:OR}}>...</span></div>}
            {genError&&<p style={{fontSize:12,color:RE,marginTop:8,textAlign:"center",fontWeight:600}}>{genError}</p>}
            <p style={{fontSize:10,color:MU,marginTop:8,textAlign:"center"}}>
              {myStores.length>0?"Using "+myStores.map(function(s){return s.name;}).join(", "):"Add stores for store-specific ingredients"}
            </p>
          </div>
        )}
        {!showForm&&!activePlan&&(
          <p style={{fontSize:13,color:MU,textAlign:"center",padding:"16px 0"}}>No meal plan yet. Tap "+ New Plan" to generate one tailored to your macros and stores.</p>
        )}
      </div>

      {/* Saved plans list */}
      {plans.length>1&&(
        <div style={{background:CARD,borderRadius:14,padding:"14px",border:"1px solid "+BORD}}>
          <p style={{fontSize:11,fontWeight:700,color:MU,letterSpacing:"0.06em",margin:"0 0 8px"}}>SAVED PLANS</p>
          {plans.map(function(plan,pi){
            var isActive=pi===0;
            return (
              <div key={plan.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:pi<plans.length-1?"1px solid "+SU:"none"}}>
                <div onClick={function(){if(!isActive){var reordered=[plan].concat(plans.filter(function(pp){return pp.id!==plan.id;}));setPlans(reordered);}}} style={{cursor:"pointer",flex:1}}>
                  <span style={{fontSize:13,fontWeight:isActive?700:500,color:isActive?OR:TX}}>{plan.name||"Meal Plan"}</span>
                  <span style={{fontSize:10,color:MU,display:"block"}}>{plan.daysCount+"d, "+plan.mealsPerDay+" meals | "+new Date(plan.created).toLocaleDateString()}</span>

function SearchTab(p){
  var [q,setQ]=useState("");
  var [results,setResults]=useState([]);
  var [loading,setLoading]=useState(false);
  var [selected,setSelected]=useState(null);
  var searchCtrlRef=useRef(null); /* AbortController for in-flight food searches */
  var [grams,setGrams]=useState("100");
  var [meal,setMeal]=useState("lunch");
  var [savedToStore,setSavedToStore]=useState(false);
  var [view,setView]=useState("search"); /* search | mystore */
  var [storeItems,setStoreItemsRaw]=useState(function(){return ld("myGroceries",[]);});
  var [usdaKey,setUsdaKeyState]=useState(function(){return ld("usdaKey","DEMO_KEY");});
  var [showKeySetup,setShowKeySetup]=useState(false);
  var [keyInput,setKeyInput]=useState("");

  function setStoreItems(v){setStoreItemsRaw(v);sd("myGroceries",v);}

  function saveUsdaKey(){
    var k=keyInput.trim()||"DEMO_KEY";
    sd("usdaKey",k);setUsdaKeyState(k);setShowKeySetup(false);
  }

  function searchUSDA(query,onDone,onFail,signal){
    var key=usdaKey||"DEMO_KEY";
    var url="https://api.nal.usda.gov/fdc/v1/foods/search?query="+encodeURIComponent(query)+"&api_key="+key+"&dataType=Foundation,SR%20Legacy&pageSize=12&sortBy=score&sortOrder=desc";
    fetch(url,{signal:signal||undefined})
    .then(function(r){return r.json();})
    .then(function(d){
      var items=(d.foods||[]).map(function(f){
        var nuts={};
        (f.foodNutrients||[]).forEach(function(n){
          if(n.nutrientId===1008) nuts["energy-kcal_100g"]=Math.round(n.value||0);
          if(n.nutrientId===1003) nuts["proteins_100g"]=parseFloat((n.value||0).toFixed(1));
          if(n.nutrientId===1005) nuts["carbohydrates_100g"]=parseFloat((n.value||0).toFixed(1));
          if(n.nutrientId===1004) nuts["fat_100g"]=parseFloat((n.value||0).toFixed(1));
        });
        if(!nuts["energy-kcal_100g"]) return null;
        var name=f.description.replace(/\b\w/g,function(c){return c.toUpperCase();});
        return {product_name:name,brands:f.dataType||"USDA",nutriments:nuts,_usda:true};
      }).filter(Boolean);
      onDone(items);
    })
    .catch(function(e){if(e&&e.name==="AbortError")return;onFail(e);});
  }

  function search(){
    if(q.trim().length<2)return;
    /* Cancel any previous in-flight search */
    if(searchCtrlRef.current) searchCtrlRef.current.abort();
    searchCtrlRef.current=new AbortController();
    var sig=searchCtrlRef.current.signal;
    setLoading(true);setResults([]);setSelected(null);
    var q2=q.toLowerCase();

    /* 1. MY STORE (saved groceries) */
    var storeHits=storeItems.filter(function(f){return f.name.toLowerCase().indexOf(q2)>=0;}).map(function(f){return {product_name:f.name,brands:"MY STORE",nutriments:{"energy-kcal_100g":f.cal,"proteins_100g":f.pro,"carbohydrates_100g":f.carb,"fat_100g":f.fat},_store:true};});

    /* 2. Local FOODS database — instant */
    var local=FOODS.filter(function(f){return f.n.toLowerCase().indexOf(q2)>=0;}).map(function(f){return {product_name:f.n,brands:"Database",nutriments:{"energy-kcal_100g":f.cal,"proteins_100g":f.pro,"carbohydrates_100g":f.carb,"fat_100g":f.fat},_local:true};});

    var combined=[...storeHits,...local];
    if(combined.length>0){setResults(combined);setLoading(false);}

    /* 3. USDA FoodData Central (primary — free, lab-accurate) */
    searchUSDA(q,function(usdaItems){
      if(sig.aborted) return;
      /* Also fire OpenFoodFacts for branded products in parallel */
      fetch("https://world.openfoodfacts.org/cgi/search.pl?search_terms="+encodeURIComponent(q)+"&search_simple=1&action=process&json=1&page_size=8",{signal:sig})
        .then(function(r){return r.json();})
        .then(function(d){
          var off=(d.products||[]).filter(function(pr){return pr.nutriments&&pr.nutriments["energy-kcal_100g"];}).map(function(pr){return Object.assign({},pr,{_off:true});});
          setResults(function(){
            var merged=[...storeHits,...usdaItems];
            local.forEach(function(item){var dup=merged.some(function(x){return x.product_name.toLowerCase()===item.product_name.toLowerCase();});if(!dup)merged.push(item);});
            off.forEach(function(item){var dup=merged.some(function(x){return x.product_name.toLowerCase()===(item.product_name||"").toLowerCase();});if(!dup)merged.push(item);});
            return merged.slice(0,30);
          });
          setLoading(false);
        })
        .catch(function(e){
          if(e&&e.name==="AbortError") return;
          setResults(function(){
            var merged=[...storeHits,...usdaItems];
            local.forEach(function(item){var dup=merged.some(function(x){return x.product_name.toLowerCase()===item.product_name.toLowerCase();});if(!dup)merged.push(item);});
            return merged.slice(0,25);
          });
          setLoading(false);
        });
    },function(e){
      if(e&&e.name==="AbortError") return;
      /* USDA failed — fall back to OpenFoodFacts only */
      fetch("https://world.openfoodfacts.org/cgi/search.pl?search_terms="+encodeURIComponent(q)+"&search_simple=1&action=process&json=1&page_size=12",{signal:sig})
        .then(function(r){return r.json();})
        .then(function(d){
          var off=(d.products||[]).filter(function(pr){return pr.nutriments&&pr.nutriments["energy-kcal_100g"];});
          setResults(function(){
            var merged=[...storeHits,...local];
            off.forEach(function(item){var dup=merged.some(function(x){return x.product_name.toLowerCase()===(item.product_name||"").toLowerCase();});if(!dup)merged.push(item);});
            return merged.slice(0,25);
          });
          setLoading(false);
        })
        .catch(function(e){if(e&&e.name==="AbortError") return;setLoading(false);});
    },sig);
  }

  function saveToMyStore(item){

/* -- SHOPPING TAB -------------------------------------------------- */
function getShoppingList(){return ld("shoppingList",[]);}
function saveShoppingList(list){sd("shoppingList",list);}
function addShoppingItem(itemName,quantity,unit){
  var list=getShoppingList();
  var category=categorizeItem(itemName);
  var id="sh_"+Date.now()+"_"+Math.random().toString(36).slice(2,9);
  list.push({id:id,itemName:itemName,quantity:quantity||1,unit:unit||"qty",category:category,dateAdded:new Date().toISOString(),checked:false});
  saveShoppingList(list);
  return list;
}
function removeShoppingItem(id){
  var list=getShoppingList();
  saveShoppingList(list.filter(function(x){return x.id!==id;}));
}
function toggleShoppingItem(id){
  var list=getShoppingList();
  var item=list.find(function(x){return x.id===id;});
  if(item) item.checked=!item.checked;
  saveShoppingList(list);
}
function categorizeItem(itemName){
  var n=itemName.toLowerCase();
  if(n.indexOf("meat")>=0||n.indexOf("chicken")>=0||n.indexOf("beef")>=0||n.indexOf("pork")>=0||n.indexOf("lamb")>=0||n.indexOf("fish")>=0||n.indexOf("salmon")>=0||n.indexOf("tuna")>=0||n.indexOf("steak")>=0) return "meat";
  if(n.indexOf("milk")>=0||n.indexOf("yogurt")>=0||n.indexOf("cheese")>=0||n.indexOf("butter")>=0||n.indexOf("cream")>=0) return "dairy";
  if(n.indexOf("vegetable")>=0||n.indexOf("broccoli")>=0||n.indexOf("spinach")>=0||n.indexOf("lettuce")>=0||n.indexOf("tomato")>=0||n.indexOf("carrot")>=0||n.indexOf("cucumber")>=0) return "produce";
  if(n.indexOf("fruit")>=0||n.indexOf("apple")>=0||n.indexOf("banana")>=0||n.indexOf("orange")>=0||n.indexOf("berry")>=0) return "produce";
  if(n.indexOf("rice")>=0||n.indexOf("pasta")>=0||n.indexOf("bread")>=0||n.indexOf("cereal")>=0||n.indexOf("oat")>=0||n.indexOf("flour")>=0) return "pantry";
  if(n.indexOf("snack")>=0||n.indexOf("chip")>=0||n.indexOf("candy")>=0||n.indexOf("cookie")>=0) return "snacks";
  if(n.indexOf("spice")>=0||n.indexOf("salt")>=0||n.indexOf("pepper")>=0||n.indexOf("sauce")>=0||n.indexOf("oil")>=0) return "pantry";
  return "other";
}
function exportShoppingList(){
  var list=getShoppingList();
  var text="SHOPPING LIST\n"+new Date().toLocaleDateString()+"\n\n";
  var byCategory={};
  list.forEach(function(item){
    if(!byCategory[item.category]) byCategory[item.category]=[];
    byCategory[item.category].push(item);
  });
  Object.keys(byCategory).sort().forEach(function(cat){
    text+="◆ "+cat.toUpperCase()+"\n";
    byCategory[cat].forEach(function(item){
      text+="  "+( item.checked?"☑":"☐")+" "+item.quantity+" "+item.unit+" "+item.itemName+"\n";
    });
    text+="\n";
  });
  return text;
}

function ShoppingTab(p){
  var [list,setList]=useState(function(){return getShoppingList();});
  var [search,setSearch]=useState("");
  var [quantity,setQuantity]=useState("1");
  var [unit,setUnit]=useState("qty");
  var [suggestions,setSuggestions]=useState([]);
  var [storeLoading,setStoreLoading]=useState(false);
  var [mergeDialog,setMergeDialog]=useState(null);
  var storeSearchTimer=useRef(null);

  function handleSearchChange(val){
    setSearch(val);
    if(val.trim().length<2){setSuggestions([]);setStoreLoading(false);if(storeSearchTimer.current)clearTimeout(storeSearchTimer.current);return;}
    var query=val.toLowerCase();
    var startsWith=FOODS.filter(function(f){return f.n.toLowerCase().indexOf(query)===0;});
    var contains=FOODS.filter(function(f){return f.n.toLowerCase().indexOf(query)>0;});
    setSuggestions(startsWith.concat(contains).slice(0,3));
    // Debounced store product search
    if(storeSearchTimer.current) clearTimeout(storeSearchTimer.current);
    var activeStores=myStores.slice(0,3);
    if(activeStores.length===0) return;
    setStoreLoading(true);
    storeSearchTimer.current=setTimeout(function(){
      var pending=activeStores.length;
      activeStores.forEach(function(store){
        fetch("https://lockedapi.cescocugliari.workers.dev/store-search",{
          method:"POST",
          headers:{"Content-Type":"application/json"},
          body:JSON.stringify({storeDomain:store.url.replace(/https?:\/\//,"").replace(/\/.*$/,""),query:val.trim(),storeDescription:store.description||""})
        }).then(function(r){return r.json();}).then(function(d){
          if(d.products&&d.products.length>0){
            setSuggestions(function(prev){
              var genericItems=prev.filter(function(s){return !s.store;});
              var otherStoreItems=prev.filter(function(s){return s.store&&s.store!==store.name;});
              var storeItems=d.products.map(function(p){
                var name=typeof p==="string"?p:p.name;
                var price=typeof p==="string"?null:p.price;
                return {n:name,store:store.name,color:store.color,storePrice:price};
              });
              return storeItems.concat(otherStoreItems).concat(genericItems.slice(0,2));
            });
          }
          pending--;if(pending<=0)setStoreLoading(false);
        }).catch(function(){pending--;if(pending<=0)setStoreLoading(false);});
      });
    },500);
  }

  function selectSuggestion(food){
    setSearch(food.n);
    setSuggestions([]);
    if(storeSearchTimer.current) clearTimeout(storeSearchTimer.current);
  }

  function normaliseName(raw){
    // Title-case the entry so items look consistent
    return raw.trim().replace(/\b\w/g,function(c){return c.toUpperCase();});
  }

  function findDuplicateItem(itemName){
    var name=itemName.toLowerCase().trim();
    return list.find(function(item){return item.itemName.toLowerCase().trim()===name;});

    if(!search.trim()) return;
    var name=normaliseName(search);

      setMergeDialog({itemName:existing.itemName,existingQty:existing.quantity,existingUnit:existing.unit,newQty:quantity||1,newUnit:unit});

      addShoppingItem(name,quantity||1,unit);
      setList(getShoppingList());
      setSearch("");setQuantity("1");setUnit("qty");setSuggestions([]);
    }
  }

  function handleMerge(action){
    if(action==="merge"&&mergeDialog.existingUnit===mergeDialog.newUnit){
      var newQty=parseFloat(mergeDialog.existingQty)+parseFloat(mergeDialog.newQty);
      var currentList=getShoppingList();
      var idx=currentList.findIndex(function(x){return x.itemName.toLowerCase()===mergeDialog.itemName.toLowerCase();});
      if(idx>=0) currentList[idx].quantity=newQty;

      addShoppingItem(normaliseName(search),quantity||1,unit);
      setList(getShoppingList());

    setSearch("");setQuantity("1");setUnit("qty");setSuggestions([]);

function getPantry(){return ld("pantryItems",[]);}
function savePantry(items){sd("pantryItems",items);}
function addToPantry(items,store){
  var pantry=getPantry();
  var now=new Date().toISOString();
  (items||[]).forEach(function(item){
    var n=(item.name||"").trim();
    if(!n) return;
    pantry.push({id:"p_"+Date.now()+"_"+Math.random().toString(36).slice(2,6),name:n,quantity:item.qty||1,unit:"",store:store||"",category:categorizeItem(n),dateAdded:now,lowStock:false});
  });
  savePantry(pantry);
}

        <p style={{fontSize:11,fontWeight:700,color:MU,letterSpacing:"0.06em",margin:"0 0 8px"}}>ADD ITEM</p>

          <button onClick={addManual} style={{padding:"9px 14px",borderRadius:9,background:"linear-gradient(135deg,"+OR_H+",#EA580C)",color:"#fff",border:"none",fontSize:13,fontWeight:700,cursor:"pointer"}}>Add</button>
        </div>
      </div>
      {pantry.length===0?(
        <div style={{textAlign:"center",padding:"32px 20px"}}>
          <p style={{fontSize:22,marginBottom:8}}>🗄️</p>
          <p style={{fontSize:14,fontWeight:700,color:TX,marginBottom:4}}>Pantry is empty</p>
          <p style={{fontSize:12,color:MU,lineHeight:1.5}}>Scan a receipt in the Budget tab to auto-populate your pantry, or add items manually above.</p>
        </div>
      ):(
        catKeys.map(function(cat){
          return (
            <div key={cat} style={{marginBottom:10}}>
              <p style={{fontSize:10,fontWeight:700,color:MU,letterSpacing:"0.06em",marginBottom:6,textTransform:"uppercase"}}>{cat}</p>
              {cats[cat].map(function(item){
                return (
                  <div key={item.id} style={{background:CARD,borderRadius:10,padding:"10px 12px",marginBottom:6,border:"1px solid "+(item.empty?"#EF444430":BORD),display:"flex",alignItems:"center",gap:10,opacity:item.empty?0.5:1}}>
                    {/* Out-of-stock circle checkbox */}
                    <button onClick={function(){toggleEmpty(item.id);}} title={item.empty?"Mark as restocked":"Mark as out of stock"} style={{width:26,height:26,borderRadius:"50%",flexShrink:0,border:"2px solid "+(item.empty?"#EF4444":BORD),background:item.empty?"#EF4444":"transparent",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:14,fontWeight:700,transition:"all 0.15s"}}>
                      {item.empty?"✕":""}
                    </button>

                      <button onClick={function(){remove(item.id);}} style={{fontSize:14,color:RE_H+"60",background:"none",border:"none",cursor:"pointer",padding:"0 2px"}}>×</button>

/* -- BUDGET TAB ------------------------------------------------------------ */
function getBudgetData(){return ld("budgetData",{weeklyTarget:0,history:[],pendingItems:[]});}
function saveBudgetData(d){sd("budgetData",d);}

function BudgetTab(){
  var [data,setDataRaw]=useState(function(){return getBudgetData();});
  var [editTarget,setEditTarget]=useState(false);
  var [targetVal,setTargetVal]=useState(String(data.weeklyTarget||""));
  var [showAdd,setShowAdd]=useState(false);
  var [addName,setAddName]=useState("");
  var [addPrice,setAddPrice]=useState("");
  var [addStore,setAddStore]=useState("");
  var [addQty,setAddQty]=useState("1");
  var [receiptLoading,setReceiptLoading]=useState(false);
  var [pendingReceipt,setPendingReceipt]=useState(null);
  var [receiptStore,setReceiptStore]=useState("");
  var [swapLoading,setSwapLoading]=useState(false);
  var [swaps,setSwaps]=useState(null);
  var [historyView,setHistoryView]=useState("week");
  var [compareItem,setCompareItem]=useState("");
  var [compareResults,setCompareResults]=useState(null);
  var [compareLoading,setCompareLoading]=useState(false);
  var fileRef=useRef(null);
  var receiptLibRef=useRef(null);
  var myStores=getMyStores().filter(function(s){return s.enabled;});

  function setData(d){setDataRaw(d);saveBudgetData(d);}

  /* -- Weekly spending calc -- */
  var now=new Date();
  var weekStart=new Date(now);weekStart.setDate(now.getDate()-now.getDay());weekStart.setHours(0,0,0,0);
  var weekEnd=new Date(weekStart);weekEnd.setDate(weekStart.getDate()+7);
  var thisWeek=data.history.filter(function(h){var d=new Date(h.date);return d>=weekStart&&d<weekEnd;});
  var weekSpent=thisWeek.reduce(function(sum,h){return sum+(h.total||0);},0);
  var pct=data.weeklyTarget>0?Math.min((weekSpent/data.weeklyTarget)*100,100):0;
  var overBudget=data.weeklyTarget>0&&weekSpent>data.weeklyTarget;

  /* -- Month spending -- */
  var monthStart=new Date(now.getFullYear(),now.getMonth(),1);
  var thisMonth=data.history.filter(function(h){return new Date(h.date)>=monthStart;});
  var monthSpent=thisMonth.reduce(function(sum,h){return sum+(h.total||0);},0);

  /* -- Save target -- */
  function saveTarget(){
    var v=parseFloat(targetVal);
    if(isNaN(v)||v<0) return;
    var d=Object.assign({},data,{weeklyTarget:v});
    setData(d);setEditTarget(false);
  }

  /* -- Add manual purchase -- */
  function addPurchase(){
    var name=addName.trim();
    var price=parseFloat(addPrice);
    var qty=parseInt(addQty)||1;
    if(!name||isNaN(price)) return;
    var entry={id:"p_"+Date.now(),items:[{name:name,price:price,qty:qty}],store:addStore||"Unknown",date:new Date().toISOString(),total:price*qty,source:"manual"};
    var d=Object.assign({},data,{history:[entry].concat(data.history)});
    setData(d);setAddName("");setAddPrice("");setAddQty("1");setShowAdd(false);
  }

  /* -- Receipt photo scan -- */
  function handleReceiptPhoto(e){
    var file=e.target.files&&e.target.files[0];
    if(!file) return;
    setReceiptLoading(true);
    try{e.target.value="";}catch(_){}
    var reader=new FileReader();
    reader.onload=function(){
      var dataUrl=reader.result||"";
      var rawB64=dataUrl.indexOf(",")>=0?dataUrl.split(",")[1]:dataUrl;
      var mime=(file.type||"image/jpeg");
      var body=JSON.stringify({base64:dataUrl,image:rawB64,mime:mime});
      fetch("https://lockedapi.cescocugliari.workers.dev/parse-receipt",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:body
      }).then(function(r){
        if(!r.ok) throw new Error("HTTP "+r.status);
        return r.json();
      }).then(function(d){
        setReceiptLoading(false);
        var parseResult=extractReceiptJson(d);

        if(parseResult.status==="success"){
          var parsed=parseResult.data;
          parsed.items=parsed.items.map(function(it){
            return {
              name:String(it.name||it.item||"Item"),
              price:parseFloat(it.price||it.cost||0)||0,
              qty:parseFloat(it.qty||it.quantity||1)||1,
              category:it.category||""
            };
          });
          if(!parsed.total){parsed.total=parsed.items.reduce(function(s,i){return s+i.price*i.qty;},0);}
          parsed.total=Math.round(parsed.total*100)/100;
          parsed.store=parsed.store||"Unknown";
          setPendingReceipt(parsed);
        } else if(parseResult.status==="ocr_failure"){
          setPendingReceipt({store:"Unknown",items:[],total:0,error:"No items detected. Try a clearer, well-lit photo of the entire receipt."});
        } else if(parseResult.status==="backend_error"){
          setPendingReceipt({store:"Unknown",items:[],total:0,error:"Receipt service temporarily unavailable. Please try again."});
        } else {
          setPendingReceipt({store:"Unknown",items:[],total:0,error:"Could not process receipt. Try again."});
        }
      }).catch(function(err){
        setReceiptLoading(false);
        setPendingReceipt({store:"Unknown",items:[],total:0,error:"Scan failed: "+(err&&err.message?err.message:"network error")+". Try again."});
      });
    };
    reader.onerror=function(){
      setReceiptLoading(false);
      setPendingReceipt({store:"Unknown",items:[],total:0,error:"Could not read image file."});
    };
    reader.readAsDataURL(file);
  }

  function extractReceiptJson(d){
    var result={data:null, status:"unknown", reason:""};

    if(!d){
      result.status="backend_error";
      result.reason="Empty response from server";
      return result;
    }

    if(d.items&&Array.isArray(d.items)){
      if(d.items.length===0){
        result.status="ocr_failure";
        result.reason="No items detected";
      } else {
        result.data=d;
        result.status="success";
      }
      return result;
    }

    var text="";
    if(d.content&&Array.isArray(d.content)&&d.content[0]){
      text=d.content[0].text||d.content[0].content||"";
    }
    if(!text) text=d.text||d.result||d.output||d.response||d.message||"";
    if(!text&&d.data){
      if(typeof d.data==="object"&&d.data.items){
        if(d.data.items.length===0){
          result.status="ocr_failure";
          result.reason="No items detected";
          return result;
        }
        result.data=d.data;
        result.status="success";
        return result;
      }
      if(typeof d.data==="string") text=d.data;
    }

    if(!text){
      result.status="backend_error";
      result.reason="Unrecognized response format";
      return result;
    }

    text=String(text).replace(/^```(?:json)?\s*/i,"").replace(/```\s*$/,"");
    var match=text.match(/\{[\s\S]*\}/);

    if(!match){
      result.status="backend_error";
      result.reason="No valid JSON found";
      return result;
    }

    try{
      var parsed=JSON.parse(match[0]);
      if(parsed.items&&Array.isArray(parsed.items)){
        if(parsed.items.length===0){
          result.status="ocr_failure";
          result.reason="No items detected";
        } else {
          result.data=parsed;
          result.status="success";
        }
      } else {
        result.status="backend_error";
        result.reason="Response missing items array";
      }
      return result;
    } catch(_){
      try{
        var repaired=JSON.parse(match[0].replace(/,(\s*[}\]])/g,"$1"));
        if(repaired.items&&Array.isArray(repaired.items)){
          if(repaired.items.length===0){
            result.status="ocr_failure";
            result.reason="No items detected";
          } else {
            result.data=repaired;
            result.status="success";
          }
          return result;
        }
      } catch(_){
        result.status="backend_error";
        result.reason="Could not parse JSON";
        return result;
      }
    }
  }

  /* -- Confirm receipt -- */
  function confirmReceipt(){
    if(!pendingReceipt||!pendingReceipt.items) return;
    var store=receiptStore||(pendingReceipt.store!=="Unknown"?pendingReceipt.store:"")||"Unknown";
    var total=pendingReceipt.items.reduce(function(s,i){return s+(i.price||0)*(i.qty||1);},0);
    var entry={id:"r_"+Date.now(),items:pendingReceipt.items,store:store,date:new Date().toISOString(),total:pendingReceipt.total||total,source:"receipt"};
    var d=Object.assign({},data,{history:[entry].concat(data.history)});
    setData(d);
    /* Save to pantry */
    addToPantry(pendingReceipt.items,store);
    setPendingReceipt(null);setReceiptStore("");
  }

  /* -- Add from shopping list (checked items) -- */
  function importCheckedItems(){
    var list=getShoppingList().filter(function(x){return x.checked;});
    if(list.length===0) return;
    var items=list.map(function(x){return {name:x.itemName,price:0,qty:x.quantity||1};});
    var entry={id:"sl_"+Date.now(),items:items,store:"Shopping List",date:new Date().toISOString(),total:0,source:"shopping_list",needsPrices:true};
    var d=Object.assign({},data,{pendingItems:data.pendingItems.concat([entry])});
    setData(d);
  }

  /* -- AI cheaper swaps -- */
  function getSwaps(){
    if(thisWeek.length===0) return;
    setSwapLoading(true);
    var recentItems=[];
    thisWeek.forEach(function(h){h.items.forEach(function(i){if(i.price>0)recentItems.push(i.name+" ($"+i.price.toFixed(2)+" at "+(h.store||"unknown")+")")});});
    var storeNames=myStores.map(function(s){return s.name+(s.description?" ("+s.description+")":"");}).join(", ");
    fetch("https://lockedapi.cescocugliari.workers.dev/",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        system:"You are a budget grocery advisor. The user shops at: "+storeNames+". Suggest cheaper alternatives for their recent purchases. For each swap, name the specific cheaper product and which store. Return ONLY a JSON array: [{\"original\":\"item name\",\"swap\":\"cheaper alternative\",\"store\":\"store name\",\"savings\":\"$X.XX\"}]. Max 6 swaps. No explanation, raw JSON array only.",
        messages:[{role:"user",content:"My recent purchases:\n"+recentItems.join("\n")+"\n\nMy weekly budget: $"+(data.weeklyTarget||"not set")+". I've spent $"+weekSpent.toFixed(2)+" this week. Suggest cheaper swaps."}],
        max_tokens:500
      })
    }).then(function(r){return r.json();}).then(function(d){
      setSwapLoading(false);
      var text=(d.content&&d.content[0]&&d.content[0].text)||"[]";
      try{var m=text.match(/\[[\s\S]*\]/);if(m)setSwaps(JSON.parse(m[0]));else setSwaps([]);}catch(e){setSwaps([]);}
    }).catch(function(){setSwapLoading(false);setSwaps([]);});
  }

  /* -- Store price comparison -- */
  function comparePrices(){
    if(!compareItem.trim()||myStores.length<2) return;
    setCompareLoading(true);
    var storeNames=myStores.map(function(s){return s.name+(s.description?" ("+s.description+")":"");}).join(", ");
    fetch("https://lockedapi.cescocugliari.workers.dev/",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        system:"You are a grocery price comparison expert. Compare prices of a product across stores. Return ONLY a JSON array sorted cheapest first: [{\"store\":\"Store Name\",\"product\":\"specific product name\",\"price\":\"$X.XX\",\"note\":\"brief note\"}]. Use realistic prices for each store. No explanation, raw JSON array only.",
        messages:[{role:"user",content:"Compare prices for \""+compareItem.trim()+"\" across these stores: "+storeNames}],
        max_tokens:400
      })
    }).then(function(r){return r.json();}).then(function(d){
      setCompareLoading(false);
      var text=(d.content&&d.content[0]&&d.content[0].text)||"[]";
      try{var m=text.match(/\[[\s\S]*\]/);if(m)setCompareResults(JSON.parse(m[0]));else setCompareResults([]);}catch(e){setCompareResults([]);}
    }).catch(function(){setCompareLoading(false);setCompareResults([]);});
  }

  /* -- Delete history entry -- */
  function deleteEntry(id){
    var d=Object.assign({},data,{history:data.history.filter(function(h){return h.id!==id;})});
    setData(d);
  }

  /* -- Filtered history -- */
  var filteredHistory=data.history;
  if(historyView==="week") filteredHistory=thisWeek;
  else if(historyView==="month") filteredHistory=thisMonth;
  else if(historyView==="receipts") filteredHistory=data.history.filter(function(e){return e.source==="receipt";});

  return (
    <div>
      {/* -- Weekly Target & Progress -- */}
      <div style={{background:CARD,borderRadius:14,padding:"16px",border:"1px solid "+BORD,marginBottom:14}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>

            <button onClick={getSwaps} disabled={swapLoading} style={{fontSize:11,color:OR,background:"none",border:"none",fontWeight:700,cursor:"pointer"}}>{swapLoading?"Finding savings...":"Find Cheaper Swaps"}</button>

          {swaps&&swaps.length===0&&<p style={{fontSize:12,color:MU}}>No cheaper alternatives found. You're already shopping smart!</p>}
        </div>
      )}

      {/* -- Purchase History -- */}
      <div style={{background:CARD,borderRadius:14,padding:"16px",border:"1px solid "+BORD,marginBottom:14}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <p style={{fontSize:11,fontWeight:700,color:MU,letterSpacing:"0.06em",margin:0}}>HISTORY</p>
          <div style={{display:"flex",gap:4}}>
            {["week","month","all","receipts"].map(function(v){
              var act=historyView===v;
              return <button key={v} onClick={function(){setHistoryView(v);}} style={{fontSize:10,padding:"4px 8px",borderRadius:6,border:act?"none":"1px solid "+BORD,background:act?OR:"transparent",color:act?"#fff":MU,fontWeight:700,cursor:"pointer"}}>{v==="week"?"Week":v==="month"?"Month":v==="receipts"?"🧾 Receipts":"All"}</button>;

/* -- MEAL PLANNER TAB ----------------------------------------------------- */
function getMealPlans(){return ld("mealPlans",[]);}
function saveMealPlans(p){sd("mealPlans",p);}

function MealPlannerTab(){
  var [plans,setPlansRaw]=useState(function(){return getMealPlans();});
  var [generating,setGenerating]=useState(false);
  var [activePlan,setActivePlan]=useState(null);
  var [daysCount,setDaysCount]=useState("7");
  var [mealsPerDay,setMealsPerDay]=useState("3");
  var [dietPref,setDietPref]=useState("");
  var [budgetPref,setBudgetPref]=useState("");
  var [showForm,setShowForm]=useState(false);
  var myStores=getMyStores().filter(function(s){return s.enabled;});
  var profile=ld("profile",{});

  function setPlans(p){setPlansRaw(p);saveMealPlans(p);}

  /* Build context for AI */
  function buildMealContext(){
    var fp=ld("fuelProfile",null);
    var tdee=fp&&fp.tdee?fp.tdee:calcTDEE(profile);
    var pro=fp&&fp.macroProtein?fp.macroProtein:(profile.macroProtein||160);
    var carb=fp&&fp.macroCarbs?fp.macroCarbs:(profile.macroCarbs||220);
    var fat=fp&&fp.macroFat?fp.macroFat:(profile.macroFat||60);
    var goal=fp&&fp.goal?fp.goal:(profile.goal||"maintain");
    var ctx="STRICT CALORIE TARGET: "+tdee+" kcal per day. ";
    ctx+="The TOTAL calories across ALL meals + snacks MUST add up to approximately "+tdee+" kcal. ";
    ctx+="Macros per day: "+pro+"g protein, "+carb+"g carbs, "+fat+"g fat. ";
    ctx+="Goal: "+goal+". ";
    if(profile.weightKg) ctx+="Weight: "+profile.weightKg+"kg. ";
    var storeNames=myStores.map(function(s){return s.name+(s.description?" ("+s.description+")":"");}).join(", ");
    if(storeNames) ctx+="Shops at: "+storeNames+". ";
    var budgetData=getBudgetData();
    if(budgetData.weeklyTarget>0) ctx+="Weekly grocery budget: $"+budgetData.weeklyTarget+". ";
    if(budgetPref) ctx+="Budget preference: "+budgetPref+". ";
    if(dietPref) ctx+="Diet preferences/restrictions: "+dietPref+". ";
    return ctx;
  }

  /* Generate meal plan */
  function generatePlan(){
    setGenerating(true);
    var ctx=buildMealContext();
    var days=parseInt(daysCount)||3;
    var meals=parseInt(mealsPerDay)||3;
    var fp=ld("fuelProfile",null);
    var dailyCal=fp&&fp.tdee?fp.tdee:calcTDEE(profile);
    var dayNamesList=[];
    var dayNames2=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
    for(var di=0;di<days;di++){var dd=new Date();dd.setDate(dd.getDate()+di);dayNamesList.push(dayNames2[dd.getDay()]);}
    fetch("https://lockedapi.cescocugliari.workers.dev/",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        system:"You are a meal planner. "+ctx+" CRITICAL: Each day MUST total approximately "+dailyCal+" kcal. Every day must have "+meals+" main meals PLUS 1-2 snacks. Meal structure: Breakfast, Lunch, Dinner"+(meals>3?", Meal "+meals:"")+" and Snack. Distribute calories: ~30% breakfast, ~30% lunch, ~30% dinner, ~10% snacks. Return ONLY valid JSON. Be concise — short titles, 2-4 ingredients per meal. Format: {\"name\":\"Plan Name\",\"days\":[{\"day\":\"DayName\",\"meals\":[{\"name\":\"Breakfast\",\"title\":\"Title\",\"ingredients\":[{\"item\":\"food\",\"amount\":\"qty\"}],\"totalCal\":N,\"totalProtein\":N,\"totalCarb\":N,\"totalFat\":N},{\"name\":\"Snack\",\"title\":\"Snack Title\",\"ingredients\":[{\"item\":\"food\",\"amount\":\"qty\"}],\"totalCal\":N,\"totalProtein\":N,\"totalCarb\":N,\"totalFat\":N}]}],\"shoppingList\":[{\"item\":\"specific product name as sold at store\",\"amount\":\"qty\",\"category\":\"meat\"}]}. IMPORTANT: In the shoppingList, use the exact product name as it would appear in the user's store (e.g. 'Quaker Old Fashioned Oats' not just 'oats', 'Chobani Greek Yogurt' not just 'yogurt'). Days: "+dayNamesList.join(",")+". Keep response under 3500 tokens.",
        messages:[{role:"user",content:"Create a "+days+"-day meal plan totaling "+dailyCal+" kcal per day. ACCURACY RULES: 1) Use REAL calorie counts — oatmeal 1 cup = 300 kcal, banana = 105 kcal, chicken breast 150g = 250 kcal, eggs 2 = 140 kcal, rice 1 cup cooked = 200 kcal, etc. NEVER inflate numbers. 2) To hit "+dailyCal+" kcal, use LARGER PORTIONS or MORE FOOD — do not fake calorie numbers. 3) Each day: "+meals+" main meals + 1-2 snacks. 4) Distribute roughly: breakfast 25%, lunch 30%, dinner 35%, snacks 10%. "+(dietPref?" Preferences: "+dietPref+". ":"")+(budgetPref?" Budget: "+budgetPref+". ":"")+"Return ONLY valid JSON."}],
        max_tokens:4096
      })
    }).then(function(r){return r.json();}).then(function(d){
      setGenerating(false);
      var text=(d.content&&d.content[0]&&d.content[0].text)||"";
      if(!text) return;
      try{
        var match=text.match(/\{[\s\S]*\}/);
        if(!match) return;
        var raw=match[0];
        var opens=raw.split("[").length-1;
        var closes=raw.split("]").length-1;
        while(closes<opens){raw+="]";closes++;}
        var braceOpens=raw.split("{").length-1;
        var braceCloses=raw.split("}").length-1;
        while(braceCloses<braceOpens){raw+="}";braceCloses++;}
        var plan=JSON.parse(raw);
        plan.id="mp_"+Date.now();
        plan.created=new Date().toISOString();
        plan.daysCount=days;
        plan.mealsPerDay=meals;
        if(!plan.days||plan.days.length===0) return;
        var updated=[plan].concat(plans);
        setPlans(updated);
        setActivePlan(plan);
        setShowForm(false);
      }catch(e){/* parse error */}
    }).catch(function(){setGenerating(false);});
  }

  /* Add shopping list to shopping tab */
  function addToShopping(plan){
    if(!plan.shoppingList||plan.shoppingList.length===0){alert("No shopping list in this plan.");return;}
    var list=getShoppingList();
    var added=0;
    var ts=Date.now();
    plan.shoppingList.forEach(function(item,idx){
      var name=(item.item||item.name||"").trim();
      if(!name) return;
      /* loose match — ignore case and small differences */
      var exists=list.find(function(x){return x.itemName.toLowerCase().indexOf(name.toLowerCase().slice(0,6))>=0;});
      if(!exists){
        list.push({id:"sh_"+(ts+idx)+"_"+Math.random().toString(36).slice(2,9),itemName:name,quantity:1,unit:item.amount||"qty",category:item.category||categorizeItem(name),dateAdded:new Date().toISOString(),checked:false,fromMealPlan:true});
        added++;
      }
    });
    saveShoppingList(list);
    alert(added+" items added to shopping list!"+(added<plan.shoppingList.length?" ("+(plan.shoppingList.length-added)+" already on list)":""));
  }

  /* Delete plan */
  function deletePlan(id){
    var updated=plans.filter(function(p){return p.id!==id;});
    setPlans(updated);
    if(activePlan&&activePlan.id===id) setActivePlan(null);
  }

  /* Day colors for visual variety */
  var dayColors=["#F97316","#3B82F6","#22C55E","#8B5CF6","#EF4444","#06B6D4","#F59E0B"];

  /* -- Active plan detail view -- */
  if(activePlan){
    return (
      <div>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
          <button onClick={function(){setActivePlan(null);}} style={{fontSize:18,color:MU,background:"none",border:"none",cursor:"pointer",padding:0}}>&larr;</button>
          <div style={{flex:1}}>

/* -- SUPPLEMENTS TAB -------------------------------------------------- */
var PRESET_SUPPS=["Creatine","Whey Protein","Casein","Pre-Workout","Omega 3","Vitamin D","Vitamin C","Magnesium","Zinc","Caffeine","Collagen","BCAAs","Ashwagandha","Melatonin","Multivitamin"];
var SUPP_TIMES=["Morning","Pre-Workout","With Food","Before Bed","Custom"];
var SUPP_FREQ=["Daily","Every Other Day","Weekly"];

function getSuppLog(){return ld("suppLog",{});}
function markSuppTaken(suppName){
  var log=getSuppLog();
  var today=new Date().toISOString().slice(0,10);
  if(!log[today]) log[today]=[];
  if(log[today].indexOf(suppName)<0) log[today].push(suppName);
  sd("suppLog",log);
  return log;
}
function isSuppTaken(suppName,dateISO){
  var log=getSuppLog();
  if(!dateISO) dateISO=new Date().toISOString().slice(0,10);
  return log[dateISO]&&log[dateISO].indexOf(suppName)>=0;
}
function getSuppStreak(suppName){
  var log=getSuppLog();
  var streak=0;
  var d=new Date();
  while(true){
    var k=d.toISOString().slice(0,10);
    if(log[k]&&log[k].indexOf(suppName)>=0){streak++;d.setDate(d.getDate()-1);}
    else break;
  }
  return streak;
}
function getDueSupps(){
  var supps=ld("supplements",[]);
  var now=new Date();
  var hour=now.getHours();
  var today=now.toISOString().slice(0,10);
  var log=getSuppLog();
  var taken=log[today]||[];
  return supps.filter(function(s){
    if(taken.indexOf(s.name)>=0) return false;
    if(s.freq==="Every Other Day"){var day=Math.floor(now.getTime()/(1000*60*60*24));if(day%2!==0) return false;}
    if(s.freq==="Weekly"&&now.getDay()!==1) return false;
    var t=s.timeOf||"";
    if(t==="Morning"&&hour>=5&&hour<12) return true;
    if(t==="Pre-Workout"&&hour>=12&&hour<18) return true;
    if(t==="With Food"&&hour>=11&&hour<14) return true;
    if(t==="Before Bed"&&hour>=19) return true;
    if(t!=="Morning"&&t!=="Pre-Workout"&&t!=="With Food"&&t!=="Before Bed") return true;
    return false;
  });
}
